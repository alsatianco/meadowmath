            <span class="tool-icon">📍</span>
            <h1 class="tool-title" data-i18n="section.tools.geoboard.title">Geoboard</h1>
          </div>
          <div class="tool-controls">
            <div class="mode-switch">
              <button class="mode-btn active" data-mode="explore" data-i18n="section.modes.explore">Explore</button>
              <button class="mode-btn" data-mode="challenges" data-i18n="section.modes.challenges">Challenges</button>
            </div>
            <button class="btn-reset"><span>↺</span><span data-i18n="section.common.reset">Reset</span></button>
          </div>
        </header>
        <div class="tool-main">
          <div class="tool-options">
            <div class="option-group">
              <label class="option-label">Grid:</label>
              <select class="option-select" id="grid-select">
                <option value="5">5 × 5</option>
                <option value="7">7 × 7</option>
              </select>
            </div>
            <div class="color-buttons">
              <button class="color-btn active" data-color="#FF6B9D" style="background: #FF6B9D;"></button>
              <button class="color-btn" data-color="#00C9C9" style="background: #00C9C9;"></button>
              <button class="color-btn" data-color="#FFD700" style="background: #FFD700;"></button>
              <button class="color-btn" data-color="#4ade80" style="background: #4ade80;"></button>
            </div>
          </div>
          <div class="tool-canvas" id="tool-canvas">
            <svg class="geoboard-svg" id="geoboard-svg"></svg>
          </div>
          <div class="tool-feedback" id="feedback-banner">
            <p class="feedback-text" id="feedback-text">Click pegs to create shapes</p>
          </div>
          <div class="challenge-panel" id="challenge-panel" style="display: none;">
            <div class="challenge-header">
              <span class="challenge-progress" id="challenge-progress">Challenge 1 of 6</span>
            </div>
            <p class="challenge-prompt" id="challenge-prompt">Make a triangle</p>
            <div class="challenge-actions">
              <button class="btn-check" id="btn-check">Check!</button>
              <button class="btn-skip" id="btn-skip">Skip →</button>
            </div>
          </div>
        </div>
