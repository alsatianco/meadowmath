  <script>
    class NumberRainbow extends ActivityBase {
      constructor() { super({ totalRounds: 6, activityId: 'number-rainbow', gradeLevel: 'number-friends', autoAdvanceDelay: 2200 }); }
      init() {
        super.init();
        this.holder = document.getElementById('rainbow-holder');
        // Build the rainbow once — arcs accumulate across rounds instead of
        // being rebuilt per round, so the whole rainbow is complete by the end.
        this.rainbowWidget = NFWidgets.rainbow(this.holder);
        this.buttons = Array.from(this.rainbowWidget.root.querySelectorAll('.nf-rainbow-num'));
        this.buttons.forEach(b => b.addEventListener('click', () => this.pick(b)));
        this.audio = NFWidgets.audioGuide({ instructionKey: 'section.activities.number-rainbow.instruction' });
        this.order = this.shuffle([0, 1, 2, 3, 4, 5]);
        this.nextRound();
      }
      startRound() {
        this.buttons.forEach(b => { b.classList.remove('nf-glow', 'correct', 'incorrect'); b.disabled = false; });
        this.a = this.order[this.currentRound - 1];
        this.b = 10 - this.a;
        this.aBtn = this.buttons.find(b => Number(b.dataset.v) === this.a);
        if (this.aBtn) this.aBtn.classList.add('nf-glow');
        const ask = i18n.t('section.activities.number-rainbow.ask').replace(/\{\{a\}\}/g, this.a);
        this.audio.say(ask);
      }
      pick(btn) {
        if (this.isAnswered) return; this.isAnswered = true;
        const v = Number(btn.dataset.v);
        const ok = v === this.b;
        this.buttons.forEach(b => b.disabled = true);
        if (this.aBtn) this.aBtn.classList.remove('nf-glow');
        const msg = i18n.t('section.activities.number-rainbow.' + (ok ? 'correct' : 'incorrect'))
          .replace(/\{\{a\}\}/g, this.a).replace(/\{\{b\}\}/g, this.b);
        // The a<->b arc is drawn every round (right or wrong) so the rainbow
        // is fully built by the end — the wrong branch still shows (and
        // celebrates) the true partner instead of leaving a gap.
        this.rainbowWidget.arc(this.a);
        const rightBtn = this.buttons.find(b => Number(b.dataset.v) === this.b);
        if (ok) {
          btn.classList.add('correct');
          if (this.aBtn) this.aBtn.classList.add('correct');
          BlockEngine.sfx('correct');
          this.incrementCorrect();
        } else {
          btn.classList.add('incorrect');
          if (rightBtn) rightBtn.classList.add('correct');
          if (this.aBtn) this.aBtn.classList.add('correct');
          BlockEngine.sfx('wrong');
          this.incrementIncorrect();
        }
        this.showFeedback(msg, !ok);
        this.audio.say(msg);
        this.renderProgress();
        this.autoAdvance();
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'number-rainbow'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new NumberRainbow().init(); });
  </script>
