  <script>
    // Every unordered split of m: [1,3] and [3,1] collapse to one chip [1,3].
    function unorderedSplits(m) {
      const seen = new Set(); const out = [];
      BlockEngine.validSplits(m).forEach(p => {
        const lo = Math.min(p[0], p[1]), hi = Math.max(p[0], p[1]);
        const key = lo + '+' + hi;
        if (!seen.has(key)) { seen.add(key); out.push([lo, hi]); }
      });
      return out;
    }

    class AllBonds extends ActivityBase {
      constructor() { super({ totalRounds: 3, activityId: 'all-bonds', gradeLevel: 'number-friends', autoAdvanceDelay: 2000 }); }
      init() {
        super.init();
        this.stage = document.getElementById('stage');
        this.choices = document.getElementById('choices');
        this.found = document.getElementById('found');
        NFWidgets.audioGuide({ instructionKey: 'section.activities.all-bonds.instruction' });
        this.ns = [4, 5, 6];
        this.nextRound();
      }
      startRound() {
        this.n = this.ns[this.currentRound - 1];
        this.correctPairs = unorderedSplits(this.n);
        this.foundKeys = new Set();
        this.wrongCounted = false;
        BlockEngine.clear(this.stage); this.choices.innerHTML = ''; this.found.innerHTML = '';
        BlockEngine.render(this.stage, { value: this.n, label: this.n });
        const decoyPool = this.shuffle(unorderedSplits(this.n - 1).concat(unorderedSplits(this.n + 1)));
        const decoys = decoyPool.slice(0, 3);
        const chips = this.shuffle(
          this.correctPairs.map(p => ({ pair: p, correct: true }))
            .concat(decoys.map(p => ({ pair: p, correct: false })))
        );
        chips.forEach(c => this.renderChip(c));
      }
      renderChip(c) {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = c.pair[0] + ' + ' + c.pair[1];
        btn.dataset.key = c.pair[0] + '+' + c.pair[1];
        btn.addEventListener('click', () => this.tapChip(c, btn));
        this.choices.appendChild(btn);
      }
      tapChip(c, btn) {
        if (this.isAnswered || btn.disabled) return;
        if (c.correct) {
          btn.disabled = true;
          btn.classList.add('correct');
          this.foundKeys.add(btn.dataset.key);
          BlockEngine.sfx('correct');
          this.renderFoundPair(c.pair);
          if (this.foundKeys.size === this.correctPairs.length) {
            this.isAnswered = true;
            this.incrementCorrect();
            this.disableButtons(this.choices);
            const msg = i18n.t('section.activities.all-bonds.foundAll').replace(/\{\{n\}\}/g, this.n);
            this.showFeedback(msg, false);
            BlockEngine.speak(msg);
            this.renderProgress();
            this.autoAdvance();
          } else {
            const msg = i18n.t('section.activities.all-bonds.foundOne');
            this.showFeedback(msg, false, 1200);
            BlockEngine.speak(msg);
          }
        } else {
          btn.classList.remove('incorrect');
          void btn.offsetWidth; // restart the shake animation on repeat taps
          btn.classList.add('incorrect');
          if (!this.wrongCounted) { this.wrongCounted = true; this.incrementIncorrect(); }
          BlockEngine.sfx('wrong');
          const msg = i18n.t('section.activities.all-bonds.wrongPair').replace(/\{\{n\}\}/g, this.n);
          this.showFeedback(msg, true, 1200);
          BlockEngine.speak(msg);
        }
      }
      renderFoundPair(pair) {
        const wrap = document.createElement('div');
        wrap.className = 'nf-pair';
        BlockEngine.render(wrap, { value: pair[0] });
        const plus = document.createElement('span');
        plus.className = 'nf-pair-plus';
        plus.textContent = '+';
        wrap.appendChild(plus);
        BlockEngine.render(wrap, { value: pair[1] });
        this.found.appendChild(wrap);
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'all-bonds'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new AllBonds().init(); });
  </script>
