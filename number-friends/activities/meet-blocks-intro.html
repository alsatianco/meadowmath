  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      const stage = document.getElementById('stage');
      const caption = document.getElementById('caption');
      const btn = document.getElementById('btn-next');
      const fallback = [
        'Hi! Every number is made of blocks.', 'One block is One.', 'Add a block — now it\'s Two!',
        'Five looks like the dots on dice.', 'Ten is two rows of five.', 'Tap a friend to hear its name!'
      ];
      const narrationIds = [
        'meet-blocks-opening', 'meet-blocks-one', 'meet-blocks-two', 'meet-blocks-five', 'meet-blocks-ten', 'meet-blocks-tap'
      ];
      function steps() {
        const raw = window.i18n.getRaw('section.activities.meet-blocks-intro.steps');
        return (Array.isArray(raw) && raw.length) ? raw : fallback;
      }
      const values = [null, 1, 2, 5, 10, null]; // number to show per step (null handled specially)
      let i = 0;
      function label(key, fb) { const v = i18n.t(key); return (v && v !== key) ? v : fb; }
      function show() {
        const s = steps();
        caption.textContent = s[i] || '';
        BlockEngine.clear(stage);
        const v = values[i];
        if (v != null) {
          const c = BlockEngine.render(stage, { value: v, label: v });
          BlockEngine.celebrate(c);
        } else if (i === values.length - 1) {
          for (let n = 1; n <= 5; n++) { BlockEngine.render(stage, { value: n }); }
        } else if (i === 0) {
          // Opening step has no assigned value — greet with a small lineup
          // so the stage is never visually empty.
          [1, 2, 3].forEach(n => BlockEngine.render(stage, { value: n }));
        }
        BlockEngine.speak(s[i] || '', { audioId: narrationIds[i] });
        const last = i >= s.length - 1;
        btn.textContent = last ? label('buttons.done', 'Done') : label('buttons.next', 'Next');
      }
      // Tapping a creature in the final lineup speaks its number.
      stage.addEventListener('click', (e) => {
        const creature = e.target.closest('.nb-creature');
        if (creature) {
          const number = creature.dataset.value;
          const names = ['', 'one', 'two', 'three', 'four', 'five'];
          BlockEngine.speak(number, { audioId: names[Number(number)] ? `number-${names[Number(number)]}` : null });
        }
      });
      btn.addEventListener('click', () => {
        const s = steps();
        if (i >= s.length - 1) { window.location.href = '../index.html'; return; }
        i++; show();
      });
      document.addEventListener('languageChanged', show);
      show();
    });
  </script>
