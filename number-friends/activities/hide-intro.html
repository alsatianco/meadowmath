  <script>
    // Hide and Seek (intro) — watch two worked examples where some friends of
    // Five duck behind the bush, then play: the whole (5) stays on screen, a
    // bush covers some cubes, and the child says how many are hidden.
    class HideIntro extends ActivityBase {
      constructor() { super({ totalRounds: 4, activityId: 'hide-intro', gradeLevel: 'number-friends', autoAdvanceDelay: 2200 }); }
      init() {
        super.init();
        this.stage = document.getElementById('stage');
        this.choices = document.getElementById('choices');
        this.caption = document.getElementById('caption');
        this.btnNext = document.getElementById('btn-next');
        this.audio = NFWidgets.audioGuide({ instructionKey: 'section.activities.hide-intro.instruction' });
        this.btnNext.addEventListener('click', () => this.onDemoNext());
        document.addEventListener('languageChanged', () => { if (this.inDemo) this.renderDemo(); });
        this.demoIdx = 0;
        this.rounds = this.shuffle([1, 2, 3, 4]).map(k => ({ n: 5, k }));
        this.runDemo();
      }
      L(key, fb) { return this.t('section.activities.hide-intro.' + key, fb); }
      say(text) { if (this.audio) this.audio.say(text); else BlockEngine.speak(text); }
      coverLast(g, k) {
        const cubes = g.querySelectorAll('.nb-cube');
        for (let i = cubes.length - k; i < cubes.length; i++) {
          const bush = document.createElement('div');
          bush.className = 'nb-hide';
          bush.textContent = '🌳';
          cubes[i].appendChild(bush);
        }
        BlockEngine.sfx('pop');
      }
      reveal(g) { g.querySelectorAll('.nb-hide').forEach(b => b.remove()); }

      // ---------- demo phase ----------
      demoData() {
        return [
          { n: 5, k: 2, q: this.L('demo1q', "Five friends! Shh… some duck behind the bush."), a: this.L('demo1a', "2 are hiding. We see 3 — but it's still 5!") },
          { n: 5, k: 1, q: this.L('demo2q', "Some are hiding again — how many this time?"), a: this.L('demo2a', "Just 1 hiding. 4 and 1 make 5!") }
        ];
      }
      runDemo() {
        this.inDemo = true;
        this.choices.style.display = 'none';
        if (this.progress) this.progress.style.visibility = 'hidden';
        this.btnNext.style.display = '';
        this.renderDemo();
      }
      renderDemo() {
        const d = this.demoData()[this.demoIdx];
        BlockEngine.clear(this.stage);
        const g = BlockEngine.render(this.stage, { value: d.n, label: d.n });
        this.caption.textContent = d.q;
        this.say(d.q);
        this.demoTimer = setTimeout(() => this.coverLast(g, d.k), 800);
        this.demoTimer2 = setTimeout(() => {
          this.caption.textContent = d.a;
          this.say(d.a);
          BlockEngine.celebrate(g);
        }, 1800);
        const last = this.demoIdx >= this.demoData().length - 1;
        this.btnNext.textContent = last ? this.L('startBtn', "Let's play!") : this.t('buttons.next', 'Next');
      }
      onDemoNext() {
        if (!this.inDemo) return;
        clearTimeout(this.demoTimer); clearTimeout(this.demoTimer2);
        if (this.demoIdx >= this.demoData().length - 1) { this.startPlay(); return; }
        this.demoIdx++;
        this.renderDemo();
      }
      startPlay() {
        this.inDemo = false;
        this.btnNext.style.display = 'none';
        this.choices.style.display = '';
        if (this.progress) this.progress.style.visibility = '';
        this.nextRound();
      }

      // ---------- play phase ----------
      startRound() {
        const r = this.rounds[this.currentRound - 1];
        this.n = r.n; this.k = r.k; this.m = this.n - this.k;
        BlockEngine.clear(this.stage); this.choices.innerHTML = '';
        this.g = BlockEngine.render(this.stage, { value: this.n, label: this.n });
        const q = this.L('play', 'Some friends are hiding! How many are behind the bush?');
        this.caption.textContent = q;
        this.say(q);
        this.hideTimer = setTimeout(() => {
          if (this.isAnswered) return;
          this.coverLast(this.g, this.k);
          this.renderChoices(BlockEngine.makeChoices(this.k, 4, 1, 5));
        }, 900);
      }
      renderChoices(values) {
        this.choices.innerHTML = '';
        values.forEach(v => {
          const b = document.createElement('button');
          b.className = 'answer-btn'; b.textContent = v; b.dataset.v = v;
          b.addEventListener('click', () => this.pick(v, b));
          this.choices.appendChild(b);
        });
      }
      pick(v, btn) {
        if (this.isAnswered) return;
        this.isAnswered = true;
        this.disableButtons(this.choices);
        const ok = v === this.k;
        const msg = (ok ? this.L('correct', 'Caught you! {{k}} were hiding — {{m}} and {{k}} make {{n}}.')
          : this.L('incorrect', '{{k}} were hiding — {{m}} and {{k}} make {{n}}.'))
          .replace(/\{\{m\}\}/g, this.m).replace(/\{\{k\}\}/g, this.k).replace(/\{\{n\}\}/g, this.n);
        if (ok) { btn.classList.add('correct'); this.incrementCorrect(); BlockEngine.sfx('correct'); }
        else {
          btn.classList.add('incorrect'); this.incrementIncorrect(); BlockEngine.sfx('wrong');
          this.choices.querySelectorAll('.answer-btn').forEach(b => { if (b.dataset.v == this.k) b.classList.add('correct'); });
        }
        this.reveal(this.g);
        if (ok) BlockEngine.celebrate(this.g);
        this.showFeedback(msg, !ok);
        this.say(msg);
        this.renderProgress();
        this.autoAdvance();
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'hide-intro'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new HideIntro().init(); });
  </script>
