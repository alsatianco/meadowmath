  <script>
    class MergeName extends ActivityBase {
      constructor() { super({ totalRounds: 8, activityId: 'merge-name', gradeLevel: 'number-friends', autoAdvanceDelay: 1700 }); }
      init() {
        super.init();
        this.stage = document.getElementById('stage');
        this.choices = document.getElementById('choices');
        NFWidgets.audioGuide({ instructionKey: 'section.activities.merge-name.instruction' });
        this.nextRound();
      }
      startRound() {
        this.a = this.randomInt(1, 9); this.b = this.randomInt(1, 10 - this.a);
        this.answer = this.a + this.b;
        BlockEngine.clear(this.stage); this.choices.innerHTML = '';
        this.ga = BlockEngine.render(this.stage, { value: this.a, label: this.a });
        this.gb = BlockEngine.render(this.stage, { value: this.b, label: this.b });
        this.renderChoices(BlockEngine.makeChoices(this.answer, 4, 2, 10));
      }
      reveal(ok) {
        BlockEngine.merge(this.ga, this.gb).then(sum => { if (ok) BlockEngine.celebrate(sum); });
      }
      pick(v, btn) {
        if (this.isAnswered) return; this.isAnswered = true;
        this.disableButtons(this.choices);
        const ok = v === this.answer;
        const msg = i18n.t('section.activities.merge-name.' + (ok ? 'correct' : 'incorrect'))
          .replace(/\{\{a\}\}/g, this.a).replace(/\{\{b\}\}/g, this.b).replace(/\{\{n\}\}/g, this.answer);
        if (ok) { btn.classList.add('correct'); this.incrementCorrect(); BlockEngine.sfx('correct'); }
        else {
          btn.classList.add('incorrect'); this.incrementIncorrect(); BlockEngine.sfx('wrong');
          this.choices.querySelectorAll('.answer-btn').forEach(b => { if (b.dataset.v == this.answer) b.classList.add('correct'); });
        }
        this.reveal(ok);
        this.showFeedback(msg, !ok); BlockEngine.speak(msg);
        this.renderProgress(); this.autoAdvance();
      }
      renderChoices(values) {
        this.choices.innerHTML = '';
        values.forEach(v => {
          const b = document.createElement('button');
          b.className = 'answer-btn'; b.textContent = v; b.dataset.v = v;
          b.addEventListener('click', () => this.pick(v, b));
          this.choices.appendChild(b);
        });
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'merge-name'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new MergeName().init(); });
  </script>
