  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      const stage = document.getElementById('stage');
      const caption = document.getElementById('caption');
      const btn = document.getElementById('btn-next');
      const fallback = [
        'I\'m Five — like an open hand!',
        'The frame has 3 already… 2 more to fill it up!',
        'Full five — high five!',
        'And I\'m Ten — two rows of five, two hands!',
        'Next stage: Ten and Some Ones!'
      ];
      function steps() {
        const raw = window.i18n.getRaw('section.activities.frame-intro.steps');
        return (Array.isArray(raw) && raw.length) ? raw : fallback;
      }
      function scene(idx, target) {
        BlockEngine.clear(target);
        if (idx === 0) {
          const g = BlockEngine.render(target, { value: 5, label: 5 });
          BlockEngine.celebrate(g);
          return;
        }
        if (idx === 1) {
          BlockEngine.renderSilhouette(target, { value: 5, layout: 'frame', filled: 3 });
          return;
        }
        if (idx === 2) {
          const sil = BlockEngine.renderSilhouette(target, { value: 5, layout: 'frame', filled: 3 });
          setTimeout(() => {
            BlockEngine.fillSilhouette(sil, 2);
            BlockEngine.celebrate(sil);
          }, 700);
          return;
        }
        if (idx === 3) {
          BlockEngine.renderSilhouette(target, { value: 10, layout: 'frame', filled: 10 });
          return;
        }
        if (idx === 4) {
          // Final teaser step — celebrate Ten one more time instead of
          // leaving the stage empty.
          const g = BlockEngine.render(target, { value: 10, label: 10 });
          BlockEngine.celebrate(g);
        }
      }
      function label(key, fb) { const v = i18n.t(key); return (v && v !== key) ? v : fb; }
      let i = 0;
      function show() {
        const s = steps();
        caption.textContent = s[i] || '';
        scene(i, stage);
        BlockEngine.speak(s[i] || '');
        const last = i >= s.length - 1;
        btn.textContent = last ? label('buttons.done', 'Done') : label('buttons.next', 'Next');
      }
      btn.addEventListener('click', () => {
        const s = steps();
        if (i >= s.length - 1) { window.location.href = '../index.html'; return; }
        i++; show();
      });
      document.addEventListener('languageChanged', show);
      show();
    });
  </script>
