  <script>
    // Joining Up! — first watch two worked examples on the magic staircase,
    // then predict: when friends a and b join up, which step do they reach?
    // The child taps the step (= a + b). Sums stay within 6 (a 6-step run).
    class JoiningUp extends ActivityBase {
      constructor() { super({ totalRounds: 5, activityId: 'merge-intro', gradeLevel: 'number-friends', autoAdvanceDelay: 2200 }); }
      init() {
        super.init();
        this.stage = document.getElementById('stage');
        this.climbers = document.getElementById('climbers');
        this.caption = document.getElementById('caption');
        this.btnNext = document.getElementById('btn-next');
        this.audio = NFWidgets.audioGuide({ instructionKey: 'section.activities.merge-intro.instruction' });
        this.btnNext.addEventListener('click', () => this.onDemoNext());
        document.addEventListener('languageChanged', () => this.refreshText());
        this.demoIdx = 0;
        this.rounds = this.buildRounds();
        this.runDemo();
      }
      L(key, fb) { return this.t('section.activities.merge-intro.' + key, fb); }
      say(text) { if (this.audio) this.audio.say(text); else BlockEngine.speak(text); }
      // five rounds, one per target step 2..6, each split into a random a+b
      buildRounds() {
        return this.shuffle([2, 3, 4, 5, 6]).map(t => {
          const a = this.randomInt(1, t - 1);
          return { a, b: t - a, sum: t };
        });
      }
      demoData() {
        return [
          { a: 2, b: 3, sum: 5, q: this.L('demo1q', 'Two and Three join up — which step do they reach?'), ans: this.L('demo1a', 'Together they reach step 5!') },
          { a: 1, b: 3, sum: 4, q: this.L('demo2q', 'One and Three join up — which step?'), ans: this.L('demo2a', 'They reach step 4!') }
        ];
      }

      // ---------- demo phase (watch two examples) ----------
      runDemo() {
        this.inDemo = true;
        this.climbers.style.display = 'none';
        if (this.progress) this.progress.style.visibility = 'hidden';
        this.btnNext.style.display = '';
        this.renderDemo();
      }
      renderDemo() {
        const d = this.demoData()[this.demoIdx];
        BlockEngine.clear(this.stage);
        const stairs = NFWidgets.staircase(this.stage, { steps: 6 });
        BlockEngine.render(stairs.slot(d.a), { value: d.a });
        BlockEngine.render(stairs.slot(d.b), { value: d.b });
        this.caption.textContent = d.q;
        this.say(d.q);
        this.demoRevealTimer = setTimeout(() => {
          const s = BlockEngine.render(stairs.slot(d.sum), { value: d.sum, label: d.sum });
          BlockEngine.celebrate(s);
          BlockEngine.sfx('snap');
          this.caption.textContent = d.ans;
          this.say(d.ans);
        }, 1200);
        const last = this.demoIdx >= this.demoData().length - 1;
        this.btnNext.textContent = last ? this.L('startBtn', "Let's play!") : this.t('buttons.next', 'Next');
      }
      onDemoNext() {
        if (!this.inDemo) return;
        clearTimeout(this.demoRevealTimer);
        if (this.demoIdx >= this.demoData().length - 1) { this.startPlay(); return; }
        this.demoIdx++;
        this.renderDemo();
      }
      startPlay() {
        this.inDemo = false;
        this.btnNext.style.display = 'none';
        this.climbers.style.display = '';
        if (this.progress) this.progress.style.visibility = '';
        this.nextRound();
      }

      // ---------- play phase (tap the step) ----------
      startRound() {
        const r = this.rounds[this.currentRound - 1];
        this.a = r.a; this.b = r.b; this.sum = r.sum;
        this.wrongCounted = false;
        BlockEngine.clear(this.stage);
        this.climbers.innerHTML = '';
        this.climbers.style.opacity = '';
        this.stairs = NFWidgets.staircase(this.stage, { steps: 6, onStep: (i, el) => this.tapStep(i, el) });
        BlockEngine.render(this.climbers, { value: this.a, label: this.a });
        const plus = document.createElement('span');
        plus.className = 'nf-plus';
        plus.textContent = '+';
        this.climbers.appendChild(plus);
        BlockEngine.render(this.climbers, { value: this.b, label: this.b });
        const q = this.L('play', '{{a}} and {{b}} join up — which step do they reach?')
          .replace(/\{\{a\}\}/g, this.a).replace(/\{\{b\}\}/g, this.b);
        this.caption.textContent = q;
        this.say(q);
      }
      tapStep(i, stepEl) {
        if (this.inDemo || this.isAnswered) return;
        if (i === this.sum) {
          this.isAnswered = true;
          stepEl.classList.add('nf-stair--correct');
          const s = BlockEngine.render(this.stairs.slot(i), { value: this.sum, label: this.sum });
          BlockEngine.celebrate(s);
          BlockEngine.sfx('correct');
          this.incrementCorrect();
          this.climbers.style.opacity = '.35';
          const msg = this.L('correct', 'Yes! {{a}} and {{b}} make {{n}}!')
            .replace(/\{\{a\}\}/g, this.a).replace(/\{\{b\}\}/g, this.b).replace(/\{\{n\}\}/g, this.sum);
          this.showFeedback(msg, false);
          this.say(msg);
          this.renderProgress();
          this.autoAdvance();
        } else {
          stepEl.classList.remove('nf-stair--wrong');
          void stepEl.offsetWidth; // restart shake on repeat taps
          stepEl.classList.add('nf-stair--wrong');
          BlockEngine.sfx('wrong');
          if (!this.wrongCounted) { this.wrongCounted = true; this.incrementIncorrect(); }
          const hint = i < this.sum
            ? this.L('higher', 'Higher! They reach a bigger step.')
            : this.L('lower', 'Lower! They reach a smaller step.');
          this.showFeedback(hint, true, 1200);
          this.say(hint);
        }
      }
      refreshText() {
        if (this.inDemo) this.renderDemo();
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'merge-intro'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new JoiningUp().init(); });
  </script>
