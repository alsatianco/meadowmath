  <script>
    class InsideMe extends ActivityBase {
      constructor() { super({ totalRounds: 4, activityId: 'inside-me', gradeLevel: 'number-friends', autoAdvanceDelay: 2000 }); }
      init() {
        super.init();
        this.stage = document.getElementById('stage');
        this.choices = document.getElementById('choices');
        NFWidgets.hostBadge(document.querySelector('.activity-header'), { value: 6, text: i18n.t('section.stages.stage-3.hostLine') });
        NFWidgets.audioGuide({ instructionKey: 'section.activities.inside-me.instruction' });
        this.ns = [3, 5, 7, 1];
        this.nextRound();
      }
      startRound() {
        this.n = this.ns[this.currentRound - 1];
        this.wrongCounted = false;
        BlockEngine.clear(this.stage); this.choices.innerHTML = '';
        BlockEngine.render(this.stage, { value: this.n, label: this.n });
        // n=1 is special: nobody fits inside One, so the lineup skips 1 and
        // adds a text "nobody" answer instead of a smallest-friend button.
        this.lineupValues = this.n === 1 ? [2, 3, 4, 5, 6]
          : this.n === 7 ? [1, 2, 3, 5, 8, 9]
          : [1, 2, 3, 4, 5, 6];
        this.correctSet = new Set(this.lineupValues.filter(m => m < this.n));
        this.foundKeys = new Set();
        this.shuffle(this.lineupValues).forEach(m => this.renderFriendBtn(m));
        if (this.n === 1) this.renderNobodyBtn();
      }
      renderFriendBtn(m) {
        const btn = document.createElement('button');
        btn.className = 'answer-btn nf-mini'; btn.dataset.v = m;
        BlockEngine.render(btn, { value: m });
        btn.addEventListener('click', () => this.tapFriend(m, btn));
        this.choices.appendChild(btn);
      }
      renderNobodyBtn() {
        const btn = document.createElement('button');
        btn.className = 'answer-btn'; btn.dataset.v = 'nobody';
        btn.textContent = i18n.t('section.activities.inside-me.nobody');
        btn.addEventListener('click', () => this.tapNobody(btn));
        this.choices.appendChild(btn);
      }
      tapFriend(m, btn) {
        if (this.isAnswered || btn.disabled) return;
        if (this.correctSet.has(m)) {
          btn.disabled = true;
          btn.classList.add('correct');
          this.foundKeys.add(m);
          BlockEngine.sfx('correct');
          BlockEngine.celebrate(btn.querySelector('.nb-group'));
          if (this.foundKeys.size === this.correctSet.size) this.completeRound();
        } else {
          btn.classList.remove('incorrect');
          void btn.offsetWidth; // restart the shake animation on repeat taps
          btn.classList.add('incorrect');
          BlockEngine.sfx('wrong');
          if (!this.wrongCounted) { this.wrongCounted = true; this.incrementIncorrect(); }
          const tooBigMsg = i18n.t('section.activities.inside-me.tooBig');
          this.showFeedback(tooBigMsg, true, 1200);
          BlockEngine.speak(tooBigMsg);
        }
      }
      tapNobody(btn) {
        if (this.isAnswered) return;
        btn.disabled = true;
        btn.classList.add('correct');
        BlockEngine.sfx('correct');
        this.completeRoundWith('nobodyMsg');
      }
      completeRound() { this.completeRoundWith('foundAll'); }
      completeRoundWith(msgKey) {
        this.isAnswered = true;
        this.incrementCorrect();
        this.disableButtons(this.choices);
        const msg = i18n.t('section.activities.inside-me.' + msgKey).replace(/\{\{n\}\}/g, this.n);
        this.showFeedback(msg, false);
        BlockEngine.speak(msg);
        this.renderProgress();
        this.autoAdvance();
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'inside-me'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new InsideMe().init(); });
  </script>
