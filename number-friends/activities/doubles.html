  <script>
    const DOUBLES_HALVES = [2, 4, 6, 8, 10];
    class Doubles extends ActivityBase {
      constructor() { super({ totalRounds: 10, activityId: 'doubles', gradeLevel: 'number-friends', autoAdvanceDelay: 1700 }); }
      init() {
        super.init();
        this.stage = document.getElementById('stage');
        this.choices = document.getElementById('choices');
        this.instrEl = document.querySelector('.activity-instruction');
        this.audio = NFWidgets.audioGuide({});
        this.nextRound();
      }
      startRound() {
        // odd rounds (1,3,5,7,9) double a mirrored friend; even rounds (2,4,6,8,10) halve one.
        this.isDouble = this.currentRound % 2 === 1;
        BlockEngine.clear(this.stage); this.choices.innerHTML = '';
        if (this.isDouble) {
          this.a = this.randomInt(1, 5);
          this.answer = this.a + this.a;
          BlockEngine.render(this.stage, { value: this.a, face: true });
          const mirror = BlockEngine.render(this.stage, { value: this.a, face: true });
          mirror.classList.add('nf-mirror');
          const instr = i18n.t('section.activities.doubles.instruction');
          this.instrEl.textContent = instr;
          this.audio.say(instr);
          this.renderChoices(BlockEngine.makeChoices(this.answer, 4, 2, 10));
        } else {
          this.n = DOUBLES_HALVES[this.randomInt(0, DOUBLES_HALVES.length - 1)];
          this.answer = this.n / 2;
          const group = BlockEngine.render(this.stage, { value: this.n, face: true });
          this.creature = group.querySelector('.nb-creature');
          const instr = i18n.t('section.activities.doubles.halveInstruction');
          this.instrEl.textContent = instr;
          this.audio.say(instr);
          this.renderChoices(BlockEngine.makeChoices(this.answer, 4, 1, 5));
        }
      }
      reveal(ok) {
        if (this.isDouble) {
          BlockEngine.clear(this.stage);
          const ga = BlockEngine.render(this.stage, { value: this.a });
          const gb = BlockEngine.render(this.stage, { value: this.a });
          BlockEngine.merge(ga, gb).then(sum => { if (ok) BlockEngine.celebrate(sum); });
        } else {
          BlockEngine.split(this.creature, [this.n / 2, this.n / 2]).then(parts => {
            if (ok) { BlockEngine.celebrate(parts.left); BlockEngine.celebrate(parts.right); }
          });
        }
      }
      pick(v, btn) {
        if (this.isAnswered) return; this.isAnswered = true;
        this.disableButtons(this.choices);
        const ok = v === this.answer;
        const key = this.isDouble ? (ok ? 'correct' : 'incorrect') : (ok ? 'halveCorrect' : 'halveIncorrect');
        // double rounds: {{a}}=a, {{n}}=2a (this.answer). halve rounds: {{n}}=n, {{a}}=n/2 (this.answer).
        const a = this.isDouble ? this.a : this.answer;
        const n = this.isDouble ? this.answer : this.n;
        const msg = i18n.t('section.activities.doubles.' + key).replace(/\{\{a\}\}/g, a).replace(/\{\{n\}\}/g, n);
        if (ok) { btn.classList.add('correct'); this.incrementCorrect(); BlockEngine.sfx('correct'); }
        else {
          btn.classList.add('incorrect'); this.incrementIncorrect(); BlockEngine.sfx('wrong');
          this.choices.querySelectorAll('.answer-btn').forEach(b => { if (b.dataset.v == this.answer) b.classList.add('correct'); });
        }
        this.reveal(ok);
        this.showFeedback(msg, !ok); BlockEngine.speak(msg);
        this.renderProgress(); this.autoAdvance();
      }
      renderChoices(values) {
        this.choices.innerHTML = '';
        values.forEach(v => {
          const b = document.createElement('button');
          b.className = 'answer-btn'; b.textContent = v; b.dataset.v = v;
          b.addEventListener('click', () => this.pick(v, b));
          this.choices.appendChild(b);
        });
      }
      showStats() { try { window.Storage.markActivityCompleted('number-friends', 'doubles'); } catch (e) {} super.showStats(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await i18n.ready(); new Doubles().init(); });
  </script>
