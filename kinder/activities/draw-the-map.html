  <style>
    /* Draw the Map Activity Styles */
    .direction-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: var(--radius-2xl);
      border: 4px solid #3b82f6;
      box-shadow: 0 6px 0 #2563eb;
    }

    .direction-icon {
      font-size: var(--text-3xl);
    }

    .direction-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: #1e40af;
      text-align: center;
      line-height: 1.4;
    }

    .map-container {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .map-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: var(--space-3);
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border-radius: var(--radius-xl);
      border: 4px solid #10b981;
    }

    .map-cell {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 3px solid #d1d5db;
      border-radius: var(--radius-lg);
      font-size: var(--text-4xl);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .map-cell:hover:not(.occupied):not(.answered) {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: #3b82f6;
      transform: scale(1.03);
    }

    .map-cell:focus {
      outline: 3px solid #6366f1;
      outline-offset: 2px;
    }

    .map-cell.reference {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
    }

    .map-cell.occupied {
      cursor: default;
    }

    .map-cell.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      animation: correctPulse 0.5s ease;
    }

    .map-cell.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      animation: shake 0.5s ease;
    }

    .map-cell.highlight {
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      border-color: #3b82f6;
    }

    .map-cell.answered {
      cursor: default;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .object-to-place {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2);
    }

    .place-label {
      font-family: var(--font-secondary);
      font-size: var(--text-base);
      color: var(--color-neutral-600);
    }

    .place-object {
      font-size: var(--text-4xl);
      animation: objectBounce 1s ease-in-out infinite;
    }

    @keyframes objectBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .map-cell {
        width: 65px;
        height: 65px;
        font-size: var(--text-3xl);
      }

      .place-object {
        font-size: var(--text-3xl);
      }

      .direction-text {
        font-size: var(--text-base);
      }
    }
  </style>

  <script>
    // Draw the Map Activity
    const DrawTheMap = {
      // Game state
      round: 1,
      maxRounds: 8,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,
      correctCell: -1,
      objectToPlace: '',
      referenceObject: '',
      referenceCell: -1,

      // DOM elements
      progress: null,
      directionText: null,
      mapGrid: null,
      placeObject: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Objects for placing
      objects: ['⭐', '🌸', '🎈', '🦋', '🍎', '🌈', '☀️', '🌙'],

      // Reference objects (landmarks)
      landmarks: ['🏠', '🌳', '🏫', '⛪', '🏪', '🏰'],

      // Positional relationships (relative to 3x3 grid with center = 4)
      positions: [
        { key: 'above', offsets: [-3], dir: 'ABOVE' },
        { key: 'below', offsets: [3], dir: 'BELOW' },
        { key: 'left', offsets: [-1], dir: 'to the LEFT of' },
        { key: 'right', offsets: [1], dir: 'to the RIGHT of' },
        { key: 'nextTo', offsets: [-1, 1, -3, 3], dir: 'NEXT TO' }
      ],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.directionText = document.getElementById('direction-text');
        this.mapGrid = document.getElementById('map-grid');
        this.placeObject = document.getElementById('place-object');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;
        this.feedback.classList.remove('show', 'error');

        // Pick random objects
        this.objectToPlace = this.objects[Math.floor(Math.random() * this.objects.length)];
        this.referenceObject = this.landmarks[Math.floor(Math.random() * this.landmarks.length)];
        this.placeObject.textContent = this.objectToPlace;

        // Pick position relationship
        const position = this.positions[Math.floor(Math.random() * this.positions.length)];

        // Pick reference cell (avoid edges for some positions)
        this.referenceCell = this.getValidReferenceCell(position);

        // Calculate correct cell
        const validOffsets = position.offsets.filter(offset => {
          const targetCell = this.referenceCell + offset;
          return this.isValidCell(targetCell, this.referenceCell, offset);
        });

        const chosenOffset = validOffsets[Math.floor(Math.random() * validOffsets.length)];
        this.correctCell = this.referenceCell + chosenOffset;

        // Build direction text
        const dirKey = `section.activities.draw-the-map.${position.key}`;
        const dirWord = i18n.t(dirKey) || position.dir;
        const prompt = i18n.t('section.activities.draw-the-map.prompt') || 'Put the {{object}} {{direction}} the {{landmark}}!';
        this.directionText.textContent = prompt
          .replace('{{object}}', this.objectToPlace)
          .replace('{{direction}}', dirWord)
          .replace('{{landmark}}', this.referenceObject);

        this.renderGrid();
        this.renderProgress();
      },

      /**
       * Get valid reference cell based on position type
       */
      getValidReferenceCell(position) {
        // Center cell works for all positions
        // Avoid edge cells for certain directions
        const validCells = [];

        for (let i = 0; i < 9; i++) {
          // For 'nextTo', at least ONE offset must be valid
          // For other positions, ALL offsets must be valid
          let hasValidOffset = false;
          let allValid = true;

          for (const offset of position.offsets) {
            const target = i + offset;
            if (this.isValidCell(target, i, offset)) {
              hasValidOffset = true;
            } else {
              allValid = false;
            }
          }

          // For nextTo, just need one valid adjacent cell
          // For directional (above, below, left, right), need the specific direction to be valid
          if (position.key === 'nextTo') {
            if (hasValidOffset) validCells.push(i);
          } else {
            if (allValid) validCells.push(i);
          }
        }

        // Fallback to center if no valid cells found
        if (validCells.length === 0) return 4;
        return validCells[Math.floor(Math.random() * validCells.length)];
      },

      /**
       * Check if cell index is valid
       */
      isValidCell(targetCell, refCell, offset) {
        // Check bounds
        if (targetCell < 0 || targetCell > 8) return false;

        // Check row wrapping for left/right
        const refRow = Math.floor(refCell / 3);
        const targetRow = Math.floor(targetCell / 3);

        if (offset === -1 || offset === 1) {
          if (refRow !== targetRow) return false;
        }

        return true;
      },

      /**
       * Render the map grid
       */
      renderGrid() {
        this.mapGrid.innerHTML = '';

        for (let i = 0; i < 9; i++) {
          const cell = document.createElement('button');
          cell.className = 'map-cell';
          cell.dataset.index = i;
          cell.setAttribute('aria-label', `Cell ${i + 1}`);

          if (i === this.referenceCell) {
            cell.textContent = this.referenceObject;
            cell.classList.add('reference', 'occupied');
          }

          cell.addEventListener('click', () => this.handleCellClick(i, cell));
          cell.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.handleCellClick(i, cell);
            }
          });

          this.mapGrid.appendChild(cell);
        }
      },

      /**
       * Handle cell click
       */
      handleCellClick(index, cell) {
        if (this.hasAnswered) return;
        if (index === this.referenceCell) return; // Can't place on reference

        this.hasAnswered = true;

        const cells = this.mapGrid.querySelectorAll('.map-cell');
        cells.forEach(c => c.classList.add('answered'));

        if (index === this.correctCell) {
          // Correct!
          cell.textContent = this.objectToPlace;
          cell.classList.add('correct');
          this.correctCount++;

          const msg = i18n.t('section.activities.draw-the-map.correct') || 'Perfect placement!';
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');

          if (typeof celebrate === 'function') {
            celebrate(cell);
          }
        } else {
          // Incorrect
          cell.classList.add('incorrect');
          // Show correct position
          cells[this.correctCell].textContent = this.objectToPlace;
          cells[this.correctCell].classList.add('highlight');
          this.wrongCount++;

          const msg = i18n.t('section.activities.draw-the-map.incorrect') || 'Not quite! Look where it goes.';
          this.feedback.textContent = msg;
          this.feedback.classList.add('show', 'error');
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🗺️';
          this.statsMessage.textContent = i18n.t('section.activities.draw-the-map.perfect') || 'Map Master!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.draw-the-map.great') || 'Great directions!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.draw-the-map.keepPracticing') || 'Keep exploring!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      DrawTheMap.init();
    });
  </script>
