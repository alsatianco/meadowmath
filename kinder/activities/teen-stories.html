  <style>
    /* Teen Stories Activity Styles */
    .story-display {
      text-align: center;
      margin-bottom: var(--space-4);
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      color: var(--color-neutral-700);
      padding: var(--space-3);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-lg);
      border: 3px solid #f59e0b;
    }

    .story-text {
      line-height: 1.6;
    }

    .story-emoji {
      font-size: var(--text-xl);
    }

    .picture-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
    }

    .group-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .group-label {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-lg);
      min-width: 50px;
      text-align: center;
    }

    .ten-box .group-label {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #2563eb;
      border: 2px solid #3b82f6;
    }

    .ones-box .group-label {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #16a34a;
      border: 2px solid #22c55e;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 4px;
      padding: var(--space-3);
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border: 4px solid #3b82f6;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 0 #2563eb;
    }

    .items-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      padding: var(--space-3);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 0 #16a34a;
      min-width: 60px;
      min-height: 60px;
    }

    .item-cell {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .plus-sign, .equals-sign {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-500);
    }

    .total-box {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      padding: var(--space-3) var(--space-4);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #d97706;
      border: 4px solid #f59e0b;
      border-radius: var(--radius-xl);
      box-shadow: 0 4px 0 #d97706;
      min-width: 70px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .total-box.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      color: #16a34a;
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
    }

    /* Question Section */
    .question-section {
      text-align: center;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    .choice-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
    }

    .choice-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-xl);
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: #166534;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #16a34a, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #16a34a, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #16a34a;
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      animation: correctPulse 0.5s ease;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .picture-display {
        gap: var(--space-2);
      }

      .item-cell {
        width: 30px;
        height: 30px;
        font-size: 20px;
      }

      .plus-sign, .equals-sign {
        font-size: var(--text-2xl);
      }

      .total-box {
        font-size: var(--text-2xl);
        min-width: 60px;
      }

      .choice-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-xl);
      }
    }

    @media (max-width: 480px) {
      .picture-display {
        flex-direction: column;
      }

      .plus-sign, .equals-sign {
        transform: rotate(90deg);
      }
    }
  </style>

  <script>
    // Teen Stories Activity
    const TeenStories = {
      // Game state
      round: 1,
      maxRounds: 10,
      targetNumber: 0,
      onesCount: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      storyDisplay: null,
      tenItems: null,
      onesItems: null,
      onesLabel: null,
      totalBox: null,
      choiceButtons: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Story templates with emojis
      stories: [
        { emoji: '⭐', text: 'I have 10 stars. I got {{ones}} more. How many stars do I have now?' },
        { emoji: '🍎', text: 'There are 10 apples in a basket. Mom adds {{ones}} more. How many apples are there?' },
        { emoji: '🌸', text: '10 flowers are in the garden. {{ones}} more bloom. How many flowers total?' },
        { emoji: '🐸', text: '10 frogs are on a lily pad. {{ones}} more jump on. How many frogs are there?' },
        { emoji: '🦋', text: 'I see 10 butterflies. {{ones}} more fly over. How many butterflies in all?' },
        { emoji: '🍪', text: 'There are 10 cookies. We bake {{ones}} more. How many cookies now?' },
        { emoji: '🎈', text: '10 balloons float up. {{ones}} more join them. How many balloons total?' },
        { emoji: '🐦', text: '10 birds sit on a branch. {{ones}} more land. How many birds are there?' }
      ],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.storyDisplay = document.getElementById('story-display');
        this.tenItems = document.getElementById('ten-items');
        this.onesItems = document.getElementById('ones-items');
        this.onesLabel = document.getElementById('ones-label');
        this.totalBox = document.getElementById('total-box');
        this.choiceButtons = document.getElementById('choice-buttons');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Generate ones (1-9)
        this.onesCount = randomInt(1, 9);
        this.targetNumber = 10 + this.onesCount;

        // Pick random story
        const story = this.stories[randomInt(0, this.stories.length - 1)];
        const storyText = story.text.replace('{{ones}}', this.onesCount);

        // Display story
        this.storyDisplay.innerHTML = `
          <span class="story-emoji">${story.emoji}</span>
          <p class="story-text">${storyText}</p>
        `;

        // Display ten items
        this.tenItems.innerHTML = '';
        for (let i = 0; i < 10; i++) {
          const item = document.createElement('div');
          item.className = 'item-cell';
          item.textContent = story.emoji;
          item.style.animationDelay = `${i * 0.05}s`;
          this.tenItems.appendChild(item);
        }

        // Display ones items
        this.onesItems.innerHTML = '';
        for (let i = 0; i < this.onesCount; i++) {
          const item = document.createElement('div');
          item.className = 'item-cell';
          item.textContent = story.emoji;
          item.style.animationDelay = `${(10 + i) * 0.05}s`;
          this.onesItems.appendChild(item);
        }

        // Update labels
        this.onesLabel.textContent = this.onesCount;
        this.totalBox.textContent = '?';
        this.totalBox.classList.remove('revealed');

        // Reset UI
        this.feedback.classList.remove('show', 'error');

        // Generate choices
        this.generateChoices();

        // Update progress
        this.renderProgress();
      },

      /**
       * Generate answer choices
       */
      generateChoices() {
        this.choiceButtons.innerHTML = '';

        // Create choices: correct answer and 3 distractors
        const choices = [this.targetNumber];

        // Pre-calculate all valid wrong answers to avoid infinite loop
        const possibleWrong = [];
        for (let n = 11; n <= 19; n++) {
          if (n !== this.targetNumber) {
            possibleWrong.push(n);
          }
        }

        // Shuffle and take up to 3 wrong answers
        shuffle(possibleWrong);
        const numWrong = Math.min(3, possibleWrong.length);
        choices.push(...possibleWrong.slice(0, numWrong));

        // Shuffle choices
        shuffle(choices);

        // Create buttons
        choices.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = num;
          btn.dataset.value = num;
          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          this.choiceButtons.appendChild(btn);
        });
      },

      /**
       * Check the answer
       */
      checkAnswer(answer, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const buttons = this.choiceButtons.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Reveal total
        this.totalBox.textContent = this.targetNumber;
        this.totalBox.classList.add('revealed');

        if (answer === this.targetNumber) {
          // Correct!
          button.classList.add('correct');
          this.feedback.textContent = '🎉 Yes! 10 + ' + this.onesCount + ' = ' + this.targetNumber + '!';
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          // Highlight correct answer
          buttons.forEach(btn => {
            if (parseInt(btn.dataset.value) === this.targetNumber) {
              btn.classList.add('correct');
            }
          });

          this.feedback.textContent = 'Not quite! 10 + ' + this.onesCount + ' = ' + this.targetNumber;
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = 'Amazing! You\'re a teen number star!';
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = 'Great job with teen numbers!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = 'Good effort! Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      TeenStories.init();
    });
  </script>
