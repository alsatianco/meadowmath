  <style>
    /* Make a New Shape Activity Styles */
    .target-section {
      text-align: center;
      margin-bottom: var(--space-3);
    }

    .target-label,
    .pieces-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-600);
      margin-bottom: var(--space-2);
    }

    .target-shape {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: var(--space-3);
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border: 4px dashed #94a3b8;
      border-radius: var(--radius-xl);
      min-width: 140px;
      min-height: 100px;
    }

    .target-svg {
      width: 120px;
      height: 100px;
    }

    .target-outline {
      fill: none;
      stroke: #64748b;
      stroke-width: 3;
      stroke-dasharray: 8 4;
    }

    /* Build Area */
    .build-area {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 120px;
      margin-bottom: var(--space-4);
      padding: var(--space-3);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #86efac;
      border-radius: var(--radius-xl);
      position: relative;
    }

    .build-svg {
      width: 140px;
      height: 120px;
    }

    /* Piece slots in build area */
    .piece-slot {
      fill: rgba(34, 197, 94, 0.2);
      stroke: #22c55e;
      stroke-width: 2;
      stroke-dasharray: 5 3;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .piece-slot:hover {
      fill: rgba(34, 197, 94, 0.4);
    }

    .piece-slot:focus {
      outline: none;
    }

    .piece-slot:focus-visible {
      stroke: #0f172a;
      stroke-width: 4;
    }

    .piece-slot.filled {
      fill: #3b82f6;
      stroke: #1d4ed8;
      stroke-width: 3;
      stroke-dasharray: none;
    }

    /* Pieces Tray */
    .pieces-tray {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .piece-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      border: 4px solid #3b82f6;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 0 #2563eb;
    }

    .piece-btn:hover:not(:disabled):not(.used) {
      transform: translateY(-3px);
      box-shadow: 0 7px 0 #2563eb;
    }

    .piece-btn:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .piece-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .piece-btn:focus-visible {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .piece-btn.selected {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      box-shadow: 0 4px 0 #d97706;
      transform: scale(1.1);
    }

    .piece-btn.used {
      opacity: 0.4;
      cursor: not-allowed;
      transform: scale(0.9);
    }

    .piece-btn svg {
      width: 50px;
      height: 50px;
    }

    .piece-shape {
      fill: #3b82f6;
      stroke: #1e40af;
      stroke-width: 2;
    }

    .piece-btn.selected .piece-shape {
      fill: #f59e0b;
      stroke: #b45309;
    }

    /* Success animation */
    @keyframes buildSuccess {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .build-area.success {
      animation: buildSuccess 0.5s ease;
      border-color: #22c55e;
      background: linear-gradient(135deg, #bbf7d0, #86efac);
    }

    /* Piece appear animation */
    @keyframes piecePlace {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .piece-slot.filled {
      animation: piecePlace 0.3s ease;
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .target-svg {
        width: 100px;
        height: 80px;
      }

      .build-svg {
        width: 120px;
        height: 100px;
      }

      .piece-btn {
        width: 70px;
        height: 70px;
      }

      .piece-btn svg {
        width: 40px;
        height: 40px;
      }
    }
  </style>

  <script>
    // Make a New Shape Activity
    const ComposeShapesK = {
      // Game state
      round: 1,
      maxRounds: 6,
      currentPuzzle: null,
      selectedPiece: null,
      placedPieces: [],
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,
      feedbackTimeout: null,

      // DOM elements
      progress: null,
      targetShape: null,
      buildArea: null,
      piecesTray: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Puzzle definitions - shapes made from pieces
      puzzles: [
        {
          id: 'square-from-triangles',
          target: 'square',
          pieces: ['triangle-right', 'triangle-left'],
          slots: 2,
          targetSvg: `<rect x="10" y="10" width="100" height="100" class="target-outline"/>`,
          buildSvg: `
            <polygon points="10,10 110,10 10,110" class="piece-slot" data-slot="0"/>
            <polygon points="110,10 110,110 10,110" class="piece-slot" data-slot="1"/>
          `,
          pieceSvgs: {
            'triangle-right': `<polygon points="5,5 45,5 5,45" class="piece-shape"/>`,
            'triangle-left': `<polygon points="45,5 45,45 5,45" class="piece-shape"/>`
          }
        },
        {
          id: 'rectangle-from-squares',
          target: 'rectangle',
          pieces: ['square', 'square'],
          slots: 2,
          targetSvg: `<rect x="10" y="30" width="100" height="50" class="target-outline"/>`,
          buildSvg: `
            <rect x="10" y="30" width="50" height="50" class="piece-slot" data-slot="0"/>
            <rect x="60" y="30" width="50" height="50" class="piece-slot" data-slot="1"/>
          `,
          pieceSvgs: {
            'square': `<rect x="10" y="10" width="30" height="30" class="piece-shape"/>`
          }
        },
        {
          id: 'house-from-shapes',
          target: 'house',
          pieces: ['triangle-roof', 'square-base'],
          slots: 2,
          targetSvg: `
            <polygon points="60,5 110,45 10,45" class="target-outline"/>
            <rect x="20" y="45" width="80" height="60" class="target-outline"/>
          `,
          buildSvg: `
            <polygon points="70,5 120,45 20,45" class="piece-slot" data-slot="0"/>
            <rect x="30" y="45" width="80" height="60" class="piece-slot" data-slot="1"/>
          `,
          pieceSvgs: {
            'triangle-roof': `<polygon points="25,40 5,5 45,5" class="piece-shape"/>`,
            'square-base': `<rect x="5" y="5" width="40" height="35" class="piece-shape"/>`
          }
        },
        {
          id: 'big-triangle',
          target: 'big triangle',
          pieces: ['triangle-small', 'triangle-small', 'triangle-small'],
          slots: 3,
          targetSvg: `<polygon points="60,10 110,90 10,90" class="target-outline"/>`,
          buildSvg: `
            <polygon points="70,10 95,50 45,50" class="piece-slot" data-slot="0"/>
            <polygon points="45,50 70,90 20,90" class="piece-slot" data-slot="1"/>
            <polygon points="95,50 120,90 70,90" class="piece-slot" data-slot="2"/>
          `,
          pieceSvgs: {
            'triangle-small': `<polygon points="25,5 45,40 5,40" class="piece-shape"/>`
          }
        },
        {
          id: 'tree-from-shapes',
          target: 'tree',
          pieces: ['triangle-tree', 'rect-trunk'],
          slots: 2,
          targetSvg: `
            <polygon points="70,10 110,60 30,60" class="target-outline"/>
            <rect x="55" y="60" width="30" height="35" class="target-outline"/>
          `,
          buildSvg: `
            <polygon points="70,10 115,65 25,65" class="piece-slot" data-slot="0"/>
            <rect x="50" y="65" width="40" height="40" class="piece-slot" data-slot="1"/>
          `,
          pieceSvgs: {
            'triangle-tree': `<polygon points="25,5 45,40 5,40" class="piece-shape"/>`,
            'rect-trunk': `<rect x="15" y="10" width="20" height="30" class="piece-shape"/>`
          }
        },
        {
          id: 'diamond-from-triangles',
          target: 'diamond',
          pieces: ['triangle-top', 'triangle-bottom'],
          slots: 2,
          targetSvg: `<polygon points="60,10 100,50 60,90 20,50" class="target-outline"/>`,
          buildSvg: `
            <polygon points="70,10 110,55 30,55" class="piece-slot" data-slot="0"/>
            <polygon points="70,100 30,55 110,55" class="piece-slot" data-slot="1"/>
          `,
          pieceSvgs: {
            'triangle-top': `<polygon points="25,5 45,40 5,40" class="piece-shape"/>`,
            'triangle-bottom': `<polygon points="25,40 5,5 45,5" class="piece-shape"/>`
          }
        }
      ],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.targetShape = document.getElementById('target-shape');
        this.buildArea = document.getElementById('build-area');
        this.piecesTray = document.getElementById('pieces-tray');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });
        this.buildArea.addEventListener('click', (event) => this.handleBuildAreaClick(event));

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.selectedPiece = null;
        this.placedPieces = [];
        if (this.feedbackTimeout) {
          clearTimeout(this.feedbackTimeout);
          this.feedbackTimeout = null;
        }

        // Pick a puzzle (cycle through them)
        this.currentPuzzle = this.puzzles[(this.round - 1) % this.puzzles.length];

        // Reset UI
        this.feedback.classList.remove('show', 'error');
        this.buildArea.classList.remove('success');

        // Render target
        this.targetShape.innerHTML = `<svg class="target-svg" viewBox="0 0 120 100">${this.currentPuzzle.targetSvg}</svg>`;

        // Render build area
        this.buildArea.innerHTML = `<svg class="build-svg" viewBox="0 0 140 120">${this.currentPuzzle.buildSvg}</svg>`;

        // Add click handlers to slots
        const slots = this.buildArea.querySelectorAll('.piece-slot');
        const placeLabel = i18n.t('section.activities.compose-shapes-k.placePiece') || 'Place a piece here';
        slots.forEach(slot => {
          const slotIndex = parseInt(slot.dataset.slot);
          slot.setAttribute('tabindex', '0');
          slot.setAttribute('role', 'button');
          slot.setAttribute('aria-label', placeLabel);
          slot.addEventListener('click', () => this.placeInSlot(slotIndex));
          slot.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              this.placeInSlot(slotIndex);
            }
          });
        });

        // Render pieces
        this.renderPieces();
        this.renderProgress();
      },

      /**
       * Render available pieces
       */
      renderPieces() {
        this.piecesTray.innerHTML = '';

        this.currentPuzzle.pieces.forEach((pieceType, index) => {
          const btn = document.createElement('button');
          btn.className = 'piece-btn';
          btn.dataset.index = index;
          btn.dataset.type = pieceType;

          const svg = this.currentPuzzle.pieceSvgs[pieceType] || this.currentPuzzle.pieceSvgs[Object.keys(this.currentPuzzle.pieceSvgs)[0]];
          btn.innerHTML = `<svg viewBox="0 0 50 50">${svg}</svg>`;

          btn.addEventListener('click', () => this.selectPiece(index, btn));
          this.piecesTray.appendChild(btn);
        });
      },

      /**
       * Select a piece
       */
      selectPiece(index, btn) {
        if (btn.classList.contains('used')) return;
        if (this.placedPieces.some(p => p.piece === index)) return;

        // Deselect previous
        const prevSelected = this.piecesTray.querySelector('.selected');
        if (prevSelected) prevSelected.classList.remove('selected');

        // Select new
        if (this.selectedPiece === index) {
          this.selectedPiece = null;
        } else {
          this.selectedPiece = index;
          btn.classList.add('selected');
        }
      },

      /**
       * Place selected piece in a slot
       */
      placeInSlot(slotIndex) {
        if (this.selectedPiece === null) {
          // Show hint
          this.feedback.textContent = i18n.t('section.activities.compose-shapes-k.selectFirst') || 'Tap a piece first!';
          this.feedback.classList.add('show');
          this.feedback.classList.remove('error');
          if (this.feedbackTimeout) {
            clearTimeout(this.feedbackTimeout);
          }
          this.feedbackTimeout = setTimeout(() => this.feedback.classList.remove('show'), 1500);
          return;
        }

        // Check if slot already filled
        if (this.placedPieces.some(p => p.slot === slotIndex)) {
          return;
        }

        // Place the piece
        const slot = this.buildArea.querySelector(`[data-slot="${slotIndex}"]`);
        if (slot) {
          slot.classList.add('filled');
          this.placedPieces.push({ piece: this.selectedPiece, slot: slotIndex });

          // Mark piece as used
          const pieceBtn = this.piecesTray.querySelector(`[data-index="${this.selectedPiece}"]`);
          if (pieceBtn) {
            pieceBtn.classList.remove('selected');
            pieceBtn.classList.add('used');
            pieceBtn.disabled = true;
          }

          this.selectedPiece = null;

          // Check if all pieces placed
          if (this.placedPieces.length === this.currentPuzzle.slots) {
            this.checkComplete();
          }
        }
      },

      /**
       * Place piece in the next available slot
       */
      placeInNextSlot() {
        const slots = Array.from(this.buildArea.querySelectorAll('.piece-slot'));
        const openSlot = slots.find(slot => !slot.classList.contains('filled'));
        if (!openSlot) return;

        const slotIndex = parseInt(openSlot.dataset.slot);
        if (Number.isNaN(slotIndex)) return;

        this.placeInSlot(slotIndex);
      },

      /**
       * Handle taps on the build area to use a large touch target
       */
      handleBuildAreaClick(event) {
        if (event.target && event.target.classList && event.target.classList.contains('piece-slot')) {
          return;
        }
        this.placeInNextSlot();
      },

      /**
       * Check if puzzle is complete
       */
      checkComplete() {
        // All pieces placed = success (simplified for K)
        this.correctCount++;
        this.buildArea.classList.add('success');

        if (this.feedbackTimeout) {
          clearTimeout(this.feedbackTimeout);
          this.feedbackTimeout = null;
        }

        const targetName = i18n.t(`section.activities.compose-shapes-k.shapes.${this.currentPuzzle.target.replace(' ', '-')}`) || this.currentPuzzle.target;
        const msg = i18n.t('section.activities.compose-shapes-k.correct') || "You made a {{shape}}!";
        this.feedback.textContent = msg.replace('{{shape}}', targetName);
        this.feedback.classList.remove('error');
        this.feedback.classList.add('show');

        if (typeof celebrate === 'function') {
          celebrate(this.buildArea);
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🧩';
          this.statsMessage.textContent = i18n.t('section.activities.compose-shapes-k.perfect') || 'Shape Builder Master!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.compose-shapes-k.great') || 'Great building!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.compose-shapes-k.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round) {
            className += ' completed';
          } else if (i === this.round && this.placedPieces.length === (this.currentPuzzle?.slots || 0)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      ComposeShapesK.init();
    });
  </script>
