  <style>
    /* Measure & Compare Activity Styles */
    .question-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: var(--space-3);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-radius: var(--radius-xl);
      border: 3px solid #22c55e;
    }

    .question-icon {
      font-size: var(--text-2xl);
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: #166534;
    }

    .comparison-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
    }

    /* Length Comparison Styles */
    .length-card {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-2xl);
      min-width: 280px;
      min-height: 80px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .length-card:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.02);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .length-card:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .length-card.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .length-card.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    .length-bar {
      height: 24px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border-radius: var(--radius-full);
      box-shadow: 0 3px 0 #6d28d9;
    }

    .length-bar.orange {
      background: linear-gradient(135deg, #f97316, #ea580c);
      box-shadow: 0 3px 0 #c2410c;
    }

    .length-bar.cyan {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      box-shadow: 0 3px 0 #0e7490;
    }

    .length-emoji {
      font-size: 40px;
      flex-shrink: 0;
    }

    .vs-divider {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      box-shadow: 0 3px 0 #6d28d9;
    }

    /* Weight Comparison Styles */
    .weight-container {
      display: flex;
      gap: var(--space-4);
      align-items: flex-end;
    }

    .weight-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-2xl);
      min-width: 120px;
      min-height: 100px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #d97706, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .weight-card:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #d97706, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .weight-card:focus {
      outline: 4px solid #f59e0b;
      outline-offset: 2px;
    }

    .weight-card.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .weight-card.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    .weight-emoji {
      font-size: 48px;
    }

    .weight-label {
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: #92400e;
    }

    /* Capacity Comparison Styles */
    .capacity-container {
      display: flex;
      gap: var(--space-4);
      align-items: flex-end;
    }

    .capacity-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 4px solid #3b82f6;
      border-radius: var(--radius-2xl);
      min-width: 100px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #2563eb, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .capacity-card:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .capacity-card:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .capacity-card.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .capacity-card.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    .cup-visual {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cup-body {
      width: var(--cup-width, 60px);
      height: var(--cup-height, 80px);
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      border: 3px solid #6366f1;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      position: relative;
      overflow: hidden;
    }

    .cup-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70%;
      background: linear-gradient(180deg, #60a5fa, #3b82f6);
      border-radius: 0 0 8px 8px;
    }

    .cup-rim {
      width: calc(var(--cup-width, 60px) + 10px);
      height: 10px;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      border-radius: var(--radius-sm);
      margin-bottom: -2px;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .length-card {
        min-width: 240px;
        min-height: 70px;
        padding: var(--space-3);
      }

      .length-bar {
        height: 20px;
      }

      .length-emoji {
        font-size: 32px;
      }

      .weight-container,
      .capacity-container {
        gap: var(--space-3);
      }

      .weight-card {
        min-width: 100px;
        padding: var(--space-3);
      }

      .weight-emoji {
        font-size: 40px;
      }

      .question-text {
        font-size: var(--text-base);
      }
    }
  </style>

  <!-- JavaScript Files -->

  <script src="../../js/i18n.js"></script>

  <script>
    // Measure & Compare Activity
    const MeasureCompare = {
      // Game state
      round: 1,
      maxRounds: 8,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,
      currentType: 'length', // 'length', 'weight', 'capacity'
      correctAnswer: '', // 'a' or 'b'
      askingFor: '', // 'longer', 'shorter', 'heavier', 'lighter', 'more', 'less'

      // DOM elements
      progress: null,
      questionBanner: null,
      questionIcon: null,
      questionText: null,
      comparisonArea: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Question configurations
      questionConfigs: [
        { type: 'length', askFor: 'longer', icon: '📏', questionKey: 'whichLonger', answerKey: 'correctLonger', wrongKey: 'incorrectLonger' },
        { type: 'length', askFor: 'shorter', icon: '📏', questionKey: 'whichShorter', answerKey: 'correctShorter', wrongKey: 'incorrectShorter' },
        { type: 'weight', askFor: 'heavier', icon: '⚖️', questionKey: 'whichHeavier', answerKey: 'correctHeavier', wrongKey: 'incorrectHeavier' },
        { type: 'weight', askFor: 'lighter', icon: '⚖️', questionKey: 'whichLighter', answerKey: 'correctLighter', wrongKey: 'incorrectLighter' },
        { type: 'capacity', askFor: 'more', icon: '🥤', questionKey: 'whichHoldsMore', answerKey: 'correctMore', wrongKey: 'incorrectMore' },
        { type: 'capacity', askFor: 'less', icon: '🥤', questionKey: 'whichHoldsLess', answerKey: 'correctLess', wrongKey: 'incorrectLess' }
      ],

      // Objects for each type
      lengthObjects: [
        { emoji: '🐛', name: 'caterpillar' },
        { emoji: '🐍', name: 'snake' },
        { emoji: '🖍️', name: 'crayon' },
        { emoji: '✏️', name: 'pencil' },
        { emoji: '🦎', name: 'lizard' },
        { emoji: '🍌', name: 'banana' }
      ],

      weightObjects: [
        { emoji: '🐘', name: 'elephant', weight: 'heavy' },
        { emoji: '🐭', name: 'mouse', weight: 'light' },
        { emoji: '🪨', name: 'rock', weight: 'heavy' },
        { emoji: '🪶', name: 'feather', weight: 'light' },
        { emoji: '🚗', name: 'car', weight: 'heavy' },
        { emoji: '🎈', name: 'balloon', weight: 'light' },
        { emoji: '🍉', name: 'watermelon', weight: 'heavy' },
        { emoji: '🍓', name: 'strawberry', weight: 'light' },
        { emoji: '📚', name: 'books', weight: 'heavy' },
        { emoji: '📄', name: 'paper', weight: 'light' }
      ],

      currentConfig: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.questionBanner = document.getElementById('question-banner');
        this.questionIcon = document.getElementById('question-icon');
        this.questionText = document.getElementById('question-text');
        this.comparisonArea = document.getElementById('comparison-area');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;
        this.feedback.classList.remove('show', 'error');

        // Pick random question configuration
        this.currentConfig = this.questionConfigs[Math.floor(Math.random() * this.questionConfigs.length)];
        this.currentType = this.currentConfig.type;
        this.askingFor = this.currentConfig.askFor;

        // Update question banner
        this.questionIcon.textContent = this.currentConfig.icon;
        const questionTranslation = i18n.t(`section.activities.measure-and-compare.${this.currentConfig.questionKey}`);
        this.questionText.textContent = questionTranslation || this.getDefaultQuestion();

        // Render appropriate comparison
        switch (this.currentType) {
          case 'length':
            this.renderLengthComparison();
            break;
          case 'weight':
            this.renderWeightComparison();
            break;
          case 'capacity':
            this.renderCapacityComparison();
            break;
        }

        this.renderProgress();
      },

      /**
       * Get default question text
       */
      getDefaultQuestion() {
        const defaults = {
          longer: 'Which one is longer?',
          shorter: 'Which one is shorter?',
          heavier: 'Which one is heavier?',
          lighter: 'Which one is lighter?',
          more: 'Which one holds more?',
          less: 'Which one holds less?'
        };
        return defaults[this.askingFor];
      },

      /**
       * Render length comparison
       */
      renderLengthComparison() {
        const obj = this.lengthObjects[Math.floor(Math.random() * this.lengthObjects.length)];

        // Generate different lengths
        const lengthA = randomInt(50, 180);
        let lengthB;
        do {
          lengthB = randomInt(50, 180);
        } while (Math.abs(lengthA - lengthB) < 30);

        // Determine correct answer
        if (this.askingFor === 'longer') {
          this.correctAnswer = lengthA > lengthB ? 'a' : 'b';
        } else {
          this.correctAnswer = lengthA < lengthB ? 'a' : 'b';
        }

        this.comparisonArea.innerHTML = `
          <button class="length-card" data-choice="a">
            <div class="length-bar orange" style="width: ${lengthA}px;"></div>
            <div class="length-emoji">${obj.emoji}</div>
          </button>
          <div class="vs-divider">VS</div>
          <button class="length-card" data-choice="b">
            <div class="length-bar cyan" style="width: ${lengthB}px;"></div>
            <div class="length-emoji">${obj.emoji}</div>
          </button>
        `;

        this.attachCardListeners('.length-card');
      },

      /**
       * Render weight comparison
       */
      renderWeightComparison() {
        // Pick one heavy and one light object
        const heavyObjects = this.weightObjects.filter(o => o.weight === 'heavy');
        const lightObjects = this.weightObjects.filter(o => o.weight === 'light');

        const heavyObj = heavyObjects[Math.floor(Math.random() * heavyObjects.length)];
        const lightObj = lightObjects[Math.floor(Math.random() * lightObjects.length)];

        // Randomly assign positions
        const heavyIsA = Math.random() < 0.5;
        const objA = heavyIsA ? heavyObj : lightObj;
        const objB = heavyIsA ? lightObj : heavyObj;

        // Determine correct answer
        if (this.askingFor === 'heavier') {
          this.correctAnswer = heavyIsA ? 'a' : 'b';
        } else {
          this.correctAnswer = heavyIsA ? 'b' : 'a';
        }

        this.comparisonArea.innerHTML = `
          <div class="weight-container">
            <button class="weight-card" data-choice="a">
              <div class="weight-emoji">${objA.emoji}</div>
            </button>
            <div class="vs-divider">VS</div>
            <button class="weight-card" data-choice="b">
              <div class="weight-emoji">${objB.emoji}</div>
            </button>
          </div>
        `;

        this.attachCardListeners('.weight-card');
      },

      /**
       * Render capacity comparison
       */
      renderCapacityComparison() {
        // Generate different cup sizes
        const sizeA = randomInt(0, 2); // 0=small, 1=medium, 2=large
        let sizeB;
        do {
          sizeB = randomInt(0, 2);
        } while (sizeA === sizeB);

        const sizes = [
          { width: 50, height: 60 },
          { width: 65, height: 80 },
          { width: 80, height: 100 }
        ];

        const cupA = sizes[sizeA];
        const cupB = sizes[sizeB];

        // Determine correct answer
        if (this.askingFor === 'more') {
          this.correctAnswer = sizeA > sizeB ? 'a' : 'b';
        } else {
          this.correctAnswer = sizeA < sizeB ? 'a' : 'b';
        }

        this.comparisonArea.innerHTML = `
          <div class="capacity-container">
            <button class="capacity-card" data-choice="a">
              <div class="cup-visual" style="--cup-width: ${cupA.width}px; --cup-height: ${cupA.height}px;">
                <div class="cup-rim"></div>
                <div class="cup-body">
                  <div class="cup-fill"></div>
                </div>
              </div>
            </button>
            <div class="vs-divider">VS</div>
            <button class="capacity-card" data-choice="b">
              <div class="cup-visual" style="--cup-width: ${cupB.width}px; --cup-height: ${cupB.height}px;">
                <div class="cup-rim"></div>
                <div class="cup-body">
                  <div class="cup-fill"></div>
                </div>
              </div>
            </button>
          </div>
        `;

        this.attachCardListeners('.capacity-card');
      },

      /**
       * Attach event listeners to cards
       */
      attachCardListeners(selector) {
        const cards = this.comparisonArea.querySelectorAll(selector);
        cards.forEach(card => {
          card.addEventListener('click', () => this.selectChoice(card.dataset.choice, card));
          card.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectChoice(card.dataset.choice, card);
            }
          });
        });
      },

      /**
       * Handle choice selection
       */
      selectChoice(choice, card) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all cards
        const cards = this.comparisonArea.querySelectorAll('button');
        cards.forEach(c => c.disabled = true);

        const isCorrect = choice === this.correctAnswer;
        const correctCard = this.comparisonArea.querySelector(`[data-choice="${this.correctAnswer}"]`);

        if (isCorrect) {
          card.classList.add('correct');
          this.correctCount++;

          const msg = i18n.t(`section.activities.measure-and-compare.${this.currentConfig.answerKey}`) || 'Correct!';
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');

          if (typeof celebrate === 'function') {
            celebrate(card);
          }
        } else {
          card.classList.add('incorrect');
          correctCard.classList.add('correct');
          this.wrongCount++;

          const msg = i18n.t(`section.activities.measure-and-compare.${this.currentConfig.wrongKey}`) || 'Not quite!';
          this.feedback.textContent = msg;
          this.feedback.classList.add('show', 'error');
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🧵';
          this.statsMessage.textContent = i18n.t('section.activities.measure-and-compare.perfect') || 'Measurement Expert!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.measure-and-compare.great') || 'Great comparing!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.measure-and-compare.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      MeasureCompare.init();
    });
  </script>
