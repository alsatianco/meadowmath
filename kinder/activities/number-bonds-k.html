  <style>
    /* Number Bonds Styles */
    .number-bond-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: var(--space-4);
    }

    .bond-whole, .bond-part {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
    }

    .bond-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      border: 4px solid;
      box-shadow: 0 4px 0 currentColor, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .whole-circle {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: #3b82f6;
      color: #1d4ed8;
      box-shadow: 0 4px 0 #2563eb, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .part-circle {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #b45309;
      box-shadow: 0 4px 0 #d97706, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .part-circle.missing {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border-color: #f87171;
      color: #dc2626;
      border-style: dashed;
      animation: missingPulse 1.5s ease-in-out infinite;
    }

    .part-circle.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      border-style: solid;
      animation: none;
    }

    @keyframes missingPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .bond-label {
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-neutral-500);
    }

    .bond-lines {
      width: 200px;
      height: 60px;
    }

    .bond-svg {
      width: 100%;
      height: 100%;
    }

    .bond-parts {
      display: flex;
      gap: var(--space-8);
    }

    /* Visual counters */
    .visual-counters {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding: var(--space-3);
      background: #f8fafc;
      border-radius: var(--radius-xl);
      border: 2px solid #e2e8f0;
    }

    .counter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-width: 100px;
      min-height: 32px;
      justify-content: center;
    }

    .counter-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fde68a, #fbbf24);
      border: 2px solid #f59e0b;
    }

    .counter-divider {
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-400);
    }

    .missing-group .counter-dot {
      background: linear-gradient(135deg, #d1d5db, #9ca3af);
      border-color: #6b7280;
      opacity: 0.5;
    }

    .missing-group.revealed .counter-dot {
      background: linear-gradient(135deg, #86efac, #4ade80);
      border-color: #22c55e;
      opacity: 1;
    }

    /* Answer choices */
    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .answer-btn {
      width: 80px;
      height: 80px;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .answer-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .bond-circle {
        width: 65px;
        height: 65px;
        font-size: var(--text-3xl);
      }

      .bond-lines {
        width: 160px;
        height: 50px;
      }

      .bond-parts {
        gap: var(--space-6);
      }

      .answer-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-2xl);
      }

      .counter-dot {
        width: 20px;
        height: 20px;
      }
    }
  </style>

  <script>
    // Number Bonds Activity
    const NumberBondsK = {
      // Game state
      round: 1,
      maxRounds: 8,
      whole: 0,
      partLeft: 0,
      partRight: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      wholeNumber: null,
      partLeftEl: null,
      partRightEl: null,
      counterLeft: null,
      counterRight: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.wholeNumber = document.getElementById('whole-number');
        this.partLeftEl = document.getElementById('part-left');
        this.partRightEl = document.getElementById('part-right');
        this.counterLeft = document.getElementById('counter-left');
        this.counterRight = document.getElementById('counter-right');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get config based on round
       */
      getConfig() {
        // Progressive: totals 5-6, then 7-8, then 9-10
        if (this.round <= 3) {
          return { min: 5, max: 6 };
        } else if (this.round <= 6) {
          return { min: 7, max: 8 };
        } else {
          return { min: 9, max: 10 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        const config = this.getConfig();
        this.whole = randomInt(config.min, config.max);

        // Generate parts (partLeft between 1 and whole-1)
        this.partLeft = randomInt(1, this.whole - 1);
        this.partRight = this.whole - this.partLeft;

        // Update display
        this.wholeNumber.textContent = this.whole;
        this.partLeftEl.textContent = this.partLeft;
        this.partRightEl.textContent = '?';
        this.partRightEl.classList.add('missing');
        this.partRightEl.classList.remove('revealed');

        // Render visual counters
        this.renderCounters();

        // Reset feedback
        this.feedback.classList.remove('show', 'error');

        // Generate answer choices
        this.renderAnswerChoices();

        this.renderProgress();
      },

      /**
       * Render visual counters
       */
      renderCounters() {
        // Left part (visible)
        this.counterLeft.innerHTML = '';
        for (let i = 0; i < this.partLeft; i++) {
          const dot = document.createElement('div');
          dot.className = 'counter-dot';
          this.counterLeft.appendChild(dot);
        }

        // Right part (missing/grayed out)
        this.counterRight.innerHTML = '';
        this.counterRight.classList.remove('revealed');
        for (let i = 0; i < this.partRight; i++) {
          const dot = document.createElement('div');
          dot.className = 'counter-dot';
          this.counterRight.appendChild(dot);
        }
      },

      /**
       * Render answer choices
       */
      renderAnswerChoices() {
        this.answerChoices.innerHTML = '';

        // Generate 4 choices including the correct answer
        const choices = new Set([this.partRight]);

        // Add distractors
        while (choices.size < 4) {
          let distractor;
          const offset = randomInt(-2, 2);
          distractor = this.partRight + offset;
          if (distractor >= 0 && distractor <= 10 && distractor !== this.partRight) {
            choices.add(distractor);
          }
        }

        // Convert to array and shuffle
        const choicesArray = Array.from(choices);
        this.shuffleArray(choicesArray);

        // Create buttons
        choicesArray.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.setAttribute('tabindex', '0');
          btn.addEventListener('click', () => this.selectAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectAnswer(num, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Shuffle array
       */
      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      /**
       * Select answer
       */
      selectAnswer(num, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const allBtns = this.answerChoices.querySelectorAll('.answer-btn');
        allBtns.forEach(b => b.disabled = true);

        const isCorrect = num === this.partRight;

        // Reveal the missing part
        this.partRightEl.textContent = this.partRight;
        this.partRightEl.classList.remove('missing');
        this.partRightEl.classList.add('revealed');
        this.counterRight.classList.add('revealed');

        if (isCorrect) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.number-bonds-k.correct') || '{{left}} and {{right}} make {{whole}}!';
          this.feedback.textContent = msg
            .replace('{{left}}', this.partLeft)
            .replace('{{right}}', this.partRight)
            .replace('{{whole}}', this.whole);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          // Highlight correct answer
          allBtns.forEach(b => {
            if (parseInt(b.textContent) === this.partRight) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.number-bonds-k.incorrect') || '{{left}} + {{right}} = {{whole}}';
          this.feedback.textContent = msg
            .replace('{{left}}', this.partLeft)
            .replace('{{right}}', this.partRight)
            .replace('{{whole}}', this.whole);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.number-bonds-k.perfect') || "Number Bond Builder!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.number-bonds-k.great') || 'Great number bonding!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.number-bonds-k.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      NumberBondsK.init();
    });
  </script>
