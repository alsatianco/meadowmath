  <style>
    /* More, Less, Same Activity Styles - Crocodile Theme */
    .comparison-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .group-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .group-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-lg);
    }

    .green-label {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #166534;
    }

    .orange-label {
      background: linear-gradient(135deg, #ffedd5, #fed7aa);
      color: #c2410c;
    }

    .item-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      min-width: 140px;
      min-height: 120px;
      max-width: 200px;
      border-radius: var(--radius-xl);
      border: 4px solid;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .green-group {
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-color: #4ade80;
      box-shadow: 0 4px 0 #22c55e;
    }

    .orange-group {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border-color: #fb923c;
      box-shadow: 0 4px 0 #f97316;
    }

    .group-item {
      font-size: 32px;
      transition: transform 0.2s ease;
    }

    .group-count {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-500);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .group-count.show {
      opacity: 1;
    }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .croc-icon {
      font-size: 48px;
      transform: rotate(0deg);
      transition: transform 0.5s ease;
    }

    .croc-icon.pointing-left {
      transform: scaleX(-1);
    }

    /* Question Section */
    .question-section {
      text-align: center;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    .choice-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
    }

    .choice-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border: 4px solid #10b981;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #059669, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #059669, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #059669;
    }

    .choice-btn:focus {
      outline: 3px solid #10b981;
      outline-offset: 2px;
    }

    .choice-btn:focus-visible {
      outline: 3px solid #10b981;
      outline-offset: 2px;
    }

    .choice-icon {
      font-size: var(--text-2xl);
    }

    .choice-btn[data-answer="more"] .choice-icon {
      transform: scaleX(-1); /* Croc facing right (eats bigger) */
    }

    .choice-btn[data-answer="less"] .choice-icon {
      transform: scaleX(1); /* Croc facing left (eats bigger) */
    }

    .choice-text {
      font-family: var(--font-secondary);
      font-size: var(--text-base);
      font-weight: var(--weight-bold);
      color: #065f46;
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    .choice-btn.incorrect .choice-text {
      color: #92400e;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .comparison-display {
        flex-direction: column;
        gap: var(--space-3);
      }

      .croc-icon {
        font-size: 40px;
        transform: rotate(90deg);
      }

      .croc-icon.pointing-left {
        transform: rotate(90deg) scaleX(-1);
      }

      .item-group {
        min-width: 120px;
        min-height: 100px;
        max-width: 180px;
      }

      .group-item {
        font-size: 28px;
      }

      .choice-btn {
        width: 90px;
        height: 90px;
      }
    }
  </style>

  <script>
    // More, Less, Same Activity (Crocodile Theme)
    const MoreLessSame = {
      // Game state
      round: 1,
      maxRounds: 10,
      greenCount: 0,
      orangeCount: 0,
      correctAnswer: '',
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,

      // DOM elements
      progress: null,
      greenGroup: null,
      orangeGroup: null,
      greenCountDisplay: null,
      orangeCountDisplay: null,
      crocIcon: null,
      choiceButtons: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Items to use - nature/swamp themed
      items: ['🐸', '🦎', '🐢', '🐟', '🦆', '🌿', '🍃', '🌾', '🪷', '🪴'],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.greenGroup = document.getElementById('green-group');
        this.orangeGroup = document.getElementById('orange-group');
        this.greenCountDisplay = document.getElementById('green-count');
        this.orangeCountDisplay = document.getElementById('orange-count');
        this.crocIcon = document.querySelector('.croc-icon');
        this.choiceButtons = document.getElementById('choice-buttons');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.choiceButtons.querySelectorAll('.choice-btn').forEach(btn => {
          btn.addEventListener('click', () => this.checkAnswer(btn.dataset.answer, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(btn.dataset.answer, btn);
            }
          });
        });
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Generate counts
        this.generateCounts();

        // Pick random item
        const item = this.items[randomInt(0, this.items.length - 1)];

        // Render groups
        this.renderGroup(this.greenGroup, this.greenCount, item);
        this.renderGroup(this.orangeGroup, this.orangeCount, item);

        // Update croc direction based on answer
        this.updateCrocDirection();

        // Reset UI
        this.greenCountDisplay.classList.remove('show');
        this.orangeCountDisplay.classList.remove('show');
        this.greenCountDisplay.textContent = '';
        this.orangeCountDisplay.textContent = '';
        this.feedback.classList.remove('show', 'error');

        // Reset choice buttons
        const buttons = this.choiceButtons.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.classList.remove('correct', 'incorrect');
          btn.disabled = false;
        });

        this.renderProgress();
      },

      /**
       * Generate counts for green and orange groups
       */
      generateCounts() {
        const minCount = 2;
        const maxCount = Math.min(6 + Math.floor(this.round / 3), 10);

        // Ensure balanced distribution of answers
        const answerType = this.round % 3; // 0: more, 1: less, 2: same

        if (answerType === 2) {
          // Same - equal counts
          this.greenCount = randomInt(minCount, maxCount);
          this.orangeCount = this.greenCount;
          this.correctAnswer = 'same';
        } else if (answerType === 0) {
          // More - green has more
          this.orangeCount = randomInt(minCount, maxCount - 1);
          this.greenCount = this.orangeCount + randomInt(1, 3);
          if (this.greenCount > maxCount) this.greenCount = maxCount;
          this.correctAnswer = 'more';
        } else {
          // Less - green has less
          this.orangeCount = randomInt(minCount + 1, maxCount);
          this.greenCount = this.orangeCount - randomInt(1, 3);
          if (this.greenCount < minCount) this.greenCount = minCount;
          this.correctAnswer = 'less';
        }
      },

      /**
       * Update crocodile direction (eats the bigger group)
       */
      updateCrocDirection() {
        if (this.greenCount > this.orangeCount) {
          // Croc faces green (left) - it's bigger
          this.crocIcon.classList.add('pointing-left');
        } else if (this.greenCount < this.orangeCount) {
          // Croc faces orange (right) - it's bigger
          this.crocIcon.classList.remove('pointing-left');
        } else {
          // Same - random direction or neutral
          this.crocIcon.classList.remove('pointing-left');
        }
      },

      /**
       * Render items in a group
       */
      renderGroup(container, count, emoji) {
        container.innerHTML = '';

        const useScatter = Math.random() < 0.3;

        for (let i = 0; i < count; i++) {
          const item = document.createElement('span');
          item.className = 'group-item';
          item.textContent = emoji;

          if (useScatter) {
            item.style.transform = `rotate(${randomInt(-15, 15)}deg)`;
          }

          container.appendChild(item);
        }
      },

      /**
       * Check the answer
       */
      checkAnswer(answer, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        const buttons = this.choiceButtons.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Show counts
        this.greenCountDisplay.textContent = this.greenCount;
        this.orangeCountDisplay.textContent = this.orangeCount;
        this.greenCountDisplay.classList.add('show');
        this.orangeCountDisplay.classList.add('show');

        if (answer === this.correctAnswer) {
          // Correct!
          button.classList.add('correct');
          let message = '';
          if (this.correctAnswer === 'more') {
            message = i18n.t('section.activities.more-less-same.correctMore') || 'Correct! Green has more! (' + this.greenCount + ' > ' + this.orangeCount + ')';
            message = message.replace('{{green}}', this.greenCount).replace('{{orange}}', this.orangeCount);
          } else if (this.correctAnswer === 'less') {
            message = i18n.t('section.activities.more-less-same.correctLess') || 'Correct! Green has less! (' + this.greenCount + ' < ' + this.orangeCount + ')';
            message = message.replace('{{green}}', this.greenCount).replace('{{orange}}', this.orangeCount);
          } else {
            message = i18n.t('section.activities.more-less-same.correctSame') || 'Correct! They have the same! (' + this.greenCount + ' = ' + this.orangeCount + ')';
            message = message.replace('{{green}}', this.greenCount).replace('{{orange}}', this.orangeCount);
          }
          this.feedback.textContent = message;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          buttons.forEach(btn => {
            if (btn.dataset.answer === this.correctAnswer) {
              btn.classList.add('correct');
            }
          });

          let message = '';
          if (this.correctAnswer === 'more') {
            message = i18n.t('section.activities.more-less-same.incorrectMore') || 'Not quite! Green has more (' + this.greenCount + ' > ' + this.orangeCount + ')';
            message = message.replace('{{green}}', this.greenCount).replace('{{orange}}', this.orangeCount);
          } else if (this.correctAnswer === 'less') {
            message = i18n.t('section.activities.more-less-same.incorrectLess') || 'Not quite! Green has less (' + this.greenCount + ' < ' + this.orangeCount + ')';
            message = message.replace('{{green}}', this.greenCount).replace('{{orange}}', this.orangeCount);
          } else {
            message = i18n.t('section.activities.more-less-same.incorrectSame') || 'Not quite! They have the same (' + this.greenCount + ' = ' + this.orangeCount + ')';
            message = message.replace('{{green}}', this.greenCount).replace('{{orange}}', this.orangeCount);
          }
          this.feedback.textContent = message;
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🐊';
          this.statsMessage.textContent = i18n.t('section.activities.more-less-same.perfect') || 'Crocodile Champion!';
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.more-less-same.great') || 'Great comparing!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.more-less-same.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      MoreLessSame.init();
    });
  </script>
