  <style>
    /* Quick Look to 10 Styles */
    .flash-container {
      position: relative;
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .flash-card {
      width: 280px;
      height: 200px;
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 5px solid #e2e8f0;
      border-radius: var(--radius-2xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 #cbd5e1, 0 8px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .flash-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: var(--space-3);
      max-width: 240px;
    }

    .flash-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: 3px solid #1d4ed8;
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3);
      animation: dotAppear 0.2s ease backwards;
    }

    @keyframes dotAppear {
      from {
        opacity: 0;
        transform: scale(0);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .flash-content.hidden .flash-dot {
      opacity: 0;
    }

    /* Ready overlay */
    .ready-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-2xl);
      border: 5px solid #f59e0b;
      box-shadow: 0 6px 0 #d97706, 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .ready-overlay.hidden {
      display: none;
    }

    .ready-icon {
      font-size: 48px;
      animation: lookPulse 1s ease-in-out infinite;
    }

    @keyframes lookPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .ready-btn {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: #92400e;
      background: white;
      border: 3px solid #f59e0b;
      border-radius: var(--radius-xl);
      padding: var(--space-2) var(--space-5);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 3px 0 #d97706;
    }

    .ready-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #d97706;
    }

    .ready-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Question area */
    .question-area {
      text-align: center;
    }

    .question-area.hidden {
      display: none;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    /* Answer choices */
    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .answer-btn {
      width: 65px;
      height: 65px;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      border-color: #3b82f6;
      box-shadow: 0 7px 0 #2563eb, 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .answer-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .flash-card {
        width: 240px;
        height: 170px;
      }

      .flash-dot {
        width: 30px;
        height: 30px;
      }

      .answer-btn {
        width: 55px;
        height: 55px;
        font-size: var(--text-xl);
      }
    }
  </style>

  <script>
    // Quick Look to 10 Activity
    const QuickLook10 = {
      // Game state
      round: 1,
      maxRounds: 10,
      targetCount: 0,
      flashDuration: 1500,
      hasFlashed: false,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      flashCard: null,
      flashContent: null,
      readyOverlay: null,
      readyBtn: null,
      questionArea: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.flashCard = document.getElementById('flash-card');
        this.flashContent = document.getElementById('flash-content');
        this.readyOverlay = document.getElementById('ready-overlay');
        this.readyBtn = document.getElementById('ready-btn');
        this.questionArea = document.getElementById('question-area');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.readyBtn.addEventListener('click', () => this.startFlash());
        this.readyBtn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.startFlash();
          }
        });

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get flash duration based on round
       */
      getFlashDuration() {
        // Progressive: 1.5s -> 1.2s -> 1s -> 0.8s
        if (this.round <= 3) return 1500;
        if (this.round <= 5) return 1200;
        if (this.round <= 7) return 1000;
        return 800;
      },

      /**
       * Get number range based on round
       */
      getRange() {
        // Progressive: 1-5, then 1-7, then 1-10
        if (this.round <= 3) return { min: 1, max: 5 };
        if (this.round <= 6) return { min: 1, max: 7 };
        return { min: 1, max: 10 };
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasFlashed = false;
        this.hasAnswered = false;

        const range = this.getRange();
        this.targetCount = randomInt(range.min, range.max);
        this.flashDuration = this.getFlashDuration();

        // Prepare dots (hidden initially)
        this.renderDots();
        this.flashContent.classList.add('hidden');

        // Reset UI
        this.readyOverlay.classList.remove('hidden');
        this.questionArea.classList.add('hidden');
        this.feedback.classList.remove('show', 'error');

        this.renderProgress();
      },

      /**
       * Render dots in the flash area
       */
      renderDots() {
        this.flashContent.innerHTML = '';
        for (let i = 0; i < this.targetCount; i++) {
          const dot = document.createElement('div');
          dot.className = 'flash-dot';
          dot.style.animationDelay = `${i * 0.03}s`;
          this.flashContent.appendChild(dot);
        }
      },

      /**
       * Start the flash
       */
      startFlash() {
        if (this.hasFlashed) return;
        this.hasFlashed = true;

        // Hide ready overlay
        this.readyOverlay.classList.add('hidden');

        // Show dots
        this.flashContent.classList.remove('hidden');

        // Hide after flash duration
        setTimeout(() => {
          this.flashContent.classList.add('hidden');
          this.showQuestion();
        }, this.flashDuration);
      },

      /**
       * Show question and choices
       */
      showQuestion() {
        this.questionArea.classList.remove('hidden');
        this.renderChoices();
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        const range = this.getRange();

        // Show all numbers in range as choices
        for (let i = range.min; i <= range.max; i++) {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = i;
          btn.setAttribute('tabindex', '0');
          btn.addEventListener('click', () => this.selectAnswer(i, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectAnswer(i, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        }
      },

      /**
       * Select answer
       */
      selectAnswer(num, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const allBtns = this.answerChoices.querySelectorAll('.answer-btn');
        allBtns.forEach(b => b.disabled = true);

        // Show dots again for reveal
        this.flashContent.classList.remove('hidden');

        const isCorrect = num === this.targetCount;

        if (isCorrect) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.quick-look-10.correct') || 'Yes! {{count}} dots!';
          this.feedback.textContent = msg.replace('{{count}}', this.targetCount);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          // Highlight correct answer
          allBtns.forEach(b => {
            if (parseInt(b.textContent) === this.targetCount) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.quick-look-10.incorrect') || 'There were {{count}} dots.';
          this.feedback.textContent = msg.replace('{{count}}', this.targetCount);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.quick-look-10.perfect') || "Quick Eyes Champion!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.quick-look-10.great') || 'Great quick looking!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.quick-look-10.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      QuickLook10.init();
    });
  </script>
