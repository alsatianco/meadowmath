  <style>
    /* Make 10 with Two Groups Styles */
    .groups-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .basket-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .basket {
      position: relative;
      padding: var(--space-4);
      background: linear-gradient(180deg, #fef3c7 0%, #fde68a 100%);
      border: 4px solid #f59e0b;
      border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
      border-top: none;
      min-width: 120px;
      min-height: 100px;
    }

    .basket::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 20px;
      background: #d97706;
      border-radius: var(--radius-full);
    }

    .basket-items {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      min-height: 50px;
    }

    .basket-item {
      font-size: 28px;
      animation: dropIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
    }

    @keyframes dropIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .basket-label {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: white;
      background: #f59e0b;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      min-width: 36px;
      text-align: center;
    }

    .plus-sign {
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-400);
    }

    /* Total area */
    .total-area {
      display: flex;
      justify-content: center;
      margin: var(--space-5) 0 var(--space-4);
    }

    .total-sum {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 3px solid #3b82f6;
      border-radius: var(--radius-xl);
    }

    .sum-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: #1d4ed8;
    }

    .sum-number {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #1d4ed8;
    }

    /* Question */
    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      text-align: center;
      margin-bottom: var(--space-4);
    }

    /* Answer choices */
    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .answer-btn {
      width: 80px;
      height: 80px;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .answer-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Equation display */
    .equation-display {
      text-align: center;
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-primary-600);
      margin-top: var(--space-3);
    }

    .equation-display.hidden {
      display: none;
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .basket {
        min-width: 100px;
        min-height: 80px;
        padding: var(--space-3);
      }

      .basket-item {
        font-size: 24px;
      }

      .answer-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-2xl);
      }
    }
  </style>

  <script>
    // Make 10 with Two Groups Activity
    const Make10TwoGroups = {
      // Game state
      round: 1,
      maxRounds: 8,
      group1: 0,
      group2: 0,
      total: 0,
      needed: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      items1: null,
      items2: null,
      label1: null,
      label2: null,
      sumNumber: null,
      answerChoices: null,
      equationDisplay: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Items for baskets
      items: ['🍎', '🍊', '🍋', '🍇', '🍓', '⭐', '🌸', '💎', '🔵', '🟡'],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.items1 = document.getElementById('items-1');
        this.items2 = document.getElementById('items-2');
        this.label1 = document.getElementById('label-1');
        this.label2 = document.getElementById('label-2');
        this.sumNumber = document.getElementById('sum-number');
        this.answerChoices = document.getElementById('answer-choices');
        this.equationDisplay = document.getElementById('equation-display');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Generate two groups that sum to less than 10
        // Total will be between 4 and 9
        this.total = randomInt(4, 9);
        this.needed = 10 - this.total;

        // Split total into two groups
        this.group1 = randomInt(1, this.total - 1);
        this.group2 = this.total - this.group1;

        // Pick items
        const item1 = this.items[randomInt(0, this.items.length - 1)];
        let item2;
        do {
          item2 = this.items[randomInt(0, this.items.length - 1)];
        } while (item2 === item1);

        // Update labels
        this.label1.textContent = this.group1;
        this.label2.textContent = this.group2;
        this.sumNumber.textContent = this.total;

        // Render items
        this.renderBasket(this.items1, this.group1, item1);
        this.renderBasket(this.items2, this.group2, item2);

        // Reset UI
        this.equationDisplay.classList.add('hidden');
        this.feedback.classList.remove('show', 'error');

        // Generate choices
        this.renderChoices();

        this.renderProgress();
      },

      /**
       * Render basket items
       */
      renderBasket(container, count, emoji) {
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const item = document.createElement('span');
          item.className = 'basket-item';
          item.textContent = emoji;
          item.style.animationDelay = `${i * 0.1}s`;
          container.appendChild(item);
        }
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        // Generate choices including the correct answer
        const choices = new Set([this.needed]);

        // Add distractors
        while (choices.size < 4) {
          const distractor = randomInt(1, 6);
          if (distractor !== this.needed) {
            choices.add(distractor);
          }
        }

        // Convert to array and shuffle
        const choicesArray = Array.from(choices);
        this.shuffleArray(choicesArray);

        // Create buttons
        choicesArray.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.setAttribute('tabindex', '0');
          btn.addEventListener('click', () => this.selectAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectAnswer(num, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Shuffle array
       */
      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      /**
       * Select answer
       */
      selectAnswer(num, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const allBtns = this.answerChoices.querySelectorAll('.answer-btn');
        allBtns.forEach(b => b.disabled = true);

        const isCorrect = num === this.needed;

        // Show equation
        this.equationDisplay.textContent = `${this.total} + ${this.needed} = 10`;
        this.equationDisplay.classList.remove('hidden');

        if (isCorrect) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.make-10-two-groups.correct') || '{{total}} + {{needed}} = 10!';
          this.feedback.textContent = msg.replace('{{total}}', this.total).replace('{{needed}}', this.needed);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          // Highlight correct answer
          allBtns.forEach(b => {
            if (parseInt(b.textContent) === this.needed) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.make-10-two-groups.incorrect') || '{{total}} needs {{needed}} more to make 10.';
          this.feedback.textContent = msg.replace('{{total}}', this.total).replace('{{needed}}', this.needed);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.make-10-two-groups.perfect') || "Make 10 Master!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.make-10-two-groups.great') || 'Great making 10!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.make-10-two-groups.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      Make10TwoGroups.init();
    });
  </script>
