  <script>
    // True or Not Activity
    const TrueOrNotK = {
      // Game state
      round: 1,
      maxRounds: 10,
      numA: 0,
      numB: 0,
      shownResult: 0,
      correctResult: 0,
      isTrue: false,
      operation: '+',
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      equationCard: null,
      equationDisplay: null,
      btnTrue: null,
      btnFalse: null,
      correctionDisplay: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.equationCard = document.getElementById('equation-card');
        this.equationDisplay = document.getElementById('equation-display');
        this.btnTrue = document.getElementById('btn-true');
        this.btnFalse = document.getElementById('btn-false');
        this.correctionDisplay = document.getElementById('correction-display');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnTrue.addEventListener('click', () => this.selectAnswer(true));
        this.btnFalse.addEventListener('click', () => this.selectAnswer(false));
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get config based on round (progressive difficulty)
       */
      getConfig() {
        if (this.round <= 3) {
          // Early: simple addition within 5, mostly true
          return { maxNum: 5, maxResult: 5, canSubtract: false, trueProbability: 0.6 };
        } else if (this.round <= 6) {
          // Middle: addition within 10, mix of true/false
          return { maxNum: 6, maxResult: 10, canSubtract: false, trueProbability: 0.5 };
        } else {
          // Later: addition and some subtraction within 10
          return { maxNum: 7, maxResult: 10, canSubtract: true, trueProbability: 0.5 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        const config = this.getConfig();

        // Decide if this equation will be true or false
        this.isTrue = Math.random() < config.trueProbability;

        // Decide operation
        this.operation = config.canSubtract && Math.random() > 0.7 ? '-' : '+';

        if (this.operation === '+') {
          // Addition
          this.numA = randomInt(1, config.maxNum);
          this.numB = randomInt(1, Math.min(config.maxNum, config.maxResult - this.numA));
          this.correctResult = this.numA + this.numB;
        } else {
          // Subtraction
          this.numA = randomInt(3, config.maxNum + 2);
          this.numB = randomInt(1, Math.min(config.maxNum - 1, this.numA - 1));
          this.correctResult = this.numA - this.numB;
        }

        // Set shown result
        if (this.isTrue) {
          this.shownResult = this.correctResult;
        } else {
          // Create a wrong answer (off by 1 or 2)
          const offset = randomInt(1, 2) * (Math.random() > 0.5 ? 1 : -1);
          this.shownResult = this.correctResult + offset;
          // Make sure it's valid (positive and within 10)
          if (this.shownResult < 0) this.shownResult = this.correctResult + Math.abs(offset);
          if (this.shownResult > 10) this.shownResult = this.correctResult - Math.abs(offset);
          // Make sure it's actually different and still valid
          if (this.shownResult === this.correctResult) {
            this.shownResult = this.correctResult >= 10 ? this.correctResult - 1 : this.correctResult + 1;
          }
        }

        // Update equation display
        this.renderEquation();

        // Reset UI
        this.equationCard.classList.remove('correct', 'incorrect');
        this.btnTrue.classList.remove('correct', 'incorrect', 'selected');
        this.btnFalse.classList.remove('correct', 'incorrect', 'selected');
        this.btnTrue.disabled = false;
        this.btnFalse.disabled = false;
        this.correctionDisplay.classList.remove('show');
        this.correctionDisplay.innerHTML = '';
        this.feedback.classList.remove('show', 'error');

        this.renderProgress();
      },

      /**
       * Render the equation
       */
      renderEquation() {
        const opSymbol = this.operation === '+' ? '+' : '−';
        this.equationDisplay.innerHTML = `
          <span class="eq-part num">${this.numA}</span>
          <span class="eq-part op">${opSymbol}</span>
          <span class="eq-part num">${this.numB}</span>
          <span class="eq-part op">=</span>
          <span class="eq-part num result">${this.shownResult}</span>
        `;
      },

      /**
       * Select answer (true or false)
       */
      selectAnswer(selectedTrue) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable buttons
        this.btnTrue.disabled = true;
        this.btnFalse.disabled = true;

        const isCorrect = selectedTrue === this.isTrue;
        const opSymbol = this.operation === '+' ? '+' : '−';

        // Mark selected button
        if (selectedTrue) {
          this.btnTrue.classList.add('selected');
        } else {
          this.btnFalse.classList.add('selected');
        }

        if (isCorrect) {
          // Correct answer!
          this.correctCount++;

          if (selectedTrue) {
            // They correctly said TRUE
            this.btnTrue.classList.add('correct');
            this.equationCard.classList.add('correct');
            const msg = i18n.t('section.activities.true-or-not-k.correctTrue') || 'Yes! {{a}} {{op}} {{b}} = {{result}} is TRUE!';
            this.feedback.textContent = msg
              .replace('{{a}}', this.numA)
              .replace('{{op}}', opSymbol)
              .replace('{{b}}', this.numB)
              .replace('{{result}}', this.shownResult);
          } else {
            // They correctly said FALSE
            this.btnFalse.classList.add('correct');
            this.equationCard.classList.add('incorrect');
            const msg = i18n.t('section.activities.true-or-not-k.correctFalse') || 'Right! It\'s NOT true.';
            this.feedback.textContent = msg;
            // Show the correct answer
            this.showCorrection();
          }

          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');

          if (typeof celebrate === 'function') {
            celebrate(selectedTrue ? this.btnTrue : this.btnFalse);
          }
        } else {
          // Incorrect answer
          this.wrongCount++;

          if (selectedTrue) {
            // They incorrectly said TRUE
            this.btnTrue.classList.add('incorrect');
            this.btnFalse.classList.add('correct');
            this.equationCard.classList.add('incorrect');
            const msg = i18n.t('section.activities.true-or-not-k.incorrectTrue') || 'Not quite! It\'s not true.';
            this.feedback.textContent = msg;
            this.showCorrection();
          } else {
            // They incorrectly said FALSE
            this.btnFalse.classList.add('incorrect');
            this.btnTrue.classList.add('correct');
            this.equationCard.classList.add('correct');
            const msg = i18n.t('section.activities.true-or-not-k.incorrectFalse') || 'Actually, it IS true!';
            this.feedback.textContent = msg;
          }

          this.feedback.classList.add('show', 'error');
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show the correct equation
       */
      showCorrection() {
        const opSymbol = this.operation === '+' ? '+' : '−';
        this.correctionDisplay.innerHTML = `
          <span class="correct-answer">${this.numA} ${opSymbol} ${this.numB} = ${this.correctResult}</span>
        `;
        this.correctionDisplay.classList.add('show');
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.true-or-not-k.perfect') || 'Equation Expert!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.true-or-not-k.great') || 'Great checking!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.true-or-not-k.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      TrueOrNotK.init();
    });
  </script>
