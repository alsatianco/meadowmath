  <style>
    /* Compare Numbers Styles */
    .comparison-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .number-card {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-5xl);
      font-weight: var(--weight-bold);
      color: #0369a1;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border: 4px solid #0ea5e9;
      border-radius: var(--radius-2xl);
      box-shadow: 0 4px 0 #0284c7, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .symbol-slot {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: #7c3aed;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      border: 4px dashed #a78bfa;
      border-radius: var(--radius-xl);
      transition: all 0.3s ease;
    }

    .symbol-slot.filled {
      border-style: solid;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #b45309;
    }

    .symbol-slot.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      animation: correctPulse 0.5s ease;
    }

    .symbol-slot.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #b91c1c;
      animation: shake 0.5s ease;
    }

    .croc-hint {
      text-align: center;
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      color: var(--color-neutral-500);
      font-style: italic;
      margin-bottom: var(--space-4);
    }

    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .symbol-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-3) var(--space-4);
      min-width: 90px;
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .symbol-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .symbol-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #cbd5e1;
    }

    .symbol-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .symbol-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
    }

    .symbol-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      box-shadow: 0 4px 0 #d97706;
    }

    .symbol-visual {
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      line-height: 1;
    }

    .symbol-label {
      font-family: var(--font-secondary);
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-500);
      text-transform: lowercase;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .comparison-display {
        gap: var(--space-3);
      }

      .number-card {
        width: 80px;
        height: 80px;
        font-size: var(--text-4xl);
      }

      .symbol-slot {
        width: 60px;
        height: 60px;
        font-size: var(--text-3xl);
      }

      .symbol-btn {
        min-width: 75px;
        padding: var(--space-2) var(--space-3);
      }

      .symbol-visual {
        font-size: var(--text-3xl);
      }
    }
  </style>

  <script>
    // Compare Numbers Activity
    const CompareNumbersK = {
      // Game state
      round: 1,
      maxRounds: 8,
      leftNum: 0,
      rightNum: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      leftNumber: null,
      rightNumber: null,
      symbolSlot: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.leftNumber = document.getElementById('left-number');
        this.rightNumber = document.getElementById('right-number');
        this.symbolSlot = document.getElementById('symbol-slot');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up symbol button listeners
        const symbolBtns = this.answerChoices.querySelectorAll('.symbol-btn');
        symbolBtns.forEach(btn => {
          btn.addEventListener('click', () => this.selectSymbol(btn.dataset.symbol, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectSymbol(btn.dataset.symbol, btn);
            }
          });
        });

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get number range based on round
       */
      getRange() {
        // Progressive: 0-5, then 0-10, then 0-20
        if (this.round <= 3) {
          return { min: 0, max: 5 };
        } else if (this.round <= 6) {
          return { min: 0, max: 10 };
        } else {
          return { min: 0, max: 20 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        const range = this.getRange();

        // Generate two numbers
        // Mix of: both different, sometimes equal
        if (this.round % 3 === 0) {
          // Make them equal sometimes
          this.leftNum = randomInt(range.min, range.max);
          this.rightNum = this.leftNum;
        } else {
          this.leftNum = randomInt(range.min, range.max);
          do {
            this.rightNum = randomInt(range.min, range.max);
          } while (this.rightNum === this.leftNum);
        }

        // Update UI
        this.leftNumber.textContent = this.leftNum;
        this.rightNumber.textContent = this.rightNum;
        this.symbolSlot.textContent = '?';
        this.symbolSlot.classList.remove('filled', 'correct', 'incorrect');
        this.feedback.classList.remove('show', 'error');

        // Reset buttons
        const symbolBtns = this.answerChoices.querySelectorAll('.symbol-btn');
        symbolBtns.forEach(btn => {
          btn.classList.remove('correct', 'incorrect');
          btn.disabled = false;
        });

        this.renderProgress();
      },

      /**
       * Get correct symbol
       */
      getCorrectSymbol() {
        if (this.leftNum < this.rightNum) return '<';
        if (this.leftNum > this.rightNum) return '>';
        return '=';
      },

      /**
       * Select a symbol
       */
      selectSymbol(symbol, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        const correct = this.getCorrectSymbol();
        const symbolBtns = this.answerChoices.querySelectorAll('.symbol-btn');
        symbolBtns.forEach(btn => btn.disabled = true);

        // Show selected symbol
        this.symbolSlot.textContent = symbol;
        this.symbolSlot.classList.add('filled');

        if (symbol === correct) {
          button.classList.add('correct');
          this.symbolSlot.classList.add('correct');

          const msg = i18n.t('section.activities.compare-numbers-k.correct') || 'Yes! {{left}} {{symbol}} {{right}}!';
          this.feedback.textContent = msg
            .replace('{{left}}', this.leftNum)
            .replace('{{symbol}}', correct)
            .replace('{{right}}', this.rightNum);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(this.symbolSlot);
          }
        } else {
          button.classList.add('incorrect');
          this.symbolSlot.classList.add('incorrect');

          // Highlight correct answer
          symbolBtns.forEach(btn => {
            if (btn.dataset.symbol === correct) {
              btn.classList.add('correct');
            }
          });

          const msg = i18n.t('section.activities.compare-numbers-k.incorrect') || 'Not quite! {{left}} {{symbol}} {{right}}.';
          this.feedback.textContent = msg
            .replace('{{left}}', this.leftNum)
            .replace('{{symbol}}', correct)
            .replace('{{right}}', this.rightNum);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.compare-numbers-k.perfect') || "Number Comparison Pro!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.compare-numbers-k.great') || 'Great comparing!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.compare-numbers-k.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      CompareNumbersK.init();
    });
  </script>
