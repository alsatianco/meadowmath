  <style>
    /* Holds More or Less Styles */
    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      text-align: center;
      margin-bottom: var(--space-4);
    }

    .containers-area {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: var(--space-4);
      flex-wrap: wrap;
      padding: var(--space-4) 0;
    }

    .container-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: var(--space-4);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-2xl);
      min-width: 140px;
      min-height: 200px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .container-card:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.02);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .container-card:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .container-card:focus:not(:focus-visible) {
      outline: none;
    }

    .container-card:focus-visible {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .container-card:disabled {
      cursor: not-allowed;
    }

    .container-card.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .container-card.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Container Visual */
    .container-visual {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Cup Shape */
    .container-shape {
      position: relative;
      border: 4px solid #475569;
      background: rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .container-shape.cup {
      border-radius: 0 0 10px 10px;
      border-top: none;
    }

    .container-shape.cup::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      height: 4px;
      background: #475569;
      border-radius: 4px 4px 0 0;
    }

    /* Liquid inside */
    .container-liquid {
      position: absolute;
      bottom: 4px;
      left: 4px;
      right: 4px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      border-radius: 0 0 6px 6px;
      opacity: 0.8;
    }

    .vs-badge {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      box-shadow: 0 3px 0 #6d28d9;
      align-self: center;
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .containers-area {
        gap: var(--space-3);
      }

      .container-card {
        min-width: 120px;
        min-height: 180px;
        padding: var(--space-3);
      }

      .vs-badge {
        font-size: var(--text-lg);
        padding: var(--space-1) var(--space-2);
      }
    }
  </style>

  <script>
    // Holds More or Less Activity
    const HoldsMoreLess = {
      // Game state
      round: 1,
      maxRounds: 8,
      leftCapacity: 0,
      rightCapacity: 0,
      askingForMore: true, // alternates
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      questionText: null,
      containerLeft: null,
      containerRight: null,
      shapeLeft: null,
      shapeRight: null,
      liquidLeft: null,
      liquidRight: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Size presets (width x height)
      sizes: [
        { w: 50, h: 60, label: 'small' },
        { w: 60, h: 80, label: 'medium' },
        { w: 70, h: 100, label: 'large' },
        { w: 80, h: 120, label: 'extra-large' },
        { w: 90, h: 140, label: 'huge' }
      ],

      // Liquid colors for variety
      liquidColors: [
        'linear-gradient(135deg, #60a5fa, #3b82f6)', // blue
        'linear-gradient(135deg, #f97316, #ea580c)', // orange
        'linear-gradient(135deg, #a855f7, #9333ea)', // purple
        'linear-gradient(135deg, #22c55e, #16a34a)', // green
        'linear-gradient(135deg, #f472b6, #ec4899)'  // pink
      ],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.questionText = document.getElementById('question-text');
        this.containerLeft = document.getElementById('container-left');
        this.containerRight = document.getElementById('container-right');
        this.shapeLeft = document.getElementById('shape-left');
        this.shapeRight = document.getElementById('shape-right');
        this.liquidLeft = document.getElementById('liquid-left');
        this.liquidRight = document.getElementById('liquid-right');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.containerLeft.addEventListener('click', () => this.selectContainer('left'));
        this.containerRight.addEventListener('click', () => this.selectContainer('right'));

        this.containerLeft.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.selectContainer('left');
          }
        });

        this.containerRight.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.selectContainer('right');
          }
        });

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Alternate between asking for more and less
        this.askingForMore = this.round % 2 === 1;

        // Update question text
        if (this.askingForMore) {
          this.questionText.textContent = i18n.t('section.activities.holds-more-less.questionMore') || 'Which container holds more?';
        } else {
          this.questionText.textContent = i18n.t('section.activities.holds-more-less.questionLess') || 'Which container holds less?';
        }

        // Pick different sizes for each container
        const leftIdx = randomInt(0, this.sizes.length - 1);
        let rightIdx;
        do {
          rightIdx = randomInt(0, this.sizes.length - 1);
        } while (rightIdx === leftIdx);

        const leftSize = this.sizes[leftIdx];
        const rightSize = this.sizes[rightIdx];

        // Capacity is based on area (width * height)
        this.leftCapacity = leftSize.w * leftSize.h;
        this.rightCapacity = rightSize.w * rightSize.h;

        // Set container sizes
        this.shapeLeft.style.width = leftSize.w + 'px';
        this.shapeLeft.style.height = leftSize.h + 'px';
        this.shapeRight.style.width = rightSize.w + 'px';
        this.shapeRight.style.height = rightSize.h + 'px';

        // Fill with liquid (show capacity)
        this.liquidLeft.style.height = (leftSize.h - 8) + 'px';
        this.liquidRight.style.height = (rightSize.h - 8) + 'px';

        // Random liquid color (same for both)
        const color = this.liquidColors[randomInt(0, this.liquidColors.length - 1)];
        this.liquidLeft.style.background = color;
        this.liquidRight.style.background = color;

        // Reset UI
        this.containerLeft.classList.remove('correct', 'incorrect');
        this.containerRight.classList.remove('correct', 'incorrect');
        this.containerLeft.disabled = false;
        this.containerRight.disabled = false;
        this.feedback.classList.remove('show', 'error');

        this.renderProgress();
      },

      /**
       * Select a container
       */
      selectContainer(side) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        this.containerLeft.disabled = true;
        this.containerRight.disabled = true;

        const leftHoldsMore = this.leftCapacity > this.rightCapacity;

        let correctSide;
        if (this.askingForMore) {
          correctSide = leftHoldsMore ? 'left' : 'right';
        } else {
          // Asking for less
          correctSide = leftHoldsMore ? 'right' : 'left';
        }

        const isCorrect = side === correctSide;

        const selectedCard = side === 'left' ? this.containerLeft : this.containerRight;
        const correctCard = correctSide === 'left' ? this.containerLeft : this.containerRight;

        if (isCorrect) {
          selectedCard.classList.add('correct');

          let msg;
          if (this.askingForMore) {
            msg = i18n.t('section.activities.holds-more-less.correctMore') || 'Yes! This one holds more!';
          } else {
            msg = i18n.t('section.activities.holds-more-less.correctLess') || 'Yes! This one holds less!';
          }
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(selectedCard);
          }
        } else {
          selectedCard.classList.add('incorrect');
          correctCard.classList.add('correct');

          let msg;
          if (this.askingForMore) {
            msg = i18n.t('section.activities.holds-more-less.incorrectMore') || 'Not quite! This one holds more.';
          } else {
            msg = i18n.t('section.activities.holds-more-less.incorrectLess') || 'Not quite! This one holds less.';
          }
          this.feedback.textContent = msg;
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🥤';
          this.statsMessage.textContent = i18n.t('section.activities.holds-more-less.perfect') || 'Capacity Champion!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.holds-more-less.great') || 'Great comparing!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.holds-more-less.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      HoldsMoreLess.init();
    });
  </script>
