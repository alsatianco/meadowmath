  <style>
    /* Number Line Place Styles */
    .target-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .target-label {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-600);
    }

    .target-number {
      font-family: var(--font-secondary);
      font-size: var(--text-5xl);
      font-weight: var(--weight-bold);
      color: #dc2626;
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-xl);
      border: 4px solid #f87171;
      box-shadow: 0 4px 0 #ef4444, 0 6px 15px rgba(0, 0, 0, 0.1);
      min-width: 80px;
      text-align: center;
      animation: targetPulse 2s ease-in-out infinite;
    }

    @keyframes targetPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .number-line-container {
      padding: var(--space-4);
      overflow-x: auto;
      overflow-y: visible;
    }

    .number-line {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
      position: relative;
      padding: var(--space-6) var(--space-6) var(--space-2);
      min-width: fit-content;
    }

    .number-line::before {
      content: '';
      position: absolute;
      bottom: 50px;
      left: 20px;
      right: 20px;
      height: 6px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 3px;
    }

    .line-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0 var(--space-2);
    }

    .line-tick {
      width: 4px;
      height: 24px;
      background: #3b82f6;
      border-radius: 2px;
    }

    .line-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-600);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }

    .line-point:hover .line-label {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .line-point.target-spot {
      position: relative;
    }

    .line-point.target-spot .line-label {
      visibility: hidden;
    }

    .line-point.target-spot::after {
      content: '?';
      position: absolute;
      bottom: 0;
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: #dc2626;
      background: #fee2e2;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-md);
      border: 2px dashed #f87171;
      animation: questionPulse 1s ease-in-out infinite;
    }

    @keyframes questionPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .line-point.placed .line-label {
      visibility: visible;
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      color: #166534;
      border: 2px solid #22c55e;
    }

    .line-point.placed::after {
      display: none;
    }

    .line-point.correct .line-label {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      color: #166534;
      animation: correctPop 0.5s ease;
    }

    .line-point.incorrect .line-label {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      animation: shake 0.5s ease;
    }

    /* Clickable area styling */
    .click-spot {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
      position: absolute;
      bottom: 25px;
      transform: translateX(-50%);
      transition: all 0.2s ease;
    }

    .click-spot:hover {
      background: rgba(59, 130, 246, 0.2);
    }

    .click-spot:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
      background: rgba(59, 130, 246, 0.2);
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .target-number {
        font-size: var(--text-4xl);
        padding: var(--space-2) var(--space-4);
      }

      .number-line {
        padding: var(--space-4) var(--space-2) var(--space-2);
      }

      .line-point {
        padding: 0 var(--space-1);
      }

      .line-label {
        font-size: var(--text-base);
      }

      .line-tick {
        height: 18px;
      }
    }
  </style>

  <script>
    // Number Line Place Activity
    const NumberLinePlaceK = {
      // Game state
      round: 1,
      maxRounds: 8,
      targetNumber: 0,
      rangeStart: 0,
      rangeEnd: 10,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      targetNumberEl: null,
      numberLine: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.targetNumberEl = document.getElementById('target-number');
        this.numberLine = document.getElementById('number-line');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get config based on round
       */
      getConfig() {
        // Progressive: 0-10, then 0-20, with number line showing some numbers
        if (this.round <= 4) {
          return { start: 0, end: 10 };
        } else {
          return { start: 0, end: 20 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        const config = this.getConfig();
        this.rangeStart = config.start;
        this.rangeEnd = config.end;

        // Pick a target number (not the endpoints)
        this.targetNumber = randomInt(this.rangeStart + 1, this.rangeEnd - 1);

        // Update UI
        this.targetNumberEl.textContent = this.targetNumber;
        this.feedback.classList.remove('show', 'error');

        this.renderNumberLine();
        this.renderProgress();
      },

      /**
       * Render number line
       */
      renderNumberLine() {
        this.numberLine.innerHTML = '';

        for (let num = this.rangeStart; num <= this.rangeEnd; num++) {
          const point = document.createElement('div');
          point.className = 'line-point';
          point.dataset.num = num;

          const tick = document.createElement('div');
          tick.className = 'line-tick';

          const label = document.createElement('div');
          label.className = 'line-label';
          label.textContent = num;

          point.appendChild(tick);
          point.appendChild(label);

          // Mark target spot (hide the number)
          if (num === this.targetNumber) {
            point.classList.add('target-spot');
          }

          // Make clickable
          point.addEventListener('click', () => this.selectSpot(num, point));
          point.setAttribute('tabindex', '0');
          point.setAttribute('role', 'button');
          point.setAttribute('aria-label', `Position ${num}`);
          point.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectSpot(num, point);
            }
          });

          this.numberLine.appendChild(point);
        }
      },

      /**
       * Select a spot on the number line
       */
      selectSpot(num, element) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all points
        const points = this.numberLine.querySelectorAll('.line-point');
        points.forEach(p => {
          p.style.pointerEvents = 'none';
        });

        // Find the target spot
        const targetSpot = this.numberLine.querySelector('.target-spot');

        if (num === this.targetNumber) {
          element.classList.add('correct', 'placed');
          element.classList.remove('target-spot');

          const msg = i18n.t('section.activities.number-line-place-k.correct') || 'Yes! {{number}} goes here!';
          this.feedback.textContent = msg.replace('{{number}}', this.targetNumber);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(element);
          }
        } else {
          element.classList.add('incorrect');
          targetSpot.classList.add('placed');
          targetSpot.classList.remove('target-spot');

          const msg = i18n.t('section.activities.number-line-place-k.incorrect') || '{{number}} goes here!';
          this.feedback.textContent = msg.replace('{{number}}', this.targetNumber);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.number-line-place-k.perfect') || "Number Line Pro!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.number-line-place-k.great') || 'Great number placing!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.number-line-place-k.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      NumberLinePlaceK.init();
    });
  </script>
