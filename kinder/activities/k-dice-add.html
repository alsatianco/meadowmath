    /* Dice Add Activity Styles */
    .roll-section {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-5);
    }

    .roll-btn {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      border: 4px solid #3b82f6;
      border-radius: var(--radius-2xl);
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: #1e40af;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 0 #2563eb, 0 10px 20px rgba(59, 130, 246, 0.2);
    }

    .roll-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(59, 130, 246, 0.3);
    }

    .roll-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #2563eb;
    }

    .roll-btn:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .roll-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .roll-btn:focus-visible {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .roll-btn.hidden {
      display: none;
    }

    .roll-emoji {
      font-size: var(--text-3xl);
      animation: bounceGently 2s ease-in-out infinite;
    }

    @keyframes bounceGently {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Dice Container */
    .dice-container {
      display: none;
      justify-content: center;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
      padding: var(--space-4);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-2xl);
      box-shadow: 0 6px 0 #16a34a;
      width: auto;
      height: auto;
    }

    .dice-container.show {
      display: flex;
    }

    .dice {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      border: 4px solid #64748b;
      border-radius: var(--radius-xl);
      box-shadow: 0 4px 0 #475569, inset 0 2px 4px rgba(255, 255, 255, 0.8);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      padding: 10px;
    }

    .dice-dot {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1e293b;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    /* Dice patterns based on data-value attribute */
    .dice[data-value="1"] .dice-dot:nth-child(5) { opacity: 1; }
    .dice[data-value="2"] .dice-dot:nth-child(1),
    .dice[data-value="2"] .dice-dot:nth-child(9) { opacity: 1; }
    .dice[data-value="3"] .dice-dot:nth-child(1),
    .dice[data-value="3"] .dice-dot:nth-child(5),
    .dice[data-value="3"] .dice-dot:nth-child(9) { opacity: 1; }
    .dice[data-value="4"] .dice-dot:nth-child(1),
    .dice[data-value="4"] .dice-dot:nth-child(3),
    .dice[data-value="4"] .dice-dot:nth-child(7),
    .dice[data-value="4"] .dice-dot:nth-child(9) { opacity: 1; }
    .dice[data-value="5"] .dice-dot:nth-child(1),
    .dice[data-value="5"] .dice-dot:nth-child(3),
    .dice[data-value="5"] .dice-dot:nth-child(5),
    .dice[data-value="5"] .dice-dot:nth-child(7),
    .dice[data-value="5"] .dice-dot:nth-child(9) { opacity: 1; }
    .dice[data-value="6"] .dice-dot:nth-child(1),
    .dice[data-value="6"] .dice-dot:nth-child(3),
    .dice[data-value="6"] .dice-dot:nth-child(4),
    .dice[data-value="6"] .dice-dot:nth-child(6),
    .dice[data-value="6"] .dice-dot:nth-child(7),
    .dice[data-value="6"] .dice-dot:nth-child(9) { opacity: 1; }

    /* Rolling animation */
    .dice.rolling {
      animation: roll 0.8s ease-out;
    }

    @keyframes roll {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(0.9); }
      50% { transform: rotate(180deg) scale(1.1); }
      75% { transform: rotate(270deg) scale(0.9); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .plus-sign {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #16a34a;
    }

    /* Question Section */
    .question-section {
      display: none;
      text-align: center;
      margin-bottom: var(--space-4);
    }

    .question-section.show {
      display: block;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
    }

    /* Answer choices */
    .answer-choices {
      display: none;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .answer-choices.show {
      display: flex;
    }

    .answer-btn {
      width: 75px;
      height: 75px;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .answer-btn:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .answer-btn:focus-visible {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #cbd5e1;
    }

    .answer-btn:disabled {
      cursor: not-allowed;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .roll-btn {
        padding: var(--space-3) var(--space-5);
        font-size: var(--text-lg);
      }

      .roll-emoji {
        font-size: var(--text-2xl);
      }

      .dice {
        width: 75px;
        height: 75px;
        padding: 8px;
      }

      .plus-sign {
        font-size: var(--text-2xl);
      }

      .answer-btn {
        width: 65px;
        height: 65px;
        font-size: var(--text-2xl);
      }
    }

    @media (max-width: 480px) {
      .dice-container {
        flex-direction: column;
        gap: var(--space-2);
      }

      .dice {
        width: 80px;
        height: 80px;
      }

      .plus-sign {
        transform: rotate(0deg);
      }
    }
  </style>

  <script>
    // Dice Add Activity
    const DiceAdd = {
      // Game state
      round: 1,
      maxRounds: 10,
      dice1Value: 0,
      dice2Value: 0,
      answer: 0,
      hasAnswered: false,
      hasRolled: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      rollSection: null,
      btnRoll: null,
      diceContainer: null,
      dice1: null,
      dice2: null,
      questionSection: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.rollSection = document.getElementById('roll-section');
        this.btnRoll = document.getElementById('btn-roll');
        this.diceContainer = document.getElementById('dice-container');
        this.dice1 = document.getElementById('dice1');
        this.dice2 = document.getElementById('dice2');
        this.questionSection = document.getElementById('question-section');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnRoll.addEventListener('click', () => this.rollDice());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;
        this.hasRolled = false;

        // Reset UI
        this.rollSection.style.display = 'flex';
        this.btnRoll.classList.remove('hidden');
        this.diceContainer.classList.remove('show');
        this.questionSection.classList.remove('show');
        this.answerChoices.classList.remove('show');
        this.answerChoices.innerHTML = '';
        this.feedback.classList.remove('show', 'error');

        this.renderProgress();
      },

      /**
       * Roll the dice
       */
      rollDice() {
        if (this.hasRolled) return;
        this.hasRolled = true;

        // Hide roll button, show dice
        this.rollSection.style.display = 'none';
        this.diceContainer.classList.add('show');

        // Generate random dice values (1-6)
        this.dice1Value = randomInt(1, 6);
        this.dice2Value = randomInt(1, 6);
        this.answer = this.dice1Value + this.dice2Value;

        // Add rolling animation
        this.dice1.classList.add('rolling');
        this.dice2.classList.add('rolling');

        // Show final values after animation
        setTimeout(() => {
          this.dice1.setAttribute('data-value', this.dice1Value);
          this.dice2.setAttribute('data-value', this.dice2Value);
          this.dice1.classList.remove('rolling');
          this.dice2.classList.remove('rolling');

          // Show question and choices
          setTimeout(() => {
            this.questionSection.classList.add('show');
            this.answerChoices.classList.add('show');
            this.renderChoices();
          }, 300);
        }, 800);
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        // Generate choices
        const choices = new Set([this.answer]);

        // Add distractors (nearby numbers within valid range 2-12)
        while (choices.size < 4) {
          let distractor = this.answer + randomInt(-3, 3);
          if (distractor >= 2 && distractor <= 12 && distractor !== this.answer) {
            choices.add(distractor);
          }
        }

        // Convert to array and shuffle
        const choicesArray = Array.from(choices);
        this.shuffleArray(choicesArray);

        // Create buttons
        choicesArray.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.addEventListener('click', () => this.selectAnswer(num, btn));
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Shuffle array
       */
      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      /**
       * Select answer
       */
      selectAnswer(num, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const allBtns = this.answerChoices.querySelectorAll('.answer-btn');
        allBtns.forEach(b => b.disabled = true);

        const isCorrect = num === this.answer;

        if (isCorrect) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.k-dice-add.correct') || '{{a}} + {{b}} = {{answer}}!';
          this.feedback.textContent = msg
            .replace('{{a}}', this.dice1Value)
            .replace('{{b}}', this.dice2Value)
            .replace('{{answer}}', this.answer);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          // Highlight correct answer
          allBtns.forEach(b => {
            if (parseInt(b.textContent) === this.answer) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.k-dice-add.incorrect') || '{{a}} + {{b}} = {{answer}}';
          this.feedback.textContent = msg
            .replace('{{a}}', this.dice1Value)
            .replace('{{b}}', this.dice2Value)
            .replace('{{answer}}', this.answer);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🎲';
          this.statsMessage.textContent = i18n.t('section.activities.k-dice-add.perfect') || 'Dice Master!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.k-dice-add.great') || 'Great dice adding!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.k-dice-add.keepPracticing') || 'Keep rolling!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      DiceAdd.init();
    });
  </script>
