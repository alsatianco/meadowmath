  <style>
    /* Count On Activity Styles */
    .sequence-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: var(--space-6);
    }

    .sequence-numbers {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
    }

    .sequence-number {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      border-radius: var(--radius-xl);
      animation: slideIn 0.3s ease;
    }

    .sequence-number.given {
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      border: 4px solid #3b82f6;
      color: #1e40af;
      box-shadow: 0 4px 0 #2563eb, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .sequence-number.mystery {
      background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
      border: 4px dashed #a855f7;
      color: #7c3aed;
      font-size: var(--text-4xl);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .sequence-number.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border: 4px solid #22c55e;
      color: #166534;
      animation: revealPop 0.5s ease;
    }

    .sequence-arrow {
      font-size: var(--text-2xl);
      color: var(--color-neutral-400);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes revealPop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Question Section */
    .question-section {
      text-align: center;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-5);
    }

    .answer-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-4);
    }

    .answer-btn {
      width: 90px;
      height: 90px;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-xl);
      color: #b45309;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #d97706, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #d97706, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d97706;
    }

    .answer-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .sequence-number {
        width: 65px;
        height: 65px;
        font-size: var(--text-2xl);
      }

      .sequence-number.mystery {
        font-size: var(--text-3xl);
      }

      .sequence-numbers {
        gap: var(--space-2);
      }

      .answer-btn {
        width: 75px;
        height: 75px;
        font-size: var(--text-2xl);
      }

      .answer-choices {
        gap: var(--space-3);
      }
    }
  </style>

  <script>
    // Count On Activity
    const CountOn = {
      // Game state
      round: 1,
      maxRounds: 10,
      startNumber: 0,
      answer: 0,
      sequenceLength: 3, // How many numbers to show before the mystery
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      sequenceNumbers: null,
      questionText: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.sequenceNumbers = document.getElementById('sequence-numbers');
        this.questionText = document.getElementById('question-text');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Get difficulty range based on round
       */
      getDifficultyRange() {
        // Progressive difficulty: 0-20 -> 20-60
        if (this.round <= 3) {
          return { min: 0, max: 10 };
        } else if (this.round <= 6) {
          return { min: 5, max: 20 };
        } else if (this.round <= 8) {
          return { min: 10, max: 40 };
        } else {
          return { min: 20, max: 60 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Get difficulty range
        const range = this.getDifficultyRange();

        // Pick a starting number (leave room for the answer)
        this.startNumber = randomInt(range.min, range.max - this.sequenceLength);

        // The answer is the next number after the sequence
        this.answer = this.startNumber + this.sequenceLength;

        // Render the sequence
        this.renderSequence();

        // Render answer choices
        this.renderChoices();

        // Update UI
        this.feedback.classList.remove('show');
        this.questionText.textContent = i18n.t('section.activities.count-on.question') || 'What comes next?';
        this.renderProgress();
      },

      /**
       * Render the number sequence
       */
      renderSequence() {
        this.sequenceNumbers.innerHTML = '';

        // Show the sequence numbers
        for (let i = 0; i < this.sequenceLength; i++) {
          const num = this.startNumber + i;

          if (i > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'sequence-arrow';
            arrow.textContent = '→';
            this.sequenceNumbers.appendChild(arrow);
          }

          const numEl = document.createElement('div');
          numEl.className = 'sequence-number given';
          numEl.textContent = num;
          numEl.style.animationDelay = `${i * 0.15}s`;
          this.sequenceNumbers.appendChild(numEl);
        }

        // Add arrow before mystery
        const arrow = document.createElement('span');
        arrow.className = 'sequence-arrow';
        arrow.textContent = '→';
        this.sequenceNumbers.appendChild(arrow);

        // Add the mystery box
        const mystery = document.createElement('div');
        mystery.className = 'sequence-number mystery';
        mystery.textContent = '?';
        mystery.id = 'mystery-number';
        this.sequenceNumbers.appendChild(mystery);
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        const choices = this.generateChoices(this.answer);
        this.answerChoices.innerHTML = '';

        choices.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(num, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Generate answer choices
       */
      generateChoices(correct) {
        const choices = [correct];

        // Pre-calculate all valid wrong answers to avoid infinite loop
        const possibleWrong = [];
        for (const offset of [-3, -2, -1, 1, 2, 3]) {
          const wrong = correct + offset;
          if (wrong >= 0) {
            possibleWrong.push(wrong);
          }
        }

        // Shuffle and take up to 3 wrong answers
        shuffle(possibleWrong);
        const numWrong = Math.min(3, possibleWrong.length);
        choices.push(...possibleWrong.slice(0, numWrong));

        return shuffle(choices);
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const buttons = this.answerChoices.querySelectorAll('.answer-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Reveal the mystery number
        const mysteryEl = document.getElementById('mystery-number');
        mysteryEl.textContent = this.answer;
        mysteryEl.classList.remove('mystery');
        mysteryEl.classList.add('revealed');

        if (selected === this.answer) {
          // Correct!
          button.classList.add('correct');
          const correctMsg = i18n.t('section.activities.count-on.correct') || 'Yes! {{prev}} → {{answer}}!';
          this.feedback.textContent = correctMsg
            .replace('{{prev}}', this.answer - 1)
            .replace('{{answer}}', this.answer);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          // Highlight correct answer
          buttons.forEach(btn => {
            if (parseInt(btn.textContent) === this.answer) {
              btn.classList.add('correct');
            }
          });
          const incorrectMsg = i18n.t('section.activities.count-on.incorrect') || 'Not quite! After {{prev}} comes {{answer}}.';
          this.feedback.textContent = incorrectMsg
            .replace('{{prev}}', this.answer - 1)
            .replace('{{answer}}', this.answer);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.count-on.perfect') || "Amazing! You're a counting champion!";
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.count-on.great') || 'Great job counting on!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.count-on.keepPracticing') || 'Good effort! Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      CountOn.init();
    });
  </script>
