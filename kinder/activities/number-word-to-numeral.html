    /* Number Word to Numeral Styles */
    .word-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .word-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-500);
    }

    .word-card {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-2xl);
      padding: var(--space-4) var(--space-6);
      box-shadow: 0 4px 0 #d97706, 0 6px 15px rgba(0, 0, 0, 0.1);
      animation: wordPulse 3s ease-in-out infinite;
    }

    @keyframes wordPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .word-text {
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: #b45309;
      text-transform: lowercase;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      text-align: center;
      margin-bottom: var(--space-4);
    }

    .answer-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-2);
    }

    .answer-btn {
      width: 90px;
      height: 90px;
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border: 4px solid #0ea5e9;
      border-radius: var(--radius-xl);
      color: #0369a1;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #0284c7, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #0284c7, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0284c7;
    }

    .answer-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .word-text {
        font-size: var(--text-3xl);
      }

      .word-card {
        padding: var(--space-3) var(--space-5);
      }

      .answer-btn {
        width: 75px;
        height: 75px;
        font-size: var(--text-3xl);
      }
    }
  </style>

  <script>
    // Number Word to Numeral Activity
    const NumberWordToNumeral = {
      // Game state
      round: 1,
      maxRounds: 8,
      targetNumber: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,
      usedNumbers: new Set(),

      // DOM elements
      progress: null,
      wordText: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Number words (0-20)
      numberWords: {
        en: ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten',
             'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen', 'twenty'],
        vi: ['không', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín', 'mười',
             'mười một', 'mười hai', 'mười ba', 'mười bốn', 'mười lăm', 'mười sáu', 'mười bảy', 'mười tám', 'mười chín', 'hai mươi']
      },

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.wordText = document.getElementById('word-text');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get target range based on round
       */
      getTargetRange() {
        // Progressive: 0-10, then 0-15, then 0-20
        if (this.round <= 3) {
          return { min: 0, max: 10 };
        } else if (this.round <= 6) {
          return { min: 0, max: 15 };
        } else {
          return { min: 0, max: 20 };
        }
      },

      /**
       * Get current language
       */
      getLanguage() {
        const lang = i18n.getLanguage ? i18n.getLanguage() : 'en';
        return this.numberWords[lang] ? lang : 'en';
      },

      /**
       * Get number word
       */
      getNumberWord(num) {
        const lang = this.getLanguage();
        return this.numberWords[lang][num] || this.numberWords['en'][num];
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Pick a new target number not recently used
        const range = this.getTargetRange();
        let attempts = 0;
        do {
          this.targetNumber = randomInt(range.min, range.max);
          attempts++;
        } while (this.usedNumbers.has(this.targetNumber) && attempts < 20);

        this.usedNumbers.add(this.targetNumber);
        if (this.usedNumbers.size > 5) {
          // Keep only recent numbers
          const arr = Array.from(this.usedNumbers);
          this.usedNumbers = new Set(arr.slice(-5));
        }

        // Update UI
        this.wordText.textContent = this.getNumberWord(this.targetNumber);
        this.feedback.classList.remove('show', 'error');
        this.renderChoices();
        this.renderProgress();
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        const choices = this.generateChoices(this.targetNumber);

        choices.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(num, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Generate answer choices
       */
      generateChoices(correct) {
        const choices = [correct];
        const range = this.getTargetRange();

        // Pre-calculate all valid wrong answers to avoid infinite loop
        const possibleWrong = [];
        for (const offset of [-3, -2, -1, 1, 2, 3]) {
          const wrong = correct + offset;
          if (wrong >= 0 && wrong <= range.max) {
            possibleWrong.push(wrong);
          }
        }

        // Shuffle and take up to 3 wrong answers
        shuffle(possibleWrong);
        const numWrong = Math.min(3, possibleWrong.length);
        choices.push(...possibleWrong.slice(0, numWrong));

        return shuffle(choices);
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        const buttons = this.answerChoices.querySelectorAll('.answer-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selected === this.targetNumber) {
          button.classList.add('correct');
          const word = this.getNumberWord(this.targetNumber);
          const msg = i18n.t('section.activities.number-word-to-numeral.correct') || 'Yes! "{{word}}" is {{number}}!';
          this.feedback.textContent = msg.replace('{{word}}', word).replace('{{number}}', this.targetNumber);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          button.classList.add('incorrect');
          buttons.forEach(btn => {
            if (parseInt(btn.textContent) === this.targetNumber) {
              btn.classList.add('correct');
            }
          });
          const word = this.getNumberWord(this.targetNumber);
          const msg = i18n.t('section.activities.number-word-to-numeral.incorrect') || 'Not quite! "{{word}}" is {{number}}.';
          this.feedback.textContent = msg.replace('{{word}}', word).replace('{{number}}', this.targetNumber);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.number-word-to-numeral.perfect') || "Word Wizard!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.number-word-to-numeral.great') || 'Great word matching!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.number-word-to-numeral.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.usedNumbers.clear();
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      NumberWordToNumeral.init();
    });
  </script>
