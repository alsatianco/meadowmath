  <style>
    /* Ten Train Styles */
    .train-scene {
      position: relative;
      width: 100%;
      max-width: 450px;
      height: 200px;
      margin: 0 auto var(--space-4);
      background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 40%, #98d8a0 40%, #7cb37c 100%);
      border-radius: var(--radius-2xl);
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* Clouds */
    .train-scene::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 20px;
      width: 60px;
      height: 25px;
      background: white;
      border-radius: 20px;
      box-shadow:
        25px 10px 0 10px white,
        80px 5px 0 5px white,
        150px 15px 0 8px white,
        200px 0 0 12px white,
        280px 10px 0 6px white,
        350px 5px 0 10px white;
      animation: cloudDrift 20s linear infinite;
    }

    @keyframes cloudDrift {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50px); }
    }

    .railroad-track {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      height: 30px;
      display: flex;
      align-items: flex-end;
    }

    /* Track base */
    .railroad-track::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #8b4513 0px,
        #8b4513 30px,
        #654321 30px,
        #654321 32px
      );
      border-top: 3px solid #4a4a4a;
      border-bottom: 3px solid #4a4a4a;
    }

    .station-sign {
      position: absolute;
      bottom: 10px;
      transform: translateX(-50%);
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      color: rgba(255, 255, 255, 0.5);
      background: rgba(139, 69, 19, 0.3);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      transition: all 0.3s ease;
    }

    .station-sign.reached {
      color: #fff;
      background: #22c55e;
      transform: translateX(-50%) scale(1.1);
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.5);
    }

    .station-sign.current {
      color: #fde047;
      background: rgba(253, 224, 71, 0.3);
      animation: pulse 0.8s ease-in-out infinite;
    }

    .train {
      position: absolute;
      left: 20px;
      bottom: 50px;
      transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
    }

    .train-body {
      font-size: 52px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transform: scaleX(-1); /* Face right */
    }

    .train-smoke {
      position: absolute;
      top: -15px;
      left: 20px;
      width: 15px;
      height: 15px;
      background: rgba(150, 150, 150, 0.7);
      border-radius: 50%;
      opacity: 0;
      animation: smoke 0.3s ease-out infinite;
    }

    .train-smoke.active {
      opacity: 1;
    }

    @keyframes smoke {
      0% {
        transform: translate(0, 0) scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: translate(-10px, -20px) scale(1.5);
        opacity: 0;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .count-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .count-label {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-600);
    }

    .count-value {
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: #166534;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-xl);
      border: 3px solid #86efac;
      box-shadow: 0 3px 0 #86efac;
      min-width: 80px;
      text-align: center;
    }

    .answer-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-2);
    }

    .answer-btn {
      width: 90px;
      height: 90px;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-xl);
      color: #92400e;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #d97706, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #d97706, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d97706;
    }

    .answer-btn:focus {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }

    .answer-btn:focus-visible {
      outline: 3px solid #f59e0b;
      outline-offset: 2px;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Celebration effect */
    .train-scene.celebrate::after {
      content: '🎉✨🌟';
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      animation: celebrateText 1s ease-out forwards;
    }

    @keyframes celebrateText {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .train-scene {
        height: 160px;
        max-width: 340px;
      }

      .train-body {
        font-size: 40px;
      }

      .train {
        bottom: 45px;
      }

      .station-sign {
        font-size: var(--text-xs);
        padding: 1px 4px;
      }

      .count-value {
        font-size: var(--text-3xl);
        min-width: 70px;
      }

      .answer-btn {
        width: 75px;
        height: 75px;
        font-size: var(--text-2xl);
      }
    }
  </style>

  <!-- JavaScript Files -->
  <script src="../../js/utils.js"></script>
  <script src="../../js/storage.js"></script>
  <script src="../../js/animations.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/navigation.js"></script>
  <script>
    // Ten Train Activity
    const TenTrain = {
      // Game state
      round: 1,
      maxRounds: 6,
      currentCount: 0,
      targetCount: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      trainScene: null,
      railroadTrack: null,
      train: null,
      trainSmoke: null,
      countValue: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.trainScene = document.getElementById('train-scene');
        this.railroadTrack = document.getElementById('railroad-track');
        this.train = document.getElementById('train');
        this.trainSmoke = document.getElementById('train-smoke');
        this.countValue = document.getElementById('count-value');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get target count range based on round
       */
      getTargetRange() {
        // Progressive: first rounds go to 50, later to 100
        if (this.round <= 2) {
          return { max: 50 };
        } else if (this.round <= 4) {
          return { max: 70 };
        } else {
          return { max: 100 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.currentCount = 0;
        this.hasAnswered = false;

        const range = this.getTargetRange();
        this.targetCount = range.max;

        // Reset UI
        this.countValue.textContent = '0';
        this.feedback.classList.remove('show', 'error');
        this.trainScene.classList.remove('celebrate');

        // Render station signs on track
        this.renderStationSigns();
        this.updateTrainPosition();
        this.renderChoices();
        this.renderProgress();
      },

      /**
       * Render station signs along the track
       */
      renderStationSigns() {
        // Clear existing signs
        const existingSigns = this.railroadTrack.querySelectorAll('.station-sign');
        existingSigns.forEach(sign => sign.remove());

        const sceneWidth = this.trainScene.offsetWidth;
        const totalSteps = this.targetCount / 10;
        const minLeft = 20;
        const maxLeft = sceneWidth - 80;
        const stepWidth = (maxLeft - minLeft) / totalSteps;

        for (let num = 0; num <= this.targetCount; num += 10) {
          const sign = document.createElement('div');
          sign.className = 'station-sign';
          sign.textContent = num;
          sign.dataset.value = num;

          // Position along the track (aligned with train stops)
          const stepIndex = num / 10;
          const leftPx = minLeft + (stepIndex * stepWidth);
          sign.style.left = leftPx + 'px';

          this.railroadTrack.appendChild(sign);
        }
      },

      /**
       * Update train position based on current count
       */
      updateTrainPosition() {
        const totalSteps = this.targetCount / 10;
        const currentStep = this.currentCount / 10;

        // Calculate position
        const sceneWidth = this.trainScene.offsetWidth;
        const minLeft = 20;
        const maxLeft = sceneWidth - 80;
        const stepWidth = (maxLeft - minLeft) / totalSteps;

        const newLeft = minLeft + (currentStep * stepWidth);
        this.train.style.left = newLeft + 'px';

        // Update station signs (mark reached)
        const signs = this.railroadTrack.querySelectorAll('.station-sign');
        signs.forEach(sign => {
          const value = parseInt(sign.dataset.value);
          sign.classList.remove('reached', 'current');
          if (value <= this.currentCount) {
            sign.classList.add('reached');
          } else if (value === this.currentCount + 10) {
            sign.classList.add('current');
          }
        });
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        if (this.currentCount >= this.targetCount) {
          // Round complete, will auto-advance
          return;
        }

        const nextNumber = this.currentCount + 10;
        const choices = this.generateChoices(nextNumber);

        choices.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.setAttribute('aria-label', num);
          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(num, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Generate answer choices
       */
      generateChoices(correct) {
        const choices = [correct];

        // Add wrong answers (nearby multiples of 10)
        const possibleWrong = [];
        for (let offset of [-20, -10, 10, 20]) {
          const wrong = correct + offset;
          if (wrong > 0 && wrong <= 110 && !choices.includes(wrong)) {
            possibleWrong.push(wrong);
          }
        }

        // Shuffle and take 3
        shuffle(possibleWrong);
        choices.push(...possibleWrong.slice(0, 3));

        return shuffle(choices);
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, button) {
        if (this.hasAnswered) return;

        const correct = this.currentCount + 10;
        const buttons = this.answerChoices.querySelectorAll('.answer-btn');

        if (selected === correct) {
          // Correct!
          button.classList.add('correct');
          this.hasAnswered = true;

          // Activate smoke and move train
          this.trainSmoke.classList.add('active');
          this.currentCount = correct;
          this.countValue.textContent = this.currentCount;

          setTimeout(() => {
            this.updateTrainPosition();
            this.trainSmoke.classList.remove('active');
          }, 100);

          // Show brief feedback
          const msg = i18n.t('section.activities.ten-train.correct') || 'Choo choo! Station {{count}}!';
          this.feedback.textContent = msg.replace('{{count}}', this.currentCount);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');

          // Check if round complete
          if (this.currentCount >= this.targetCount) {
            this.correctCount++;
            this.trainScene.classList.add('celebrate');

            if (typeof celebrate === 'function') {
              celebrate(this.train);
            }

            setTimeout(() => {
              if (this.round < this.maxRounds) {
                this.nextRound();
              } else {
                this.showStats();
              }
            }, this.autoAdvanceDelay);
          } else {
            // Continue counting
            setTimeout(() => {
              this.hasAnswered = false;
              this.feedback.classList.remove('show');
              this.renderChoices();
            }, 800);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          buttons.forEach(btn => {
            if (parseInt(btn.textContent) === correct) {
              btn.classList.add('correct');
            }
          });

          const msg = i18n.t('section.activities.ten-train.incorrect') || 'Not quite! Next station is {{next}}.';
          this.feedback.textContent = msg.replace('{{next}}', correct);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;

          // Move to next round after mistake
          this.hasAnswered = true;
          buttons.forEach(btn => btn.disabled = true);

          setTimeout(() => {
            if (this.round < this.maxRounds) {
              this.nextRound();
            } else {
              this.showStats();
            }
          }, this.autoAdvanceDelay);
        }

        this.renderProgress();
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🚂';
          this.statsMessage.textContent = i18n.t('section.activities.ten-train.perfect') || 'Train Conductor!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.ten-train.great') || 'Great train ride!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.ten-train.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      TenTrain.init();
    });
  </script>
