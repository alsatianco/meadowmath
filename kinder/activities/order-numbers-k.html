  <style>
    /* Order Numbers Styles */
    .order-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .order-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-500);
    }

    .order-slots {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .order-slot {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border: 4px dashed #cbd5e1;
      border-radius: var(--radius-xl);
      color: var(--color-neutral-400);
      transition: all 0.2s ease;
    }

    .order-slot.filled {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 4px solid #3b82f6;
      border-style: solid;
      color: #1e40af;
    }

    .order-slot.current {
      border-color: #f59e0b;
      animation: slotPulse 1s ease-in-out infinite;
    }

    .order-arrow {
      font-size: var(--text-2xl);
      color: var(--color-neutral-400);
    }

    @keyframes slotPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
    }

    .numbers-pool {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-2xl);
      margin-bottom: var(--space-4);
    }

    .number-chip {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      background: white;
      border: 4px solid #0ea5e9;
      border-radius: var(--radius-xl);
      color: #0369a1;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #0284c7, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .number-chip:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #0284c7, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .number-chip:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0284c7;
    }

    .number-chip:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .number-chip.used {
      opacity: 0.3;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .number-chip.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
    }

    .number-chip.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #b91c1c;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .order-slot {
        width: 55px;
        height: 55px;
        font-size: var(--text-2xl);
      }

      .order-arrow {
        font-size: var(--text-lg);
      }

      .numbers-pool {
        padding: var(--space-3);
        gap: var(--space-2);
      }

      .number-chip {
        width: 55px;
        height: 55px;
        font-size: var(--text-2xl);
      }
    }
  </style>

  <script>
    // Order Numbers Activity
    const OrderNumbersK = {
      // Game state
      round: 1,
      maxRounds: 6,
      numbers: [],
      shuffledNumbers: [], // Store shuffled order for display
      selectedOrder: [],
      currentSlot: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      orderSlots: null,
      numbersPool: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.orderSlots = document.getElementById('order-slots');
        this.numbersPool = document.getElementById('numbers-pool');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get config based on round
       */
      getConfig() {
        // Progressive: 3 numbers then 4 numbers, increasing range
        if (this.round <= 2) {
          return { count: 3, min: 1, max: 5 };
        } else if (this.round <= 4) {
          return { count: 4, min: 1, max: 10 };
        } else {
          return { count: 4, min: 5, max: 15 };
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;
        this.selectedOrder = [];
        this.currentSlot = 0;

        const config = this.getConfig();

        // Generate unique random numbers
        this.numbers = [];
        while (this.numbers.length < config.count) {
          const num = randomInt(config.min, config.max);
          if (!this.numbers.includes(num)) {
            this.numbers.push(num);
          }
        }

        // Shuffle once for display (don't re-shuffle on each render)
        this.shuffledNumbers = shuffle([...this.numbers]);

        // Reset UI
        this.feedback.classList.remove('show', 'error');
        this.renderSlots();
        this.renderPool();
        this.renderProgress();
      },

      /**
       * Render order slots
       */
      renderSlots() {
        this.orderSlots.innerHTML = '';

        for (let i = 0; i < this.numbers.length; i++) {
          if (i > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'order-arrow';
            arrow.textContent = '→';
            this.orderSlots.appendChild(arrow);
          }

          const slot = document.createElement('div');
          slot.className = 'order-slot';
          slot.dataset.index = i;

          if (this.selectedOrder[i] !== undefined) {
            slot.textContent = this.selectedOrder[i];
            slot.classList.add('filled');
          } else {
            slot.textContent = '?';
            if (i === this.currentSlot) {
              slot.classList.add('current');
            }
          }

          this.orderSlots.appendChild(slot);
        }
      },

      /**
       * Render numbers pool
       */
      renderPool() {
        this.numbersPool.innerHTML = '';

        // Use pre-shuffled order (don't re-shuffle)
        this.shuffledNumbers.forEach(num => {
          const chip = document.createElement('button');
          chip.className = 'number-chip';
          chip.textContent = num;
          chip.dataset.num = num;

          if (this.selectedOrder.includes(num)) {
            chip.classList.add('used');
            chip.disabled = true;
          } else {
            chip.addEventListener('click', () => this.selectNumber(num, chip));
            chip.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                this.selectNumber(num, chip);
              }
            });
          }

          this.numbersPool.appendChild(chip);
        });
      },

      /**
       * Select a number
       */
      selectNumber(num, chip) {
        if (this.hasAnswered || this.selectedOrder.includes(num)) return;

        // Check if this is the correct next number
        const sortedNumbers = [...this.numbers].sort((a, b) => a - b);
        const expectedNum = sortedNumbers[this.currentSlot];

        if (num === expectedNum) {
          // Correct
          chip.classList.add('correct');
          this.selectedOrder.push(num);
          this.currentSlot++;

          setTimeout(() => {
            this.renderSlots();
            this.renderPool();

            // Check if complete
            if (this.currentSlot >= this.numbers.length) {
              this.completeRound(true);
            }
          }, 300);
        } else {
          // Incorrect
          chip.classList.add('incorrect');
          this.hasAnswered = true;

          // Show correct order
          setTimeout(() => {
            this.showCorrectOrder();
            this.completeRound(false);
          }, 500);
        }
      },

      /**
       * Show correct order
       */
      showCorrectOrder() {
        const sortedNumbers = [...this.numbers].sort((a, b) => a - b);
        this.selectedOrder = sortedNumbers;
        this.renderSlots();
      },

      /**
       * Complete round
       */
      completeRound(isCorrect) {
        this.hasAnswered = true;

        if (isCorrect) {
          this.correctCount++;
          const sorted = [...this.numbers].sort((a, b) => a - b);
          const msg = i18n.t('section.activities.order-numbers-k.correct') || 'Perfect! {{order}}';
          this.feedback.textContent = msg.replace('{{order}}', sorted.join(' → '));
          this.feedback.classList.remove('error');

          if (typeof celebrate === 'function') {
            celebrate(this.orderSlots);
          }
        } else {
          this.wrongCount++;
          const sorted = [...this.numbers].sort((a, b) => a - b);
          const msg = i18n.t('section.activities.order-numbers-k.incorrect') || 'The order is {{order}}';
          this.feedback.textContent = msg.replace('{{order}}', sorted.join(' → '));
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.order-numbers-k.perfect') || "Ordering Expert!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.order-numbers-k.great') || 'Great ordering!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.order-numbers-k.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      OrderNumbersK.init();
    });
  </script>
