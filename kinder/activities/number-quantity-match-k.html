  <style>
    /* Number Quantity Match Styles */
    .number-display {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: var(--space-4);
    }

    .big-number {
      font-family: var(--font-secondary);
      font-size: 96px;
      font-weight: var(--weight-bold);
      color: #1e40af;
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      border: 5px solid #3b82f6;
      border-radius: var(--radius-2xl);
      padding: var(--space-4) var(--space-8);
      box-shadow: 0 6px 0 #2563eb, 0 8px 20px rgba(0, 0, 0, 0.1);
      min-width: 140px;
      text-align: center;
      line-height: 1;
      animation: numberPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes numberPop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      text-align: center;
      margin-bottom: var(--space-5);
    }

    .frame-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-4);
      max-width: 600px;
      margin: 0 auto;
    }

    .frame-choice {
      background: white;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      padding: var(--space-3);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .frame-choice:hover:not(:disabled):not(.matched) {
      transform: translateY(-4px) scale(1.03);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .frame-choice:active:not(:disabled):not(.matched) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #cbd5e1;
    }

    .frame-choice:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .frame-choice.correct {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .frame-choice.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    .frame-choice.matched {
      opacity: 0.5;
      cursor: default;
    }

    /* Five-frame and Ten-frame */
    .five-frame, .ten-frame {
      display: grid;
      gap: 4px;
    }

    .five-frame {
      grid-template-columns: repeat(5, 1fr);
    }

    .ten-frame {
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .frame-cell {
      width: 32px;
      height: 32px;
      border: 2px solid #cbd5e1;
      border-radius: var(--radius-md);
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame-cell.filled {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
    }

    .frame-cell .dot {
      width: 20px;
      height: 20px;
      background: #f59e0b;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4);
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .big-number {
        font-size: 72px;
        padding: var(--space-3) var(--space-6);
        min-width: 110px;
      }

      .frame-choices {
        gap: var(--space-3);
      }

      .frame-cell {
        width: 26px;
        height: 26px;
      }

      .frame-cell .dot {
        width: 16px;
        height: 16px;
      }

      .frame-choice {
        padding: var(--space-2);
      }
    }
  </style>

  <script>
    // Number Quantity Match Activity
    const NumberQuantityMatch = {
      // Game state
      round: 1,
      maxRounds: 10,
      targetNumber: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      targetNumberEl: null,
      frameChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.targetNumberEl = document.getElementById('target-number');
        this.frameChoices = document.getElementById('frame-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Get number range based on difficulty
       */
      getNumberRange() {
        // Progressive difficulty
        if (this.round <= 3) {
          return { min: 1, max: 5 }; // Five-frame only
        } else if (this.round <= 6) {
          return { min: 3, max: 8 };
        } else {
          return { min: 5, max: 10 }; // Ten-frame
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        const range = this.getNumberRange();
        this.targetNumber = randomInt(range.min, range.max);

        // Update display
        this.targetNumberEl.textContent = this.targetNumber;
        this.targetNumberEl.style.animation = 'none';
        this.targetNumberEl.offsetHeight; // Trigger reflow
        this.targetNumberEl.style.animation = 'numberPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

        // Generate choices
        this.generateChoices();

        // Reset feedback
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      /**
       * Generate frame choices
       */
      generateChoices() {
        this.frameChoices.innerHTML = '';

        // Generate 4 unique numbers including the target
        const numbers = [this.targetNumber];
        const range = this.getNumberRange();

        while (numbers.length < 4) {
          let num;
          // Generate numbers close to target for challenge
          if (Math.random() < 0.7) {
            num = this.targetNumber + randomInt(-2, 2);
          } else {
            num = randomInt(range.min, range.max);
          }
          if (num >= 1 && num <= 10 && !numbers.includes(num)) {
            numbers.push(num);
          }
        }

        // Shuffle
        const shuffled = shuffle(numbers);

        // Create frame choice cards
        shuffled.forEach(num => {
          const card = document.createElement('button');
          card.className = 'frame-choice';
          card.dataset.value = num;
          card.setAttribute('aria-label', `Group of ${num}`);
          card.innerHTML = this.createFrame(num);
          card.addEventListener('click', () => this.checkAnswer(num, card));
          card.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(num, card);
            }
          });
          this.frameChoices.appendChild(card);
        });
      },

      /**
       * Create a five-frame or ten-frame
       */
      createFrame(count) {
        // Use five-frame for 1-5, ten-frame for 6-10
        const frameSize = count <= 5 ? 5 : 10;
        const frameClass = frameSize === 5 ? 'five-frame' : 'ten-frame';

        let html = `<div class="${frameClass}">`;
        for (let i = 0; i < frameSize; i++) {
          const isFilled = i < count;
          html += `<div class="frame-cell ${isFilled ? 'filled' : ''}">`;
          if (isFilled) {
            html += '<div class="dot"></div>';
          }
          html += '</div>';
        }
        html += '</div>';
        return html;
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, card) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all cards
        const cards = this.frameChoices.querySelectorAll('.frame-choice');
        cards.forEach(c => c.disabled = true);

        if (selected === this.targetNumber) {
          // Correct!
          card.classList.add('correct');
          const msg = i18n.t('section.activities.number-quantity-match-k.correct') || 'Yes! That\'s {{number}}!';
          this.feedback.textContent = msg.replace('{{number}}', this.targetNumber);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(card);
          }
        } else {
          // Incorrect
          card.classList.add('incorrect');
          // Highlight correct
          cards.forEach(c => {
            if (parseInt(c.dataset.value) === this.targetNumber) {
              c.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.number-quantity-match-k.incorrect') || 'Not quite! This is {{number}}.';
          this.feedback.textContent = msg.replace('{{number}}', this.targetNumber);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.number-quantity-match-k.perfect') || "Amazing! You're a number matching star!";
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.number-quantity-match-k.great') || 'Great job matching numbers!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.number-quantity-match-k.keepPracticing') || 'Good effort! Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      NumberQuantityMatch.init();
    });
  </script>
