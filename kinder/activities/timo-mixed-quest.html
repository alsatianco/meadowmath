  <style>
    /* TIMO Mixed Quest Activity Styles */
    .badge-progress {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: var(--space-2);
    }

    .badge-slot {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border: 3px dashed #94a3b8;
      border-radius: 50%;
      font-size: var(--text-xl);
      transition: all 0.3s ease;
    }

    .badge-slot.earned {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 3px solid #f59e0b;
      animation: badgeEarn 0.5s ease;
    }

    @keyframes badgeEarn {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .quest-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: var(--space-3);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: var(--radius-xl);
      border: 3px solid #3b82f6;
    }

    .quest-icon {
      font-size: var(--text-2xl);
    }

    .quest-text {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: #1e40af;
    }

    .quest-content {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-4);
      padding: var(--space-4);
    }

    /* Matrix puzzle styles */
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: var(--space-3);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-radius: var(--radius-xl);
      border: 4px solid #22c55e;
    }

    .matrix-cell {
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 3px solid #d1d5db;
      border-radius: var(--radius-lg);
      font-size: var(--text-3xl);
    }

    .matrix-cell.missing {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      border-style: dashed;
    }

    .matrix-cell.missing::after {
      content: '?';
      color: #d97706;
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
    }

    .matrix-cell.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      animation: revealPulse 0.5s ease;
    }

    @keyframes revealPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Pattern sequence styles */
    .pattern-sequence {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-xl);
      border: 4px solid #f59e0b;
    }

    .pattern-item {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 3px solid #d1d5db;
      border-radius: var(--radius-lg);
      font-size: var(--text-3xl);
    }

    .pattern-item.missing {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: #3b82f6;
      border-style: dashed;
    }

    .pattern-item.missing::after {
      content: '?';
      color: #2563eb;
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
    }

    .pattern-item.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
    }

    /* Counting display styles */
    .counting-display {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-2);
      max-width: 260px;
      padding: var(--space-4);
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      border-radius: var(--radius-xl);
      border: 4px solid #6366f1;
    }

    .count-item {
      font-size: var(--text-3xl);
      animation: popIn 0.3s ease backwards;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Shape display styles */
    .shape-display {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      background: linear-gradient(135deg, #fce7f3, #fbcfe8);
      border-radius: var(--radius-xl);
      border: 4px solid #ec4899;
    }

    .shape-emoji {
      font-size: 80px;
    }

    /* Answer choices */
    .answer-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-2);
    }

    .answer-btn {
      min-width: 80px;
      min-height: 80px;
      padding: var(--space-3);
      font-size: var(--text-2xl);
      font-family: var(--font-secondary);
      font-weight: var(--weight-semibold);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #16a34a, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #16a34a, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .answer-btn:focus {
      outline: 3px solid #22c55e;
      outline-offset: 2px;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Badge collection in stats */
    .badge-collection {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: var(--space-3);
    }

    .final-badge {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-2xl);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 3px solid #f59e0b;
      border-radius: 50%;
      animation: badgeShow 0.3s ease backwards;
    }

    @keyframes badgeShow {
      0% { transform: scale(0) rotate(-180deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .matrix-cell {
        width: 60px;
        height: 60px;
        font-size: var(--text-2xl);
      }

      .pattern-item {
        width: 50px;
        height: 50px;
        font-size: var(--text-2xl);
      }

      .answer-btn {
        min-width: 70px;
        min-height: 70px;
        font-size: var(--text-xl);
      }

      .shape-emoji {
        font-size: 60px;
      }

      .badge-slot {
        width: 35px;
        height: 35px;
        font-size: var(--text-lg);
      }

      .quest-text {
        font-size: var(--text-base);
      }
    }
  </style>

  <!-- JavaScript Files -->
  <script src="../../js/utils.js"></script>
  <script src="../../js/storage.js"></script>
  <script src="../../js/animations.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/navigation.js"></script>
  <script>
    // TIMO Mixed Quest Activity
    const TimoMixedQuest = {
      // Game state
      round: 1,
      maxRounds: 8,
      hasAnswered: false,
      badges: [],
      autoAdvanceDelay: 2000,
      correctAnswer: null,
      currentQuestType: '',

      // DOM elements
      badgeProgress: null,
      questBanner: null,
      questIcon: null,
      questText: null,
      questContent: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      badgeCollection: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Quest types and their badges
      questTypes: [
        { type: 'matrix', icon: '🧩', badge: '🧩', textKey: 'findMissing' },
        { type: 'pattern', icon: '🔮', badge: '🔮', textKey: 'completePattern' },
        { type: 'counting', icon: '🔢', badge: '🔢', textKey: 'howMany' },
        { type: 'shape', icon: '🔷', badge: '🔷', textKey: 'nameShape' },
        { type: 'compare', icon: '⚖️', badge: '⚖️', textKey: 'whichBigger' }
      ],

      // Pattern groups for matrix puzzles
      matrixPatterns: [
        { items: ['🔴', '🟡', '🟢', '🔵'] },
        { items: ['⭐', '🌟', '✨', '💫'] },
        { items: ['🍎', '🍊', '🍋', '🍇'] },
        { items: ['🐱', '🐶', '🐰', '🐻'] },
        { items: ['🌸', '🌺', '🌻', '🌹'] },
        { items: ['❤️', '💛', '💚', '💙'] }
      ],

      // Pattern sequences
      patternSequences: [
        { pattern: ['🔴', '🔵', '🔴', '🔵'], next: '🔴' },
        { pattern: ['⭐', '⭐', '🌙', '⭐'], next: '⭐' },
        { pattern: ['🐱', '🐶', '🐱', '🐶'], next: '🐱' },
        { pattern: ['🍎', '🍎', '🍊', '🍎'], next: '🍎' },
        { pattern: ['❤️', '💙', '❤️', '💙'], next: '❤️' },
        { pattern: ['🔺', '🔵', '🔺', '🔵'], next: '🔺' }
      ],

      // Counting items
      countingItems: ['🍎', '🌟', '🐱', '🔵', '🌸', '🐦'],

      // Shapes for naming
      shapes: [
        { emoji: '🔺', name: 'triangle', nameKey: 'triangle' },
        { emoji: '⬛', name: 'square', nameKey: 'square' },
        { emoji: '⭕', name: 'circle', nameKey: 'circle' },
        { emoji: '🔷', name: 'diamond', nameKey: 'diamond' },
        { emoji: '⬜', name: 'rectangle', nameKey: 'rectangle' }
      ],

      /**
       * Initialize the activity
       */
      init() {
        this.badgeProgress = document.getElementById('badge-progress');
        this.questBanner = document.getElementById('quest-banner');
        this.questIcon = document.getElementById('quest-icon');
        this.questText = document.getElementById('quest-text');
        this.questContent = document.getElementById('quest-content');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.badgeCollection = document.getElementById('badge-collection');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.renderBadgeProgress();
        this.startRound();
      },

      /**
       * Render badge progress
       */
      renderBadgeProgress() {
        this.badgeProgress.innerHTML = '';
        for (let i = 0; i < this.maxRounds; i++) {
          const slot = document.createElement('div');
          slot.className = 'badge-slot';
          if (this.badges[i]) {
            slot.classList.add('earned');
            slot.textContent = this.badges[i];
          }
          this.badgeProgress.appendChild(slot);
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;
        this.feedback.classList.remove('show', 'error');

        // Pick random quest type
        const quest = this.questTypes[Math.floor(Math.random() * this.questTypes.length)];
        this.currentQuestType = quest.type;

        // Update banner
        this.questIcon.textContent = quest.icon;
        const questTextKey = `activities.timo-mixed-quest.${quest.textKey}`;
        this.questText.textContent = i18n.t(questTextKey) || this.getDefaultQuestText(quest.type);

        // Generate the quest
        switch (quest.type) {
          case 'matrix':
            this.generateMatrixQuest();
            break;
          case 'pattern':
            this.generatePatternQuest();
            break;
          case 'counting':
            this.generateCountingQuest();
            break;
          case 'shape':
            this.generateShapeQuest();
            break;
          case 'compare':
            this.generateCompareQuest();
            break;
        }
      },

      /**
       * Get default quest text
       */
      getDefaultQuestText(type) {
        const defaults = {
          matrix: 'Find the missing piece!',
          pattern: 'What comes next?',
          counting: 'How many are there?',
          shape: 'What shape is this?',
          compare: 'Which number is bigger?'
        };
        return defaults[type];
      },

      /**
       * Generate matrix puzzle
       */
      generateMatrixQuest() {
        const patternGroup = this.matrixPatterns[Math.floor(Math.random() * this.matrixPatterns.length)];
        const items = shuffle([...patternGroup.items]);
        const missingIndex = Math.floor(Math.random() * 4);
        this.correctAnswer = items[missingIndex];

        // Generate wrong answers
        const otherGroups = this.matrixPatterns.filter(g => g !== patternGroup);
        const wrongPool = otherGroups.flatMap(g => g.items);
        const wrongAnswers = shuffle(wrongPool).slice(0, 2);
        const choices = shuffle([this.correctAnswer, ...wrongAnswers]);

        this.questContent.innerHTML = `
          <div class="matrix-grid">
            ${items.map((item, i) => `
              <div class="matrix-cell ${i === missingIndex ? 'missing' : ''}" data-index="${i}">
                ${i !== missingIndex ? item : ''}
              </div>
            `).join('')}
          </div>
        `;

        this.renderChoices(choices);
      },

      /**
       * Generate pattern sequence
       */
      generatePatternQuest() {
        const seq = this.patternSequences[Math.floor(Math.random() * this.patternSequences.length)];
        this.correctAnswer = seq.next;

        // Generate wrong answers
        const wrongPool = this.patternSequences
          .filter(s => s.next !== seq.next)
          .map(s => s.next);
        const uniqueWrong = [...new Set(wrongPool)];
        const wrongAnswers = shuffle(uniqueWrong).slice(0, 2);
        const choices = shuffle([this.correctAnswer, ...wrongAnswers]);

        this.questContent.innerHTML = `
          <div class="pattern-sequence">
            ${seq.pattern.map(item => `<div class="pattern-item">${item}</div>`).join('')}
            <div class="pattern-item missing"></div>
          </div>
        `;

        this.renderChoices(choices);
      },

      /**
       * Generate counting quest
       */
      generateCountingQuest() {
        const count = randomInt(3, 8);
        const item = this.countingItems[Math.floor(Math.random() * this.countingItems.length)];
        this.correctAnswer = count.toString();

        // Generate wrong answers (nearby numbers)
        const wrongAnswers = [];
        if (count > 1) wrongAnswers.push((count - 1).toString());
        wrongAnswers.push((count + 1).toString());
        if (wrongAnswers.length < 2 && count > 2) {
          wrongAnswers.push((count - 2).toString());
        }

        const choices = shuffle([this.correctAnswer, ...wrongAnswers.slice(0, 2)]);

        this.questContent.innerHTML = `
          <div class="counting-display">
            ${Array(count).fill(0).map((_, i) => `
              <span class="count-item" style="animation-delay: ${i * 0.1}s">${item}</span>
            `).join('')}
          </div>
        `;

        this.renderChoices(choices);
      },

      /**
       * Generate shape naming quest
       */
      generateShapeQuest() {
        const shape = this.shapes[Math.floor(Math.random() * this.shapes.length)];
        this.correctAnswer = i18n.t(`section.activities.timo-mixed-quest.shapes.${shape.nameKey}`) || shape.name;

        // Generate wrong answers
        const wrongShapes = this.shapes.filter(s => s !== shape);
        const wrongAnswers = shuffle(wrongShapes)
          .slice(0, 2)
          .map(s => i18n.t(`section.activities.timo-mixed-quest.shapes.${s.nameKey}`) || s.name);

        const choices = shuffle([this.correctAnswer, ...wrongAnswers]);

        this.questContent.innerHTML = `
          <div class="shape-display">
            <span class="shape-emoji">${shape.emoji}</span>
          </div>
        `;

        this.renderChoices(choices, true);
      },

      /**
       * Generate number comparison quest
       */
      generateCompareQuest() {
        const numA = randomInt(1, 9);
        let numB;
        do {
          numB = randomInt(1, 9);
        } while (numA === numB);

        const bigger = Math.max(numA, numB);
        this.correctAnswer = bigger.toString();

        // Wrong answer is the smaller number
        const choices = shuffle([numA.toString(), numB.toString()]);
        // Add a third wrong option
        let wrongNum;
        do {
          wrongNum = randomInt(1, 9);
        } while (wrongNum === numA || wrongNum === numB);
        choices.push(wrongNum.toString());

        this.questContent.innerHTML = `
          <div class="pattern-sequence">
            <div class="pattern-item" style="font-size: var(--text-4xl); font-weight: var(--weight-bold);">${numA}</div>
            <div class="pattern-item" style="background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #22c55e; font-size: var(--text-lg);">or</div>
            <div class="pattern-item" style="font-size: var(--text-4xl); font-weight: var(--weight-bold);">${numB}</div>
          </div>
        `;

        this.renderChoices(shuffle(choices));
      },

      /**
       * Render answer choices
       */
      renderChoices(choices, isText = false) {
        this.answerChoices.innerHTML = '';

        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = choice;
          if (isText) {
            btn.style.minWidth = '100px';
            btn.style.fontSize = 'var(--text-base)';
          }
          btn.setAttribute('aria-label', `Choose ${choice}`);
          btn.addEventListener('click', () => this.checkAnswer(choice, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(choice, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        const buttons = this.answerChoices.querySelectorAll('.answer-btn');
        buttons.forEach(btn => btn.disabled = true);

        const quest = this.questTypes.find(q => q.type === this.currentQuestType);

        if (selected === this.correctAnswer) {
          // Correct - earn badge!
          button.classList.add('correct');
          this.badges.push(quest.badge);

          const msg = i18n.t('section.activities.timo-mixed-quest.correct') || 'You earned a badge!';
          this.feedback.textContent = `${quest.badge} ${msg}`;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');

          // Reveal answer in content
          this.revealAnswer();

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          buttons.forEach(btn => {
            if (btn.textContent === this.correctAnswer) {
              btn.classList.add('correct');
            }
          });

          const msg = i18n.t('section.activities.timo-mixed-quest.tryAgain') || 'Keep trying!';
          this.feedback.textContent = msg;
          this.feedback.classList.add('show', 'error');

          this.revealAnswer();
        }

        this.renderBadgeProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Reveal the answer in content
       */
      revealAnswer() {
        const missingCell = this.questContent.querySelector('.missing');
        if (missingCell) {
          missingCell.textContent = this.correctAnswer;
          missingCell.classList.remove('missing');
          missingCell.classList.add('revealed');
        }
      },

      /**
       * Show stats
       */
      showStats() {
        // Show all earned badges
        this.badgeCollection.innerHTML = '';
        this.badges.forEach((badge, i) => {
          const badgeEl = document.createElement('div');
          badgeEl.className = 'final-badge';
          badgeEl.textContent = badge;
          badgeEl.style.animationDelay = `${i * 0.1}s`;
          this.badgeCollection.appendChild(badgeEl);
        });

        const percent = this.badges.length / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.timo-mixed-quest.champion') || 'Quest Champion!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.timo-mixed-quest.great') || 'Great adventurer!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.timo-mixed-quest.keepGoing') || 'Keep exploring!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.badges = [];
        this.statsOverlay.classList.remove('show');
        this.renderBadgeProgress();
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      TimoMixedQuest.init();
    });
  </script>
