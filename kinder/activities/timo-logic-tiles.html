  <style>
    /* TIMO Logic Tiles Activity Styles */
    .thinking-prompt {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      padding: var(--space-3);
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      border-radius: var(--radius-xl);
      border: 3px solid #6366f1;
    }

    .thinking-icon {
      font-size: var(--text-2xl);
    }

    .thinking-text {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: #4338ca;
    }

    .matrix-container {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-5);
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: var(--space-3);
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      border-radius: var(--radius-xl);
      border: 4px solid #6b7280;
    }

    .matrix-cell {
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 3px solid #d1d5db;
      border-radius: var(--radius-lg);
      font-size: var(--text-4xl);
    }

    .matrix-cell.missing {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 3px dashed #f59e0b;
      animation: missingPulse 1.5s ease-in-out infinite;
    }

    .matrix-cell.missing::after {
      content: '?';
      font-size: var(--text-4xl);
      color: #f59e0b;
    }

    .matrix-cell.revealed {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 3px solid #22c55e;
      animation: revealPop 0.5s ease;
    }

    @keyframes missingPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes revealPop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .answer-btn {
      width: 85px;
      height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-4xl);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #16a34a, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #16a34a, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #16a34a;
    }

    .answer-btn:focus {
      outline: 3px solid #22c55e;
      outline-offset: 2px;
    }

    .answer-btn:focus-visible {
      outline: 3px solid #22c55e;
      outline-offset: 2px;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .matrix-cell {
        width: 70px;
        height: 70px;
        font-size: var(--text-3xl);
      }

      .matrix-cell.missing::after {
        font-size: var(--text-3xl);
      }

      .answer-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-3xl);
      }

      .matrix-grid {
        gap: 6px;
        padding: var(--space-2);
      }
    }
  </style>

  <script>
    // TIMO Logic Tiles Activity
    const TimoLogicTiles = {
      // Game state
      round: 1,
      maxRounds: 8,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,
      correctAnswer: '',
      missingIndex: 3, // Bottom-right by default

      // DOM elements
      progress: null,
      matrixGrid: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Pattern groups: items that vary in predictable ways
      patternGroups: [
        // Shape patterns (same color, different shapes)
        { items: ['🔴', '🟡', '🟢', '🔵'], attribute: 'color' },
        { items: ['⭐', '🌟', '✨', '💫'], attribute: 'star-type' },
        { items: ['🍎', '🍊', '🍋', '🍇'], attribute: 'fruit' },
        { items: ['🐱', '🐶', '🐰', '🐻'], attribute: 'animal' },
        { items: ['🚗', '🚕', '🚌', '🚑'], attribute: 'vehicle' },
        { items: ['🌸', '🌺', '🌻', '🌹'], attribute: 'flower' },
        // Size/count patterns
        { items: ['⚫', '⚫⚫', '⚫⚫⚫', '⚫⚫⚫⚫'], attribute: 'count' },
        { items: ['🔵', '🔵🔵', '🔵🔵🔵', '🔵🔵🔵🔵'], attribute: 'count' },
        // Number patterns
        { items: ['1️⃣', '2️⃣', '3️⃣', '4️⃣'], attribute: 'number' },
        // Shape progression
        { items: ['🔺', '🔷', '⬛', '⭕'], attribute: 'shape' },
        { items: ['❤️', '💛', '💚', '💙'], attribute: 'heart-color' },
      ],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.matrixGrid = document.getElementById('matrix-grid');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;
        this.feedback.classList.remove('show', 'error');

        // Pick random pattern group
        const patternGroup = this.patternGroups[Math.floor(Math.random() * this.patternGroups.length)];
        const items = [...patternGroup.items];

        // Shuffle order of items
        const shuffledItems = shuffle(items);

        // Pick which cell is missing (0-3 for 2x2)
        this.missingIndex = Math.floor(Math.random() * 4);
        this.correctAnswer = shuffledItems[this.missingIndex];

        // Generate wrong answers
        const wrongAnswers = this.generateWrongAnswers(this.correctAnswer, items);

        this.renderMatrix(shuffledItems);
        this.renderAnswers(wrongAnswers);
        this.renderProgress();
      },

      /**
       * Generate wrong answers from other pattern groups
       */
      generateWrongAnswers(correct, currentItems) {
        const wrongPool = [];

        // Get items from other pattern groups
        this.patternGroups.forEach(group => {
          group.items.forEach(item => {
            if (!currentItems.includes(item) && item !== correct) {
              wrongPool.push(item);
            }
          });
        });

        // Pick 2 random wrong answers
        const shuffledWrong = shuffle(wrongPool);
        const wrongAnswers = shuffledWrong.slice(0, 2);

        // Combine and shuffle all answers
        return shuffle([correct, ...wrongAnswers]);
      },

      /**
       * Render the matrix grid
       */
      renderMatrix(items) {
        this.matrixGrid.innerHTML = '';

        for (let i = 0; i < 4; i++) {
          const cell = document.createElement('div');
          cell.className = 'matrix-cell';
          cell.dataset.index = i;

          if (i === this.missingIndex) {
            cell.classList.add('missing');
          } else {
            cell.textContent = items[i];
          }

          this.matrixGrid.appendChild(cell);
        }
      },

      /**
       * Render answer choices
       */
      renderAnswers(answers) {
        this.answerChoices.innerHTML = '';

        answers.forEach(answer => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = answer;
          btn.setAttribute('aria-label', `Choose ${answer}`);
          btn.addEventListener('click', () => this.checkAnswer(answer, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(answer, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        const buttons = this.answerChoices.querySelectorAll('.answer-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Reveal the missing cell
        const missingCell = this.matrixGrid.querySelector('.missing');
        missingCell.textContent = this.correctAnswer;
        missingCell.classList.remove('missing');
        missingCell.classList.add('revealed');

        if (selected === this.correctAnswer) {
          // Correct!
          button.classList.add('correct');
          this.correctCount++;

          const msg = i18n.t('section.activities.timo-logic-tiles.correct') || 'Great thinking!';
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');

          if (typeof celebrate === 'function') {
            celebrate(missingCell);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          buttons.forEach(btn => {
            if (btn.textContent === this.correctAnswer) {
              btn.classList.add('correct');
            }
          });
          this.wrongCount++;

          const msg = i18n.t('section.activities.timo-logic-tiles.incorrect') || 'Not quite! Look at the pattern.';
          this.feedback.textContent = msg;
          this.feedback.classList.add('show', 'error');
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🧠';
          this.statsMessage.textContent = i18n.t('section.activities.timo-logic-tiles.perfect') || 'Logic Master!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.timo-logic-tiles.great') || 'Great thinking!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.timo-logic-tiles.keepPracticing') || 'Keep puzzling!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      TimoLogicTiles.init();
    });
  </script>
