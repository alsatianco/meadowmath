  <style>
    /* Join the Picnic Activity Styles */
    .picnic-scene {
      margin-bottom: var(--space-5);
    }

    .picnic-blanket {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: repeating-linear-gradient(
        45deg,
        #fef3c7,
        #fef3c7 10px,
        #fde68a 10px,
        #fde68a 20px
      );
      border: 4px solid #f59e0b;
      border-radius: var(--radius-2xl);
      box-shadow: 0 6px 0 #d97706, 0 10px 20px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
    }

    .basket-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .basket-label {
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: #92400e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .basket-items {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3);
      min-width: 100px;
      min-height: 80px;
      max-width: 160px;
      background: linear-gradient(135deg, #fef7ed, #ffedd5);
      border: 4px solid #ea580c;
      border-radius: var(--radius-xl);
      box-shadow: 0 4px 0 #c2410c, inset 0 2px 4px rgba(255, 255, 255, 0.5);
    }

    .item-emoji {
      font-size: 28px;
      animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes bounceIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .basket-count {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: #c2410c;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .basket-count.show {
      opacity: 1;
    }

    .plus-sign, .equals-sign {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #92400e;
    }

    .total-box {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      padding: var(--space-3) var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      color: #1e40af;
      border: 4px solid #3b82f6;
      border-radius: var(--radius-xl);
      box-shadow: 0 4px 0 #2563eb;
      min-width: 70px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .total-box.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      color: #16a34a;
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      animation: celebratePop 0.5s ease;
    }

    @keyframes celebratePop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* Question Section */
    .question-section {
      text-align: center;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    .choice-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
    }

    .choice-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 75px;
      height: 75px;
      background: linear-gradient(135deg, #fed7aa, #fdba74);
      border: 4px solid #ea580c;
      border-radius: var(--radius-xl);
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: #9a3412;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #c2410c, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #c2410c, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .choice-btn:focus {
      outline: 4px solid #f59e0b;
      outline-offset: 2px;
    }

    .choice-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .choice-btn:focus-visible {
      outline: 4px solid #f59e0b;
      outline-offset: 2px;
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #c2410c;
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .picnic-blanket {
        padding: var(--space-3);
        gap: var(--space-2);
      }

      .basket-items {
        min-width: 80px;
        min-height: 70px;
        max-width: 130px;
      }

      .item-emoji {
        font-size: 24px;
      }

      .plus-sign, .equals-sign {
        font-size: var(--text-2xl);
      }

      .total-box {
        font-size: var(--text-2xl);
        min-width: 60px;
      }

      .choice-btn {
        width: 65px;
        height: 65px;
        font-size: var(--text-xl);
      }
    }

    @media (max-width: 480px) {
      .picnic-blanket {
        flex-direction: column;
        gap: var(--space-2);
      }

      .plus-sign, .equals-sign {
        transform: rotate(0deg);
      }
    }
  </style>

  <script>
    // Join the Picnic Activity
    const JoinThePicnic = {
      // Game state
      round: 1,
      maxRounds: 10,
      basket1Count: 0,
      basket2Count: 0,
      total: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      basket1Items: null,
      basket2Items: null,
      basket1CountEl: null,
      basket2CountEl: null,
      totalBox: null,
      choiceButtons: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Picnic-themed items
      picnicItems: ['🍎', '🍊', '🍇', '🍓', '🧁', '🍪', '🥪', '🧃', '🍌', '🥕', '🍰', '🍩'],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.basket1Items = document.getElementById('basket1-items');
        this.basket2Items = document.getElementById('basket2-items');
        this.basket1CountEl = document.getElementById('basket1-count');
        this.basket2CountEl = document.getElementById('basket2-count');
        this.totalBox = document.getElementById('total-box');
        this.choiceButtons = document.getElementById('choice-buttons');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Generate counts based on round (progressive difficulty)
        let maxSum = Math.min(5 + Math.floor(this.round / 2), 10);
        let minSum = Math.max(2, maxSum - 3);

        this.total = randomInt(minSum, maxSum);
        this.basket1Count = randomInt(1, this.total - 1);
        this.basket2Count = this.total - this.basket1Count;

        // Pick random picnic item
        const item = this.picnicItems[randomInt(0, this.picnicItems.length - 1)];

        // Render baskets
        this.renderBasket(this.basket1Items, this.basket1Count, item);
        this.renderBasket(this.basket2Items, this.basket2Count, item);

        // Reset UI
        this.basket1CountEl.textContent = this.basket1Count;
        this.basket2CountEl.textContent = this.basket2Count;
        this.basket1CountEl.classList.remove('show');
        this.basket2CountEl.classList.remove('show');
        this.totalBox.textContent = '?';
        this.totalBox.classList.remove('revealed');
        this.feedback.classList.remove('show', 'error');

        // Generate choices
        this.generateChoices();

        // Update progress
        this.renderProgress();
      },

      /**
       * Render items in a basket
       */
      renderBasket(container, count, emoji) {
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const item = document.createElement('span');
          item.className = 'item-emoji';
          item.textContent = emoji;
          item.style.animationDelay = `${i * 0.1}s`;
          container.appendChild(item);
        }
      },

      /**
       * Generate answer choices
       */
      generateChoices() {
        this.choiceButtons.innerHTML = '';

        // Create choices: correct answer and 3 distractors
        const choices = [this.total];

        // Add nearby numbers as distractors
        const possibleDistractors = [];
        for (let i = Math.max(2, this.total - 3); i <= Math.min(10, this.total + 3); i++) {
          if (i !== this.total) {
            possibleDistractors.push(i);
          }
        }

        // Shuffle and take 3
        possibleDistractors.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 3 && i < possibleDistractors.length; i++) {
          choices.push(possibleDistractors[i]);
        }

        // Shuffle choices
        choices.sort(() => Math.random() - 0.5);

        // Create buttons
        choices.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = num;
          btn.dataset.value = num;
          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          this.choiceButtons.appendChild(btn);
        });
      },

      /**
       * Check the answer
       */
      checkAnswer(answer, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const buttons = this.choiceButtons.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Show counts and total
        this.basket1CountEl.classList.add('show');
        this.basket2CountEl.classList.add('show');
        this.totalBox.textContent = this.total;
        this.totalBox.classList.add('revealed');

        if (answer === this.total) {
          // Correct!
          button.classList.add('correct');
          const msg = i18n.t('section.activities.join-the-picnic.correct') || 'Yay! {{a}} + {{b}} = {{total}} treats!';
          this.feedback.textContent = msg
            .replace('{{a}}', this.basket1Count)
            .replace('{{b}}', this.basket2Count)
            .replace('{{total}}', this.total);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          // Highlight correct answer
          buttons.forEach(btn => {
            if (parseInt(btn.dataset.value) === this.total) {
              btn.classList.add('correct');
            }
          });

          const msg = i18n.t('section.activities.join-the-picnic.incorrect') || '{{a}} + {{b}} = {{total}}';
          this.feedback.textContent = msg
            .replace('{{a}}', this.basket1Count)
            .replace('{{b}}', this.basket2Count)
            .replace('{{total}}', this.total);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🧺';
          this.statsMessage.textContent = i18n.t('section.activities.join-the-picnic.perfect') || 'Picnic champion!';
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.join-the-picnic.great') || 'Great picnic math!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.join-the-picnic.keepPracticing') || 'Keep counting treats!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      JoinThePicnic.init();
    });
  </script>
