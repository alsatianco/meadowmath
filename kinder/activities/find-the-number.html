    /* Find the Number Styles */
    .basket-area {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .basket-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .basket-items {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 8px;
      min-height: 100px;
      max-width: 280px;
      padding: var(--space-3);
      background: linear-gradient(180deg, rgba(254, 243, 199, 0.5) 0%, rgba(253, 230, 138, 0.8) 100%);
      border-radius: var(--radius-xl) var(--radius-xl) 50% 50%;
      margin-bottom: -20px;
      position: relative;
      z-index: 1;
    }

    .basket-item {
      font-size: 36px;
      animation: itemBounce 0.5s ease backwards;
    }

    @keyframes itemBounce {
      0% { transform: translateY(-20px); opacity: 0; }
      60% { transform: translateY(5px); }
      100% { transform: translateY(0); opacity: 1; }
    }

    .basket-base {
      font-size: 100px;
      line-height: 1;
      position: relative;
      z-index: 2;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      text-align: center;
      margin-bottom: var(--space-5);
    }

    /* Number choices - square buttons */
    .number-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
      max-width: 450px;
      margin: 0 auto;
    }

    .number-btn {
      width: 80px;
      height: 80px;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-xl);
      color: #92400e;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #d97706, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .number-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #d97706, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .number-btn:focus {
      outline: 4px solid #f59e0b;
      outline-offset: 2px;
    }

    .number-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .number-btn:focus-visible {
      outline: 4px solid #f59e0b;
      outline-offset: 2px;
    }

    .number-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d97706;
    }

    .number-btn:disabled {
      cursor: not-allowed;
    }

    .number-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .number-btn.incorrect {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border-color: #f87171;
      color: #991b1b;
      box-shadow: 0 4px 0 #ef4444;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .basket-items {
        max-width: 240px;
        min-height: 80px;
      }

      .basket-item {
        font-size: 28px;
      }

      .basket-base {
        font-size: 80px;
      }

      .number-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-2xl);
      }
    }

  <script>
    // Find the Number Activity
    const FindTheNumber = {
      // Game state
      round: 1,
      maxRounds: 8,
      targetCount: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      basketItems: null,
      numberChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Fun items for the basket
      basketEmojis: ['🍎', '🍊', '🍋', '🍇', '🍓', '🫐', '🥕', '🌽', '🥒', '🍌', '🍐', '🥝'],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.basketItems = document.getElementById('basket-items');
        this.numberChoices = document.getElementById('number-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get number range based on round
       */
      getRange() {
        if (this.round <= 3) return { min: 1, max: 5 };
        if (this.round <= 5) return { min: 3, max: 8 };
        return { min: 5, max: 10 };
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        const range = this.getRange();
        this.targetCount = randomInt(range.min, range.max);

        // Pick random emoji for this round
        const emoji = this.basketEmojis[randomInt(0, this.basketEmojis.length - 1)];

        // Render basket items
        this.renderBasketItems(emoji);

        // Render number choices
        this.renderNumberChoices();

        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      /**
       * Render items in the basket
       */
      renderBasketItems(emoji) {
        this.basketItems.innerHTML = '';
        for (let i = 0; i < this.targetCount; i++) {
          const item = document.createElement('span');
          item.className = 'basket-item';
          item.textContent = emoji;
          item.style.animationDelay = `${i * 0.1}s`;
          this.basketItems.appendChild(item);
        }
      },

      /**
       * Render number choice buttons
       */
      renderNumberChoices() {
        this.numberChoices.innerHTML = '';

        // Generate 4-5 unique numbers including target
        const numbers = [this.targetCount];
        const range = this.getRange();
        const numChoices = range.max <= 5 ? 4 : 5;

        while (numbers.length < numChoices) {
          let num;
          if (Math.random() < 0.7) {
            num = this.targetCount + randomInt(-2, 2);
          } else {
            num = randomInt(range.min, range.max);
          }
          if (num >= 1 && num <= 10 && !numbers.includes(num)) {
            numbers.push(num);
          }
        }

        const shuffled = shuffle(numbers);

        shuffled.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'number-btn';
          btn.textContent = num;
          btn.setAttribute('aria-label', `Number ${num}`);

          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(num, btn);
            }
          });

          this.numberChoices.appendChild(btn);
        });
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        const buttons = this.numberChoices.querySelectorAll('.number-btn');
        buttons.forEach(b => b.disabled = true);

        if (selected === this.targetCount) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.find-the-number.correct') || 'Yes! There are {{count}}!';
          this.feedback.textContent = msg.replace('{{count}}', this.targetCount);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          buttons.forEach(b => {
            if (parseInt(b.textContent) === this.targetCount) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.find-the-number.incorrect') || 'Not quite! There are {{count}}.';
          this.feedback.textContent = msg.replace('{{count}}', this.targetCount);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🧺';
          this.statsMessage.textContent = i18n.t('section.activities.find-the-number.perfect') || 'Number Finding Pro!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.find-the-number.great') || 'Great number finding!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.find-the-number.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      FindTheNumber.init();
    });
  </script>
