  <style>
    /* Robot Steps Activity Styles */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }

    .grid-container {
      padding: var(--space-3);
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border-radius: var(--radius-xl);
      border: 4px solid #10b981;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: #059669;
      padding: 4px;
      border-radius: var(--radius-lg);
    }

    .grid-cell {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-3xl);
      transition: all 0.3s ease;
    }

    .grid-cell.path {
      background: linear-gradient(135deg, #bfdbfe, #93c5fd);
    }

    .grid-cell.robot {
      background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
      animation: robotBounce 0.5s ease;
    }

    .grid-cell.treasure {
      background: linear-gradient(135deg, #fef08a, #fde047);
    }

    .grid-cell.reached {
      animation: treasureFound 0.5s ease;
    }

    @keyframes robotBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes treasureFound {
      0% { transform: scale(1); }
      50% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1); }
    }

    .controls-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }

    .queue-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .queue-label {
      font-family: var(--font-secondary);
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-600);
    }

    .move-queue {
      display: flex;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      background: white;
      border: 3px solid #d1d5db;
      border-radius: var(--radius-lg);
      min-width: 200px;
      min-height: 50px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .queue-arrow {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xl);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 2px solid #3b82f6;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .queue-arrow:hover {
      transform: scale(1.1);
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
    }

    .queue-arrow.executing {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      transform: scale(1.15);
    }

    .clear-btn {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border: 2px solid #ef4444;
      border-radius: var(--radius-md);
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      color: #b91c1c;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .clear-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .clear-btn:focus {
      outline: 3px solid #ef4444;
      outline-offset: 2px;
    }

    .arrow-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .arrow-row {
      display: flex;
      gap: var(--space-2);
      justify-content: center;
    }

    .arrow-btn {
      width: 70px;
      height: 70px;
      font-size: var(--text-3xl);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 4px solid #3b82f6;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #2563eb, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .arrow-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .arrow-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2563eb;
    }

    .arrow-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .arrow-btn:focus-visible {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .arrow-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .go-btn {
      width: 70px;
      height: 70px;
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border: 4px solid #22c55e;
      border-radius: 50%;
      color: #166534;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #16a34a, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .go-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.1);
      box-shadow: 0 8px 0 #16a34a, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .go-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #16a34a;
    }

    .go-btn:focus {
      outline: 3px solid #22c55e;
      outline-offset: 2px;
    }

    .go-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Placeholder text in queue */
    .queue-placeholder {
      font-size: var(--text-sm);
      color: var(--color-neutral-400);
      font-style: italic;
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .grid-cell {
        width: 50px;
        height: 50px;
        font-size: var(--text-2xl);
      }

      .arrow-btn,
      .go-btn {
        width: 60px;
        height: 60px;
        font-size: var(--text-2xl);
      }

      .go-btn {
        font-size: var(--text-lg);
      }

      .queue-arrow {
        width: 35px;
        height: 35px;
        font-size: var(--text-lg);
      }

      .move-queue {
        min-width: 180px;
      }
    }
  </style>

  <!-- JavaScript Files -->
  <script src="../../js/utils.js"></script>

  <script src="../../js/animations.js"></script>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/navigation.js"></script>
  <script>
    // Robot Steps Activity
    const RobotSteps = {
      // Game state
      round: 1,
      maxRounds: 6,
      gridSize: 4,
      robotPos: { x: 0, y: 0 },
      treasurePos: { x: 3, y: 3 },
      moveQueue: [],
      isExecuting: false,
      totalTries: 0,
      successCount: 0,
      maxMoves: 8,

      // DOM elements
      progress: null,
      grid: null,
      moveQueueEl: null,
      feedback: null,
      btnGo: null,
      btnClear: null,
      arrowBtns: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Puzzle configurations (robot start, treasure positions)
      puzzles: [
        { robot: { x: 0, y: 0 }, treasure: { x: 2, y: 0 } },    // Easy: straight right
        { robot: { x: 0, y: 0 }, treasure: { x: 0, y: 2 } },    // Easy: straight down
        { robot: { x: 0, y: 0 }, treasure: { x: 1, y: 1 } },    // Easy: diagonal
        { robot: { x: 0, y: 0 }, treasure: { x: 2, y: 2 } },    // Medium: L-shape
        { robot: { x: 3, y: 0 }, treasure: { x: 0, y: 2 } },    // Medium: cross grid
        { robot: { x: 1, y: 1 }, treasure: { x: 3, y: 3 } },    // Medium: center start
      ],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.grid = document.getElementById('grid');
        this.moveQueueEl = document.getElementById('move-queue');
        this.feedback = document.getElementById('feedback');
        this.btnGo = document.getElementById('btn-go');
        this.btnClear = document.getElementById('btn-clear');
        this.arrowBtns = document.querySelectorAll('.arrow-btn');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Setup event listeners
        this.arrowBtns.forEach(btn => {
          btn.addEventListener('click', () => this.addMove(btn.dataset.direction));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.addMove(btn.dataset.direction);
            }
          });
        });

        this.btnGo.addEventListener('click', () => this.executeQueue());
        this.btnClear.addEventListener('click', () => this.clearQueue());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Keyboard shortcuts for directions
        document.addEventListener('keydown', (e) => {
          if (this.isExecuting) return;
          switch (e.key) {
            case 'ArrowUp': this.addMove('up'); break;
            case 'ArrowDown': this.addMove('down'); break;
            case 'ArrowLeft': this.addMove('left'); break;
            case 'ArrowRight': this.addMove('right'); break;
            case 'Enter': this.executeQueue(); break;
            case 'Escape': this.clearQueue(); break;
          }
        });

        this.shuffledPuzzles = shuffle([...this.puzzles]);
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        const puzzle = this.shuffledPuzzles[(this.round - 1) % this.shuffledPuzzles.length];
        this.robotPos = { ...puzzle.robot };
        this.treasurePos = { ...puzzle.treasure };
        this.moveQueue = [];
        this.isExecuting = false;

        this.feedback.classList.remove('show', 'error');
        this.setControlsEnabled(true);
        this.renderGrid();
        this.renderQueue();
        this.renderProgress();
      },

      /**
       * Render the grid
       */
      renderGrid() {
        this.grid.innerHTML = '';

        for (let y = 0; y < this.gridSize; y++) {
          for (let x = 0; x < this.gridSize; x++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.dataset.x = x;
            cell.dataset.y = y;

            if (x === this.robotPos.x && y === this.robotPos.y) {
              cell.classList.add('robot');
              cell.textContent = '🤖';
            } else if (x === this.treasurePos.x && y === this.treasurePos.y) {
              cell.classList.add('treasure');
              cell.textContent = '💎';
            }

            this.grid.appendChild(cell);
          }
        }
      },

      /**
       * Add a move to the queue
       */
      addMove(direction) {
        if (this.isExecuting || this.moveQueue.length >= this.maxMoves) return;

        this.moveQueue.push(direction);
        this.renderQueue();
      },

      /**
       * Remove a move from the queue
       */
      removeMove(index) {
        if (this.isExecuting) return;
        this.moveQueue.splice(index, 1);
        this.renderQueue();
      },

      /**
       * Clear the queue
       */
      clearQueue() {
        if (this.isExecuting) return;
        this.moveQueue = [];
        this.renderQueue();
      },

      /**
       * Render the move queue
       */
      renderQueue() {
        this.moveQueueEl.innerHTML = '';

        if (this.moveQueue.length === 0) {
          const placeholder = document.createElement('span');
          placeholder.className = 'queue-placeholder';
          placeholder.textContent = i18n.t('section.activities.robot-steps.tapArrows') || 'Tap arrows to plan!';
          this.moveQueueEl.appendChild(placeholder);
          return;
        }

        const arrows = {
          up: '⬆️',
          down: '⬇️',
          left: '⬅️',
          right: '➡️'
        };

        this.moveQueue.forEach((dir, index) => {
          const arrowEl = document.createElement('div');
          arrowEl.className = 'queue-arrow';
          arrowEl.textContent = arrows[dir];
          arrowEl.dataset.index = index;
          arrowEl.setAttribute('aria-label', `Remove ${dir} move`);
          arrowEl.addEventListener('click', () => this.removeMove(index));
          this.moveQueueEl.appendChild(arrowEl);
        });
      },

      /**
       * Execute the move queue
       */
      async executeQueue() {
        if (this.isExecuting || this.moveQueue.length === 0) return;

        this.isExecuting = true;
        this.totalTries++;
        this.setControlsEnabled(false);

        // Animate each move
        for (let i = 0; i < this.moveQueue.length; i++) {
          // Highlight current move
          const queueArrows = this.moveQueueEl.querySelectorAll('.queue-arrow');
          queueArrows.forEach((el, idx) => {
            el.classList.toggle('executing', idx === i);
          });

          const dir = this.moveQueue[i];
          const newPos = this.getNewPosition(this.robotPos, dir);

          // Check if move is valid (within grid)
          if (this.isValidPosition(newPos)) {
            this.robotPos = newPos;
            this.renderGrid();
          }

          // Check if reached treasure
          if (this.robotPos.x === this.treasurePos.x && this.robotPos.y === this.treasurePos.y) {
            await this.delay(300);
            this.handleSuccess();
            return;
          }

          await this.delay(400);
        }

        // Didn't reach treasure
        this.handleMiss();
      },

      /**
       * Handle successful treasure collection
       */
      handleSuccess() {
        this.successCount++;

        // Mark treasure cell
        const treasureCell = this.grid.querySelector(`[data-x="${this.treasurePos.x}"][data-y="${this.treasurePos.y}"]`);
        if (treasureCell) {
          treasureCell.classList.add('reached');
          treasureCell.textContent = '🎉';
        }

        const msg = i18n.t('section.activities.robot-steps.success') || 'You found the treasure!';
        this.feedback.textContent = msg;
        this.feedback.classList.remove('error');
        this.feedback.classList.add('show');

        if (typeof celebrate === 'function') {
          celebrate(treasureCell);
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, 2000);
      },

      /**
       * Handle missing the treasure
       */
      handleMiss() {
        const msg = i18n.t('section.activities.robot-steps.tryAgain') || 'Almost! Try a different path!';
        this.feedback.textContent = msg;
        this.feedback.classList.add('show', 'error');

        // Reset robot position and allow editing
        setTimeout(() => {
          const puzzle = this.shuffledPuzzles[(this.round - 1) % this.shuffledPuzzles.length];
          this.robotPos = { ...puzzle.robot };
          this.isExecuting = false;
          this.setControlsEnabled(true);
          this.renderGrid();

          // Clear executing state from queue
          const queueArrows = this.moveQueueEl.querySelectorAll('.queue-arrow');
          queueArrows.forEach(el => el.classList.remove('executing'));
        }, 1500);
      },

      /**
       * Get new position after move
       */
      getNewPosition(pos, direction) {
        const deltas = {
          up: { x: 0, y: -1 },
          down: { x: 0, y: 1 },
          left: { x: -1, y: 0 },
          right: { x: 1, y: 0 }
        };
        const delta = deltas[direction];
        return { x: pos.x + delta.x, y: pos.y + delta.y };
      },

      /**
       * Check if position is valid
       */
      isValidPosition(pos) {
        return pos.x >= 0 && pos.x < this.gridSize && pos.y >= 0 && pos.y < this.gridSize;
      },

      /**
       * Enable/disable controls
       */
      setControlsEnabled(enabled) {
        this.arrowBtns.forEach(btn => btn.disabled = !enabled);
        this.btnGo.disabled = !enabled;
        this.btnClear.disabled = !enabled;
      },

      /**
       * Delay helper
       */
      delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.successCount;
        this.statsWrong.textContent = this.totalTries;

        const efficiency = this.successCount / this.totalTries;
        if (efficiency >= 0.8) {
          this.statsIcon.textContent = '🤖';
          this.statsMessage.textContent = i18n.t('section.activities.robot-steps.perfect') || 'Robot Master!';
        } else if (efficiency >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.robot-steps.great') || 'Great planning!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.robot-steps.keepPracticing') || 'Keep exploring!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.successCount = 0;
        this.totalTries = 0;
        this.shuffledPuzzles = shuffle([...this.puzzles]);
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      RobotSteps.init();
    });
  </script>
