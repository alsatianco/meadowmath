  <style>
    /* Dot Flash Activity Styles */
    .flash-container {
      position: relative;
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .flash-card {
      width: 260px;
      height: 180px;
      background: linear-gradient(135deg, #fdf4ff, #fae8ff);
      border: 5px solid #e879f9;
      border-radius: var(--radius-2xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 #d946ef, 0 8px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .flash-content {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: var(--space-3);
      justify-items: center;
      align-items: center;
    }

    .flash-content.hidden {
      visibility: hidden;
    }

    .flash-dot {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 2px 4px rgba(0, 0, 0, 0.15);
      animation: dotPop 0.3s ease backwards;
    }

    /* Colorful dots */
    .flash-dot.color-1 { background: linear-gradient(135deg, #f472b6, #ec4899); border: 3px solid #db2777; }
    .flash-dot.color-2 { background: linear-gradient(135deg, #60a5fa, #3b82f6); border: 3px solid #2563eb; }
    .flash-dot.color-3 { background: linear-gradient(135deg, #4ade80, #22c55e); border: 3px solid #16a34a; }
    .flash-dot.color-4 { background: linear-gradient(135deg, #fbbf24, #f59e0b); border: 3px solid #d97706; }
    .flash-dot.color-5 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); border: 3px solid #7c3aed; }
    .flash-dot.color-6 { background: linear-gradient(135deg, #fb7185, #f43f5e); border: 3px solid #e11d48; }

    @keyframes dotPop {
      from {
        opacity: 0;
        transform: scale(0);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Ready overlay */
    .ready-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-2xl);
      border: 5px solid #f59e0b;
      box-shadow: 0 6px 0 #d97706, 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .ready-overlay.hidden {
      display: none;
    }

    .ready-icon {
      font-size: 48px;
      animation: eyePulse 1s ease-in-out infinite;
    }

    @keyframes eyePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .ready-btn {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: #92400e;
      background: white;
      border: 3px solid #f59e0b;
      border-radius: var(--radius-xl);
      padding: var(--space-3) var(--space-5);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 0 #d97706;
      min-width: 140px;
    }

    .ready-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #d97706;
    }

    .ready-btn:focus {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    .ready-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .ready-btn:focus-visible {
      outline: 4px solid #3b82f6;
      outline-offset: 2px;
    }

    /* Question area */
    .question-area {
      text-align: center;
    }

    .question-area.hidden {
      display: none;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    /* Answer choices - square buttons */
    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .answer-btn {
      width: 70px;
      height: 70px;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      border-color: #e879f9;
      box-shadow: 0 7px 0 #d946ef, 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .answer-btn:focus {
      outline: 4px solid #e879f9;
      outline-offset: 2px;
    }

    .answer-btn:focus:not(:focus-visible) {
      outline: none;
    }

    .answer-btn:focus-visible {
      outline: 4px solid #e879f9;
      outline-offset: 2px;
    }

    .answer-btn:disabled {
      cursor: not-allowed;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .flash-card {
        width: 220px;
        height: 160px;
      }

      .flash-content {
        gap: 10px;
      }

      .flash-dot {
        width: 38px;
        height: 38px;
      }

      .answer-btn {
        width: 60px;
        height: 60px;
        font-size: var(--text-xl);
      }
    }
  </style>

  <script>
    // Dot Flash Activity - Level 1 subitizing practice
    const DotFlash = {
      // Game state
      round: 1,
      maxRounds: 8,
      targetCount: 0,
      flashDuration: 2000,
      hasFlashed: false,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      flashCard: null,
      flashContent: null,
      readyOverlay: null,
      readyBtn: null,
      questionArea: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.flashCard = document.getElementById('flash-card');
        this.flashContent = document.getElementById('flash-content');
        this.readyOverlay = document.getElementById('ready-overlay');
        this.readyBtn = document.getElementById('ready-btn');
        this.questionArea = document.getElementById('question-area');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.readyBtn.addEventListener('click', () => this.startFlash());
        this.readyBtn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.startFlash();
          }
        });

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Get flash duration based on round - starts longer, gets shorter
       */
      getFlashDuration() {
        // Progressive: 2s -> 1.5s -> 1.2s
        if (this.round <= 3) return 2000;
        if (this.round <= 5) return 1500;
        return 1200;
      },

      /**
       * Get number range based on round - Level 1 focuses on 1-6
       */
      getRange() {
        // Progressive: 1-4, then 1-5, then 1-6
        if (this.round <= 3) return { min: 1, max: 4 };
        if (this.round <= 5) return { min: 1, max: 5 };
        return { min: 1, max: 6 };
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasFlashed = false;
        this.hasAnswered = false;

        const range = this.getRange();
        this.targetCount = randomInt(range.min, range.max);
        this.flashDuration = this.getFlashDuration();

        // Prepare dots (hidden initially)
        this.renderDots();
        this.flashContent.classList.add('hidden');

        // Reset UI
        this.readyOverlay.classList.remove('hidden');
        this.questionArea.classList.add('hidden');
        this.feedback.classList.remove('show', 'error');

        this.renderProgress();
      },

      /**
       * Render dots in arranged patterns for subitizing
       */
      renderDots() {
        this.flashContent.innerHTML = '';

        // Use consistent patterns for subitizing (like dice)
        const patterns = {
          1: [[1, 1]],
          2: [[0, 1], [2, 1]],
          3: [[0, 0], [1, 1], [2, 2]],
          4: [[0, 0], [0, 2], [2, 0], [2, 2]],
          5: [[0, 0], [0, 2], [1, 1], [2, 0], [2, 2]],
          6: [[0, 0], [0, 1], [0, 2], [2, 0], [2, 1], [2, 2]]
        };

        const positions = patterns[this.targetCount] || [];
        const colorClass = `color-${randomInt(1, 6)}`;

        // Create a 3x3 grid container
        for (let row = 0; row < 3; row++) {
          for (let col = 0; col < 3; col++) {
            const cell = document.createElement('div');
            cell.style.width = '44px';
            cell.style.height = '44px';

            // Check if this position should have a dot
            const hasDot = positions.some(p => p[0] === col && p[1] === row);
            if (hasDot) {
              const dot = document.createElement('div');
              dot.className = `flash-dot ${colorClass}`;
              dot.style.animationDelay = `${positions.findIndex(p => p[0] === col && p[1] === row) * 0.05}s`;
              cell.appendChild(dot);
            }

            this.flashContent.appendChild(cell);
          }
        }
      },

      /**
       * Start the flash
       */
      startFlash() {
        if (this.hasFlashed) return;
        this.hasFlashed = true;

        // Hide ready overlay
        this.readyOverlay.classList.add('hidden');

        // Show dots
        this.flashContent.classList.remove('hidden');

        // Hide after flash duration
        setTimeout(() => {
          this.flashContent.classList.add('hidden');
          this.showQuestion();
        }, this.flashDuration);
      },

      /**
       * Show question and choices
       */
      showQuestion() {
        this.questionArea.classList.remove('hidden');
        this.renderChoices();
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        const range = this.getRange();

        // Show all numbers in range as choices
        for (let i = range.min; i <= range.max; i++) {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = i;
          btn.setAttribute('tabindex', '0');
          btn.addEventListener('click', () => this.selectAnswer(i, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectAnswer(i, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        }
      },

      /**
       * Select answer
       */
      selectAnswer(num, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const allBtns = this.answerChoices.querySelectorAll('.answer-btn');
        allBtns.forEach(b => b.disabled = true);

        // Show dots again for reveal
        this.flashContent.classList.remove('hidden');

        const isCorrect = num === this.targetCount;

        if (isCorrect) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.dot-flash.correct') || 'Yes! {{count}} dots!';
          this.feedback.textContent = msg.replace('{{count}}', this.targetCount);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          // Highlight correct answer
          allBtns.forEach(b => {
            if (parseInt(b.textContent) === this.targetCount) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.dot-flash.incorrect') || 'There were {{count}} dots.';
          this.feedback.textContent = msg.replace('{{count}}', this.targetCount);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '⚡';
          this.statsMessage.textContent = i18n.t('section.activities.dot-flash.perfect') || 'Lightning Fast Eyes!';
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.dot-flash.great') || 'Great dot spotting!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.dot-flash.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      DotFlash.init();
    });
  </script>
