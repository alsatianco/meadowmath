  <style>
    /* Missing Number Train Activity Styles */
    .train-container {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
      border-radius: var(--radius-2xl);
      margin-bottom: var(--space-6);
      overflow-x: auto;
      max-width: 100%;
    }

    .train-engine {
      font-size: 64px;
      animation: trainBob 2s ease-in-out infinite;
    }

    @keyframes trainBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .train-cars {
      display: flex;
      gap: var(--space-2);
    }

    .train-car {
      position: relative;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      transition: all 0.3s ease;
    }

    .train-car::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
    }

    .train-car::before {
      /* content: '⚫ ⚫'; */
      position: absolute;
      bottom: -16px;
      font-size: 14px;
      letter-spacing: 30px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* .train-car:first-child::before {
      content: none;
    } */

    .train-car.missing {
      background: linear-gradient(135deg, #e5e7eb, #d1d5db);
      border: 4px dashed #9ca3af;
      box-shadow: 0 4px 0 #6b7280;
      color: transparent;
    }

    .train-car.missing::after {
      content: '?';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: var(--text-3xl);
      color: #6b7280;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .train-car.revealed {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
      color: #166534;
      animation: trainCarReveal 0.5s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes trainCarReveal {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Answer Section */
    .answer-section {
      text-align: center;
    }

    .answer-prompt {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    .answer-choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
    }

    .answer-btn {
      width: 80px;
      height: 80px;
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border: 4px solid #0ea5e9;
      border-radius: var(--radius-xl);
      color: #0369a1;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #0284c7, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #0284c7, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0284c7;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPulse 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
      box-shadow: 0 4px 0 #d97706;
      animation: shake 0.5s ease;
    }

    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .train-container {
        padding: var(--space-3);
      }

      .train-engine {
        font-size: 48px;
      }

      .train-car {
        width: 60px;
        height: 60px;
        font-size: var(--text-2xl);
      }

      .train-car::before {
        font-size: 10px;
        letter-spacing: 20px;
        bottom: -14px;
      }

      .answer-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-xl);
      }
    }
  </style>

  <script>
    // Missing Number Train Activity
    const MissingNumberTrain = {
      // Game state
      round: 1,
      maxRounds: 10,
      sequence: [],
      missingIndex: 0,
      missingNumber: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,

      // DOM elements
      progress: null,
      trainCars: null,
      answerChoices: null,
      feedback: null,
      instruction: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Sequence types
      sequenceTypes: [
        { name: 'counting', step: 1, start: [1, 5, 10, 15] },
        { name: 'countingBy10', step: 10, start: [10, 20, 30] },
        { name: 'countingBy5', step: 5, start: [5, 10, 15] },
        { name: 'countingBy2', step: 2, start: [2, 4, 6, 10] }
      ],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.trainCars = document.getElementById('train-cars');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.instruction = document.getElementById('instruction');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Generate sequence based on difficulty (round)
        this.generateSequence();

        // Render train
        this.renderTrain();

        // Render answer choices
        this.renderChoices();

        // Clear feedback
        this.feedback.classList.remove('show', 'error');

        // Update progress
        this.renderProgress();
      },

      /**
       * Generate a number sequence with one missing
       */
      generateSequence() {
        // Choose sequence type based on round
        let typeIndex;
        if (this.round <= 3) {
          // Early rounds: simple counting by 1
          typeIndex = 0;
        } else if (this.round <= 6) {
          // Middle rounds: counting by 1, 2, or 5
          typeIndex = randomInt(0, 2);
        } else {
          // Later rounds: all types including counting by 10
          typeIndex = randomInt(0, 3);
        }

        const seqType = this.sequenceTypes[typeIndex];
        const startOptions = seqType.start;
        const start = startOptions[randomInt(0, startOptions.length - 1)];

        // Generate sequence of 5 numbers
        const length = 5;
        this.sequence = [];
        for (let i = 0; i < length; i++) {
          this.sequence.push(start + i * seqType.step);
        }

        // Pick random position to be missing
        this.missingIndex = randomInt(0, length - 1);
        this.missingNumber = this.sequence[this.missingIndex];
      },

      /**
       * Render the train cars
       */
      renderTrain() {
        this.trainCars.innerHTML = '';

        this.sequence.forEach((num, index) => {
          const car = document.createElement('div');
          car.className = 'train-car';
          car.dataset.index = index;

          if (index === this.missingIndex) {
            car.classList.add('missing');
            car.textContent = '';
          } else {
            car.textContent = num;
          }

          this.trainCars.appendChild(car);
        });
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        // Generate choices (correct + distractors)
        const choices = this.generateChoices(this.missingNumber);

        choices.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.addEventListener('click', () => this.checkAnswer(num, btn));
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Generate answer choices
       */
      generateChoices(correct) {
        const choices = [correct];

        // Calculate the step size in the sequence
        let step = 1;
        if (this.sequence.length >= 2) {
          step = Math.abs(this.sequence[1] - this.sequence[0]);
        }

        // Pre-calculate all valid wrong answers to avoid infinite loop
        const possibleWrong = [];
        for (const multiplier of [-3, -2, -1, 1, 2, 3]) {
          const wrong = correct + multiplier * step;
          if (wrong > 0 && wrong <= 100) {
            possibleWrong.push(wrong);
          }
        }

        // Shuffle and take up to 3 wrong answers
        shuffle(possibleWrong);
        const numWrong = Math.min(3, possibleWrong.length);
        choices.push(...possibleWrong.slice(0, numWrong));

        return shuffle(choices);
      },

      /**
       * Check the answer
       */
      checkAnswer(selected, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const buttons = this.answerChoices.querySelectorAll('.answer-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Find the missing train car
        const missingCar = this.trainCars.querySelector('.train-car.missing');

        if (selected === this.missingNumber) {
          // Correct!
          button.classList.add('correct');
          missingCar.classList.remove('missing');
          missingCar.classList.add('revealed');
          missingCar.textContent = this.missingNumber;

          this.feedback.textContent = '🎉 Correct! The missing number is ' + this.missingNumber + '!';
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(missingCar);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          // Highlight correct answer
          buttons.forEach(btn => {
            if (parseInt(btn.textContent) === this.missingNumber) {
              btn.classList.add('correct');
            }
          });

          // Show correct number on train car
          missingCar.classList.remove('missing');
          missingCar.classList.add('revealed');
          missingCar.textContent = this.missingNumber;

          this.feedback.textContent = 'Not quite! It was ' + this.missingNumber + '.';
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = 'Amazing! You\'re a number train conductor!';
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = 'Great job finding the missing numbers!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = 'Good effort! Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      MissingNumberTrain.init();
    });
  </script>
