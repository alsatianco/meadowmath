      font-size: var(--text-lg);

    }

    .blue-label {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #2563eb;
    }

    .item-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      min-width: 140px;
      min-height: 120px;
      max-width: 200px;
      border-radius: var(--radius-xl);
      border: 4px solid;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .red-group {
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border-color: #f87171;
      box-shadow: 0 4px 0 #ef4444;
    }

    .blue-group {
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border-color: #60a5fa;
      box-shadow: 0 4px 0 #3b82f6;
    }

    .group-item {
      font-size: 32px;
      transition: transform 0.2s ease;
    }

    .group-count {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-500);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .group-count.show {
      opacity: 1;
    }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vs-divider span {
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-400);
      padding: var(--space-2);
    }

    /* Question Section */
    .question-section {
      text-align: center;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    .choice-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
    }

    .choice-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #16a34a, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #16a34a, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #16a34a;
    }

    .choice-icon {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: #16a34a;
    }

    .choice-text {
      font-family: var(--font-secondary);
      font-size: var(--text-base);
      font-weight: var(--weight-bold);
      color: #166534;
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;

    .choice-btn.incorrect {

  <script>
    // More, Fewer, or Same Activity
    const MoreFewerSame = {
      // Game state
      round: 1,
      maxRounds: 10,
      redCount: 0,
      blueCount: 0,
      correctAnswer: '',
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,

      // DOM elements
      progress: null,
      redGroup: null,
      blueGroup: null,
      redCountDisplay: null,
      blueCountDisplay: null,
      choiceButtons: null,
      feedback: null,
      instruction: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Items to use
      items: ['🍎', '🍊', '🍋', '🍇', '🍓', '⭐', '❤️', '🌸', '🦋', '🐸'],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.redGroup = document.getElementById('red-group');
        this.blueGroup = document.getElementById('blue-group');
        this.redCountDisplay = document.getElementById('red-count');
        this.blueCountDisplay = document.getElementById('blue-count');
        this.choiceButtons = document.getElementById('choice-buttons');
        this.feedback = document.getElementById('feedback');
        this.instruction = document.getElementById('instruction');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.choiceButtons.querySelectorAll('.choice-btn').forEach(btn => {
          btn.addEventListener('click', () => this.checkAnswer(btn.dataset.answer, btn));
        });
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Generate counts - ensure variety of more/fewer/same
        this.generateCounts();

        // Pick random item
        const item = this.items[randomInt(0, this.items.length - 1)];

        // Render groups
        this.renderGroup(this.redGroup, this.redCount, item);
        this.renderGroup(this.blueGroup, this.blueCount, item);

        // Reset UI
        this.redCountDisplay.classList.remove('show');
        this.blueCountDisplay.classList.remove('show');
        this.redCountDisplay.textContent = '';
        this.blueCountDisplay.textContent = '';
        this.feedback.classList.remove('show', 'error');

        // Reset choice buttons
        const buttons = this.choiceButtons.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.classList.remove('correct', 'incorrect');
          btn.disabled = false;
        });

        // Update progress
        this.renderProgress();
      },

      /**
       * Generate counts for red and blue groups
       */
      generateCounts() {
        const minCount = 2;
        const maxCount = Math.min(6 + Math.floor(this.round / 3), 10);

        // Ensure balanced distribution of answers
        const answerType = this.round % 3; // 0: more, 1: fewer, 2: same

        if (answerType === 2) {
          // Same - equal counts
          this.redCount = randomInt(minCount, maxCount);
          this.blueCount = this.redCount;
          this.correctAnswer = 'same';
        } else if (answerType === 0) {
          // More - red has more
          this.blueCount = randomInt(minCount, maxCount - 1);
          this.redCount = this.blueCount + randomInt(1, 3);
          if (this.redCount > maxCount) this.redCount = maxCount;
          this.correctAnswer = 'more';
        } else {
          // Fewer - red has fewer
          this.blueCount = randomInt(minCount + 1, maxCount);
          this.redCount = this.blueCount - randomInt(1, 3);
          if (this.redCount < minCount) this.redCount = minCount;
          this.correctAnswer = 'fewer';
        }
      },

      /**
       * Render items in a group with varied layouts
       */
      renderGroup(container, count, emoji) {
        container.innerHTML = '';

        // Use different layouts for variety (especially for "same" to test conservation)
        const useScatter = Math.random() < 0.3;

        for (let i = 0; i < count; i++) {
          const item = document.createElement('span');
          item.className = 'group-item';
          item.textContent = emoji;

          if (useScatter) {
            // Random rotation for visual variety
            item.style.transform = `rotate(${randomInt(-15, 15)}deg)`;
          }

          container.appendChild(item);
        }
      },

      /**
       * Check the answer
       */
      checkAnswer(answer, button) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const buttons = this.choiceButtons.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        // Show counts
        this.redCountDisplay.textContent = this.redCount;
        this.blueCountDisplay.textContent = this.blueCount;
        this.redCountDisplay.classList.add('show');
        this.blueCountDisplay.classList.add('show');

        if (answer === this.correctAnswer) {
          // Correct!
          button.classList.add('correct');
          let message = '';
          if (this.correctAnswer === 'more') {
            message = '🎉 Correct! Red has more! (' + this.redCount + ' > ' + this.blueCount + ')';
          } else if (this.correctAnswer === 'fewer') {
            message = '🎉 Correct! Red has fewer! (' + this.redCount + ' < ' + this.blueCount + ')';
          } else {
            message = '🎉 Correct! They have the same! (' + this.redCount + ' = ' + this.blueCount + ')';
          }
          this.feedback.textContent = message;
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(button);
          }
        } else {
          // Incorrect
          button.classList.add('incorrect');
          // Highlight correct answer
          buttons.forEach(btn => {
            if (btn.dataset.answer === this.correctAnswer) {
              btn.classList.add('correct');
            }
          });

          let message = '';
          if (this.correctAnswer === 'more') {
            message = 'Not quite! Red has more (' + this.redCount + ' > ' + this.blueCount + ')';
          } else if (this.correctAnswer === 'fewer') {
            message = 'Not quite! Red has fewer (' + this.redCount + ' < ' + this.blueCount + ')';
          } else {
            message = 'Not quite! They have the same (' + this.redCount + ' = ' + this.blueCount + ')';
          }
          this.feedback.textContent = message;
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = 'Amazing! You\'re a comparison champion!';
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = 'Great job comparing groups!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = 'Good effort! Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      MoreFewerSame.init();
    });
  </script>
