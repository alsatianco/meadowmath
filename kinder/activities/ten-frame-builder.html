  <style>
    /* Ten-Frame Builder Activity Styles */
    .target-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .target-label {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      color: var(--color-neutral-600);
    }

    .target-number {
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: var(--color-primary-600);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      padding: var(--space-2) var(--space-5);
      border-radius: var(--radius-xl);
      border: 4px solid var(--color-primary-400);
      box-shadow: 0 4px 0 var(--color-primary-500);
      min-width: 80px;
      text-align: center;
    }

    .frames-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .ten-frame {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 4px;
      padding: var(--space-2);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 0 #d97706;
    }

    .frame-cell {
      width: 48px;
      height: 48px;
      background: white;
      border: 2px solid #fbbf24;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.2s ease;
    }

    .frame-cell.filled {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: #3b82f6;
    }

    .frame-cell.filled .cell-chip {
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Extra ones (for teen numbers) */
    .extra-ones {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 4px solid #22c55e;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 0 #16a34a;
      min-width: 60px;
      min-height: 60px;
    }

    .extra-cell {
      width: 48px;
      height: 48px;
      background: white;
      border: 2px solid #86efac;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.2s ease;
    }

    .extra-cell.filled {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
    }

    /* Chip source area */
    .chips-area {
      display: flex;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .chip-source {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-3) var(--space-5);
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border: 4px solid #0ea5e9;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #0284c7, 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .chip-source:hover:not(.disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 0 #0284c7, 0 12px 25px rgba(0, 0, 0, 0.15);
    }

    .chip-source:active:not(.disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0284c7;
    }

    .chip-source.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chip-emoji {
      font-size: 40px;
    }

    .chip-text {
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: #0369a1;
    }

    /* Count display */
    .count-display {
      text-align: center;
      margin-bottom: var(--space-3);
    }

    .current-count {
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-600);
    }

    /* Equation display */
    .equation-display {
      text-align: center;
      min-height: 40px;
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-primary-600);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease;
    }

    .equation-display.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .frame-cell, .extra-cell {
        width: 40px;
        height: 40px;
        font-size: 24px;
      }

      .target-number {
        font-size: var(--text-3xl);
      }

      .chip-emoji {
        font-size: 32px;
      }
    }

    @media (max-width: 480px) {
      .frame-cell, .extra-cell {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      .frames-container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>

  <script>
    // Ten-Frame Builder Activity
    const TenFrameBuilder = {
      // Game state
      round: 1,
      maxRounds: 10,
      targetNumber: 0,
      currentCount: 0,
      hasCompleted: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 2000,

      // DOM elements
      progress: null,
      targetNumberEl: null,
      framesContainer: null,
      chipSource: null,
      currentCountEl: null,
      equationDisplay: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Round configurations - progressive difficulty
      rounds: [
        { min: 3, max: 5 },    // Start small (within five-frame)
        { min: 5, max: 7 },
        { min: 6, max: 9 },
        { min: 8, max: 10 },
        { min: 10, max: 10 }, // Exactly 10
        { min: 11, max: 13 }, // Teen numbers start
        { min: 12, max: 15 },
        { min: 14, max: 17 },
        { min: 15, max: 18 },
        { min: 16, max: 19 }
      ],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.progress = document.getElementById('progress');
        this.targetNumberEl = document.getElementById('target-number');
        this.framesContainer = document.getElementById('frames-container');
        this.chipSource = document.getElementById('chip-source');
        this.currentCountEl = document.getElementById('current-count');
        this.equationDisplay = document.getElementById('equation-display');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.chipSource.addEventListener('click', () => this.addChip());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Start
        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasCompleted = false;
        this.currentCount = 0;

        // Get target number based on round difficulty
        const config = this.rounds[Math.min(this.round - 1, this.rounds.length - 1)];
        this.targetNumber = randomInt(config.min, config.max);

        // Update display
        this.targetNumberEl.textContent = this.targetNumber;
        this.currentCountEl.textContent = '0';
        this.equationDisplay.classList.remove('show');
        this.equationDisplay.textContent = '';
        this.feedback.classList.remove('show', 'error');

        // Build frame(s)
        this.buildFrames();

        // Enable chip source
        this.chipSource.classList.remove('disabled');

        // Update progress
        this.renderProgress();
      },

      /**
       * Build the ten-frame(s) based on target number
       */
      buildFrames() {
        this.framesContainer.innerHTML = '';

        // Always show a ten-frame
        const tenFrame = document.createElement('div');
        tenFrame.className = 'ten-frame';
        tenFrame.id = 'ten-frame';

        for (let i = 0; i < 10; i++) {
          const cell = document.createElement('div');
          cell.className = 'frame-cell';
          cell.dataset.index = i;
          tenFrame.appendChild(cell);
        }

        this.framesContainer.appendChild(tenFrame);

        // If target > 10, add extra ones area
        if (this.targetNumber > 10) {
          const extrasContainer = document.createElement('div');
          extrasContainer.className = 'extra-ones';
          extrasContainer.id = 'extra-ones';

          // Create cells for the extras (up to 9)
          const extraCount = this.targetNumber - 10;
          for (let i = 0; i < extraCount; i++) {
            const cell = document.createElement('div');
            cell.className = 'extra-cell';
            cell.dataset.index = i;
            extrasContainer.appendChild(cell);
          }

          this.framesContainer.appendChild(extrasContainer);
        }
      },

      /**
       * Add a chip when tapped
       */
      addChip() {
        if (this.hasCompleted || this.currentCount >= this.targetNumber) return;

        this.currentCount++;
        this.currentCountEl.textContent = this.currentCount;

        // Fill the appropriate cell
        this.fillCell(this.currentCount);

        // Check if complete
        if (this.currentCount === this.targetNumber) {
          this.completeRound();
        }
      },

      /**
       * Fill a cell based on current count
       */
      fillCell(count) {
        if (count <= 10) {
          // Fill ten-frame
          const tenFrame = document.getElementById('ten-frame');
          const cell = tenFrame.children[count - 1];
          if (cell) {
            cell.classList.add('filled');
            cell.innerHTML = '<span class="cell-chip">🔵</span>';
          }
        } else {
          // Fill extra ones
          const extras = document.getElementById('extra-ones');
          if (extras) {
            const extraIndex = count - 11;
            const cell = extras.children[extraIndex];
            if (cell) {
              cell.classList.add('filled');
              cell.innerHTML = '<span class="cell-chip">🔵</span>';
            }
          }
        }
      },

      /**
       * Handle round completion
       */
      completeRound() {
        this.hasCompleted = true;
        this.chipSource.classList.add('disabled');

        // Show equation for numbers > 5
        if (this.targetNumber > 10) {
          const ones = this.targetNumber - 10;
          this.equationDisplay.textContent = `${this.targetNumber} = 10 + ${ones}`;
          this.equationDisplay.classList.add('show');
        } else if (this.targetNumber > 5) {
          const extras = this.targetNumber - 5;
          this.equationDisplay.textContent = `${this.targetNumber} = 5 + ${extras}`;
          this.equationDisplay.classList.add('show');
        }

        // Show feedback
        this.feedback.textContent = '🎉 Perfect! You built ' + this.targetNumber + '!';
        this.feedback.classList.remove('error');
        this.feedback.classList.add('show');
        this.correctCount++;

        // Celebrate
        if (typeof celebrate === 'function') {
          celebrate(this.framesContainer);
        }

        this.renderProgress();

        // Auto-advance
        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = 'Amazing! You\'re a ten-frame master!';
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = 'Great job building numbers!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = 'Good effort! Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasCompleted)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      TenFrameBuilder.init();
    });
  </script>
