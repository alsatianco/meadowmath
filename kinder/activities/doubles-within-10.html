  <style>
    /* Double Trouble Styles */
    .doubles-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .double-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 4px solid #3b82f6;
      border-radius: var(--radius-2xl);
      min-width: 100px;
    }

    .double-group.mirror {
      background: linear-gradient(135deg, #fce7f3, #fbcfe8);
      border-color: #ec4899;
    }

    .group-items {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-1);
      min-height: 40px;
    }

    .group-item {
      font-size: 32px;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .group-count {
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: #1d4ed8;
      background: white;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      border: 3px solid #3b82f6;
    }

    .double-group.mirror .group-count {
      color: #be185d;
      border-color: #ec4899;
    }

    .plus-sign {
      font-family: var(--font-secondary);
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-400);
    }

    /* Equation prompt */
    .equation-prompt {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding: var(--space-3);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-xl);
      border: 3px solid #f59e0b;
    }

    .equation-part {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #92400e;
    }

    .equation-sign {
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-500);
    }

    .equation-answer {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #dc2626;
      background: white;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-lg);
      border: 3px dashed #f87171;
      min-width: 50px;
      text-align: center;
    }

    .equation-answer.revealed {
      color: #166534;
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border: 3px solid #22c55e;
      border-style: solid;
    }

    /* Question */
    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      text-align: center;
      margin-bottom: var(--space-4);
    }

    /* Answer choices */
    .answer-choices {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .answer-btn {
      width: 80px;
      height: 80px;
      border: 4px solid #e2e8f0;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 0 #cbd5e1, 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      border-color: #3b82f6;
      box-shadow: 0 8px 0 #2563eb, 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .answer-btn:focus {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .answer-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .answer-btn.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #16a34a;
      animation: correctPop 0.5s ease;
    }

    .answer-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: shake 0.5s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Mobile responsive */
    @media (max-width: 767px) {
      .double-group {
        min-width: 90px;
        padding: var(--space-3);
      }

      .group-item {
        font-size: 26px;

      .group-count {
        font-size: var(--text-xl);
      }

      .answer-btn {
        width: 70px;
        height: 70px;
        font-size: var(--text-2xl);
      }

      .equation-part {
        font-size: var(--text-2xl);
      }

      .equation-answer {
        font-size: var(--text-2xl);
      }
    }
  </style>

  <script>
    // Double Trouble Activity
    const DoublesWithin10 = {
      // Game state
      round: 1,
      maxRounds: 8,
      doubleNum: 0,
      total: 0,
      hasAnswered: false,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1800,

      // DOM elements
      progress: null,
      groupLeft: null,
      groupRight: null,
      countLeft: null,
      countRight: null,
      eqLeft: null,
      eqRight: null,
      equationAnswer: null,
      answerChoices: null,
      feedback: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Items to use
      items: ['🌸', '⭐', '💎', '🦋', '🐸', '🍎', '🔵', '❤️', '🌟', '🍀'],

      // Doubles: 1-5 (to stay within 10)
      doubles: [1, 2, 3, 4, 5],

      /**
       * Initialize the activity
       */
      init() {
        this.progress = document.getElementById('progress');
        this.groupLeft = document.getElementById('group-left');
        this.groupRight = document.getElementById('group-right');
        this.countLeft = document.getElementById('count-left');
        this.countRight = document.getElementById('count-right');
        this.eqLeft = document.getElementById('eq-left');
        this.eqRight = document.getElementById('eq-right');
        this.equationAnswer = document.querySelector('.equation-answer');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        this.startRound();
        this.renderProgress();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.hasAnswered = false;

        // Pick a double (1-5)
        this.doubleNum = this.doubles[randomInt(0, this.doubles.length - 1)];
        this.total = this.doubleNum * 2;

        // Pick an item
        const item = this.items[randomInt(0, this.items.length - 1)];

        // Update counts
        this.countLeft.textContent = this.doubleNum;
        this.countRight.textContent = this.doubleNum;
        this.eqLeft.textContent = this.doubleNum;
        this.eqRight.textContent = this.doubleNum;
        this.equationAnswer.textContent = '?';
        this.equationAnswer.classList.remove('revealed');

        // Render items
        this.renderGroup(this.groupLeft, this.doubleNum, item);
        this.renderGroup(this.groupRight, this.doubleNum, item);

        // Reset UI
        this.feedback.classList.remove('show', 'error');

        // Generate choices
        this.renderChoices();

        this.renderProgress();
      },

      /**
       * Render items in a group
       */
      renderGroup(container, count, emoji) {
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const item = document.createElement('span');
          item.className = 'group-item';
          item.textContent = emoji;
          item.style.animationDelay = `${i * 0.1}s`;
          container.appendChild(item);
        }
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        this.answerChoices.innerHTML = '';

        // Generate choices including the correct answer
        const choices = new Set([this.total]);

        // Add distractors (nearby even numbers and off-by-one)
        const distractors = [
          this.total - 2,
          this.total - 1,
          this.total + 1,
          this.total + 2
        ].filter(n => n > 0 && n <= 10 && n !== this.total);

        // Shuffle distractors and take 3
        this.shuffleArray(distractors);
        for (let i = 0; i < 3 && i < distractors.length; i++) {
          choices.add(distractors[i]);
        }

        // Convert to array and shuffle
        const choicesArray = Array.from(choices);
        this.shuffleArray(choicesArray);

        // Create buttons
        choicesArray.forEach(num => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = num;
          btn.setAttribute('tabindex', '0');
          btn.addEventListener('click', () => this.selectAnswer(num, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.selectAnswer(num, btn);
            }
          });
          this.answerChoices.appendChild(btn);
        });
      },

      /**
       * Shuffle array
       */
      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      /**
       * Select answer
       */
      selectAnswer(num, btn) {
        if (this.hasAnswered) return;
        this.hasAnswered = true;

        // Disable all buttons
        const allBtns = this.answerChoices.querySelectorAll('.answer-btn');
        allBtns.forEach(b => b.disabled = true);

        // Reveal answer
        this.equationAnswer.textContent = this.total;
        this.equationAnswer.classList.add('revealed');

        const isCorrect = num === this.total;

        if (isCorrect) {
          btn.classList.add('correct');
          const msg = i18n.t('section.activities.doubles-within-10.correct') || '{{num}} + {{num}} = {{total}}!';
          this.feedback.textContent = msg
            .replace(/\{\{num\}\}/g, this.doubleNum)
            .replace('{{total}}', this.total);
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;

          if (typeof celebrate === 'function') {
            celebrate(btn);
          }
        } else {
          btn.classList.add('incorrect');
          // Highlight correct answer
          allBtns.forEach(b => {
            if (parseInt(b.textContent) === this.total) {
              b.classList.add('correct');
            }
          });
          const msg = i18n.t('section.activities.doubles-within-10.incorrect') || '{{num}} + {{num}} = {{total}}';
          this.feedback.textContent = msg
            .replace(/\{\{num\}\}/g, this.doubleNum)
            .replace('{{total}}', this.total);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        setTimeout(() => {
          if (this.round < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;
        if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.doubles-within-10.perfect') || "Doubles Champion!";
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '🎉';
          this.statsMessage.textContent = i18n.t('section.activities.doubles-within-10.great') || 'Great doubling!';
        } else {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.doubles-within-10.keepPracticing') || 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart
       */
      restartActivity() {
        this.round = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      /**
       * Next round
       */
      nextRound() {
        this.round++;
        this.startRound();
      },

      /**
       * Render progress
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.round || (i === this.round && this.hasAnswered)) {
            className += ' completed';
          } else if (i === this.round) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      DoublesWithin10.init();
    });
  </script>
