  <script>
    // Compare Fractions Activity - Grade 4 Level 3
    const CompareFractions = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      showHint: false,
      revealBars: false,
      isAnswered: false,
      lastResult: null,
      advanceTimeout: null,

      leftNumerator: null,
      leftDenominator: null,
      rightNumerator: null,
      rightDenominator: null,
      leftBar: null,
      rightBar: null,
      symbolDisplay: null,
      symbolPlaceholder: null,
      choicesContainer: null,
      choiceButtons: [],
      btnHint: null,
      btnReset: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.leftNumerator = document.getElementById('left-numerator');
        this.leftDenominator = document.getElementById('left-denominator');
        this.rightNumerator = document.getElementById('right-numerator');
        this.rightDenominator = document.getElementById('right-denominator');
        this.leftBar = document.getElementById('left-bar');
        this.rightBar = document.getElementById('right-bar');
        this.symbolDisplay = document.getElementById('symbol-display');
        this.symbolPlaceholder = this.symbolDisplay.querySelector('.symbol-placeholder');
        this.choicesContainer = document.getElementById('choices-container');
        this.choiceButtons = Array.from(this.choicesContainer.querySelectorAll('.symbol-choice'));
        this.btnHint = document.getElementById('btn-hint');
        this.btnReset = document.getElementById('btn-reset');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.choiceButtons.forEach((btn) => {
          btn.addEventListener('click', () => this.selectAnswer(btn));
        });

        this.btnHint.addEventListener('click', () => this.toggleHint());
        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      generateQuestions() {
        const sameDenominator = [
          { left: { num: 3, den: 8 }, right: { num: 5, den: 8 } },
          { left: { num: 7, den: 12 }, right: { num: 5, den: 12 } },
          { left: { num: 4, den: 10 }, right: { num: 4, den: 10 } },
          { left: { num: 2, den: 6 }, right: { num: 5, den: 6 } },
          { left: { num: 1, den: 4 }, right: { num: 3, den: 4 } }
        ];

        const sameNumerator = [
          { left: { num: 3, den: 4 }, right: { num: 3, den: 8 } },
          { left: { num: 2, den: 5 }, right: { num: 2, den: 3 } },
          { left: { num: 1, den: 6 }, right: { num: 1, den: 2 } },
          { left: { num: 5, den: 8 }, right: { num: 5, den: 10 } }
        ];

        const mixed = [
          { left: { num: 2, den: 4 }, right: { num: 1, den: 2 } },
          { left: { num: 3, den: 6 }, right: { num: 2, den: 3 } },
          { left: { num: 5, den: 8 }, right: { num: 3, den: 4 } },
          { left: { num: 7, den: 10 }, right: { num: 3, den: 5 } },
          { left: { num: 4, den: 8 }, right: { num: 1, den: 2 } }
        ];

        this.questions = [
          ...shuffle(sameDenominator).slice(0, 4),
          ...shuffle(sameNumerator).slice(0, 3),
          ...shuffle(mixed).slice(0, 3)
        ];

        if (this.questions.length < this.totalQuestions) {
          const pool = shuffle([...sameDenominator, ...sameNumerator, ...mixed]);
          while (this.questions.length < this.totalQuestions && pool.length) {
            this.questions.push(pool.pop());
          }
        }

        this.questions = this.questions.slice(0, this.totalQuestions);
      },

      getCorrectSymbol(left, right) {
        const leftValue = left.num / left.den;
        const rightValue = right.num / right.den;

        if (Math.abs(leftValue - rightValue) < 0.0001) {
          return '=';
        }
        return leftValue < rightValue ? '<' : '>';
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) {
            return text;
          }
        }
        return fallback;
      },

      updateHintButton() {
        const hintVisible = this.showHint || this.revealBars;
        const key = hintVisible ? 'hideHint' : 'showHint';
        const fallback = hintVisible ? 'Hide fraction bars' : 'Show fraction bars';
        const text = this.getTranslation(`section.activities.compare-fractions.${key}`, fallback);
        this.btnHint.innerHTML = `<span data-i18n="section.activities.compare-fractions.${key}">${text}</span>`;
        this.btnHint.setAttribute('aria-pressed', hintVisible);
      },

      updateTranslations() {
        this.updateHintButton();

        if (this.lastResult && this.feedback.classList.contains('show')) {
          if (this.lastResult.isCorrect) {
            this.feedback.textContent = this.getTranslation(
              'section.activities.compare-fractions.correct',
              'Correct!'
            );
            this.feedback.classList.remove('error');
          } else {
            const template = this.getTranslation(
              'section.activities.compare-fractions.wrong',
              'The answer is {symbol}'
            );
            this.feedback.textContent = template.replace('{symbol}', this.lastResult.correctSymbol);
            this.feedback.classList.add('error');
          }
        }

        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.revealBars = false;
        this.lastResult = null;
        this.feedback.classList.remove('show', 'error');

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        const { left, right } = question;

        this.leftNumerator.textContent = left.num;
        this.leftDenominator.textContent = left.den;
        this.rightNumerator.textContent = right.num;
        this.rightDenominator.textContent = right.den;

        this.symbolPlaceholder.textContent = '?';
        this.symbolDisplay.classList.remove('correct', 'incorrect');

        this.renderFractionBar(this.leftBar, left.num, left.den);
        this.renderFractionBar(this.rightBar, right.num, right.den);

        if (this.showHint) {
          this.leftBar.classList.add('show');
          this.rightBar.classList.add('show');
        } else {
          this.leftBar.classList.remove('show');
          this.rightBar.classList.remove('show');
        }

        this.choiceButtons.forEach((btn) => {
          btn.disabled = false;
          btn.classList.remove('selected', 'correct', 'incorrect');
        });

        this.updateHintButton();
        this.renderProgress();
      },

      renderFractionBar(container, numerator, denominator) {
        container.innerHTML = '';
        for (let i = 0; i < denominator; i++) {
          const part = document.createElement('div');
          part.className = 'fraction-bar-part';
          if (i < numerator) {
            part.classList.add('shaded');
          } else {
            part.classList.add('unshaded');
          }
          container.appendChild(part);
        }
      },

      toggleHint() {
        const hintVisible = this.showHint || this.revealBars;
        const nextVisible = !hintVisible;
        this.showHint = nextVisible;
        this.revealBars = false;

        if (nextVisible) {
          this.leftBar.classList.add('show');
          this.rightBar.classList.add('show');
        } else {
          this.leftBar.classList.remove('show');
          this.rightBar.classList.remove('show');
        }

        this.updateHintButton();
      },

      selectAnswer(btn) {
        if (this.isAnswered) return;
        this.isAnswered = true;
        this.clearAdvanceTimeout();

        const selectedSymbol = btn.dataset.symbol;
        const question = this.questions[this.currentQuestion];
        const correctSymbol = this.getCorrectSymbol(question.left, question.right);

        this.choiceButtons.forEach((button) => {
          button.disabled = true;
        });

        btn.classList.add('selected');

        if (selectedSymbol === correctSymbol) {
          this.correctCount++;
          btn.classList.add('correct');
          this.symbolPlaceholder.textContent = correctSymbol;
          this.symbolDisplay.classList.add('correct');

          this.feedback.textContent = this.getTranslation(
            'section.activities.compare-fractions.correct',
            'Correct!'
          );
          this.feedback.classList.remove('error');

          this.lastResult = { isCorrect: true, correctSymbol };
        } else {
          this.incorrectCount++;
          btn.classList.add('incorrect');

          this.choiceButtons.forEach((button) => {
            if (button.dataset.symbol === correctSymbol) {
              button.classList.add('correct');
            }
          });

          this.symbolPlaceholder.textContent = correctSymbol;
          this.symbolDisplay.classList.add('incorrect');

          const template = this.getTranslation(
            'section.activities.compare-fractions.wrong',
            'The answer is {symbol}'
          );
          this.feedback.textContent = template.replace('{symbol}', correctSymbol);
          this.feedback.classList.add('error');

          this.lastResult = { isCorrect: false, correctSymbol };
        }

        this.feedback.classList.add('show');
        this.leftBar.classList.add('show');
        this.rightBar.classList.add('show');
        this.revealBars = true;
        this.updateHintButton();

        this.renderProgress();

        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.compare-fractions.perfect',
            'Amazing comparison skills!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.compare-fractions.great',
            'Great fraction work!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.compare-fractions.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.compare-fractions.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.showHint = false;
        this.revealBars = false;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.updateHintButton();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => CompareFractions.init());
      } else {
        CompareFractions.init();
      }
    });
  </script>
  <style>

      border: 4px solid #3b82f6;

    }

    }

    .fraction-side.right .fraction-bar-part.shaded {
      background: linear-gradient(135deg, #a78bfa, #8b5cf6);
    }

    .fraction-bar-part.unshaded {
      background: #f8fafc;
    }

    .fraction-display {

      flex-direction: column;
      align-items: center;

      font-weight: var(--weight-bold);

      text-align: center;

      text-align: center;
    }

      align-items: center;
      justify-content: center;
      width: 72px;

      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 4px solid #f59e0b;
      border-radius: var(--radius-xl);
      box-shadow: 0 4px 0 #d97706;
    }

    .symbol-placeholder {
      font-size: var(--text-4xl);
      font-weight: var(--weight-bold);
      color: #92400e;
    }

    .symbol-display.correct {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      border-color: #22c55e;
      box-shadow: 0 4px 0 #16a34a;
    }

    .symbol-display.correct .symbol-placeholder {

      box-shadow: 0 4px 0 #dc2626;
