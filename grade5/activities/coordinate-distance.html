  <script>
    // Coordinate Distance Activity - Grade 5 Level 5
    const CoordinateDistance = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,
      gridSize: 10,
      cellSize: 30,
      padding: 40,

      // DOM elements
      promptCard: null,
      promptText: null,
      gridContainer: null,
      gridSvg: null,
      pointLabels: null,
      pointALabel: null,
      pointBLabel: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.promptCard = document.getElementById('prompt-card');
        this.promptText = document.getElementById('prompt-text');
        this.gridContainer = document.getElementById('grid-container');
        this.gridSvg = document.getElementById('coordinate-grid');
        this.pointLabels = document.getElementById('point-labels');
        this.pointALabel = document.getElementById('point-a-label');
        this.pointBLabel = document.getElementById('point-b-label');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.drawGrid();
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      drawGrid() {
        const svg = this.gridSvg;
        svg.innerHTML = '';

        const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');

        // Draw grid lines
        for (let i = 0; i <= this.gridSize; i++) {
          const x = this.padding + i * this.cellSize;
          const y = this.padding + (this.gridSize - i) * this.cellSize;

          // Vertical lines
          const vLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          vLine.setAttribute('x1', x);
          vLine.setAttribute('y1', this.padding);
          vLine.setAttribute('x2', x);
          vLine.setAttribute('y2', this.padding + this.gridSize * this.cellSize);
          vLine.setAttribute('stroke', i === 0 ? '#374151' : '#d1d5db');
          vLine.setAttribute('stroke-width', i === 0 ? '2' : '1');
          gridGroup.appendChild(vLine);

          // Horizontal lines
          const hLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          hLine.setAttribute('x1', this.padding);
          hLine.setAttribute('y1', y);
          hLine.setAttribute('x2', this.padding + this.gridSize * this.cellSize);
          hLine.setAttribute('y2', y);
          hLine.setAttribute('stroke', i === 0 ? '#374151' : '#d1d5db');
          hLine.setAttribute('stroke-width', i === 0 ? '2' : '1');
          gridGroup.appendChild(hLine);

          // X-axis labels
          const xLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          xLabel.setAttribute('x', this.padding + i * this.cellSize);
          xLabel.setAttribute('y', this.padding + this.gridSize * this.cellSize + 20);
          xLabel.setAttribute('text-anchor', 'middle');
          xLabel.setAttribute('fill', '#374151');
          xLabel.setAttribute('font-size', '12');
          xLabel.setAttribute('font-family', 'var(--font-secondary)');
          xLabel.textContent = i;
          gridGroup.appendChild(xLabel);

          // Y-axis labels
          const yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          yLabel.setAttribute('x', this.padding - 15);
          yLabel.setAttribute('y', this.padding + (this.gridSize - i) * this.cellSize + 4);
          yLabel.setAttribute('text-anchor', 'middle');
          yLabel.setAttribute('fill', '#374151');
          yLabel.setAttribute('font-size', '12');
          yLabel.setAttribute('font-family', 'var(--font-secondary)');
          yLabel.textContent = i;
          gridGroup.appendChild(yLabel);
        }

        // Add axis labels
        const xAxisLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        xAxisLabel.setAttribute('x', this.padding + this.gridSize * this.cellSize + 15);
        xAxisLabel.setAttribute('y', this.padding + this.gridSize * this.cellSize + 4);
        xAxisLabel.setAttribute('fill', '#3b82f6');
        xAxisLabel.setAttribute('font-size', '14');
        xAxisLabel.setAttribute('font-weight', 'bold');
        xAxisLabel.textContent = 'x';
        gridGroup.appendChild(xAxisLabel);

        const yAxisLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        yAxisLabel.setAttribute('x', this.padding - 4);
        yAxisLabel.setAttribute('y', this.padding - 10);
        yAxisLabel.setAttribute('fill', '#22c55e');
        yAxisLabel.setAttribute('font-size', '14');
        yAxisLabel.setAttribute('font-weight', 'bold');
        yAxisLabel.textContent = 'y';
        gridGroup.appendChild(yAxisLabel);

        svg.appendChild(gridGroup);

        // Create drawing group
        this.drawGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        this.drawGroup.setAttribute('id', 'draw-group');
        svg.appendChild(this.drawGroup);
      },

      generateQuestions() {
        const questions = [];

        while (questions.length < this.totalQuestions) {
          // Randomly choose horizontal or vertical
          const isHorizontal = Math.random() < 0.5;

          let p1, p2;
          if (isHorizontal) {
            // Same y, different x
            const y = Math.floor(Math.random() * (this.gridSize + 1));
            let x1 = Math.floor(Math.random() * (this.gridSize + 1));
            let x2 = Math.floor(Math.random() * (this.gridSize + 1));

            // Ensure x1 < x2 and they're different
            if (x1 === x2) x2 = (x2 + 3) % (this.gridSize + 1);
            if (x1 > x2) [x1, x2] = [x2, x1];

            // Ensure distance is at least 2
            if (x2 - x1 < 2) {
              x2 = Math.min(x1 + 2 + Math.floor(Math.random() * 5), this.gridSize);
            }

            p1 = { x: x1, y };
            p2 = { x: x2, y };
          } else {
            // Same x, different y
            const x = Math.floor(Math.random() * (this.gridSize + 1));
            let y1 = Math.floor(Math.random() * (this.gridSize + 1));
            let y2 = Math.floor(Math.random() * (this.gridSize + 1));

            // Ensure y1 < y2 and they're different
            if (y1 === y2) y2 = (y2 + 3) % (this.gridSize + 1);
            if (y1 > y2) [y1, y2] = [y2, y1];

            // Ensure distance is at least 2
            if (y2 - y1 < 2) {
              y2 = Math.min(y1 + 2 + Math.floor(Math.random() * 5), this.gridSize);
            }

            p1 = { x, y: y1 };
            p2 = { x, y: y2 };
          }

          const distance = isHorizontal ? Math.abs(p2.x - p1.x) : Math.abs(p2.y - p1.y);

          // Skip if distance is still less than 2 (edge case)
          if (distance < 2) continue;

          questions.push({
            p1,
            p2,
            distance,
            isHorizontal
          });
        }

        this.questions = shuffle(questions);
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');

        const q = this.questions[this.currentQuestion];
        if (!q) {
          this.showStats();
          return;
        }

        // Update prompt
        this.promptText.textContent = this.getTranslation(
          'section.activities.coordinate-distance.prompt',
          'How far apart are points A and B?'
        );

        // Draw points and segment
        this.drawSegment(q);

        // Update point labels
        this.pointALabel.textContent = `A (${q.p1.x}, ${q.p1.y})`;
        this.pointBLabel.textContent = `B (${q.p2.x}, ${q.p2.y})`;

        // Generate choices
        const choices = this.generateChoices(q.distance);
        this.renderChoices(choices, q.distance);

        this.renderProgress();
      },

      drawSegment(q) {
        const drawGroup = document.getElementById('draw-group');
        drawGroup.innerHTML = '';

        const x1 = this.padding + q.p1.x * this.cellSize;
        const y1 = this.padding + (this.gridSize - q.p1.y) * this.cellSize;
        const x2 = this.padding + q.p2.x * this.cellSize;
        const y2 = this.padding + (this.gridSize - q.p2.y) * this.cellSize;

        // Draw segment line
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#8b5cf6');
        line.setAttribute('stroke-width', '4');
        line.setAttribute('stroke-linecap', 'round');
        drawGroup.appendChild(line);

        // Draw point A
        const circleA = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circleA.setAttribute('cx', x1);
        circleA.setAttribute('cy', y1);
        circleA.setAttribute('r', '8');
        circleA.setAttribute('fill', '#3b82f6');
        circleA.setAttribute('stroke', 'white');
        circleA.setAttribute('stroke-width', '2');
        drawGroup.appendChild(circleA);

        // Draw point B
        const circleB = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circleB.setAttribute('cx', x2);
        circleB.setAttribute('cy', y2);
        circleB.setAttribute('r', '8');
        circleB.setAttribute('fill', '#22c55e');
        circleB.setAttribute('stroke', 'white');
        circleB.setAttribute('stroke-width', '2');
        drawGroup.appendChild(circleB);

        // Add point labels
        const labelA = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        labelA.setAttribute('x', x1);
        labelA.setAttribute('y', y1 - 14);
        labelA.setAttribute('text-anchor', 'middle');
        labelA.setAttribute('fill', '#1e40af');
        labelA.setAttribute('font-size', '12');
        labelA.setAttribute('font-weight', 'bold');
        labelA.textContent = 'A';
        drawGroup.appendChild(labelA);

        const labelB = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        labelB.setAttribute('x', x2);
        labelB.setAttribute('y', y2 - 14);
        labelB.setAttribute('text-anchor', 'middle');
        labelB.setAttribute('fill', '#166534');
        labelB.setAttribute('font-size', '12');
        labelB.setAttribute('font-weight', 'bold');
        labelB.textContent = 'B';
        drawGroup.appendChild(labelB);
      },

      generateChoices(correct) {
        const choices = [correct];
        const used = new Set([correct]);

        // Common mistakes: off by one
        const offByOne = [correct + 1, correct - 1];
        for (const val of offByOne) {
          if (val > 0 && val <= this.gridSize && !used.has(val)) {
            choices.push(val);
            used.add(val);
          }
        }

        // Other distractors
        const others = [correct + 2, correct - 2, correct * 2];
        for (const val of others) {
          if (choices.length >= 4) break;
          if (val > 0 && val <= this.gridSize && !used.has(val)) {
            choices.push(val);
            used.add(val);
          }
        }

        // Fill with random if needed
        while (choices.length < 4) {
          const val = Math.floor(Math.random() * this.gridSize) + 1;
          if (!used.has(val)) {
            choices.push(val);
            used.add(val);
          }
        }

        return shuffle(choices);
      },

      renderChoices(choices, correctAnswer) {
        this.choicesContainer.innerHTML = '';
        const unitsLabel = this.getTranslation('section.activities.coordinate-distance.units', 'units');

        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.setAttribute('tabindex', '0');
          btn.innerHTML = `<span class="choice-value">${choice}</span><span class="choice-unit">${unitsLabel}</span>`;

          btn.addEventListener('click', () => this.checkAnswer(choice, correctAnswer));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(choice, correctAnswer);
            }
          });

          this.choicesContainer.appendChild(btn);
        });
      },

      checkAnswer(selected, correct) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const buttons = this.choicesContainer.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        const isCorrect = selected === correct;

        buttons.forEach(btn => {
          const btnValue = parseInt(btn.querySelector('.choice-value').textContent);
          if (btnValue === correct) {
            btn.classList.add('correct');
          } else if (btnValue === selected) {
            btn.classList.add('incorrect');
          }
        });

        const q = this.questions[this.currentQuestion];
        const calculation = q.isHorizontal
          ? `|${q.p2.x} - ${q.p1.x}| = ${correct}`
          : `|${q.p2.y} - ${q.p1.y}| = ${correct}`;

        if (isCorrect) {
          this.correctCount++;
          this.feedback.textContent = this.getTranslation(
            'section.activities.coordinate-distance.correct',
            'Correct! The distance is {distance} units.'
          )
            .replace('{distance}', correct);
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          this.feedback.textContent = this.getTranslation(
            'section.activities.coordinate-distance.wrong',
            'The distance is {distance} units. ({calculation})'
          )
            .replace('{distance}', correct)
            .replace('{calculation}', calculation);
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.scheduleAdvance();
      },

      scheduleAdvance() {
        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();

        // Update prompt if showing a question
        if (!this.statsOverlay.classList.contains('show') && this.questions[this.currentQuestion]) {
          this.promptText.textContent = this.getTranslation(
            'section.activities.coordinate-distance.prompt',
            'How far apart are points A and B?'
          );

          // Update choice unit labels
          const unitsLabel = this.getTranslation('section.activities.coordinate-distance.units', 'units');
          this.choicesContainer.querySelectorAll('.choice-unit').forEach(el => {
            el.textContent = unitsLabel;
          });
        }
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.coordinate-distance.perfect',
            'Perfect! You mastered coordinate distance!'
          );
        } else if (percent >= 0.75) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.coordinate-distance.great',
            'Great distance finding!'
          );
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.coordinate-distance.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.coordinate-distance.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => CoordinateDistance.init());
      } else {
        CoordinateDistance.init();
      }
    });
