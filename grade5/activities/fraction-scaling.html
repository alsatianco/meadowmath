  <script>
    // Fraction Scaling Activity - Grade 5 Level 3
    const FractionScaling = {
      currentQuestion: 0,
      totalQuestions: 12,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,

      // DOM elements
      questionPrompt: null,
      visualModel: null,
      originalBar: null,
      originalFill: null,
      originalValue: null,
      originalLabel: null,
      resultBar: null,
      resultFill: null,
      resultValue: null,
      resultLabel: null,
      exprNumber: null,
      exprFraction: null,
      exprResult: null,
      expressionDisplay: null,
      choicesContainer: null,
      btnSmaller: null,
      btnSame: null,
      btnBigger: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.questionPrompt = document.getElementById('question-prompt');
        this.visualModel = document.getElementById('visual-model');
        this.originalBar = document.getElementById('original-bar');
        this.originalFill = document.getElementById('original-fill');
        this.originalValue = document.getElementById('original-value');
        this.originalLabel = document.getElementById('original-label');
        this.resultBar = document.getElementById('result-bar');
        this.resultFill = document.getElementById('result-fill');
        this.resultValue = document.getElementById('result-value');
        this.resultLabel = document.getElementById('result-label');
        this.exprNumber = document.getElementById('expr-number');
        this.exprFraction = document.getElementById('expr-fraction');
        this.exprResult = document.getElementById('expr-result');
        this.expressionDisplay = document.getElementById('expression-display');
        this.choicesContainer = document.getElementById('choices-container');
        this.btnSmaller = document.getElementById('btn-smaller');
        this.btnSame = document.getElementById('btn-same');
        this.btnBigger = document.getElementById('btn-bigger');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Event listeners
        this.btnSmaller.addEventListener('click', () => this.checkAnswer('smaller', this.btnSmaller));
        this.btnSame.addEventListener('click', () => this.checkAnswer('same', this.btnSame));
        this.btnBigger.addEventListener('click', () => this.checkAnswer('bigger', this.btnBigger));
        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      // Calculate GCD using Euclidean algorithm
      gcd(a, b) {
        return b === 0 ? a : this.gcd(b, a % b);
      },

      // Simplify a fraction
      simplify(num, den) {
        const g = this.gcd(num, den);
        return { num: num / g, den: den / g };
      },

      // Format fraction for HTML display
      formatFractionHTML(num, den) {
        if (den === 1) return `<span class="whole-number">${num}</span>`;
        return `<span class="frac-display"><span class="frac-num">${num}</span><span class="frac-bar"></span><span class="frac-den">${den}</span></span>`;
      },

      // Format fraction as text
      formatFractionText(num, den) {
        if (den === 1) return `${num}`;
        return `${num}/${den}`;
      },

      generateQuestions() {
        // Question types:
        // 1. Fraction < 1 (shrinks)
        // 2. Fraction = 1 (same)
        // 3. Fraction > 1 (grows)
        const questionTemplates = [
          // Fractions less than 1 (result is smaller)
          { num: 1, den: 2, answer: 'smaller' },  // 1/2
          { num: 1, den: 3, answer: 'smaller' },  // 1/3
          { num: 1, den: 4, answer: 'smaller' },  // 1/4
          { num: 2, den: 3, answer: 'smaller' },  // 2/3
          { num: 3, den: 4, answer: 'smaller' },  // 3/4
          { num: 2, den: 5, answer: 'smaller' },  // 2/5
          { num: 3, den: 5, answer: 'smaller' },  // 3/5
          { num: 4, den: 5, answer: 'smaller' },  // 4/5

          // Fractions equal to 1 (result is same)
          { num: 2, den: 2, answer: 'same' },     // 2/2 = 1
          { num: 3, den: 3, answer: 'same' },     // 3/3 = 1
          { num: 4, den: 4, answer: 'same' },     // 4/4 = 1
          { num: 5, den: 5, answer: 'same' },     // 5/5 = 1

          // Fractions greater than 1 (result is bigger)
          { num: 3, den: 2, answer: 'bigger' },   // 3/2
          { num: 4, den: 3, answer: 'bigger' },   // 4/3
          { num: 5, den: 4, answer: 'bigger' },   // 5/4
          { num: 5, den: 3, answer: 'bigger' },   // 5/3
          { num: 7, den: 4, answer: 'bigger' },   // 7/4
          { num: 5, den: 2, answer: 'bigger' },   // 5/2
          { num: 6, den: 5, answer: 'bigger' },   // 6/5
          { num: 8, den: 5, answer: 'bigger' },   // 8/5
        ];

        // Whole numbers to multiply with
        const wholeNumbers = [4, 6, 8, 10, 12, 15, 16, 18, 20, 24];

        // Shuffle templates and take 12
        const shuffledTemplates = shuffle(questionTemplates);

        this.questions = [];
        for (let i = 0; i < this.totalQuestions; i++) {
          const template = shuffledTemplates[i % shuffledTemplates.length];
          const wholeNum = wholeNumbers[Math.floor(Math.random() * wholeNumbers.length)];

          // Calculate the product
          const productNum = wholeNum * template.num;
          const productDen = template.den;
          const simplified = this.simplify(productNum, productDen);

          // Calculate actual decimal value for visual comparison
          const originalValue = wholeNum;
          const resultValue = (wholeNum * template.num) / template.den;

          this.questions.push({
            wholeNum,
            fracNum: template.num,
            fracDen: template.den,
            answer: template.answer,
            productNum: simplified.num,
            productDen: simplified.den,
            originalValue,
            resultValue
          });
        }

        // Shuffle questions to mix different types
        this.questions = shuffle(this.questions);
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');

        // Reset button states
        const allBtns = this.choicesContainer.querySelectorAll('.choice-btn');
        allBtns.forEach(btn => {
          btn.disabled = false;
          btn.classList.remove('correct', 'incorrect', 'selected');
        });

        // Hide result bar initially
        this.resultBar.classList.remove('revealed');
        this.resultFill.style.width = '0%';
        this.resultValue.textContent = '?';
        this.exprResult.textContent = '= ?';

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Build question prompt
        const promptText = this.buildPromptText(question);
        this.questionPrompt.innerHTML = promptText;

        // Update expression display
        this.exprNumber.textContent = question.wholeNum;
        this.exprFraction.innerHTML = this.formatFractionHTML(question.fracNum, question.fracDen);

        // Update visual model
        this.updateVisualModel(question);

        this.renderProgress();
      },

      buildPromptText(question) {
        // Build a sentence like "8 × 1/2 is ____ than 8"
        const fractionText = this.formatFractionText(question.fracNum, question.fracDen);
        const numberText = `<strong>${question.wholeNum}</strong>`;
        const fractionHTML = this.formatFractionHTML(question.fracNum, question.fracDen);

        const promptTemplate = this.getTranslation(
          'section.activities.fraction-scaling.prompt',
          '{number} × {fraction} will be ____?'
        );

        // Replace placeholders
        let prompt = promptTemplate
          .replace('{number}', numberText)
          .replace('{fraction}', `<span class="inline-fraction">${this.formatFractionHTML(question.fracNum, question.fracDen)}</span>`);

        return `<div class="prompt-text">${prompt}</div>`;
      },

      updateVisualModel(question) {
        // Set original bar to 100% (represents the whole number)
        this.originalFill.style.width = '100%';
        this.originalValue.textContent = question.wholeNum;

        // Update labels
        const originalText = this.getTranslation('section.activities.fraction-scaling.original', 'Original');
        const resultText = this.getTranslation('section.activities.fraction-scaling.result', 'Result');
        this.originalLabel.textContent = originalText + ': ' + question.wholeNum;
        this.resultLabel.textContent = resultText + ': ?';
      },

      revealResult(question) {
        // Calculate the width ratio based on fraction
        const ratio = question.fracNum / question.fracDen;
        const widthPercent = Math.min(ratio * 100, 150); // Cap at 150% for display

        // Animate the result bar
        this.resultBar.classList.add('revealed');
        this.resultFill.style.width = `${widthPercent}%`;

        // Show the result value
        let resultDisplay;
        if (question.productDen === 1) {
          resultDisplay = question.productNum;
        } else {
          // Show as mixed number if > 1
          const whole = Math.floor(question.productNum / question.productDen);
          const remainder = question.productNum % question.productDen;
          if (whole > 0 && remainder > 0) {
            resultDisplay = `${whole} ${remainder}/${question.productDen}`;
          } else if (whole > 0) {
            resultDisplay = whole;
          } else {
            resultDisplay = `${question.productNum}/${question.productDen}`;
          }
        }

        this.resultValue.textContent = resultDisplay;
        this.resultLabel.textContent = this.getTranslation('section.activities.fraction-scaling.result', 'Result') + ': ' + resultDisplay;

        // Update expression result
        this.exprResult.textContent = '= ' + resultDisplay;
      },

      checkAnswer(selected, btn) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const question = this.questions[this.currentQuestion];
        const isCorrect = selected === question.answer;

        // Disable all buttons
        const allBtns = this.choicesContainer.querySelectorAll('.choice-btn');
        allBtns.forEach(b => b.disabled = true);

        // Reveal the result visually
        this.revealResult(question);

        if (isCorrect) {
          this.correctCount++;
          btn.classList.add('correct');

          // Build feedback message
          const feedbackKey = this.getFeedbackKey(question);
          const feedbackText = this.getTranslation(
            `section.activities.fraction-scaling.${feedbackKey}`,
            this.getDefaultFeedback(question)
          );

          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btn.classList.add('incorrect');

          // Highlight correct answer
          const correctBtn = this.choicesContainer.querySelector(`[data-value="${question.answer}"]`);
          if (correctBtn) {
            correctBtn.classList.add('correct');
          }

          // Build wrong feedback message
          const wrongKey = this.getWrongFeedbackKey(question);
          const wrongText = this.getTranslation(
            `section.activities.fraction-scaling.${wrongKey}`,
            this.getDefaultWrongFeedback(question)
          );

          this.feedback.textContent = wrongText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.scheduleAdvance();
      },

      getFeedbackKey(question) {
        if (question.answer === 'smaller') return 'correctSmaller';
        if (question.answer === 'same') return 'correctSame';
        return 'correctBigger';
      },

      getDefaultFeedback(question) {
        const fractionText = this.formatFractionText(question.fracNum, question.fracDen);
        if (question.answer === 'smaller') {
          return `Correct! ${fractionText} < 1, so the product is smaller.`;
        } else if (question.answer === 'same') {
          return `Correct! ${fractionText} = 1, so the product is the same.`;
        } else {
          return `Correct! ${fractionText} > 1, so the product is bigger.`;
        }
      },

      getWrongFeedbackKey(question) {
        if (question.answer === 'smaller') return 'wrongSmaller';
        if (question.answer === 'same') return 'wrongSame';
        return 'wrongBigger';
      },

      getDefaultWrongFeedback(question) {
        const fractionText = this.formatFractionText(question.fracNum, question.fracDen);
        if (question.answer === 'smaller') {
          return `${fractionText} < 1 makes the product smaller.`;
        } else if (question.answer === 'same') {
          return `${fractionText} = 1 keeps the product the same.`;
        } else {
          return `${fractionText} > 1 makes the product bigger.`;
        }
      },

      scheduleAdvance() {
        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);

        this.renderProgress();
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();

        // Update button labels
        const smallerText = this.getTranslation('section.activities.fraction-scaling.smaller', 'Smaller');
        const sameText = this.getTranslation('section.activities.fraction-scaling.same', 'Same');
        const biggerText = this.getTranslation('section.activities.fraction-scaling.bigger', 'Bigger');

        this.btnSmaller.querySelector('.choice-text').textContent = smallerText;
        this.btnSame.querySelector('.choice-text').textContent = sameText;
        this.btnBigger.querySelector('.choice-text').textContent = biggerText;

        // Update current question if not answered
        if (!this.isAnswered && this.questions[this.currentQuestion]) {
          const question = this.questions[this.currentQuestion];
          this.questionPrompt.innerHTML = this.buildPromptText(question);
          this.updateVisualModel(question);
        }
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-scaling.perfect',
            'Perfect! You mastered fraction scaling!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-scaling.great',
            'Great work with fraction scaling!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-scaling.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-scaling.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      FractionScaling.init();
    });
