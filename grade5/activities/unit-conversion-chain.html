  <script>
    // Unit Conversion Chain Activity - Grade 5 Level 4
    const UnitConversionChain = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,

      // Conversion data
      conversionSystems: {
        metric_length: {
          name: 'Length (Metric)',
          units: ['km', 'm', 'cm', 'mm'],
          factors: [1000, 100, 10], // km→m, m→cm, cm→mm
          icon: '📏'
        },
        metric_mass: {
          name: 'Mass (Metric)',
          units: ['kg', 'g', 'mg'],
          factors: [1000, 1000], // kg→g, g→mg
          icon: '⚖️'
        },
        metric_capacity: {
          name: 'Capacity (Metric)',
          units: ['L', 'mL'],
          factors: [1000], // L→mL
          icon: '🧪'
        },
        us_length: {
          name: 'Length (US)',
          units: ['mi', 'yd', 'ft', 'in'],
          factors: [1760, 3, 12], // mi→yd, yd→ft, ft→in
          icon: '📐'
        },
        us_weight: {
          name: 'Weight (US)',
          units: ['lb', 'oz'],
          factors: [16], // lb→oz
          icon: '🏋️'
        },
        time: {
          name: 'Time',
          units: ['hr', 'min', 'sec'],
          factors: [60, 60], // hr→min, min→sec
          icon: '⏱️'
        }
      },

      // DOM elements
      conversionContainer: null,
      sourceValue: null,
      sourceUnit: null,
      targetValue: null,
      targetUnit: null,
      factorDisplay: null,
      factorHint: null,
      referenceCard: null,
      referenceContent: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.conversionContainer = document.getElementById('conversion-container');
        this.sourceValue = document.getElementById('source-value');
        this.sourceUnit = document.getElementById('source-unit');
        this.targetValue = document.getElementById('target-value');
        this.targetUnit = document.getElementById('target-unit');
        this.factorDisplay = document.getElementById('factor-display');
        this.factorHint = document.getElementById('factor-hint');
        this.referenceCard = document.getElementById('reference-card');
        this.referenceContent = document.getElementById('reference-content');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      generateQuestions() {
        const templates = [];

        // Metric length conversions
        templates.push(
          { system: 'metric_length', fromIdx: 0, toIdx: 1, value: 2 },     // km → m
          { system: 'metric_length', fromIdx: 0, toIdx: 1, value: 3.5 },   // km → m
          { system: 'metric_length', fromIdx: 1, toIdx: 2, value: 4 },     // m → cm
          { system: 'metric_length', fromIdx: 1, toIdx: 2, value: 2.5 },   // m → cm
          { system: 'metric_length', fromIdx: 2, toIdx: 3, value: 15 },    // cm → mm
          { system: 'metric_length', fromIdx: 1, toIdx: 0, value: 5000 },  // m → km
          { system: 'metric_length', fromIdx: 2, toIdx: 1, value: 300 },   // cm → m
        );

        // Metric mass conversions
        templates.push(
          { system: 'metric_mass', fromIdx: 0, toIdx: 1, value: 3 },       // kg → g
          { system: 'metric_mass', fromIdx: 0, toIdx: 1, value: 1.5 },     // kg → g
          { system: 'metric_mass', fromIdx: 1, toIdx: 0, value: 2500 },    // g → kg
        );

        // Metric capacity
        templates.push(
          { system: 'metric_capacity', fromIdx: 0, toIdx: 1, value: 2 },   // L → mL
          { system: 'metric_capacity', fromIdx: 0, toIdx: 1, value: 0.5 }, // L → mL
          { system: 'metric_capacity', fromIdx: 1, toIdx: 0, value: 750 }, // mL → L
        );

        // US length
        templates.push(
          { system: 'us_length', fromIdx: 2, toIdx: 3, value: 3 },         // ft → in
          { system: 'us_length', fromIdx: 2, toIdx: 3, value: 5 },         // ft → in
          { system: 'us_length', fromIdx: 3, toIdx: 2, value: 24 },        // in → ft
        );

        // US weight
        templates.push(
          { system: 'us_weight', fromIdx: 0, toIdx: 1, value: 2 },         // lb → oz
          { system: 'us_weight', fromIdx: 0, toIdx: 1, value: 3 },         // lb → oz
          { system: 'us_weight', fromIdx: 1, toIdx: 0, value: 32 },        // oz → lb
        );

        // Time
        templates.push(
          { system: 'time', fromIdx: 0, toIdx: 1, value: 2 },              // hr → min
          { system: 'time', fromIdx: 0, toIdx: 1, value: 1.5 },            // hr → min
          { system: 'time', fromIdx: 1, toIdx: 2, value: 3 },              // min → sec
          { system: 'time', fromIdx: 1, toIdx: 0, value: 120 },            // min → hr
        );

        // Shuffle and pick questions
        const shuffled = shuffle(templates);
        this.questions = [];

        for (let i = 0; i < this.totalQuestions; i++) {
          const template = shuffled[i % shuffled.length];
          const systemData = this.conversionSystems[template.system];

          const fromUnit = systemData.units[template.fromIdx];
          const toUnit = systemData.units[template.toIdx];

          // Calculate answer
          let answer;
          let factor;
          let operation;

          if (template.fromIdx < template.toIdx) {
            // Converting to smaller unit (multiply)
            factor = 1;
            for (let j = template.fromIdx; j < template.toIdx; j++) {
              factor *= systemData.factors[j];
            }
            answer = template.value * factor;
            operation = 'multiply';
          } else {
            // Converting to larger unit (divide)
            factor = 1;
            for (let j = template.toIdx; j < template.fromIdx; j++) {
              factor *= systemData.factors[j];
            }
            answer = template.value / factor;
            operation = 'divide';
          }

          this.questions.push({
            system: template.system,
            systemData: systemData,
            fromValue: template.value,
            fromUnit: fromUnit,
            toUnit: toUnit,
            answer: answer,
            factor: factor,
            operation: operation,
            fromIdx: template.fromIdx,
            toIdx: template.toIdx
          });
        }
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      formatNumber(num) {
        // Avoid floating point errors
        if (Number.isInteger(num)) {
          return num.toLocaleString();
        }
        // Round to reasonable decimal places
        const rounded = Math.round(num * 1000) / 1000;
        return rounded.toLocaleString(undefined, { maximumFractionDigits: 3 });
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');
        this.targetValue.textContent = '?';
        this.targetValue.classList.remove('revealed');

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Update display
        this.sourceValue.textContent = this.formatNumber(question.fromValue);
        this.sourceUnit.textContent = question.fromUnit;
        this.targetUnit.textContent = question.toUnit;

        // Show conversion hint
        this.buildFactorHint(question);

        // Show reference
        this.buildReference(question);

        // Generate choices
        this.generateChoices(question);

        this.renderProgress();
      },

      buildFactorHint(question) {
        const operatorText = question.operation === 'multiply' ? '×' : '÷';
        const hintText = this.getTranslation(
          `section.activities.unit-conversion-chain.${question.operation}`,
          question.operation === 'multiply' ? 'Multiply' : 'Divide'
        );

        this.factorHint.innerHTML = `
          <span class="hint-operation">${hintText} ${operatorText} ${question.factor.toLocaleString()}</span>
        `;
      },

      buildReference(question) {
        const systemData = question.systemData;
        let referenceHTML = `<div class="reference-icon-badge">${systemData.icon}</div>`;

        // Build reference chain
        const refParts = [];
        for (let i = 0; i < systemData.units.length - 1; i++) {
          refParts.push(`1 ${systemData.units[i]} = ${systemData.factors[i].toLocaleString()} ${systemData.units[i + 1]}`);
        }

        referenceHTML += `<div class="reference-facts">${refParts.join('<br>')}</div>`;
        this.referenceContent.innerHTML = referenceHTML;
      },

      generateChoices(question) {
        this.choicesContainer.innerHTML = '';

        const correctAnswer = question.answer;
        const choices = new Set();
        choices.add(correctAnswer);

        // Generate distractors
        // Wrong operation
        if (question.operation === 'multiply') {
          choices.add(question.fromValue / question.factor);
        } else {
          choices.add(question.fromValue * question.factor);
        }

        // Off by factor of 10
        choices.add(correctAnswer * 10);
        choices.add(correctAnswer / 10);

        // Slightly wrong
        choices.add(correctAnswer + question.factor);
        choices.add(correctAnswer - question.factor);

        // Filter out negatives and zeros, and convert to array
        let choicesArray = Array.from(choices)
          .filter(c => c > 0 && c !== correctAnswer)
          .slice(0, 3);

        // Add correct answer
        choicesArray.push(correctAnswer);

        // Shuffle
        choicesArray = shuffle(choicesArray);

        // Create buttons
        choicesArray.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = `<span class="choice-value">${this.formatNumber(choice)}</span> <span class="choice-unit">${question.toUnit}</span>`;
          btn.dataset.value = choice;
          btn.addEventListener('click', () => this.checkAnswer(choice, btn, question));
          this.choicesContainer.appendChild(btn);
        });
      },

      checkAnswer(selected, btn, question) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const isCorrect = Math.abs(selected - question.answer) < 0.0001;

        // Disable all buttons
        const allBtns = this.choicesContainer.querySelectorAll('.choice-btn');
        allBtns.forEach(b => b.disabled = true);

        // Reveal answer
        this.targetValue.textContent = this.formatNumber(question.answer);
        this.targetValue.classList.add('revealed');

        if (isCorrect) {
          this.correctCount++;
          btn.classList.add('correct');

          const operatorText = question.operation === 'multiply' ? '×' : '÷';
          const feedbackText = this.getTranslation(
            'section.activities.unit-conversion-chain.correct',
            'Correct!'
          ) + ` ${this.formatNumber(question.fromValue)} ${operatorText} ${question.factor.toLocaleString()} = ${this.formatNumber(question.answer)}`;

          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btn.classList.add('incorrect');

          // Highlight correct answer
          allBtns.forEach(b => {
            const val = parseFloat(b.dataset.value);
            if (Math.abs(val - question.answer) < 0.0001) {
              b.classList.add('correct');
            }
          });

          const feedbackText = this.getTranslation(
            'section.activities.unit-conversion-chain.wrong',
            'The answer is {answer}.'
          ).replace('{answer}', `${this.formatNumber(question.answer)} ${question.toUnit}`);

          this.feedback.textContent = feedbackText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.scheduleAdvance();
      },

      scheduleAdvance() {
        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);

        this.renderProgress();
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();

        // Refresh current question if not answered
        if (!this.isAnswered && this.questions[this.currentQuestion]) {
          const question = this.questions[this.currentQuestion];
          this.buildFactorHint(question);
        }
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.unit-conversion-chain.perfect',
            'Perfect! You mastered unit conversions!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.unit-conversion-chain.great',
            'Great work with unit conversions!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.unit-conversion-chain.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.unit-conversion-chain.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => UnitConversionChain.init());
      } else {
        UnitConversionChain.init();
      }
    });
  </script>
  <style>
    /* Unit Conversion Chain specific styles */

    .conversion-container {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: var(--radius-xl);
      border: 3px solid #3b82f6;
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      text-align: center;
    }

    .conversion-prompt {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: #1e40af;
      margin-bottom: var(--space-3);
    }

    .conversion-chain {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      flex-wrap: wrap;
      margin-bottom: var(--space-3);
    }

    .chain-value {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      min-width: 120px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .chain-value.source {
      border: 3px solid #3b82f6;
