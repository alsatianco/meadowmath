  <script>
    // Fraction Word Problems with Bar Model Activity - Grade 5 Level 3
    const FractionWordProblems = {
      currentQuestion: 0,
      totalQuestions: 6,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,

      // DOM elements
      storyContainer: null,
      storyIcon: null,
      storyText: null,
      barModelContainer: null,
      barModel: null,
      barLegend: null,
      equationContainer: null,
      equationDisplay: null,
      questionSection: null,
      questionText: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.storyContainer = document.getElementById('story-container');
        this.storyIcon = document.getElementById('story-icon');
        this.storyText = document.getElementById('story-text');
        this.barModelContainer = document.getElementById('bar-model-container');
        this.barModel = document.getElementById('bar-model');
        this.barLegend = document.getElementById('bar-legend');
        this.equationContainer = document.getElementById('equation-container');
        this.equationDisplay = document.getElementById('equation-display');
        this.questionSection = document.getElementById('question-section');
        this.questionText = document.getElementById('question-text');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      // Calculate GCD using Euclidean algorithm
      gcd(a, b) {
        return b === 0 ? a : this.gcd(b, a % b);
      },

      // Simplify a fraction
      simplify(num, den) {
        if (num === 0) return { num: 0, den: 1 };
        const g = this.gcd(Math.abs(num), Math.abs(den));
        return { num: num / g, den: den / g };
      },

      // Add two fractions
      addFractions(n1, d1, n2, d2) {
        const newNum = n1 * d2 + n2 * d1;
        const newDen = d1 * d2;
        return this.simplify(newNum, newDen);
      },

      // Subtract two fractions
      subtractFractions(n1, d1, n2, d2) {
        const newNum = n1 * d2 - n2 * d1;
        const newDen = d1 * d2;
        return this.simplify(newNum, newDen);
      },

      // Format fraction for HTML display
      formatFractionHTML(num, den) {
        if (den === 1) return `<span class="whole-number">${num}</span>`;

        // Handle mixed numbers
        const whole = Math.floor(Math.abs(num) / den);
        const remainder = Math.abs(num) % den;
        const sign = num < 0 ? '-' : '';

        if (whole > 0 && remainder > 0) {
          return `<span class="mixed-number">${sign}${whole}<span class="frac-display"><span class="frac-num">${remainder}</span><span class="frac-bar"></span><span class="frac-den">${den}</span></span></span>`;
        } else if (whole > 0) {
          return `<span class="whole-number">${sign}${whole}</span>`;
        }

        return `<span class="frac-display"><span class="frac-num">${sign}${Math.abs(num)}</span><span class="frac-bar"></span><span class="frac-den">${den}</span></span>`;
      },

      // Format fraction as text
      formatFractionText(num, den) {
        if (den === 1) return `${num}`;

        const whole = Math.floor(Math.abs(num) / den);
        const remainder = Math.abs(num) % den;
        const sign = num < 0 ? '-' : '';

        if (whole > 0 && remainder > 0) {
          return `${sign}${whole} ${remainder}/${den}`;
        } else if (whole > 0) {
          return `${sign}${whole}`;
        }

        return `${sign}${Math.abs(num)}/${den}`;
      },

      generateQuestions() {
        // Word problem templates for fraction operations
        const problemTemplates = [
          // Addition problems
          {
            type: 'add',
            icon: '🍕',
            storyKey: 'storyPizza',
            storyDefault: 'Maya ate {frac1} of a pizza. Then she ate {frac2} more of the pizza.',
            questionKey: 'questionTotal',
            questionDefault: 'How much pizza did Maya eat in all?',
            frac1: { num: 3, den: 8 },
            frac2: { num: 1, den: 4 }
          },
          {
            type: 'add',
            icon: '📏',
            storyKey: 'storyRibbon',
            storyDefault: 'Mina used {frac1} of a meter of ribbon for one bow. Then she used {frac2} of a meter for another bow.',
            questionKey: 'questionTotal',
            questionDefault: 'How much ribbon did Mina use in all?',
            frac1: { num: 1, den: 3 },
            frac2: { num: 1, den: 6 }
          },
          {
            type: 'add',
            icon: '🥛',
            storyKey: 'storyMilk',
            storyDefault: 'Dani drank {frac1} of a carton of milk in the morning. Later, she drank {frac2} more of the carton.',
            questionKey: 'questionTotal',
            questionDefault: 'What fraction of the carton did Dani drink altogether?',
            frac1: { num: 2, den: 5 },
            frac2: { num: 1, den: 5 }
          },
          // Subtraction problems
          {
            type: 'subtract',
            icon: '🍰',
            storyKey: 'storyCake',
            storyDefault: 'A bakery had {frac1} of a cake. They sold {frac2} of the whole cake.',
            questionKey: 'questionRemain',
            questionDefault: 'How much cake is left?',
            frac1: { num: 5, den: 6 },
            frac2: { num: 1, den: 3 }
          },
          {
            type: 'subtract',
            icon: '📐',
            storyKey: 'storyPaper',
            storyDefault: 'Jamal had {frac1} of a sheet of paper. He used {frac2} of a sheet for his project.',
            questionKey: 'questionRemain',
            questionDefault: 'How much paper does Jamal have left?',
            frac1: { num: 3, den: 4 },
            frac2: { num: 1, den: 2 }
          },
          {
            type: 'subtract',
            icon: '🚗',
            storyKey: 'storyDistance',
            storyDefault: 'The trip is {frac1} of the way done. The family already drove {frac2} of the trip yesterday.',
            questionKey: 'questionToday',
            questionDefault: 'How much of the trip did they drive today?',
            frac1: { num: 7, den: 8 },
            frac2: { num: 1, den: 2 }
          },
          // More addition problems
          {
            type: 'add',
            icon: '🎨',
            storyKey: 'storyPaint',
            storyDefault: 'For her art project, Lily used {frac1} of a jar of blue paint and {frac2} of a jar of green paint.',
            questionKey: 'questionTotal',
            questionDefault: 'How much paint did Lily use in total?',
            frac1: { num: 1, den: 4 },
            frac2: { num: 3, den: 8 }
          },
          {
            type: 'add',
            icon: '📚',
            storyKey: 'storyBook',
            storyDefault: 'Sam read {frac1} of a book on Monday and {frac2} of the book on Tuesday.',
            questionKey: 'questionTotal',
            questionDefault: 'What fraction of the book has Sam read?',
            frac1: { num: 2, den: 5 },
            frac2: { num: 3, den: 10 }
          },
          // More subtraction problems
          {
            type: 'subtract',
            icon: '💧',
            storyKey: 'storyWater',
            storyDefault: 'A water bottle was {frac1} full. Someone drank {frac2} of the bottle.',
            questionKey: 'questionRemain',
            questionDefault: 'How much water is left?',
            frac1: { num: 4, den: 5 },
            frac2: { num: 2, den: 5 }
          },
          {
            type: 'subtract',
            icon: '🧵',
            storyKey: 'storyYarn',
            storyDefault: 'Emma had {frac1} of a ball of yarn. She used {frac2} of the ball for a scarf.',
            questionKey: 'questionRemain',
            questionDefault: 'How much yarn is left?',
            frac1: { num: 5, den: 6 },
            frac2: { num: 1, den: 2 }
          }
        ];

        // Shuffle and take 6
        const shuffled = shuffle(problemTemplates);
        this.questions = [];

        for (let i = 0; i < this.totalQuestions; i++) {
          const template = shuffled[i % shuffled.length];
          const frac1 = template.frac1;
          const frac2 = template.frac2;

          let answer;
          if (template.type === 'add') {
            answer = this.addFractions(frac1.num, frac1.den, frac2.num, frac2.den);
          } else {
            answer = this.subtractFractions(frac1.num, frac1.den, frac2.num, frac2.den);
          }

          this.questions.push({
            type: template.type,
            icon: template.icon,
            storyKey: template.storyKey,
            storyDefault: template.storyDefault,
            questionKey: template.questionKey,
            questionDefault: template.questionDefault,
            frac1: frac1,
            frac2: frac2,
            answerNum: answer.num,
            answerDen: answer.den
          });
        }
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Build story display
        this.buildStoryDisplay(question);

        // Build bar model
        this.buildBarModel(question);

        // Build equation display
        this.buildEquationDisplay(question);

        // Build question and choices
        this.buildQuestionAndChoices(question);

        this.renderProgress();
      },

      buildStoryDisplay(question) {
        this.storyIcon.textContent = question.icon;

        // Get story text with placeholders replaced
        let storyText = this.getTranslation(
          `section.activities.fraction-word-problems-bar-model.${question.storyKey}`,
          question.storyDefault
        );

        // Replace placeholders with formatted fractions
        storyText = storyText
          .replace('{frac1}', `<span class="story-fraction">${this.formatFractionHTML(question.frac1.num, question.frac1.den)}</span>`)
          .replace('{frac2}', `<span class="story-fraction">${this.formatFractionHTML(question.frac2.num, question.frac2.den)}</span>`);

        this.storyText.innerHTML = storyText;
      },

      buildBarModel(question) {
        this.barModel.innerHTML = '';
        this.barLegend.innerHTML = '';

        // Find common denominator for visualization
        const commonDen = question.frac1.den * question.frac2.den / this.gcd(question.frac1.den, question.frac2.den);
        const frac1Parts = question.frac1.num * (commonDen / question.frac1.den);
        const frac2Parts = question.frac2.num * (commonDen / question.frac2.den);

        // Create the bar segments
        const totalParts = commonDen;

        // Create bar wrapper
        const barWrapper = document.createElement('div');
        barWrapper.className = 'bar-wrapper';

        for (let i = 0; i < totalParts; i++) {
          const segment = document.createElement('div');
          segment.className = 'bar-segment';

          if (question.type === 'add') {
            // For addition: first fraction + second fraction
            if (i < frac1Parts) {
              segment.classList.add('part-1');
            } else if (i < frac1Parts + frac2Parts) {
              segment.classList.add('part-2');
            } else {
              segment.classList.add('part-empty');
            }
          } else {
            // For subtraction: show original, then what's removed
            if (i < frac1Parts) {
              if (i < frac2Parts) {
                segment.classList.add('part-removed');
              } else {
                segment.classList.add('part-remaining');
              }
            } else {
              segment.classList.add('part-empty');
            }
          }

          barWrapper.appendChild(segment);
        }

        this.barModel.appendChild(barWrapper);

        // Create legend
        if (question.type === 'add') {
          this.barLegend.innerHTML = `
            <div class="legend-item">
              <div class="legend-color part-1"></div>
              <span class="legend-text">${this.formatFractionHTML(question.frac1.num, question.frac1.den)}</span>
            </div>
            <div class="legend-item">
              <div class="legend-color part-2"></div>
              <span class="legend-text">${this.formatFractionHTML(question.frac2.num, question.frac2.den)}</span>
            </div>
          `;
        } else {
          this.barLegend.innerHTML = `
            <div class="legend-item">
              <div class="legend-color part-remaining"></div>
              <span class="legend-text">${this.getTranslation('section.activities.fraction-word-problems-bar-model.remaining', 'Remaining')}</span>
            </div>
            <div class="legend-item">
              <div class="legend-color part-removed"></div>
              <span class="legend-text">${this.formatFractionHTML(question.frac2.num, question.frac2.den)} ${this.getTranslation('section.activities.fraction-word-problems-bar-model.used', 'used')}</span>
            </div>
          `;
        }
      },

      buildEquationDisplay(question) {
        const operatorSymbol = question.type === 'add' ? '+' : '−';

        this.equationDisplay.innerHTML = `
          <span class="eq-part">${this.formatFractionHTML(question.frac1.num, question.frac1.den)}</span>
          <span class="eq-operator">${operatorSymbol}</span>
          <span class="eq-part">${this.formatFractionHTML(question.frac2.num, question.frac2.den)}</span>
          <span class="eq-equals">=</span>
          <span class="eq-answer" id="eq-answer">?</span>
        `;
      },

      buildQuestionAndChoices(question) {
        // Get question text
        const questionTextContent = this.getTranslation(
          `section.activities.fraction-word-problems-bar-model.${question.questionKey}`,
          question.questionDefault
        );

        this.questionText.innerHTML = `<span class="question-prompt">${questionTextContent}</span>`;

        // Generate choices
        this.choicesContainer.innerHTML = '';

        const correctAnswer = this.formatFractionText(question.answerNum, question.answerDen);
        const choices = new Set();
        choices.add(correctAnswer);

        // Generate distractors
        // Wrong common denominator
        const wrongDenom1 = this.simplify(question.frac1.num + question.frac2.num, Math.max(question.frac1.den, question.frac2.den));
        choices.add(this.formatFractionText(wrongDenom1.num, wrongDenom1.den));

        // Slightly off answer
        const offAnswer = question.type === 'add'
          ? this.simplify(question.answerNum + 1, question.answerDen)
          : this.simplify(Math.abs(question.answerNum - 1), question.answerDen);
        choices.add(this.formatFractionText(offAnswer.num, offAnswer.den));

        // Different denominator mistake
        const wrongDenom2 = this.simplify(question.frac1.num + question.frac2.num, question.frac1.den + question.frac2.den);
        if (wrongDenom2.num > 0) {
          choices.add(this.formatFractionText(wrongDenom2.num, wrongDenom2.den));
        }

        // Add more if needed
        const extraDistractors = [
          this.formatFractionText(question.frac1.num, question.frac1.den),
          this.formatFractionText(question.frac2.num, question.frac2.den),
          this.formatFractionText(question.answerNum + 2, question.answerDen)
        ];

        for (const d of extraDistractors) {
          if (choices.size < 4) choices.add(d);
        }

        // Convert to array and shuffle
        let choicesArray = Array.from(choices).slice(0, 4);
        choicesArray = shuffle(choicesArray);

        // Create buttons
        choicesArray.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';

          // Parse and format the choice for display
          if (choice.includes('/')) {
            const parts = choice.split(' ');
            if (parts.length === 2) {
              // Mixed number
              const whole = parseInt(parts[0]);
              const [num, den] = parts[1].split('/').map(Number);
              btn.innerHTML = this.formatFractionHTML(whole * den + num, den);
            } else {
              const [num, den] = choice.split('/').map(Number);
              btn.innerHTML = this.formatFractionHTML(num, den);
            }
          } else {
            btn.textContent = choice;
          }

          btn.dataset.value = choice;
          btn.addEventListener('click', () => this.checkAnswer(choice, btn, question));
          this.choicesContainer.appendChild(btn);
        });
      },

      checkAnswer(selected, btn, question) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const correctAnswer = this.formatFractionText(question.answerNum, question.answerDen);
        const isCorrect = selected === correctAnswer;

        // Disable all buttons
        const allBtns = this.choicesContainer.querySelectorAll('.choice-btn');
        allBtns.forEach(b => b.disabled = true);

        // Update equation answer
        const eqAnswer = document.getElementById('eq-answer');
        eqAnswer.innerHTML = this.formatFractionHTML(question.answerNum, question.answerDen);
        eqAnswer.classList.add('revealed');

        if (isCorrect) {
          this.correctCount++;
          btn.classList.add('correct');

          const feedbackText = this.getTranslation(
            'section.activities.fraction-word-problems-bar-model.correct',
            'Correct!'
          ) + ` ${this.formatFractionText(question.frac1.num, question.frac1.den)} ${question.type === 'add' ? '+' : '−'} ${this.formatFractionText(question.frac2.num, question.frac2.den)} = ${correctAnswer}`;

          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btn.classList.add('incorrect');

          // Highlight correct answer
          allBtns.forEach(b => {
            if (b.dataset.value === correctAnswer) {
              b.classList.add('correct');
            }
          });

          const feedbackText = this.getTranslation(
            'section.activities.fraction-word-problems-bar-model.wrong',
            'The answer is {answer}.'
          ).replace('{answer}', correctAnswer);

          this.feedback.textContent = feedbackText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.scheduleAdvance();
      },

      scheduleAdvance() {
        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);

        this.renderProgress();
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();

        // Refresh current question if not answered
        if (!this.isAnswered && this.questions[this.currentQuestion]) {
          const question = this.questions[this.currentQuestion];
          this.buildStoryDisplay(question);
          this.buildBarModel(question);
          this.buildEquationDisplay(question);
          this.buildQuestionAndChoices(question);
        }
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-word-problems-bar-model.perfect',
            'Perfect! You mastered fraction word problems!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-word-problems-bar-model.great',
            'Great work with fraction word problems!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-word-problems-bar-model.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.fraction-word-problems-bar-model.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      FractionWordProblems.init();
    });
