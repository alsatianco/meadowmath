  <script>
    // Decimal Patterns Activity - Grade 5 Level 1
    const DecimalPatterns = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      currentBlankIndex: 0,
      filledBlanks: [],
      isAnswered: false,
      advanceTimeout: null,

      // DOM elements
      ruleText: null,
      sequenceContainer: null,
      fillPrompt: null,
      choicesContainer: null,
      btnReset: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.ruleText = document.getElementById('rule-text');
        this.sequenceContainer = document.getElementById('sequence-container');
        this.fillPrompt = document.getElementById('fill-prompt');
        this.choicesContainer = document.getElementById('choices-container');
        this.btnReset = document.getElementById('btn-reset');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      // Format number to avoid floating point issues
      formatNumber(num) {
        // Round to avoid floating point errors
        const rounded = Math.round(num * 10000) / 10000;
        // Remove unnecessary trailing zeros but keep at least one decimal for decimals
        if (Number.isInteger(rounded)) {
          return rounded.toString();
        }
        return parseFloat(rounded.toFixed(4)).toString();
      },

      generateQuestions() {
        // Define pattern configurations
        const patternConfigs = [
          // ×10 patterns
          { start: 0.04, operation: '×10', func: x => x * 10, length: 5 },
          { start: 0.3, operation: '×10', func: x => x * 10, length: 5 },
          { start: 0.007, operation: '×10', func: x => x * 10, length: 5 },

          // ÷10 patterns
          { start: 400, operation: '÷10', func: x => x / 10, length: 5 },
          { start: 50, operation: '÷10', func: x => x / 10, length: 5 },
          { start: 7.5, operation: '÷10', func: x => x / 10, length: 5 },

          // +0.1 patterns
          { start: 0.3, operation: '+0.1', func: x => x + 0.1, length: 5 },
          { start: 1.7, operation: '+0.1', func: x => x + 0.1, length: 5 },

          // +0.25 patterns
          { start: 0.5, operation: '+0.25', func: x => x + 0.25, length: 5 },
          { start: 1.25, operation: '+0.25', func: x => x + 0.25, length: 5 },

          // +0.05 patterns
          { start: 0.1, operation: '+0.05', func: x => x + 0.05, length: 5 },
          { start: 0.85, operation: '+0.05', func: x => x + 0.05, length: 5 },

          // -0.1 patterns (subtraction for variety)
          { start: 2.5, operation: '-0.1', func: x => x - 0.1, length: 5 },

          // ×100 pattern
          { start: 0.003, operation: '×100', func: x => x * 100, length: 4 },
        ];

        this.questions = [];

        shuffle(patternConfigs).slice(0, this.totalQuestions).forEach(config => {
          // Generate full sequence
          const sequence = [config.start];
          for (let i = 1; i < config.length; i++) {
            sequence.push(config.func(sequence[i - 1]));
          }

          // Decide which positions are blanks (last 2 positions)
          const blankPositions = [config.length - 2, config.length - 1];

          this.questions.push({
            start: config.start,
            operation: config.operation,
            sequence: sequence,
            blankPositions: blankPositions
          });
        });
      },

      generateChoices(correctValue, operation) {
        const choices = new Set();
        choices.add(correctValue);

        // Generate distractors based on operation type
        if (operation.includes('×10')) {
          choices.add(correctValue / 10);
          choices.add(correctValue * 10);
          choices.add(correctValue + 10);
        } else if (operation.includes('÷10')) {
          choices.add(correctValue * 10);
          choices.add(correctValue / 10);
          choices.add(correctValue - 1);
        } else if (operation.includes('×100')) {
          choices.add(correctValue / 10);
          choices.add(correctValue * 10);
          choices.add(correctValue / 100);
        } else if (operation.includes('+')) {
          const increment = parseFloat(operation.replace('+', ''));
          choices.add(correctValue + increment);
          choices.add(correctValue - increment);
          choices.add(correctValue + increment * 2);
        } else if (operation.includes('-')) {
          const decrement = parseFloat(operation.replace('-', ''));
          choices.add(correctValue + decrement);
          choices.add(correctValue - decrement);
          choices.add(correctValue - decrement * 2);
        }

        // Add some random nearby values if we don't have enough
        while (choices.size < 4) {
          const variation = correctValue * (0.5 + Math.random());
          choices.add(Math.round(variation * 100) / 100);
        }

        // Convert to array and filter valid, unique values
        let choiceArr = Array.from(choices)
          .filter(c => c >= 0 && isFinite(c))
          .map(c => Math.round(c * 10000) / 10000);

        // Remove duplicates based on formatted string
        const seen = new Set();
        choiceArr = choiceArr.filter(c => {
          const formatted = this.formatNumber(c);
          if (seen.has(formatted)) return false;
          seen.add(formatted);
          return true;
        });

        // Ensure we have exactly 4 choices
        choiceArr = choiceArr.slice(0, 4);

        // If we don't have 4, add some more
        while (choiceArr.length < 4) {
          const newVal = correctValue + (choiceArr.length * 0.5);
          if (!choiceArr.some(c => this.formatNumber(c) === this.formatNumber(newVal))) {
            choiceArr.push(newVal);
          }
        }

        return shuffle(choiceArr.map(c => ({
          value: c,
          isCorrect: this.formatNumber(c) === this.formatNumber(correctValue)
        })));
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      getRuleText(question) {
        const startAtText = this.getTranslation('section.activities.decimal-patterns.startAt', 'Start at');
        const eachStepText = this.getTranslation('section.activities.decimal-patterns.eachStep', 'Each step');
        return `${startAtText} ${this.formatNumber(question.start)}. ${eachStepText}: ${question.operation}`;
      },

      renderSequence(question) {
        this.sequenceContainer.innerHTML = '';

        question.sequence.forEach((value, index) => {
          const item = document.createElement('div');
          const isBlank = question.blankPositions.includes(index);
          const isCurrentBlank = isBlank && index === question.blankPositions[this.currentBlankIndex];
          const isFilled = this.filledBlanks[index] !== undefined;

          item.className = 'sequence-item';
          if (isBlank && !isFilled) {
            item.classList.add('blank');
            if (isCurrentBlank) {
              item.classList.add('current');
            }
          }
          if (isFilled) {
            item.classList.add('filled');
          }

          if (isBlank && !isFilled) {
            item.textContent = '?';
            item.setAttribute('aria-label', `Blank ${index + 1}`);
          } else if (isFilled) {
            item.textContent = this.formatNumber(this.filledBlanks[index]);
          } else {
            item.textContent = this.formatNumber(value);
          }

          // Add arrow between items (except after last)
          if (index < question.sequence.length - 1) {
            const arrow = document.createElement('span');
            arrow.className = 'sequence-arrow';
            arrow.textContent = '→';
            arrow.setAttribute('aria-hidden', 'true');
            this.sequenceContainer.appendChild(item);
            this.sequenceContainer.appendChild(arrow);
          } else {
            this.sequenceContainer.appendChild(item);
          }
        });
      },

      renderChoices(choices) {
        this.choicesContainer.innerHTML = '';

        choices.forEach((choice) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn pattern-choice';
          btn.type = 'button';
          btn.textContent = this.formatNumber(choice.value);
          btn.dataset.value = choice.value;
          btn.dataset.correct = choice.isCorrect;
          btn.setAttribute('aria-pressed', 'false');
          btn.addEventListener('click', () => this.selectAnswer(btn, choice));

          this.choicesContainer.appendChild(btn);
        });
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.currentBlankIndex = 0;
        this.filledBlanks = [];
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Update rule display
        this.ruleText.textContent = this.getRuleText(question);

        // Render sequence
        this.renderSequence(question);

        // Show choices for first blank
        this.showChoicesForCurrentBlank();

        this.renderProgress();
      },

      showChoicesForCurrentBlank() {
        const question = this.questions[this.currentQuestion];
        const blankPosition = question.blankPositions[this.currentBlankIndex];
        const correctValue = question.sequence[blankPosition];

        const choices = this.generateChoices(correctValue, question.operation);
        this.renderChoices(choices);

        // Update sequence to highlight current blank
        this.renderSequence(question);
      },

      selectAnswer(btn, choice) {
        if (this.isAnswered) return;

        const question = this.questions[this.currentQuestion];
        const blankPosition = question.blankPositions[this.currentBlankIndex];
        const correctValue = question.sequence[blankPosition];
        const isCorrect = choice.isCorrect;

        // Disable all buttons
        const buttons = this.choicesContainer.querySelectorAll('.pattern-choice');
        buttons.forEach(b => {
          b.disabled = true;
          b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
        });

        btn.classList.add('selected');

        if (isCorrect) {
          btn.classList.add('correct');
          this.filledBlanks[blankPosition] = choice.value;
          this.renderSequence(question);

          // Check if all blanks are filled
          if (this.currentBlankIndex >= question.blankPositions.length - 1) {
            // All blanks filled correctly
            this.isAnswered = true;
            this.correctCount++;

            this.feedback.textContent = this.getTranslation(
              'section.activities.decimal-patterns.correct',
              'Correct! Pattern complete!'
            );
            this.feedback.classList.remove('error');
            this.feedback.classList.add('show');

            this.advanceTimeout = setTimeout(() => {
              this.advanceTimeout = null;
              if (this.currentQuestion < this.totalQuestions - 1) {
                this.nextQuestion();
              } else {
                this.showStats();
              }
            }, this.autoAdvanceDelay);
          } else {
            // Move to next blank
            this.feedback.textContent = this.getTranslation(
              'section.activities.decimal-patterns.correctNext',
              'Correct! Now fill the next blank.'
            );
            this.feedback.classList.remove('error');
            this.feedback.classList.add('show');

            setTimeout(() => {
              this.currentBlankIndex++;
              this.feedback.classList.remove('show');
              this.showChoicesForCurrentBlank();
            }, 800);
          }
        } else {
          this.isAnswered = true;
          this.incorrectCount++;
          btn.classList.add('incorrect');

          // Show correct answer
          buttons.forEach(b => {
            if (b.dataset.correct === 'true') {
              b.classList.add('correct');
            }
          });

          const template = this.getTranslation(
            'section.activities.decimal-patterns.wrong',
            'The next number is {answer}.'
          );
          this.feedback.textContent = template.replace('{answer}', this.formatNumber(correctValue));
          this.feedback.classList.add('error');
          this.feedback.classList.add('show');

          this.advanceTimeout = setTimeout(() => {
            this.advanceTimeout = null;
            if (this.currentQuestion < this.totalQuestions - 1) {
              this.nextQuestion();
            } else {
              this.showStats();
            }
          }, this.autoAdvanceDelay);
        }

        this.renderProgress();
      },

      updateTranslations() {
        const question = this.questions[this.currentQuestion];
        if (question) {
          this.ruleText.textContent = this.getRuleText(question);
        }

        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }

        this.updateProgressLabel();
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-patterns.perfect',
            'Perfect pattern work!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-patterns.great',
            'Great pattern work!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-patterns.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-patterns.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => DecimalPatterns.init());
      } else {
        DecimalPatterns.init();
      }
    });
  </script>
