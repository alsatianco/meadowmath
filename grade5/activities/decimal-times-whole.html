  <script>
    // Decimal × Whole Activity - Grade 5 Level 2
    const DecimalTimesWhole = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,

      // DOM elements
      decimalNumber: null,
      wholeNumber: null,
      answerBlank: null,
      modelContainer: null,
      modelLabel: null,
      groupsDisplay: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.decimalNumber = document.getElementById('decimal-number');
        this.wholeNumber = document.getElementById('whole-number');
        this.answerBlank = document.getElementById('answer-blank');
        this.modelContainer = document.getElementById('model-container');
        this.modelLabel = document.getElementById('model-label');
        this.groupsDisplay = document.getElementById('groups-display');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      generateQuestions() {
        // Mix of problems: tenths and hundredths, small whole multipliers (2-6)
        const problemSet = [
          // Tenths problems (easier visualization)
          { decimal: 0.3, whole: 2 },    // 0.6
          { decimal: 0.4, whole: 3 },    // 1.2
          { decimal: 0.5, whole: 4 },    // 2.0
          { decimal: 0.6, whole: 3 },    // 1.8
          { decimal: 0.7, whole: 2 },    // 1.4
          { decimal: 1.2, whole: 3 },    // 3.6
          { decimal: 1.5, whole: 4 },    // 6.0
          { decimal: 2.3, whole: 2 },    // 4.6
          // Hundredths problems
          { decimal: 0.24, whole: 3 },   // 0.72
          { decimal: 0.35, whole: 2 },   // 0.70
          { decimal: 0.15, whole: 4 },   // 0.60
          { decimal: 0.45, whole: 2 },   // 0.90
          { decimal: 1.25, whole: 4 },   // 5.00
          { decimal: 2.35, whole: 3 },   // 7.05
          { decimal: 0.08, whole: 5 },   // 0.40
          { decimal: 0.12, whole: 6 },   // 0.72
        ];

        // Shuffle and pick 10
        const shuffled = shuffle(problemSet);
        this.questions = shuffled.slice(0, this.totalQuestions).map(p => {
          const answer = this.formatDecimal(p.decimal * p.whole);
          return {
            decimal: p.decimal,
            whole: p.whole,
            answer: answer
          };
        });
      },

      formatDecimal(num) {
        // Format to avoid floating point errors
        const rounded = Math.round(num * 100) / 100;
        if (rounded === Math.floor(rounded)) {
          return rounded.toString();
        }
        if (rounded * 10 === Math.floor(rounded * 10)) {
          return rounded.toFixed(1);
        }
        return rounded.toFixed(2);
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');
        this.answerBlank.textContent = '?';
        this.answerBlank.classList.remove('revealed');

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Update problem display
        this.decimalNumber.textContent = question.decimal;
        this.wholeNumber.textContent = question.whole;

        // Update model label
        const groupsText = this.getTranslation('section.activities.decimal-times-whole.groups', 'groups of');
        this.modelLabel.innerHTML = `<span class="group-count">${question.whole}</span> ${groupsText} <span class="group-value">${question.decimal}</span>`;

        // Generate visual groups
        this.renderGroups(question.decimal, question.whole);

        // Generate answer choices
        this.renderChoices(question.answer, question.decimal, question.whole);

        this.renderProgress();
      },

      renderGroups(decimal, whole) {
        this.groupsDisplay.innerHTML = '';

        // Determine how to display: use small grid for hundredths (< 1 with 2+ decimal places), bars for tenths
        const decimalStr = this.formatDecimal(decimal);
        const decimalParts = decimalStr.split('.');
        const isHundredths = decimal < 1 && decimalParts.length > 1 && decimalParts[1].length >= 2;

        for (let g = 0; g < whole; g++) {
          const group = document.createElement('div');
          group.className = 'visual-group';
          group.setAttribute('aria-label', `Group ${g + 1}: ${decimal}`);

          if (isHundredths && decimal < 1) {
            // Use mini 10x10 grid for hundredths
            const squaresToShade = Math.round(decimal * 100);
            group.innerHTML = this.createMiniGrid(squaresToShade);
          } else {
            // Use bar representation for tenths or larger
            group.innerHTML = this.createBarModel(decimal);
          }

          // Add label
          const label = document.createElement('span');
          label.className = 'group-label';
          label.textContent = decimal;
          group.appendChild(label);

          this.groupsDisplay.appendChild(group);

          // Animate entry
          group.style.animationDelay = `${g * 100}ms`;
          group.classList.add('animate-in');
        }
      },

      createMiniGrid(squaresToShade) {
        let html = '<div class="mini-grid">';
        for (let i = 0; i < 100; i++) {
          const shaded = i < squaresToShade ? 'shaded' : '';
          html += `<div class="mini-square ${shaded}"></div>`;
        }
        html += '</div>';
        return html;
      },

      createBarModel(decimal) {
        // Show as filled bar(s)
        const wholes = Math.floor(decimal);
        const tenths = Math.round((decimal - wholes) * 10);

        let html = '<div class="bar-model">';

        // Whole bars
        for (let w = 0; w < wholes; w++) {
          html += '<div class="whole-bar"></div>';
        }

        // Tenths bar
        if (tenths > 0) {
          html += '<div class="tenths-bar">';
          for (let t = 0; t < 10; t++) {
            const filled = t < tenths ? 'filled' : '';
            html += `<div class="tenth-segment ${filled}"></div>`;
          }
          html += '</div>';
        }

        html += '</div>';
        return html;
      },

      renderChoices(correctAnswer, decimal, whole) {
        this.choicesContainer.innerHTML = '';

        // Generate distractors
        const distractors = this.generateDistractors(correctAnswer, decimal, whole);
        const allChoices = shuffle([correctAnswer, ...distractors]);

        const choiceLetters = ['A', 'B', 'C', 'D'];
        allChoices.forEach((choice, index) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = choice;
          btn.setAttribute('aria-label', `Choice ${choiceLetters[index]}: ${choice}`);
          btn.addEventListener('click', () => this.checkAnswer(choice, btn));
          this.choicesContainer.appendChild(btn);
        });
      },

      generateDistractors(correct, decimal, whole) {
        const correctNum = parseFloat(correct);
        const distractors = new Set();

        // Common errors:
        // 1. Forgot to multiply (just decimal)
        distractors.add(this.formatDecimal(decimal));

        // 2. Added instead of multiplied
        distractors.add(this.formatDecimal(decimal + whole));

        // 3. Off by one group
        if (whole > 1) {
          distractors.add(this.formatDecimal(decimal * (whole - 1)));
        }
        distractors.add(this.formatDecimal(decimal * (whole + 1)));

        // 4. Decimal place error (common: treating 0.24 × 3 = 7.2 instead of 0.72)
        if (decimal < 1) {
          distractors.add(this.formatDecimal(correctNum * 10));
        }

        // 5. Small variations
        distractors.add(this.formatDecimal(correctNum + 0.1));
        distractors.add(this.formatDecimal(correctNum - 0.1));
        distractors.add(this.formatDecimal(correctNum + 0.2));
        distractors.add(this.formatDecimal(correctNum - 0.2));

        // 6. Double the answer (common error)
        distractors.add(this.formatDecimal(correctNum * 2));

        // 7. Half the answer
        distractors.add(this.formatDecimal(correctNum / 2));

        // Remove correct answer and invalid values
        distractors.delete(correct);
        distractors.delete(this.formatDecimal(0));

        // Filter to only positive, sensible values
        const validDistractors = [...distractors].filter(d => {
          const num = parseFloat(d);
          return num > 0 && num !== correctNum && num < correctNum * 4;
        });

        // Shuffle and take 3 unique distractors
        const shuffled = shuffle(validDistractors);
        let result = shuffled.slice(0, 3);

        // Ensure we always have exactly 3 distractors
        // If not enough, generate more by adding small offsets
        let offset = 0.3;
        while (result.length < 3) {
          const candidate = this.formatDecimal(correctNum + offset);
          if (!result.includes(candidate) && candidate !== correct && parseFloat(candidate) > 0) {
            result.push(candidate);
          }
          offset += 0.1;
          if (offset > 5) break; // Safety limit
        }

        return result;
      },

      checkAnswer(selected, btn) {
        if (this.isAnswered) return;

        const question = this.questions[this.currentQuestion];
        const isCorrect = selected === question.answer;

        this.isAnswered = true;

        // Disable all buttons
        const allBtns = this.choicesContainer.querySelectorAll('.choice-btn');
        allBtns.forEach(b => b.disabled = true);

        // Show answer in blank
        this.answerBlank.textContent = question.answer;
        this.answerBlank.classList.add('revealed');

        if (isCorrect) {
          this.correctCount++;
          btn.classList.add('correct');

          const feedbackText = this.getTranslation(
            'section.activities.decimal-times-whole.correct',
            'Correct!'
          ).replace('{decimal}', question.decimal)
           .replace('{whole}', question.whole)
           .replace('{answer}', question.answer);
          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btn.classList.add('incorrect');

          // Highlight correct answer
          allBtns.forEach(b => {
            if (b.textContent === question.answer) {
              b.classList.add('correct');
            }
          });

          const feedbackText = this.getTranslation(
            'section.activities.decimal-times-whole.wrong',
            '{decimal} × {whole} = {answer}'
          ).replace('{decimal}', question.decimal)
           .replace('{whole}', question.whole)
           .replace('{answer}', question.answer);
          this.feedback.textContent = feedbackText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);

        this.renderProgress();
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();
        // Update model label if showing
        if (!this.isAnswered && this.questions[this.currentQuestion]) {
          const question = this.questions[this.currentQuestion];
          const groupsText = this.getTranslation('section.activities.decimal-times-whole.groups', 'groups of');
          this.modelLabel.innerHTML = `<span class="group-count">${question.whole}</span> ${groupsText} <span class="group-value">${question.decimal}</span>`;
        }
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');
        this.answerBlank.textContent = '?';
        this.answerBlank.classList.remove('revealed');

        const question = this.questions[this.currentQuestion];
        if (question) {
          this.renderChoices(question.answer, question.decimal, question.whole);
        }
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-times-whole.perfect',
            'Perfect decimal multiplication!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-times-whole.great',
            'Great multiplication work!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-times-whole.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-times-whole.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      DecimalTimesWhole.init();
    });
  </script>

    .answer-blank {

      text-align: center;

      border: 3px dashed #d1d5db;

    }

    .answer-blank.revealed {
      color: #059669;
      border-color: #10b981;
      border-style: solid;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    }

    /* Model Container */
    .model-container {
      background: white;
      border-radius: var(--radius-xl);
      border: 2px solid #e5e7eb;
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .model-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-medium);
      color: #374151;
      text-align: center;
      margin-bottom: var(--space-3);
    }

    .model-label .group-count {
      color: #7c3aed;
      font-weight: var(--weight-bold);
      font-size: var(--text-xl);
    }

    .model-label .group-value {
      color: #059669;
      font-weight: var(--weight-bold);
      font-size: var(--text-xl);
    }

    /* Groups Display */
    .groups-display {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: center;
      align-items: flex-end;
    }

    .visual-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-radius: var(--radius-lg);
      border: 2px solid #86efac;
      opacity: 0;
      transform: scale(0.8);
      animation: groupAppear 0.3s ease forwards;
    }

    @keyframes groupAppear {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .group-label {
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      color: #059669;
    }

    /* Mini Grid for Hundredths */
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 1px;
      width: 60px;
      height: 60px;
      background: #e5e7eb;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .mini-square {
      background: white;
      transition: background 0.2s ease;
    }

    .mini-square.shaded {
      background: #22c55e;
    }

    /* Bar Model for Tenths */
    .bar-model {
      display: flex;
      gap: var(--space-1);
      align-items: flex-end;
    }

    .whole-bar {
      width: 40px;
      height: 60px;
      background: linear-gradient(180deg, #22c55e, #16a34a);
      border-radius: var(--radius-sm);
      border: 2px solid #15803d;
    }

    .tenths-bar {
      display: flex;
      width: 40px;
      height: 60px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 2px solid #15803d;
      flex-direction: column;
    }

    .tenth-segment {
      flex: 1;
      background: white;
      border-bottom: 1px solid #d1d5db;
    }

    .tenth-segment.filled {
      background: linear-gradient(180deg, #22c55e, #16a34a);
    }

    .tenth-segment:last-child {
      border-bottom: none;
    }

    /* Answer Choices */
    .choices-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      max-width: 400px;
      margin: 0 auto var(--space-4);
    }

    .choice-btn {
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: #1e3a5f;
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border: 3px solid #0ea5e9;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 60px;
    }

    .choice-btn:hover:not(:disabled) {
      transform: scale(1.02);
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border-color: #0284c7;
    }

    .choice-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: 0.8;
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-color: #22c55e;
      color: #166534;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fef2f2, #fecaca);
      border-color: #ef4444;
      color: #991b1b;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    .activity-area {
      padding-bottom: calc(var(--space-8) + 60px);
      position: relative;
    }

    .feedback-message {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0;
      max-width: 90%;
    }

    /* Responsive */
    @media (max-width: 767px) {
      .problem-display {
        padding: var(--space-3);
        gap: var(--space-2);
      }

      .decimal-number,
      .whole-number {
        font-size: var(--text-3xl);
      }

      .multiply-sign,
      .equals-sign {
        font-size: var(--text-2xl);
      }

      .answer-blank {
        font-size: var(--text-3xl);
        min-width: 60px;
        padding: var(--space-1) var(--space-2);
      }

      .model-container {
        padding: var(--space-3);
      }

      .groups-display {
        gap: var(--space-2);
      }

      .visual-group {
        padding: var(--space-1);
      }

      .mini-grid {
        width: 50px;
        height: 50px;
      }

      .whole-bar,
      .tenths-bar {
        width: 30px;
        height: 50px;
      }

      .choices-container {
        gap: var(--space-2);
        max-width: 320px;
      }

      .choice-btn {
        padding: var(--space-2) var(--space-3);
        font-size: var(--text-lg);
        min-height: 50px;
      }
    }

    @media (max-width: 480px) {
      .problem-display {
        padding: var(--space-2);
      }

      .decimal-number,
      .whole-number {
        font-size: var(--text-2xl);
      }

      .multiply-sign,
      .equals-sign {
        font-size: var(--text-xl);
      }

      .answer-blank {
        font-size: var(--text-2xl);
        min-width: 50px;
      }

      .model-label {
        font-size: var(--text-base);
      }

      .model-label .group-count,
      .model-label .group-value {
        font-size: var(--text-lg);
      }

      .mini-grid {
        width: 40px;
        height: 40px;
      }

      .whole-bar,
      .tenths-bar {
        width: 25px;
        height: 40px;
      }

      .choice-btn {
        font-size: var(--text-base);
        min-height: 44px;
        padding: var(--space-2);
      }
    }

    @media (max-width: 360px) {
      .choices-container {
        grid-template-columns: 1fr;
        max-width: 200px;
      }

      .mini-grid {
        width: 35px;
        height: 35px;
      }

      .whole-bar,
      .tenths-bar {
        width: 20px;
        height: 35px;
      }

      .groups-display {
        gap: var(--space-1);
      }

      .visual-group {
        padding: 2px;
      }

      .group-label {
        font-size: var(--text-xs);
      }
    }
