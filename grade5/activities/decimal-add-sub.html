  <script>
    // Decimal Add/Sub Align Activity - Grade 5 Level 2
    const DecimalAddSub = {
      currentQuestion: 0,
      totalQuestions: 12,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,

      // DOM elements
      firstNumber: null,
      secondNumber: null,
      operator: null,
      answerInput: null,
      alignHint: null,
      btnCheck: null,
      btnReset: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.firstNumber = document.getElementById('first-number');
        this.secondNumber = document.getElementById('second-number');
        this.operator = document.getElementById('operator');
        this.answerInput = document.getElementById('answer-input');
        this.alignHint = document.getElementById('align-hint');
        this.btnCheck = document.getElementById('btn-check');
        this.btnReset = document.getElementById('btn-reset');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnCheck.addEventListener('click', () => this.checkAnswer());
        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        // Allow Enter key to submit
        this.answerInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !this.isAnswered) {
            this.checkAnswer();
          }
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      generateQuestions() {
        // Mix of addition and subtraction with decimals to hundredths
        const problems = [];

        // Addition problems (mix of difficulties)
        const additionProblems = [
          { a: 12.45, b: 3.78 },     // Simple, no borrowing
          { a: 8.56, b: 4.27 },      // Tenths carry
          { a: 15.39, b: 7.84 },     // Multiple carries
          { a: 6.05, b: 2.98 },      // Zero in tenths
          { a: 24.67, b: 8.45 },     // Larger numbers
          { a: 3.9, b: 2.15 },       // Different decimal places
          { a: 45.08, b: 6.95 },     // Tenths carry into ones
          { a: 0.87, b: 0.56 },      // Less than 1
        ];

        // Subtraction problems (mix of difficulties)
        const subtractionProblems = [
          { a: 15.83, b: 4.21 },     // Simple, no borrowing
          { a: 12.45, b: 3.78 },     // Borrowing in hundredths
          { a: 20.05, b: 8.67 },     // Borrowing across zero
          { a: 9.34, b: 5.89 },      // Multiple borrowing
          { a: 18.2, b: 6.75 },      // Different decimal places
          { a: 7.06, b: 2.58 },      // Borrowing from ones
          { a: 25.4, b: 9.85 },      // Mixed complexity
          { a: 14.03, b: 7.56 },     // Borrowing across zero
        ];

        // Shuffle and pick problems
        const shuffledAdd = shuffle(additionProblems);
        const shuffledSub = shuffle(subtractionProblems);

        // Interleave addition and subtraction
        for (let i = 0; i < 6; i++) {
          if (shuffledAdd[i]) {
            problems.push({
              a: shuffledAdd[i].a,
              b: shuffledAdd[i].b,
              operation: '+',
              answer: this.formatDecimal(shuffledAdd[i].a + shuffledAdd[i].b)
            });
          }
          if (shuffledSub[i]) {
            problems.push({
              a: shuffledSub[i].a,
              b: shuffledSub[i].b,
              operation: '-',
              answer: this.formatDecimal(shuffledSub[i].a - shuffledSub[i].b)
            });
          }
        }

        this.questions = shuffle(problems).slice(0, this.totalQuestions);
      },

      formatDecimal(num) {
        // Format to avoid floating point errors and ensure proper decimal display
        // Round to 2 decimal places
        const rounded = Math.round(num * 100) / 100;
        // Format to show minimal necessary decimal places
        if (rounded === Math.floor(rounded)) {
          // Whole number result
          return rounded.toString();
        }
        // Check if one decimal place is enough
        if (rounded * 10 === Math.floor(rounded * 10)) {
          return rounded.toFixed(1);
        }
        return rounded.toFixed(2);
      },

      formatDisplayNumber(num) {
        // Format number for display, padding to hundredths if needed
        const str = num.toString();
        if (!str.includes('.')) {
          return str + '.00';
        }
        const parts = str.split('.');
        if (parts[1].length === 1) {
          return str + '0';
        }
        return str;
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');
        this.answerInput.value = '';
        this.answerInput.disabled = false;
        this.btnCheck.disabled = false;
        this.alignHint.classList.remove('hidden');

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Update display
        this.firstNumber.textContent = this.formatDisplayNumber(question.a);
        this.operator.textContent = question.operation;
        this.secondNumber.textContent = this.formatDisplayNumber(question.b);

        // Focus on input
        setTimeout(() => {
          this.answerInput.focus();
        }, 100);

        this.renderProgress();
      },

      normalizeAnswer(input) {
        // Normalize user input for comparison
        let str = input.trim();

        // Handle empty input
        if (!str) return null;

        // Remove leading zeros except before decimal
        str = str.replace(/^0+(\d)/, '$1');

        // Parse as float and format consistently
        const num = parseFloat(str);
        if (isNaN(num)) return null;

        return this.formatDecimal(num);
      },

      checkAnswer() {
        if (this.isAnswered) return;

        const userAnswer = this.normalizeAnswer(this.answerInput.value);
        const question = this.questions[this.currentQuestion];
        const correctAnswer = question.answer;

        if (userAnswer === null) {
          // Empty or invalid input
          this.answerInput.classList.add('shake');
          setTimeout(() => this.answerInput.classList.remove('shake'), 500);
          return;
        }

        this.isAnswered = true;
        this.answerInput.disabled = true;
        this.btnCheck.disabled = true;
        this.alignHint.classList.add('hidden');

        const isCorrect = userAnswer === correctAnswer;

        if (isCorrect) {
          this.correctCount++;
          this.answerInput.classList.add('correct');

          const feedbackText = this.getTranslation(
            'section.activities.decimal-add-sub.correct',
            'Correct!'
          );
          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          this.answerInput.classList.add('incorrect');

          const feedbackText = this.getTranslation(
            'section.activities.decimal-add-sub.wrong',
            'The answer is {answer}.'
          ).replace('{answer}', correctAnswer);
          this.feedback.textContent = feedbackText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          this.answerInput.classList.remove('correct', 'incorrect');
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);

        this.renderProgress();
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.answerInput.disabled = false;
        this.btnCheck.disabled = false;
        this.answerInput.value = '';
        this.answerInput.classList.remove('correct', 'incorrect');
        this.feedback.classList.remove('show', 'error');
        this.alignHint.classList.remove('hidden');
        this.answerInput.focus();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-add-sub.perfect',
            'Perfect decimal work!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-add-sub.great',
            'Great decimal work!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-add-sub.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.decimal-add-sub.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => DecimalAddSub.init());
      } else {
        DecimalAddSub.init();
      }
    });
  </script>
