  <script>
    // Volume with Unit Cubes Activity - Grade 5 Level 4
    const VolumeUnitCubes = {
      currentQuestion: 0,
      totalQuestions: 8,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 2000,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,
      showingLayers: false,
      currentDimensions: null,

      // Possible prism dimensions [length, width, height]
      dimensionSets: [
        [2, 2, 2],
        [3, 2, 2],
        [2, 3, 2],
        [3, 3, 2],
        [4, 2, 2],
        [3, 2, 3],
        [4, 3, 2],
        [3, 3, 3],
        [4, 2, 3],
        [5, 2, 2],
        [4, 3, 3],
        [5, 3, 2],
        [4, 4, 2],
        [5, 2, 3],
        [4, 4, 3]
      ],

      // DOM elements
      questionContainer: null,
      questionText: null,
      prismContainer: null,
      prismView: null,
      dimensionLabels: null,
      btnLayer: null,
      layerInfo: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.questionContainer = document.getElementById('question-container');
        this.questionText = document.getElementById('question-text');
        this.prismContainer = document.getElementById('prism-container');
        this.prismView = document.getElementById('prism-view');
        this.dimensionLabels = document.getElementById('dimension-labels');
        this.btnLayer = document.getElementById('btn-layer');
        this.layerInfo = document.getElementById('layer-info');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnLayer.addEventListener('click', () => this.toggleLayers());
        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      generateQuestions() {
        const shuffled = shuffle([...this.dimensionSets]);
        this.questions = shuffled.slice(0, this.totalQuestions);
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.showingLayers = false;
        this.feedback.classList.remove('show', 'error');
        this.dimensionLabels.innerHTML = '';
        this.layerInfo.innerHTML = '';
        this.btnLayer.disabled = false;
        this.updateLayerButtonText();

        const dimensions = this.questions[this.currentQuestion];
        if (!dimensions) {
          this.showStats();
          return;
        }

        this.currentDimensions = dimensions;
        const [length, width, height] = dimensions;
        const volume = length * width * height;

        // Build the 3D prism
        this.buildPrism(length, width, height);

        // Generate choices
        const choices = this.generateChoices(volume);
        this.renderChoices(choices, volume);

        this.renderProgress();
      },

      buildPrism(length, width, height) {
        this.prismView.innerHTML = '';
        this.prismView.className = 'prism-view';

        // Create isometric 3D view using CSS
        const cubeSize = this.calculateCubeSize(length, width, height);

        // Calculate center offset for proper positioning
        const totalWidth = (length + width) * cubeSize * 0.866;
        const totalHeight = (length + width) * cubeSize * 0.5 + height * cubeSize;
        const centerOffsetX = totalWidth / 2;

        // Build cubes layer by layer (back to front, bottom to top)
        for (let y = 0; y < height; y++) {
          for (let z = width - 1; z >= 0; z--) {
            for (let x = 0; x < length; x++) {
              const cube = this.createCube(x, y, z, cubeSize, y, centerOffsetX, width);
              this.prismView.appendChild(cube);
            }
          }
        }

        // Set container size
        this.prismView.style.width = `${totalWidth}px`;
        this.prismView.style.height = `${totalHeight}px`;
      },

      calculateCubeSize(length, width, height) {
        // Adjust cube size based on prism dimensions to fit container
        const maxDimension = Math.max(length + width, height);
        const containerWidth = Math.min(window.innerWidth - 100, 400);
        return Math.min(40, Math.floor(containerWidth / (maxDimension * 1.5)));
      },

      createCube(x, y, z, size, layer, centerOffsetX, width) {
        const cube = document.createElement('div');
        cube.className = 'cube';
        cube.dataset.layer = layer;

        // Isometric positioning - center the prism horizontally
        const isoX = (x - z) * size * 0.866;
        const isoY = (x + z) * size * 0.5 - y * size;

        // Offset to center: shift by half width and account for back-most z position
        const backOffset = (width - 1) * size * 0.866 / 2;

        cube.style.setProperty('--size', `${size}px`);
        cube.style.left = `${isoX + centerOffsetX + backOffset}px`;
        cube.style.bottom = `${isoY + 10}px`;

        // Create cube faces
        const top = document.createElement('div');
        top.className = 'cube-face cube-top';
        cube.appendChild(top);

        const left = document.createElement('div');
        left.className = 'cube-face cube-left';
        cube.appendChild(left);

        const right = document.createElement('div');
        right.className = 'cube-face cube-right';
        cube.appendChild(right);

        return cube;
      },

      toggleLayers() {
        this.showingLayers = !this.showingLayers;
        this.updateLayerButtonText();

        const cubes = this.prismView.querySelectorAll('.cube');
        const [length, width, height] = this.currentDimensions;
        const cubesPerLayer = length * width;

        if (this.showingLayers) {
          // Show layers with spacing and color coding
          cubes.forEach(cube => {
            const layer = parseInt(cube.dataset.layer);
            cube.classList.add('layer-view');
            cube.style.setProperty('--layer-offset', `${layer * 15}px`);
          });

          // Show layer info
          const layerLabel = this.getTranslation('section.activities.volume-unit-cubes.layerInfo', '{count} cubes per layer × {layers} layers');
          this.layerInfo.textContent = layerLabel
            .replace('{count}', cubesPerLayer)
            .replace('{layers}', height);
        } else {
          cubes.forEach(cube => {
            cube.classList.remove('layer-view');
            cube.style.removeProperty('--layer-offset');
          });
          this.layerInfo.textContent = '';
        }
      },

      updateLayerButtonText() {
        if (this.showingLayers) {
          this.btnLayer.textContent = this.getTranslation('section.activities.volume-unit-cubes.hideLayers', 'Hide Layers');
        } else {
          this.btnLayer.textContent = this.getTranslation('section.activities.volume-unit-cubes.showLayers', 'Show Layers');
        }
      },

      generateChoices(correct) {
        const choices = [correct];
        const used = new Set([correct]);

        // Add common mistakes as distractors
        const [length, width, height] = this.currentDimensions;

        // Common errors: miscounting one dimension, off by one layer
        const distractors = [
          length * width * (height - 1),
          length * width * (height + 1),
          (length - 1) * width * height,
          (length + 1) * width * height,
          length * (width - 1) * height,
          length * (width + 1) * height,
          length * width + height, // Adding instead of multiplying
          correct - length * width, // Missing a layer
          correct + length * width  // Extra layer
        ].filter(v => v > 0 && !used.has(v));

        for (const d of distractors) {
          if (choices.length >= 4) break;
          if (!used.has(d)) {
            choices.push(d);
            used.add(d);
          }
        }

        // Fill with nearby numbers if needed
        while (choices.length < 4) {
          const offset = Math.floor(Math.random() * 10) - 5;
          const val = correct + offset;
          if (val > 0 && !used.has(val)) {
            choices.push(val);
            used.add(val);
          }
        }

        return shuffle(choices);
      },

      renderChoices(choices, answer) {
        this.choicesContainer.innerHTML = '';

        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.setAttribute('tabindex', '0');

          const unitLabel = this.getTranslation('section.activities.volume-unit-cubes.cubicUnits', 'cubic units');
          btn.innerHTML = `<span class="choice-number">${choice}</span><span class="choice-unit">${unitLabel}</span>`;

          btn.addEventListener('click', () => this.checkAnswer(choice, answer));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(choice, answer);
            }
          });

          this.choicesContainer.appendChild(btn);
        });
      },

      checkAnswer(selected, correct) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        this.btnLayer.disabled = true;

        // Disable all buttons
        const buttons = this.choicesContainer.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        const isCorrect = selected === correct;

        // Highlight correct/incorrect
        buttons.forEach(btn => {
          const btnValue = parseInt(btn.querySelector('.choice-number').textContent);
          if (btnValue === correct) {
            btn.classList.add('correct');
          } else if (btnValue === selected) {
            btn.classList.add('incorrect');
          }
        });

        // Show dimension labels
        this.showDimensionLabels();

        if (isCorrect) {
          this.correctCount++;
          const feedbackText = this.getTranslation(
            'section.activities.volume-unit-cubes.correct',
            'Correct! The volume is {volume} cubic units.'
          ).replace('{volume}', correct);
          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          const [length, width, height] = this.currentDimensions;
          const feedbackText = this.getTranslation(
            'section.activities.volume-unit-cubes.wrong',
            'The answer is {volume}. ({l} × {w} × {h} = {volume})'
          )
            .replace('{volume}', correct)
            .replace('{volume}', correct)
            .replace('{l}', length)
            .replace('{w}', width)
            .replace('{h}', height);
          this.feedback.textContent = feedbackText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.scheduleAdvance();
      },

      showDimensionLabels() {
        const [length, width, height] = this.currentDimensions;
        const lengthLabel = this.getTranslation('section.activities.volume-unit-cubes.length', 'Length');
        const widthLabel = this.getTranslation('section.activities.volume-unit-cubes.width', 'Width');
        const heightLabel = this.getTranslation('section.activities.volume-unit-cubes.height', 'Height');

        this.dimensionLabels.innerHTML = `
          <div class="dimension-badge length">${lengthLabel}: ${length}</div>
          <div class="dimension-badge width">${widthLabel}: ${width}</div>
          <div class="dimension-badge height">${heightLabel}: ${height}</div>
        `;
      },

      scheduleAdvance() {
        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();
        this.updateLayerButtonText();
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.volume-unit-cubes.perfect',
            'Perfect! You mastered counting cubes!'
          );
        } else if (percent >= 0.75) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.volume-unit-cubes.great',
            'Great work counting cubes!'
          );
        } else if (percent >= 0.5) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.volume-unit-cubes.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.volume-unit-cubes.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => VolumeUnitCubes.init());
      } else {
        VolumeUnitCubes.init();
      }
    });
  </script>
  <style>
    /* Volume with Unit Cubes specific styles */

    /* Question Container */
    .question-container {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: var(--radius-xl);
      border: 3px solid #3b82f6;
      padding: var(--space-3);
      margin-bottom: var(--space-4);
      text-align: center;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: #1e3a8a;
    }

    /* Prism Container */
    .prism-container {
      background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
      border-radius: var(--radius-xl);
      border: 2px solid #bae6fd;
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      min-height: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .prism-view {
      position: relative;
      transform-style: preserve-3d;
    }

    /* Isometric Cube Styles */
    .cube {
      position: absolute;
      width: var(--size);
      height: var(--size);
      transform-style: preserve-3d;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .cube.layer-view {
      transform: translateY(calc(-1 * var(--layer-offset, 0px)));
    }

    .cube-face {
      position: absolute;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      border: 1px solid #1d4ed8;
    }

    .cube-top {
      width: var(--size);
      height: calc(var(--size) * 0.577);
      background: linear-gradient(135deg, #93c5fd, #60a5fa);
      transform: rotateX(60deg) rotateZ(45deg) translateZ(calc(var(--size) * 0.408));
      transform-origin: center;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .cube-left {
      width: calc(var(--size) * 0.866);
      height: var(--size);
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      transform: skewY(30deg);
      transform-origin: bottom left;
    }
