  <script>
    // Divide Unit Fractions Activity - Grade 5 Level 3
    const DivideUnitFractions = {
      currentQuestion: 0,
      totalQuestions: 8,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      isAnswered: false,
      advanceTimeout: null,

      // DOM elements
      questionPrompt: null,
      expressionDisplay: null,
      exprDividend: null,
      exprDivisor: null,
      exprResult: null,
      visualModel: null,
      modelLabel: null,
      stripsWrapper: null,
      groupCounter: null,
      groupCount: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.questionPrompt = document.getElementById('question-prompt');
        this.expressionDisplay = document.getElementById('expression-display');
        this.exprDividend = document.getElementById('expr-dividend');
        this.exprDivisor = document.getElementById('expr-divisor');
        this.exprResult = document.getElementById('expr-result');
        this.visualModel = document.getElementById('visual-model');
        this.modelLabel = document.getElementById('model-label');
        this.stripsWrapper = document.getElementById('strips-wrapper');
        this.groupCounter = document.getElementById('group-counter');
        this.groupCount = document.getElementById('group-count');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (event) => {
          if (event.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      // Format fraction for HTML display
      formatFractionHTML(num, den) {
        if (den === 1) return `<span class="whole-number">${num}</span>`;
        return `<span class="frac-display"><span class="frac-num">${num}</span><span class="frac-bar"></span><span class="frac-den">${den}</span></span>`;
      },

      // Format fraction as text
      formatFractionText(num, den) {
        if (den === 1) return `${num}`;
        return `${num}/${den}`;
      },

      generateQuestions() {
        // Two types of questions:
        // Type A: Whole ÷ unit fraction (e.g., 2 ÷ 1/3 = 6)
        // Type B: Unit fraction ÷ whole (e.g., 1/2 ÷ 4 = 1/8)

        const typeAProblems = [
          // whole ÷ 1/den = whole × den
          { whole: 2, unitDen: 3, answer: 6 },    // 2 ÷ 1/3 = 6
          { whole: 3, unitDen: 4, answer: 12 },   // 3 ÷ 1/4 = 12
          { whole: 2, unitDen: 5, answer: 10 },   // 2 ÷ 1/5 = 10
          { whole: 4, unitDen: 2, answer: 8 },    // 4 ÷ 1/2 = 8
          { whole: 3, unitDen: 2, answer: 6 },    // 3 ÷ 1/2 = 6
          { whole: 2, unitDen: 4, answer: 8 },    // 2 ÷ 1/4 = 8
          { whole: 5, unitDen: 2, answer: 10 },   // 5 ÷ 1/2 = 10
          { whole: 2, unitDen: 6, answer: 12 },   // 2 ÷ 1/6 = 12
        ];

        const typeBProblems = [
          // 1/num ÷ den = 1/(num×den)
          { unitNum: 2, whole: 3, answerNum: 1, answerDen: 6 },   // 1/2 ÷ 3 = 1/6
          { unitNum: 3, whole: 2, answerNum: 1, answerDen: 6 },   // 1/3 ÷ 2 = 1/6
          { unitNum: 4, whole: 2, answerNum: 1, answerDen: 8 },   // 1/4 ÷ 2 = 1/8
          { unitNum: 2, whole: 4, answerNum: 1, answerDen: 8 },   // 1/2 ÷ 4 = 1/8
          { unitNum: 3, whole: 4, answerNum: 1, answerDen: 12 },  // 1/3 ÷ 4 = 1/12
          { unitNum: 5, whole: 2, answerNum: 1, answerDen: 10 },  // 1/5 ÷ 2 = 1/10
          { unitNum: 4, whole: 3, answerNum: 1, answerDen: 12 },  // 1/4 ÷ 3 = 1/12
          { unitNum: 6, whole: 2, answerNum: 1, answerDen: 12 },  // 1/6 ÷ 2 = 1/12
        ];

        // Mix: 5 type A + 3 type B (more whole ÷ fraction since it's more intuitive)
        const shuffledA = shuffle(typeAProblems).slice(0, 5);
        const shuffledB = shuffle(typeBProblems).slice(0, 3);

        this.questions = [];

        // Add Type A questions
        shuffledA.forEach(p => {
          this.questions.push({
            type: 'wholeDivideUnit',
            whole: p.whole,
            unitDen: p.unitDen,
            answer: p.answer,
            answerNum: p.answer,
            answerDen: 1
          });
        });

        // Add Type B questions
        shuffledB.forEach(p => {
          this.questions.push({
            type: 'unitDivideWhole',
            unitNum: p.unitNum,
            whole: p.whole,
            answer: p.answerNum / p.answerDen, // For comparison
            answerNum: p.answerNum,
            answerDen: p.answerDen
          });
        });

        // Shuffle all questions
        this.questions = shuffle(this.questions);
      },

      getTranslation(key, fallback) {
        if (window.i18n && typeof i18n.t === 'function') {
          const text = i18n.t(key);
          if (text && text !== key) return text;
        }
        return fallback;
      },

      startQuestion() {
        this.clearAdvanceTimeout();
        this.isAnswered = false;
        this.feedback.classList.remove('show', 'error');
        this.exprResult.textContent = '?';
        this.groupCount.textContent = '0';

        const question = this.questions[this.currentQuestion];
        if (!question) {
          this.showStats();
          return;
        }

        // Build question display
        this.buildQuestionDisplay(question);

        // Generate visual model
        this.buildVisualModel(question);

        // Generate answer choices
        this.generateChoices(question);

        this.renderProgress();
      },

      buildQuestionDisplay(question) {
        let promptText = '';

        if (question.type === 'wholeDivideUnit') {
          // e.g., "How many 1/3s are in 2?"
          const fracText = this.formatFractionText(1, question.unitDen);
          promptText = this.getTranslation(
            'section.activities.divide-unit-fractions.promptWholeDivUnit',
            'How many {frac}s are in {whole}?'
          ).replace('{frac}', fracText).replace('{whole}', question.whole);

          this.exprDividend.innerHTML = question.whole;
          this.exprDivisor.innerHTML = this.formatFractionHTML(1, question.unitDen);
        } else {
          // e.g., "1/2 shared among 4 equals what?"
          const fracText = this.formatFractionText(1, question.unitNum);
          promptText = this.getTranslation(
            'section.activities.divide-unit-fractions.promptUnitDivWhole',
            'What is {frac} divided by {whole}?'
          ).replace('{frac}', fracText).replace('{whole}', question.whole);

          this.exprDividend.innerHTML = this.formatFractionHTML(1, question.unitNum);
          this.exprDivisor.innerHTML = question.whole;
        }

        this.questionPrompt.innerHTML = `<div class="prompt-text">${promptText}</div>`;
      },

      buildVisualModel(question) {
        this.stripsWrapper.innerHTML = '';

        if (question.type === 'wholeDivideUnit') {
          // Set label for Type A: "How many 1/3 fit in 2?"
          const howManyText = this.getTranslation('section.activities.divide-unit-fractions.howMany', 'How many');
          const fitInText = this.getTranslation('section.activities.divide-unit-fractions.fitIn', 'fit in');
          this.modelLabel.innerHTML = `${howManyText} ${this.formatFractionHTML(1, question.unitDen)} ${fitInText} <strong>${question.whole}</strong>?`;

          // Show whole number as fraction strips divided into unit fractions
          // e.g., 2 ÷ 1/3: show 2 wholes, each divided into thirds
          const strips = [];

          for (let w = 0; w < question.whole; w++) {
            const strip = document.createElement('div');
            strip.className = 'fraction-strip whole-strip';
            strip.innerHTML = `<div class="strip-label">${w + 1}</div>`;

            const partsContainer = document.createElement('div');
            partsContainer.className = 'strip-parts';

            for (let p = 0; p < question.unitDen; p++) {
              const part = document.createElement('div');
              part.className = 'strip-part';
              part.dataset.group = w * question.unitDen + p;
              partsContainer.appendChild(part);
            }

            strip.appendChild(partsContainer);
            strips.push(strip);
          }

          strips.forEach(s => this.stripsWrapper.appendChild(s));

        } else {
          // Set label for Type B: "Divide 1/2 into 4 equal parts"
          const divideText = this.getTranslation('section.activities.divide-unit-fractions.divide', 'Divide');
          const intoEqualParts = this.getTranslation('section.activities.divide-unit-fractions.intoEqualParts', 'into {n} equal parts').replace('{n}', question.whole);
          this.modelLabel.innerHTML = `${divideText} ${this.formatFractionHTML(1, question.unitNum)} ${intoEqualParts}`;

          // Type B: Show unit fraction being divided further
          // e.g., 1/2 ÷ 4: show 1/2 (half a strip), then divide it into 4 parts
          const strip = document.createElement('div');
          strip.className = 'fraction-strip unit-divide-strip';

          const partsContainer = document.createElement('div');
          partsContainer.className = 'strip-parts';

          // Show the unit fraction portion being divided
          const shadedPortion = document.createElement('div');
          shadedPortion.className = 'shaded-portion';
          shadedPortion.style.width = `${100 / question.unitNum}%`;

          // Divide the shaded portion into parts
          for (let p = 0; p < question.whole; p++) {
            const part = document.createElement('div');
            part.className = 'strip-part shaded';
            part.dataset.group = p;
            shadedPortion.appendChild(part);
          }

          // Show the remaining unshaded portion
          const unshadedPortion = document.createElement('div');
          unshadedPortion.className = 'unshaded-portion';
          unshadedPortion.style.width = `${100 - (100 / question.unitNum)}%`;

          partsContainer.appendChild(shadedPortion);
          partsContainer.appendChild(unshadedPortion);
          strip.appendChild(partsContainer);

          // Add label showing 1 whole
          const wholeLabel = document.createElement('div');
          wholeLabel.className = 'strip-label';
          wholeLabel.textContent = '1 ' + this.getTranslation('section.activities.divide-unit-fractions.whole', 'whole');
          strip.appendChild(wholeLabel);

          this.stripsWrapper.appendChild(strip);
        }
      },

      generateChoices(question) {
        this.choicesContainer.innerHTML = '';

        let correctAnswer;
        let choices = [];

        if (question.type === 'wholeDivideUnit') {
          correctAnswer = question.answer.toString();

          // Generate distractors
          const distractors = new Set();
          distractors.add((question.answer + 1).toString());
          distractors.add((question.answer - 1).toString());
          distractors.add((question.answer * 2).toString());
          if (question.answer > 2) distractors.add(Math.floor(question.answer / 2).toString());
          distractors.add((question.whole * (question.unitDen - 1)).toString());
          distractors.add((question.whole * (question.unitDen + 1)).toString());

          distractors.delete(correctAnswer);
          distractors.delete('0');

          choices = [correctAnswer, ...Array.from(distractors).slice(0, 3)];
        } else {
          // Type B: answer is a fraction
          correctAnswer = this.formatFractionText(question.answerNum, question.answerDen);

          // Generate fraction distractors - ensure valid denominators > 1
          const distractors = new Set();
          if (question.answerDen > 2) {
            distractors.add(this.formatFractionText(1, question.answerDen - 1));
          }
          distractors.add(this.formatFractionText(1, question.answerDen + 1));
          distractors.add(this.formatFractionText(1, question.answerDen + 2));
          distractors.add(this.formatFractionText(1, question.answerDen + 3));
          if (question.unitNum * 2 > 1) {
            distractors.add(this.formatFractionText(1, question.unitNum * 2));
          }
          if (question.whole > 1) {
            distractors.add(this.formatFractionText(1, question.whole));
          }
          // Add more common mistake: just the unitNum denominator
          distractors.add(this.formatFractionText(1, question.unitNum));

          distractors.delete(correctAnswer);
          distractors.delete('1/1');
          distractors.delete('1/0');

          choices = [correctAnswer, ...Array.from(distractors).slice(0, 3)];
        }

        // Shuffle choices
        choices = shuffle(choices);

        // Create buttons
        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';

          // Parse and format the choice for display
          if (choice.includes('/')) {
            const [num, den] = choice.split('/').map(Number);
            btn.innerHTML = this.formatFractionHTML(num, den);
          } else {
            btn.textContent = choice;
          }

          btn.dataset.value = choice;
          btn.addEventListener('click', () => this.checkAnswer(choice, btn, question));
          this.choicesContainer.appendChild(btn);
        });
      },

      checkAnswer(selected, btn, question) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const correctAnswer = question.type === 'wholeDivideUnit'
          ? question.answer.toString()
          : this.formatFractionText(question.answerNum, question.answerDen);

        const isCorrect = selected === correctAnswer;

        // Disable all buttons
        const allBtns = this.choicesContainer.querySelectorAll('.choice-btn');
        allBtns.forEach(b => b.disabled = true);

        // Animate the visual model to show the answer
        this.animateGroups(question);

        // Update expression result
        if (question.type === 'wholeDivideUnit') {
          this.exprResult.textContent = question.answer;
        } else {
          this.exprResult.innerHTML = this.formatFractionHTML(question.answerNum, question.answerDen);
        }

        if (isCorrect) {
          this.correctCount++;
          btn.classList.add('correct');

          let feedbackText;
          if (question.type === 'wholeDivideUnit') {
            feedbackText = this.getTranslation(
              'section.activities.divide-unit-fractions.correctWholeDivUnit',
              'Correct! There are {answer} groups of {frac} in {whole}.'
            ).replace('{answer}', question.answer)
             .replace('{frac}', this.formatFractionText(1, question.unitDen))
             .replace('{whole}', question.whole);
          } else {
            feedbackText = this.getTranslation(
              'section.activities.divide-unit-fractions.correctUnitDivWhole',
              'Correct! {frac} ÷ {whole} = {answer}'
            ).replace('{frac}', this.formatFractionText(1, question.unitNum))
             .replace('{whole}', question.whole)
             .replace('{answer}', this.formatFractionText(question.answerNum, question.answerDen));
          }

          this.feedback.textContent = feedbackText;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btn.classList.add('incorrect');

          // Highlight correct answer
          allBtns.forEach(b => {
            if (b.dataset.value === correctAnswer) {
              b.classList.add('correct');
            }
          });

          let feedbackText;
          if (question.type === 'wholeDivideUnit') {
            feedbackText = this.getTranslation(
              'section.activities.divide-unit-fractions.wrongWholeDivUnit',
              '{whole} ÷ {frac} = {answer}'
            ).replace('{whole}', question.whole)
             .replace('{frac}', this.formatFractionText(1, question.unitDen))
             .replace('{answer}', question.answer);
          } else {
            feedbackText = this.getTranslation(
              'section.activities.divide-unit-fractions.wrongUnitDivWhole',
              '{frac} ÷ {whole} = {answer}'
            ).replace('{frac}', this.formatFractionText(1, question.unitNum))
             .replace('{whole}', question.whole)
             .replace('{answer}', this.formatFractionText(question.answerNum, question.answerDen));
          }

          this.feedback.textContent = feedbackText;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');
        this.scheduleAdvance();
      },

      animateGroups(question) {
        const parts = this.stripsWrapper.querySelectorAll('.strip-part');
        let groupCounter = 0;

        // Animate parts with color to show groups
        parts.forEach((part, index) => {
          setTimeout(() => {
            part.classList.add('highlighted');
            groupCounter++;
            this.groupCount.textContent = groupCounter;
          }, index * 100);
        });

        // Final count
        setTimeout(() => {
          if (question.type === 'wholeDivideUnit') {
            this.groupCount.textContent = question.answer;
          } else {
            // For type B, show each part is 1/(original×divisor)
            this.groupCount.innerHTML = `1 ${this.getTranslation('section.activities.divide-unit-fractions.part', 'part')} = ` +
              this.formatFractionHTML(question.answerNum, question.answerDen);
          }
        }, parts.length * 100 + 200);
      },

      scheduleAdvance() {
        this.advanceTimeout = setTimeout(() => {
          this.advanceTimeout = null;
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);

        this.renderProgress();
      },

      updateTranslations() {
        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
        this.updateProgressLabel();

        // Refresh current question if not answered
        if (!this.isAnswered && this.questions[this.currentQuestion]) {
          const question = this.questions[this.currentQuestion];
          this.buildQuestionDisplay(question);
        }
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.clearAdvanceTimeout();
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      updateStatsMessage() {
        const percent = this.correctCount / this.totalQuestions;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.divide-unit-fractions.perfect',
            'Perfect! You mastered unit fraction division!'
          );
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.divide-unit-fractions.great',
            'Great work with unit fraction division!'
          );
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.divide-unit-fractions.good',
            'Good job!'
          );
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation(
            'section.activities.divide-unit-fractions.keepPracticing',
            'Keep practicing!'
          );
        }
      },

      restartActivity() {
        this.clearAdvanceTimeout();
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      clearAdvanceTimeout() {
        if (this.advanceTimeout) {
          clearTimeout(this.advanceTimeout);
          this.advanceTimeout = null;
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
        this.updateProgressLabel();
      },

      updateProgressLabel() {
        if (!this.progress) return;
        const roundLabel = this.getTranslation('activity.round', 'Round');
        const ofLabel = this.getTranslation('activity.of', 'of');
        const currentRound = Math.min(this.currentQuestion + 1, this.totalQuestions);
        this.progress.setAttribute('aria-label', `${roundLabel} ${currentRound} ${ofLabel} ${this.totalQuestions}`);
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      DivideUnitFractions.init();
    });
  </script>
