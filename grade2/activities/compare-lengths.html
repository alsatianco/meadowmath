  <script>
    // Compare Lengths Activity - Grade 2 Level 4
    const CompareLengths = {
      currentQuestion: 0,
      totalQuestions: 8,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // Current question state
      lengthA: 0,
      lengthB: 0,
      questionPhase: 'longer', // 'longer' or 'difference'
      unit: 'cm',

      // DOM elements
      barA: null,
      barB: null,
      barAMeasure: null,
      barBMeasure: null,
      questionText: null,
      choiceContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.barA = document.getElementById('bar-a');
        this.barB = document.getElementById('bar-b');
        this.barAMeasure = document.getElementById('bar-a-measure');
        this.barBMeasure = document.getElementById('bar-b-measure');
        this.questionText = document.getElementById('question-text');
        this.choiceContainer = document.getElementById('choice-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Redraw bars on resize for responsive scaling
        window.addEventListener('resize', () => {
          this.renderBars();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Re-render question text on language change
        if (!this.isAnswered) {
          this.renderQuestion();
        }
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      generateQuestion() {
        // Generate two different lengths (3-15 cm range)
        this.lengthA = this.randomInt(3, 15);
        do {
          this.lengthB = this.randomInt(3, 15);
        } while (this.lengthB === this.lengthA);

        // Alternate between cm and inches
        this.unit = this.currentQuestion % 2 === 0 ? 'cm' : 'inches';

        // First ask which is longer, then ask the difference
        this.questionPhase = 'longer';
        this.isAnswered = false;
      },

      startQuestion() {
        this.generateQuestion();
        this.renderBars();
        this.renderQuestion();
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderBars() {
        // Responsive scale: smaller on mobile to prevent overflow
        const isMobile = window.innerWidth <= 480;
        const pixelsPerUnit = this.unit === 'cm'
          ? (isMobile ? 14 : 18)
          : (isMobile ? 22 : 30);
        const unitLabel = this.unit === 'cm'
          ? (window.i18n ? i18n.t('section.activities.compare-lengths.cm') : 'cm')
          : (window.i18n ? i18n.t('section.activities.compare-lengths.inches') : 'in');

        // Render bar A
        const widthA = this.lengthA * pixelsPerUnit;
        this.barA.style.width = `${widthA}px`;
        this.barAMeasure.textContent = `${this.lengthA} ${unitLabel}`;

        // Render bar B
        const widthB = this.lengthB * pixelsPerUnit;
        this.barB.style.width = `${widthB}px`;
        this.barBMeasure.textContent = `${this.lengthB} ${unitLabel}`;
      },

      renderQuestion() {
        this.choiceContainer.innerHTML = '';

        if (this.isAnswered) return;

        const unitLabel = this.unit === 'cm'
          ? (window.i18n ? i18n.t('section.activities.compare-lengths.cm') : 'cm')
          : (window.i18n ? i18n.t('section.activities.compare-lengths.inches') : 'in');

        if (this.questionPhase === 'longer') {
          // Ask which is longer
          this.questionText.textContent = window.i18n
            ? i18n.t('section.activities.compare-lengths.whichLonger')
            : 'Which bar is longer?';

          // Create A and B choices
          const choices = ['A', 'B'];
          choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn choice-letter';
            btn.textContent = choice;
            btn.dataset.value = choice;
            btn.addEventListener('click', () => this.selectLonger(choice));
            this.choiceContainer.appendChild(btn);
          });
        } else {
          // Ask for the difference
          const diff = Math.abs(this.lengthA - this.lengthB);
          this.questionText.textContent = window.i18n
            ? i18n.t('section.activities.compare-lengths.howMuchLonger')
            : 'How much longer is it?';

          // Generate choices
          const choices = [diff];
          const distractors = new Set();

          // Add nearby values as distractors
          [-2, -1, 1, 2, 3].forEach(offset => {
            const d = diff + offset;
            if (d > 0 && d !== diff) {
              distractors.add(d);
            }
          });

          const distractorArray = Array.from(distractors);
          this.shuffleArray(distractorArray);
          choices.push(...distractorArray.slice(0, 3));

          // Ensure we have 4 choices
          while (choices.length < 4) {
            const extra = this.randomInt(1, 12);
            if (!choices.includes(extra)) {
              choices.push(extra);
            }
          }

          this.shuffleArray(choices);

          choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = `${choice} ${unitLabel}`;
            btn.dataset.value = choice;
            btn.addEventListener('click', () => this.selectDifference(choice));
            this.choiceContainer.appendChild(btn);
          });
        }
      },

      selectLonger(choice) {
        if (this.isAnswered) return;

        const correctAnswer = this.lengthA > this.lengthB ? 'A' : 'B';
        const isCorrect = choice === correctAnswer;

        // Highlight buttons
        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          if (btn.dataset.value === correctAnswer) {
            btn.classList.add('correct');
          } else if (btn.dataset.value === choice && !isCorrect) {
            btn.classList.add('incorrect');
          }
          btn.disabled = true;
        });

        const longerLength = Math.max(this.lengthA, this.lengthB);
        const unitLabel = this.unit === 'cm'
          ? (window.i18n ? i18n.t('section.activities.compare-lengths.cm') : 'cm')
          : (window.i18n ? i18n.t('section.activities.compare-lengths.inches') : 'in');

        if (isCorrect) {
          const msg = window.i18n
            ? i18n.t('section.activities.compare-lengths.correctLonger')
                .replace('{bar}', correctAnswer)
                .replace('{length}', longerLength)
                .replace('{unit}', unitLabel)
            : `✓ Correct! Bar ${correctAnswer} is longer (${longerLength} ${unitLabel}).`;
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
        } else {
          const msg = window.i18n
            ? i18n.t('section.activities.compare-lengths.wrongLonger')
                .replace('{bar}', correctAnswer)
                .replace('{length}', longerLength)
                .replace('{unit}', unitLabel)
            : `Bar ${correctAnswer} is longer (${longerLength} ${unitLabel}).`;
          this.feedback.textContent = msg;
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        // Move to difference question after delay
        setTimeout(() => {
          this.questionPhase = 'difference';
          this.isAnswered = false;
          this.feedback.classList.remove('show', 'error');
          this.renderQuestion();
        }, this.autoAdvanceDelay);
      },

      selectDifference(value) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const diff = Math.abs(this.lengthA - this.lengthB);
        const isCorrect = value === diff;

        const unitLabel = this.unit === 'cm'
          ? (window.i18n ? i18n.t('section.activities.compare-lengths.cm') : 'cm')
          : (window.i18n ? i18n.t('section.activities.compare-lengths.inches') : 'in');

        // Highlight buttons
        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          const btnValue = parseInt(btn.dataset.value);
          if (btnValue === diff) {
            btn.classList.add('correct');
          } else if (btnValue === value && !isCorrect) {
            btn.classList.add('incorrect');
          }
          btn.disabled = true;
        });

        if (isCorrect) {
          this.correctCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.compare-lengths.correctDiff')
                .replace('{diff}', diff)
                .replace('{unit}', unitLabel)
            : `✓ Correct! The difference is ${diff} ${unitLabel}.`;
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.compare-lengths.wrongDiff')
                .replace('{diff}', diff)
                .replace('{unit}', unitLabel)
            : `The difference is ${diff} ${unitLabel}.`;
          this.feedback.textContent = msg;
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.isAnswered = false;
        this.questionPhase = 'longer';
        this.renderQuestion();
        this.feedback.classList.remove('show', 'error');
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.compare-lengths.perfect')
            : 'Amazing comparison skills!';
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '🧵';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.compare-lengths.great')
            : 'Great comparing!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.compare-lengths.keepPracticing')
            : 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => CompareLengths.init());
      } else {
        CompareLengths.init();
      }
    });
  </script>
  <style>
    /* Compare Lengths specific styles */

    /* Bars Container */
    .bars-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      margin: var(--space-6) auto;
      padding: var(--space-6);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-radius: var(--radius-xl);
      border: 3px solid #86efac;
      max-width: 500px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .bar-label {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: white;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .bar-wrapper {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex: 1;
      min-width: 0;
    }

    .length-bar {
      height: 36px;
      border-radius: var(--radius-md);
      transition: width 0.4s ease;
      min-width: 20px;
    }

    .bar-a {
      background: linear-gradient(135deg, #f97316, #ea580c);
      border: 2px solid #c2410c;
    }

    .bar-b {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      border: 2px solid #6d28d9;
    }

    .bar-measurement {
      font-family: var(--font-secondary);
      font-size: var(--text-base);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-600);
      white-space: nowrap;
    }

    /* Question Section */
    .question-section {
      text-align: center;
      margin: var(--space-4) 0;
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      margin-bottom: var(--space-4);
    }

    /* Choice Container */
    .choice-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin: var(--space-4) auto;
      max-width: 360px;
    }

    .choice-btn {
      padding: var(--space-4);
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      border: 3px solid var(--color-neutral-300);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 3px 0 var(--color-neutral-300);
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .choice-btn.choice-letter {
      font-size: var(--text-2xl);
      min-width: 100px;
      min-height: 80px;
    }

    .choice-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #2563eb;
    }

    .choice-btn:focus:not(:disabled) {
      outline: none;
      box-shadow: 0 3px 0 var(--color-neutral-300), 0 0 0 3px rgba(59, 130, 246, 0.4);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 1px 0 var(--color-neutral-300);
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #86efac, #4ade80);
      border-color: #16a34a;
      box-shadow: 0 3px 0 #166534;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #dc2626;
      box-shadow: 0 3px 0 #991b1b;
      animation: shake 0.5s ease;
    }

    .choice-btn:disabled {
      cursor: default;
    }

    /* Progress indicator */
    .progress-indicator {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-neutral-300);
      transition: all 0.3s ease;
    }

    .progress-dot.current {
      background: var(--color-primary);
      transform: scale(1.2);
    }

    .progress-dot.completed {
      background: #22c55e;
    }

    /* Feedback positioning */
    .activity-area {
      padding-bottom: calc(var(--space-8) + 60px);
    }

    .feedback-message {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0;
      max-width: 90%;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* Responsive */
    @media (max-width: 767px) {
      .bars-container {
        padding: var(--space-4);
        margin: var(--space-4) auto;
      }

      .bar-label {
