  <script>
    // Number Line Add/Subtract Activity - Grade 2
    const NumberLineAddSub = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      startNumber: 0,
      operand: 0,
      isAddition: true,
      correctAnswer: 0,
      jumps: [], // array of jump amounts (e.g., [+20, +7] or [-30, -6])
      autoAdvanceDelay: 1500,
      isAnswered: false,
      animationInProgress: false,

      // Number line range
      lineStart: 0,
      lineEnd: 100,
      markerInterval: 5, // Show label every 5

      // DOM elements
      problemDisplay: null,
      problemText: null,
      instruction: null,
      numberLine: null,
      numberLineContainer: null,
      frog: null,
      jumpsContainer: null,
      jumpBreakdown: null,
      startContainer: null,
      btnStart: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.problemDisplay = document.getElementById('problem-display');
        this.problemText = document.getElementById('problem-text');
        this.instruction = document.getElementById('instruction');
        this.numberLine = document.getElementById('number-line');
        this.numberLineContainer = document.getElementById('number-line-container');
        this.frog = document.getElementById('frog');
        this.jumpsContainer = document.getElementById('jumps-container');
        this.jumpBreakdown = document.getElementById('jump-breakdown');
        this.startContainer = document.getElementById('start-container');
        this.btnStart = document.getElementById('btn-start');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnStart.addEventListener('click', () => this.animateJumps());
        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.createNumberLine();
        this.startQuestion();
        this.renderProgress();
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      updateTranslations() {
        // Update dynamic text if needed
        if (this.startNumber && this.operand) {
          this.updateJumpBreakdown();
        }
      },

      createNumberLine() {
        this.numberLine.innerHTML = '';

        for (let i = this.lineStart; i <= this.lineEnd; i++) {
          const marker = document.createElement('div');
          marker.className = 'number-marker';
          marker.dataset.value = i;

          const tick = document.createElement('div');
          tick.className = 'number-tick';

          // Larger ticks at intervals of 10, medium at 5
          if (i % 10 === 0) {
            tick.classList.add('tick-large');
          } else if (i % 5 === 0) {
            tick.classList.add('tick-medium');
          }

          marker.appendChild(tick);

          // Label at intervals of 10
          if (i % 10 === 0) {
            const label = document.createElement('div');
            label.className = 'number-label';
            label.textContent = i;
            marker.appendChild(label);
          }

          this.numberLine.appendChild(marker);
        }
      },

      generateProblem() {
        // Decide addition or subtraction
        this.isAddition = this.randomInt(0, 1) === 0;

        let start, operand;

        if (this.currentQuestion < 4) {
          // Early: easier problems
          if (this.isAddition) {
            start = this.randomInt(10, 40);
            operand = this.randomInt(15, 35);
          } else {
            start = this.randomInt(40, 80);
            operand = this.randomInt(15, 35);
          }
        } else if (this.currentQuestion < 7) {
          // Medium difficulty
          if (this.isAddition) {
            start = this.randomInt(20, 50);
            operand = this.randomInt(20, 45);
          } else {
            start = this.randomInt(50, 90);
            operand = this.randomInt(20, 45);
          }
        } else {
          // Harder problems
          if (this.isAddition) {
            start = this.randomInt(15, 55);
            operand = this.randomInt(25, 50);
          } else {
            start = this.randomInt(55, 95);
            operand = this.randomInt(25, 50);
          }
        }

        // Ensure valid range (answer stays within 0-100)
        if (this.isAddition) {
          // Ensure sum <= 100
          while (start + operand > 100) {
            operand = this.randomInt(10, Math.min(50, 100 - start));
          }
        } else {
          // Ensure difference >= 0
          while (start - operand < 0) {
            operand = this.randomInt(10, Math.min(50, start));
          }
        }

        this.startNumber = start;
        this.operand = operand;
        this.correctAnswer = this.isAddition ? start + operand : start - operand;

        // Break operand into tens and ones for jump visualization
        const tens = Math.floor(operand / 10) * 10;
        const ones = operand % 10;

        this.jumps = [];
        if (tens > 0) {
          this.jumps.push(this.isAddition ? tens : -tens);
        }
        if (ones > 0) {
          this.jumps.push(this.isAddition ? ones : -ones);
        }

        this.isAnswered = false;
        this.animationInProgress = false;
      },

      startQuestion() {
        this.generateProblem();
        this.renderProblem();
        this.feedback.classList.remove('show', 'error');
        this.startContainer.classList.remove('hidden');
        this.choicesContainer.classList.add('hidden');
        this.jumpsContainer.innerHTML = '';
        this.renderProgress();

        // Reset scroll and position frog
        this.numberLineContainer.scrollLeft = 0;

        requestAnimationFrame(() => {
          this.positionFrog(this.startNumber);
          this.highlightMarker(this.startNumber, 'highlight-start');
          this.btnStart.focus();
        });
      },

      renderProblem() {
        const operator = this.isAddition ? '+' : '−';
        this.problemText.textContent = `${this.startNumber} ${operator} ${this.operand} = ?`;

        // Update jump breakdown
        this.updateJumpBreakdown();

        // Clear highlights
        const markers = this.numberLine.querySelectorAll('.number-marker');
        markers.forEach(m => m.classList.remove('highlight-start', 'highlight-end', 'highlight-jump'));
      },

      updateJumpBreakdown() {
        const startText = window.i18n
          ? i18n.t('section.activities.number-line-add-sub-100.startAt').replace('{n}', this.startNumber)
          : `Start at ${this.startNumber}`;

        let jumpsText = '';
        this.jumps.forEach(j => {
          const sign = j > 0 ? '+' : '';
          jumpsText += ` → ${sign}${j}`;
        });

        this.jumpBreakdown.innerHTML = `<span class="breakdown-start">${startText}</span>${jumpsText} → <span class="breakdown-answer">?</span>`;
      },

      highlightMarker(value, className) {
        const marker = this.numberLine.querySelector(`[data-value="${value}"]`);
        if (marker) {
          marker.classList.add(className);
        }
      },

      positionFrog(position) {
        const marker = this.numberLine.querySelector(`[data-value="${position}"]`);
        if (marker) {
          const left = marker.offsetLeft + (marker.offsetWidth / 2) - 20;
          this.frog.style.left = `${left}px`;
          this.frog.style.opacity = '1';

          // Scroll to keep frog visible
          const container = this.numberLineContainer;
          const frogCenter = left + 20;
          const containerWidth = container.clientWidth;
          const scrollLeft = container.scrollLeft;

          if (frogCenter < scrollLeft + 60 || frogCenter > scrollLeft + containerWidth - 60) {
            container.scrollTo({
              left: Math.max(0, frogCenter - containerWidth / 2),
              behavior: 'smooth'
            });
          }
        }
      },

      async animateJumps() {
        if (this.animationInProgress) return;
        this.animationInProgress = true;
        this.btnStart.disabled = true;
        this.startContainer.classList.add('hidden');

        let currentPos = this.startNumber;

        for (let i = 0; i < this.jumps.length; i++) {
          const jump = this.jumps[i];
          const targetPos = currentPos + jump;

          // Highlight the path
          const minPos = Math.min(currentPos, targetPos);
          const maxPos = Math.max(currentPos, targetPos);
          for (let p = minPos; p <= maxPos; p++) {
            if (p !== currentPos) {
              this.highlightMarker(p, 'highlight-jump');
            }
          }

          // Draw jump arc
          await this.drawJumpArc(currentPos, targetPos, jump);

          // Animate frog
          await this.jumpFrogTo(targetPos);

          currentPos = targetPos;
          await this.delay(400);
        }

        // Highlight end position
        this.highlightMarker(this.correctAnswer, 'highlight-end');

        await this.delay(500);
        this.renderChoices();
        this.choicesContainer.classList.remove('hidden');
        this.btnStart.disabled = false;

        const firstChoice = this.choicesContainer.querySelector('.choice-btn');
        if (firstChoice) firstChoice.focus();
      },

      drawJumpArc(from, to, jumpAmount) {
        return new Promise(resolve => {
          const fromMarker = this.numberLine.querySelector(`[data-value="${from}"]`);
          const toMarker = this.numberLine.querySelector(`[data-value="${to}"]`);

          if (!fromMarker || !toMarker) {
            resolve();
            return;
          }

          const fromX = fromMarker.offsetLeft + fromMarker.offsetWidth / 2;
          const toX = toMarker.offsetLeft + toMarker.offsetWidth / 2;
          const width = Math.abs(toX - fromX);
          const left = Math.min(fromX, toX);

          const arc = document.createElement('div');
          arc.className = 'jump-arc';
          arc.style.left = `${left}px`;
          arc.style.width = `${width}px`;

          // Label for the jump
          const label = document.createElement('span');
          label.className = 'jump-label';
          label.textContent = jumpAmount > 0 ? `+${jumpAmount}` : `${jumpAmount}`;
          arc.appendChild(label);

          this.jumpsContainer.appendChild(arc);

          // Animate arc appearance
          setTimeout(() => {
            arc.classList.add('show');
            resolve();
          }, 50);
        });
      },

      jumpFrogTo(position) {
        return new Promise(resolve => {
          this.frog.classList.add('jumping');
          this.positionFrog(position);

          setTimeout(() => {
            this.frog.classList.remove('jumping');
            resolve();
          }, 500);
        });
      },

      delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      },

      renderChoices() {
        this.choicesContainer.innerHTML = '';

        const choices = [this.correctAnswer];

        // Generate distractors
        const distractors = [];

        // Common mistakes
        // Mistake: added/subtracted only tens or only ones
        if (this.jumps.length === 2) {
          distractors.push(this.startNumber + this.jumps[0]); // Only first jump
          distractors.push(this.startNumber + this.jumps[1]); // Only second jump (wrong)
        }

        // Off by 10
        distractors.push(this.correctAnswer + 10);
        distractors.push(this.correctAnswer - 10);

        // Off by 1
        distractors.push(this.correctAnswer + 1);
        distractors.push(this.correctAnswer - 1);

        // Wrong operation
        if (this.isAddition) {
          distractors.push(this.startNumber - this.operand);
        } else {
          distractors.push(this.startNumber + this.operand);
        }

        // Filter valid distractors
        const validDistractors = distractors.filter(d =>
          d >= 0 && d <= 100 && !choices.includes(d)
        );
        this.shuffleArray(validDistractors);
        choices.push(...validDistractors.slice(0, 3));

        // Fill remaining if needed
        while (choices.length < 4) {
          const d = this.randomInt(
            Math.max(0, this.correctAnswer - 15),
            Math.min(100, this.correctAnswer + 15)
          );
          if (!choices.includes(d)) choices.push(d);
        }

        this.shuffleArray(choices);

        const operator = this.isAddition ? '+' : '−';
        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = choice;
          btn.dataset.value = choice;
          btn.setAttribute('aria-label', `${this.startNumber} ${operator} ${this.operand} = ${choice}`);
          btn.addEventListener('click', () => this.checkAnswer(choice));
          this.choicesContainer.appendChild(btn);
        });
      },

      checkAnswer(userAnswer) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const isCorrect = userAnswer === this.correctAnswer;

        // Update UI
        const buttons = this.choicesContainer.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.disabled = true;
          const btnValue = parseInt(btn.dataset.value);
          if (btnValue === this.correctAnswer) {
            btn.classList.add('correct');
          } else if (btnValue === userAnswer && !isCorrect) {
            btn.classList.add('incorrect');
          }
        });

        // Update jump breakdown with answer
        const breakdownAnswer = this.jumpBreakdown.querySelector('.breakdown-answer');
        if (breakdownAnswer) {
          breakdownAnswer.textContent = this.correctAnswer;
          breakdownAnswer.classList.add(isCorrect ? 'correct' : 'show-correct');
        }

        const operator = this.isAddition ? '+' : '−';

        if (isCorrect) {
          this.correctCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.number-line-add-sub-100.correct')
                .replace('{a}', this.startNumber)
                .replace('{op}', operator)
                .replace('{b}', this.operand)
                .replace('{result}', this.correctAnswer)
            : `${this.startNumber} ${operator} ${this.operand} = ${this.correctAnswer}`;

          this.feedback.textContent = '✓ ' + msg;
          this.feedback.classList.remove('error');

          this.frog.classList.add('celebrate');
          setTimeout(() => this.frog.classList.remove('celebrate'), 1000);
        } else {
          this.incorrectCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.number-line-add-sub-100.wrong')
                .replace('{result}', this.correctAnswer)
            : `The answer is ${this.correctAnswer}`;

          this.feedback.textContent = msg;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.number-line-add-sub-100.perfect')
            : 'Amazing number line skills!';
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '🐸';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.number-line-add-sub-100.great')
            : 'Great hopping!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.number-line-add-sub-100.keepPracticing')
            : 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          let status = 'pending';
          if (i < this.currentQuestion) {
            className += ' completed';
            status = 'completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
            status = 'current';
          }
          html += `<div class="${className}" role="listitem" aria-label="Question ${i + 1} of ${this.totalQuestions}: ${status}"></div>`;
        }
        this.progress.setAttribute('role', 'list');
        this.progress.setAttribute('aria-label', 'Progress');
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => NumberLineAddSub.init());
      } else {
        NumberLineAddSub.init();
      }
    });
  </script>
  <style>
    /* Number Line Add/Subtract - Grade 2 specific styles */

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-600);
      margin-bottom: var(--space-3);
      text-align: center;
    }

    /* Problem Display */
    .problem-display {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: var(--space-3);
      padding: var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 3px solid #3b82f6;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 0 #2563eb;
    }

    .problem-text {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #1e40af;
    }

    /* Number Line Wrapper */
    .number-line-wrapper {
      margin: var(--space-4) 0;
      padding: var(--space-2);
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      border-radius: var(--radius-lg);
      border: 2px solid var(--color-neutral-200);
    }

    .number-line-container {
      position: relative;
      padding: var(--space-8) var(--space-4) var(--space-4);
      overflow-x: auto;
      overflow-y: visible;
    }

    .number-line {
      position: relative;
      display: flex;
      align-items: flex-end;
      min-width: 100%;
      height: 70px;
      padding-bottom: 30px;
      /* Line base */
      background: linear-gradient(to bottom, transparent calc(100% - 3px), var(--color-neutral-400) calc(100% - 3px));
    }

    .number-marker {
      flex: 0 0 auto;
      width: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
    }

    .number-tick {
      width: 2px;
      height: 10px;
      background: var(--color-neutral-400);
      margin-bottom: 0;
      transition: all 0.3s ease;
    }

    .number-tick.tick-medium {
      height: 14px;
      width: 2px;
      background: var(--color-neutral-500);
    }

    .number-tick.tick-large {
      height: 20px;
      width: 3px;
      background: var(--color-neutral-600);
    }

    .number-label {
      position: absolute;
      bottom: -24px;
      font-family: var(--font-secondary);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-600);
      white-space: nowrap;
    }

    /* Highlighted markers */
    .number-marker.highlight-start .number-tick {
      background: #22c55e;
      height: 26px;
      width: 4px;
    }

    .number-marker.highlight-start .number-label {
      color: #22c55e;
      font-size: var(--text-sm);
    }

    .number-marker.highlight-jump .number-tick {
      background: #3b82f6;
      height: 16px;
    }

    .number-marker.highlight-end .number-tick {
      background: #f59e0b;
      height: 30px;
      width: 5px;
      animation: pop 0.5s ease;
    }

    .number-marker.highlight-end .number-label {
      color: #f59e0b;
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
    }

    /* Frog */
    .frog {
      position: absolute;
      bottom: 55px;
      left: 0;
      font-size: var(--text-3xl);
      transition: left 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      opacity: 0;
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .frog.jumping {
      animation: jump 0.5s ease-in-out;
    }

    .frog.celebrate {
      animation: celebrate 1s ease;
    }

    @keyframes jump {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-35px) scale(1.15); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes celebrate {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-15deg) scale(1.3); }
      50% { transform: rotate(15deg) scale(1.3); }
      75% { transform: rotate(-10deg) scale(1.2); }
      100% { transform: rotate(0deg) scale(1); }
    }

    /* Jump arcs container */
    .jumps-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      pointer-events: none;
    }

    .jump-arc {
      position: absolute;
      top: 15px;
      height: 40px;
      border: 3px solid transparent;
      border-top-color: #3b82f6;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .jump-arc.show {
      opacity: 1;
    }

    .jump-label {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      background: #3b82f6;
      color: white;
      padding: 2px 8px;
      border-radius: var(--radius-md);
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      white-space: nowrap;
    }

    /* Jump Breakdown */
    .jump-breakdown {
      text-align: center;
      font-family: var(--font-secondary);
      font-size: var(--text-base);
      color: var(--color-neutral-600);
      padding: var(--space-3) var(--space-4);
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: var(--radius-lg);
      border: 2px solid #fbbf24;
      margin: var(--space-3) auto;
      max-width: 400px;
    }

    .breakdown-start {
      color: #22c55e;
      font-weight: var(--weight-bold);
    }

    .breakdown-answer {
      color: #f59e0b;
      font-weight: var(--weight-bold);
      font-size: var(--text-lg);
    }

    .breakdown-answer.correct {
      color: #22c55e;
    }

    .breakdown-answer.show-correct {
      color: #f59e0b;
    }

    /* Start Container */
    .start-container {
      text-align: center;
      margin: var(--space-4) 0;
    }

    .start-container.hidden {
      display: none;
    }

    .start-container .btn-activity:focus {
      outline: none;
      box-shadow: 0 4px 0 var(--color-primary-dark), 0 6px 20px rgba(0, 0, 0, 0.1), 0 0 0 3px rgba(59, 130, 246, 0.5);
    }

    /* Choices Container */
    .choices-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin: var(--space-4) auto;
      max-width: 400px;
    }

    .choices-container.hidden {
      display: none;
    }

    .choice-btn {
      aspect-ratio: 1;
      min-width: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border: 3px solid var(--color-primary-light);
      border-radius: var(--radius-lg);
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 0 var(--color-primary-light);
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--color-primary-light);
      background: linear-gradient(135deg, #bfdbfe, #93c5fd);
    }

    .choice-btn:focus {
      outline: none;
      box-shadow: 0 4px 0 var(--color-primary-light), 0 0 0 3px rgba(59, 130, 246, 0.5);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 0 var(--color-primary-light);
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #86efac, #4ade80);
      border-color: #16a34a;
      color: #166534;
      animation: pop 0.4s ease;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: #b45309;
      color: white;
      animation: shake 0.5s ease;
    }

    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    /* Progress indicator */
    .progress-indicator {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-neutral-300);
      transition: all 0.3s ease;
    }

    .progress-dot.current {
      background: var(--color-primary);
      transform: scale(1.2);
    }

    .progress-dot.completed {
      background: #22c55e;
    }

    /* Activity area padding for feedback */
    .activity-area {
      padding-bottom: calc(var(--space-8) + 60px);
    }

    /* Feedback at bottom */
    .feedback-message {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0;
      max-width: 90%;
    }

    /* Responsive */
    @media (max-width: 767px) {
      .problem-text {
        font-size: var(--text-2xl);
      }

      .number-line-container {
        padding: var(--space-6) var(--space-2) var(--space-3);
      }

      .number-line {
        height: 55px;
        padding-bottom: 25px;
      }

      .number-marker {
        width: 10px;
      }

      .number-label {
        font-size: 10px;
        bottom: -20px;
      }

      .frog {
        font-size: var(--text-2xl);
        bottom: 45px;
      }

      .jumps-container {
        height: 50px;
      }

      .jump-arc {
        top: 10px;
        height: 35px;
      }

      .jump-label {
        font-size: var(--text-xs);
        padding: 2px 6px;
      }

      .jump-breakdown {
        font-size: var(--text-sm);
        padding: var(--space-2) var(--space-3);
        max-width: 90%;
      }

      .choices-container {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-3);
        max-width: 220px;
      }

      .choice-btn {
        min-width: 70px;
        font-size: var(--text-lg);
      }

      .feedback-message {
        font-size: var(--text-sm);
        padding: var(--space-2) var(--space-3);
      }
    }

    @media (max-width: 400px) {
      .problem-display {
        padding: var(--space-3);
      }

      .problem-text {
        font-size: var(--text-xl);
      }

      .number-marker {
        width: 8px;
      }

      .frog {
        font-size: var(--text-xl);
      }

      .choice-btn {
        min-width: 60px;
        font-size: var(--text-base);
      }
    }
  </style>
