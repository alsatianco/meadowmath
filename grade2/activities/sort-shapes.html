  <style>
    /* Sort Shapes specific styles */
    .sorting-rule {
      text-align: center;
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      margin-bottom: var(--space-6);
      padding: var(--space-4);
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      border-radius: var(--radius-xl);
      border: 3px solid #3b82f6;
    }

    .sorting-bins {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-6);
      margin-bottom: var(--space-6);
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .sorting-bin {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-4);
      background: white;
      border: 4px dashed #94a3b8;
      border-radius: var(--radius-xl);
      min-height: 180px;
      transition: all 0.2s ease;
    }

    .sorting-bin.drag-over {
      border-color: #3b82f6;
      background-color: #eff6ff;
      border-style: solid;
    }

    .sorting-bin.correct-bin {
      border-color: var(--color-success);
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-style: solid;
    }

    .sorting-bin.incorrect-bin {
      border-color: var(--color-error);
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border-style: solid;
    }

    .bin-label {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      margin-bottom: var(--space-3);
      text-align: center;
      padding: var(--space-2) var(--space-4);
      background: #f1f5f9;
      border-radius: var(--radius-lg);
      min-width: 120px;
    }

    .bin-shapes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-2);
      min-height: 80px;
      width: 100%;
      padding: var(--space-2);
    }

    .shapes-tray {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-4);
      background: #f1f5f9;
      border-radius: var(--radius-xl);
      margin-bottom: var(--space-6);
      min-height: 100px;
    }

    .sortable-shape {
      width: 80px;
      height: 80px;
      background: white;
      border: 3px solid #3b82f6;
      border-radius: var(--radius-lg);
      cursor: grab;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      box-shadow: 0 3px 0 rgba(59, 130, 246, 0.3), 0 4px 8px rgba(0, 0, 0, 0.1);
      user-select: none;
      touch-action: none;
    }

    .sortable-shape:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 5px 0 rgba(59, 130, 246, 0.3), 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .sortable-shape:active,
    .sortable-shape.dragging {
      cursor: grabbing;
      transform: scale(1.1);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 100;
      opacity: 0.9;
    }

    .sortable-shape:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5), 0 3px 0 rgba(59, 130, 246, 0.3), 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .sortable-shape.sorted {
      width: 60px;
      height: 60px;
      cursor: pointer;
    }

    .sortable-shape.correct-shape {
      border-color: var(--color-success);
      background: #dcfce7;
    }

    .sortable-shape.incorrect-shape {
      border-color: var(--color-error);
      background: #fee2e2;
    }

    .sortable-shape svg {
      width: 60px;
      height: 60px;
    }

    .sortable-shape.sorted svg {
      width: 45px;
      height: 45px;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .action-buttons .btn-activity {
      min-width: 160px;
      min-height: 60px;
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      border-radius: var(--radius-xl);
      padding: var(--space-4) var(--space-6);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-activity:active {
      transform: scale(0.97);
    }

    .btn-activity:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4);
    }

    .btn-activity:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Activity area needs padding for feedback */
    .activity-area {
      padding-bottom: calc(var(--space-8) + 60px);
      position: relative;
    }

    /* Feedback at bottom */
    .feedback-message {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0;
      max-width: 90%;
    }

    @media (max-width: 767px) {
      .sorting-rule {
        font-size: var(--text-lg);
        padding: var(--space-3);
      }

      .sorting-bins {
        gap: var(--space-4);
      }

      .sorting-bin {
        padding: var(--space-3);
        min-height: 150px;
      }

      .bin-label {
        font-size: var(--text-base);
        padding: var(--space-1) var(--space-3);
        min-width: 100px;
      }

      .shapes-tray {
        gap: var(--space-3);
        padding: var(--space-3);
      }

      .sortable-shape {
        width: 70px;
        height: 70px;
      }

      .sortable-shape svg {
        width: 50px;
        height: 50px;
      }

      .sortable-shape.sorted {
        width: 50px;
        height: 50px;
      }

      .sortable-shape.sorted svg {
        width: 35px;
        height: 35px;
      }

      .action-buttons .btn-activity {
        min-width: 140px;
        min-height: 54px;
        font-size: var(--text-base);
        padding: var(--space-3) var(--space-4);
      }
    }
  </style>

  <script>
    // Sort Shapes Activity - Grade 2
    const SortShapes = {
      // Game state
      currentRound: 1,
      maxRounds: 6,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      currentChallenge: null,
      challenges: [],
      sortedShapes: { bin1: [], bin2: [] },

      // DOM elements
      sortingRule: null,
      sortingBins: null,
      shapesTray: null,
      feedback: null,
      progress: null,
      btnCheck: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Drag state
      draggedShape: null,
      dragClone: null,
      dragOffsetX: 0,
      dragOffsetY: 0,

      /**
       * Shape definitions with SVG
       */
      shapes: {
        triangle: {
          sides: 3,
          type: '2d',
          svg: (color) => `<polygon points="30,5 55,55 5,55" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        square: {
          sides: 4,
          type: '2d',
          svg: (color) => `<rect x="5" y="5" width="50" height="50" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        rectangle: {
          sides: 4,
          type: '2d',
          svg: (color) => `<rect x="2" y="12" width="56" height="36" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        pentagon: {
          sides: 5,
          type: '2d',
          svg: (color) => `<polygon points="30,5 55,22 47,52 13,52 5,22" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        hexagon: {
          sides: 6,
          type: '2d',
          svg: (color) => `<polygon points="30,5 52,15 52,42 30,55 8,42 8,15" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        circle: {
          sides: 0,
          type: '2d',
          svg: (color) => `<circle cx="30" cy="30" r="25" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        oval: {
          sides: 0,
          type: '2d',
          svg: (color) => `<ellipse cx="30" cy="30" rx="27" ry="18" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        },
        rhombus: {
          sides: 4,
          type: '2d',
          svg: (color) => `<polygon points="30,5 55,30 30,55 5,30" fill="${color}" stroke="#1f2937" stroke-width="2"/>`
        }
      },

      /**
       * Colors for shapes
       */
      colors: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899'],

      /**
       * Sorting rules - different ways to classify shapes
       */
      sortingRules: [
        {
          id: 'four-sides',
          rule: (shape) => SortShapes.shapes[shape].sides === 4,
          bin1Key: 'fourSides',
          bin2Key: 'notFourSides'
        },
        {
          id: 'three-sides',
          rule: (shape) => SortShapes.shapes[shape].sides === 3,
          bin1Key: 'threeSides',
          bin2Key: 'notThreeSides'
        },
        {
          id: 'more-than-four',
          rule: (shape) => SortShapes.shapes[shape].sides > 4,
          bin1Key: 'moreThanFour',
          bin2Key: 'fourOrLess'
        },
        {
          id: 'curved',
          rule: (shape) => SortShapes.shapes[shape].sides === 0,
          bin1Key: 'curved',
          bin2Key: 'straight'
        },
        {
          id: 'less-than-five',
          rule: (shape) => SortShapes.shapes[shape].sides > 0 && SortShapes.shapes[shape].sides < 5,
          bin1Key: 'lessThanFive',
          bin2Key: 'fiveOrMore'
        },
        {
          id: 'exactly-six',
          rule: (shape) => SortShapes.shapes[shape].sides === 6,
          bin1Key: 'sixSides',
          bin2Key: 'notSixSides'
        }
      ],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.sortingRule = document.getElementById('sorting-rule');
        this.sortingBins = document.getElementById('sorting-bins');
        this.shapesTray = document.getElementById('shapes-tray');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnCheck = document.getElementById('btn-check');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnCheck.addEventListener('click', () => this.checkAnswer());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Set up global drag listeners
        this.setupGlobalListeners();

        // Generate challenge sequence
        this.generateChallengeSequence();

        // Start first round
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Generate a random sequence of challenges
       */
      generateChallengeSequence() {
        this.challenges = shuffle([...this.sortingRules]).slice(0, this.maxRounds);
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        if (this.currentChallenge) {
          this.renderRule();
          this.renderBins();
        }

        // Update feedback message if showing
        if (this.feedback.classList.contains('show')) {
          const isError = this.feedback.classList.contains('error');
          if (isError) {
            this.feedback.textContent = i18n.t('section.activities.sort-shapes.tryAgain');
          } else {
            this.feedback.textContent = i18n.t('section.activities.sort-shapes.correct');
          }
        }
      },

      /**
       * Generate a new round
       */
      generateRound() {
        this.feedback.classList.remove('show');
        this.sortedShapes = { bin1: [], bin2: [] };
        this.btnCheck.disabled = false;

        // Get current challenge
        this.currentChallenge = this.challenges[this.currentRound - 1];

        // Generate shapes for this round (mix that applies to both categories)
        this.currentShapes = this.generateShapesForChallenge();

        this.renderRule();
        this.renderBins();
        this.renderShapes();
      },

      /**
       * Generate shapes that include both categories
       */
      generateShapesForChallenge() {
        const allShapeNames = Object.keys(this.shapes);
        const rule = this.currentChallenge.rule;

        // Split shapes into matching and non-matching
        const matching = allShapeNames.filter(rule);
        const notMatching = allShapeNames.filter(s => !rule(s));

        // Select 2-3 from each category
        const selectedMatching = shuffle(matching).slice(0, Math.min(3, matching.length));
        const selectedNotMatching = shuffle(notMatching).slice(0, Math.min(3, notMatching.length));

        // Create shape objects with unique IDs and colors
        const shapes = [];
        let id = 0;

        selectedMatching.forEach(shapeName => {
          shapes.push({
            id: id++,
            name: shapeName,
            color: this.colors[randomInt(0, this.colors.length - 1)],
            matchesBin1: true
          });
        });

        selectedNotMatching.forEach(shapeName => {
          shapes.push({
            id: id++,
            name: shapeName,
            color: this.colors[randomInt(0, this.colors.length - 1)],
            matchesBin1: false
          });
        });

        return shuffle(shapes);
      },

      /**
       * Render the sorting rule
       */
      renderRule() {
        this.sortingRule.textContent = i18n.t('section.activities.sort-shapes.sortBy');
      },

      /**
       * Render the sorting bins
       */
      renderBins() {
        const bin1Label = i18n.t(`section.activities.sort-shapes.bins.${this.currentChallenge.bin1Key}`);
        const bin2Label = i18n.t(`section.activities.sort-shapes.bins.${this.currentChallenge.bin2Key}`);

        this.sortingBins.innerHTML = `
          <div class="sorting-bin" id="bin1" data-bin="bin1">
            <div class="bin-label">${bin1Label}</div>
            <div class="bin-shapes" id="bin1-shapes"></div>
          </div>
          <div class="sorting-bin" id="bin2" data-bin="bin2">
            <div class="bin-label">${bin2Label}</div>
            <div class="bin-shapes" id="bin2-shapes"></div>
          </div>
        `;

        // Re-render any sorted shapes
        this.renderSortedShapes();
      },

      /**
       * Render shapes in the tray
       */
      renderShapes() {
        this.shapesTray.innerHTML = '';

        // Only show shapes that haven't been sorted yet
        const unsortedShapes = this.currentShapes.filter(shape =>
          !this.sortedShapes.bin1.includes(shape.id) &&
          !this.sortedShapes.bin2.includes(shape.id)
        );

        unsortedShapes.forEach(shape => {
          const shapeEl = this.createShapeElement(shape);
          this.shapesTray.appendChild(shapeEl);
        });
      },

      /**
       * Create a shape element
       */
      createShapeElement(shape, isSorted = false) {
        const shapeEl = document.createElement('div');
        shapeEl.className = 'sortable-shape' + (isSorted ? ' sorted' : '');
        shapeEl.dataset.shapeId = shape.id;
        shapeEl.dataset.shapeName = shape.name;
        shapeEl.innerHTML = `<svg viewBox="0 0 60 60">${this.shapes[shape.name].svg(shape.color)}</svg>`;

        if (!isSorted) {
          // Add drag listeners
          shapeEl.addEventListener('mousedown', (e) => this.startDrag(e, shapeEl, shape));
          shapeEl.addEventListener('touchstart', (e) => this.startDrag(e, shapeEl, shape), { passive: false });

          // Keyboard support
          shapeEl.setAttribute('tabindex', '0');
          shapeEl.setAttribute('role', 'button');
          shapeEl.setAttribute('aria-label', i18n.t(`section.activities.sort-shapes.shapes.${shape.name}`) || shape.name);
          shapeEl.addEventListener('keydown', (e) => {
            if (e.key === '1') {
              e.preventDefault();
              this.placeInBin(shape, 'bin1');
            } else if (e.key === '2') {
              e.preventDefault();
              this.placeInBin(shape, 'bin2');
            }
          });
        } else {
          // Click to remove from bin
          shapeEl.addEventListener('click', () => this.removeFromBin(shape));
          shapeEl.setAttribute('tabindex', '0');
          shapeEl.setAttribute('role', 'button');
          shapeEl.setAttribute('aria-label', i18n.t('section.activities.sort-shapes.clickToRemove'));
          shapeEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.removeFromBin(shape);
            }
          });
        }

        return shapeEl;
      },

      /**
       * Render sorted shapes in bins
       */
      renderSortedShapes() {
        const bin1Shapes = document.getElementById('bin1-shapes');
        const bin2Shapes = document.getElementById('bin2-shapes');

        if (bin1Shapes) {
          bin1Shapes.innerHTML = '';
          this.sortedShapes.bin1.forEach(shapeId => {
            const shape = this.currentShapes.find(s => s.id === shapeId);
            if (shape) {
              bin1Shapes.appendChild(this.createShapeElement(shape, true));
            }
          });
        }

        if (bin2Shapes) {
          bin2Shapes.innerHTML = '';
          this.sortedShapes.bin2.forEach(shapeId => {
            const shape = this.currentShapes.find(s => s.id === shapeId);
            if (shape) {
              bin2Shapes.appendChild(this.createShapeElement(shape, true));
            }
          });
        }
      },

      /**
       * Set up global event listeners (called once during init)
       */
      setupGlobalListeners() {
        this.boundOnDrag = (e) => this.onDrag(e);
        this.boundEndDrag = (e) => this.endDrag(e);

        document.addEventListener('mousemove', this.boundOnDrag);
        document.addEventListener('mouseup', this.boundEndDrag);
        document.addEventListener('touchmove', this.boundOnDrag, { passive: false });
        document.addEventListener('touchend', this.boundEndDrag);
      },

      /**
       * Start dragging a shape
       */
      startDrag(e, shapeEl, shape) {
        e.preventDefault();

        const touch = e.touches ? e.touches[0] : e;
        const rect = shapeEl.getBoundingClientRect();

        this.draggedShape = shape;
        this.dragOffsetX = touch.clientX - rect.left;
        this.dragOffsetY = touch.clientY - rect.top;

        shapeEl.classList.add('dragging');

        // Create a clone for dragging
        this.dragClone = shapeEl.cloneNode(true);
        this.dragClone.style.position = 'fixed';
        this.dragClone.style.pointerEvents = 'none';
        this.dragClone.style.zIndex = '1000';
        this.dragClone.style.width = shapeEl.offsetWidth + 'px';
        this.dragClone.style.height = shapeEl.offsetHeight + 'px';
        this.dragClone.style.left = (touch.clientX - this.dragOffsetX) + 'px';
        this.dragClone.style.top = (touch.clientY - this.dragOffsetY) + 'px';
        document.body.appendChild(this.dragClone);
      },

      /**
       * Handle drag movement
       */
      onDrag(e) {
        if (!this.draggedShape || !this.dragClone) return;

        e.preventDefault();

        const touch = e.touches ? e.touches[0] : e;
        this.dragClone.style.left = (touch.clientX - this.dragOffsetX) + 'px';
        this.dragClone.style.top = (touch.clientY - this.dragOffsetY) + 'px';

        // Check if over either bin
        const bins = this.sortingBins.querySelectorAll('.sorting-bin');
        bins.forEach(bin => {
          const binRect = bin.getBoundingClientRect();
          const isOver = touch.clientX >= binRect.left && touch.clientX <= binRect.right &&
                        touch.clientY >= binRect.top && touch.clientY <= binRect.bottom;
          bin.classList.toggle('drag-over', isOver);
        });
      },

      /**
       * End drag operation
       */
      endDrag(e) {
        if (!this.draggedShape) return;

        const touch = e.changedTouches ? e.changedTouches[0] : e;

        // Check which bin (if any) the shape was dropped on
        const bins = this.sortingBins.querySelectorAll('.sorting-bin');
        bins.forEach(bin => {
          const binRect = bin.getBoundingClientRect();
          const isOver = touch.clientX >= binRect.left && touch.clientX <= binRect.right &&
                        touch.clientY >= binRect.top && touch.clientY <= binRect.bottom;

          if (isOver) {
            this.placeInBin(this.draggedShape, bin.dataset.bin);
          }

          bin.classList.remove('drag-over');
        });

        // Clean up
        const draggingEl = this.shapesTray.querySelector('.dragging');
        if (draggingEl) {
          draggingEl.classList.remove('dragging');
        }

        if (this.dragClone) {
          this.dragClone.remove();
          this.dragClone = null;
        }

        this.draggedShape = null;
      },

      /**
       * Place a shape in a bin
       */
      placeInBin(shape, binId) {
        // Remove from other bin if present
        this.sortedShapes.bin1 = this.sortedShapes.bin1.filter(id => id !== shape.id);
        this.sortedShapes.bin2 = this.sortedShapes.bin2.filter(id => id !== shape.id);

        // Add to target bin
        this.sortedShapes[binId].push(shape.id);

        // Re-render
        this.renderShapes();
        this.renderSortedShapes();
      },

      /**
       * Remove a shape from its bin
       */
      removeFromBin(shape) {
        this.sortedShapes.bin1 = this.sortedShapes.bin1.filter(id => id !== shape.id);
        this.sortedShapes.bin2 = this.sortedShapes.bin2.filter(id => id !== shape.id);

        this.renderShapes();
        this.renderSortedShapes();
      },

      /**
       * Check if all shapes are correctly sorted
       */
      checkAnswer() {
        // Make sure all shapes are sorted
        const totalSorted = this.sortedShapes.bin1.length + this.sortedShapes.bin2.length;
        if (totalSorted < this.currentShapes.length) {
          this.feedback.textContent = i18n.t('section.activities.sort-shapes.sortAll');
          this.feedback.classList.add('show', 'error');
          setTimeout(() => {
            this.feedback.classList.remove('show');
          }, 1500);
          return;
        }

        this.btnCheck.disabled = true;

        // Check each shape
        let allCorrect = true;
        const bin1El = document.getElementById('bin1');
        const bin2El = document.getElementById('bin2');

        this.currentShapes.forEach(shape => {
          const inBin1 = this.sortedShapes.bin1.includes(shape.id);
          const shouldBeInBin1 = shape.matchesBin1;
          const isCorrect = inBin1 === shouldBeInBin1;

          if (!isCorrect) {
            allCorrect = false;
          }

          // Highlight the shape
          const shapeEl = this.sortingBins.querySelector(`[data-shape-id="${shape.id}"]`);
          if (shapeEl) {
            shapeEl.classList.add(isCorrect ? 'correct-shape' : 'incorrect-shape');
          }
        });

        // Highlight bins
        if (allCorrect) {
          bin1El.classList.add('correct-bin');
          bin2El.classList.add('correct-bin');
          this.feedback.textContent = i18n.t('section.activities.sort-shapes.correct');
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;
        } else {
          bin1El.classList.add('incorrect-bin');
          bin2El.classList.add('incorrect-bin');
          this.feedback.textContent = i18n.t('section.activities.sort-shapes.tryAgain');
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.sort-shapes.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.sort-shapes.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.sort-shapes.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.sort-shapes.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the entire activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateChallengeSequence();
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      SortShapes.init();
    });
  </script>
