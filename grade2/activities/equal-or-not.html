  <script>
    // Equal or Not Activity - Grade 2
    const EqualOrNot = {
      // Game state
      currentRound: 1,
      maxRounds: 10,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      currentQuestion: null,
      questions: [],

      // DOM elements
      shapeDisplay: null,
      answerChoices: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Shape colors
      colors: {
        fill: ['#fecaca', '#fed7aa', '#fef08a', '#bbf7d0', '#bae6fd', '#ddd6fe', '#fbcfe8'],
        stroke: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#0ea5e9', '#8b5cf6', '#ec4899']
      },

      /**
       * Shape generators - create equal and unequal partitions
       */
      shapes: {
        // Rectangle partitions
        rectangleHalvesEqual: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="20" y="50" width="160" height="100" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="100" y1="50" x2="100" y2="150" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        rectangleHalvesUnequal: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="20" y="50" width="160" height="100" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="70" y1="50" x2="70" y2="150" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        rectangleThirdsEqual: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="20" y="50" width="160" height="100" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="73" y1="50" x2="73" y2="150" stroke="${stroke}" stroke-width="3"/>
            <line x1="127" y1="50" x2="127" y2="150" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        rectangleThirdsUnequal: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="20" y="50" width="160" height="100" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="60" y1="50" x2="60" y2="150" stroke="${stroke}" stroke-width="3"/>
            <line x1="140" y1="50" x2="140" y2="150" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        rectangleFourthsEqual: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="20" y="50" width="160" height="100" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="60" y1="50" x2="60" y2="150" stroke="${stroke}" stroke-width="3"/>
            <line x1="100" y1="50" x2="100" y2="150" stroke="${stroke}" stroke-width="3"/>
            <line x1="140" y1="50" x2="140" y2="150" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        rectangleFourthsUnequal: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="20" y="50" width="160" height="100" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="50" y1="50" x2="50" y2="150" stroke="${stroke}" stroke-width="3"/>
            <line x1="100" y1="50" x2="100" y2="150" stroke="${stroke}" stroke-width="3"/>
            <line x1="130" y1="50" x2="130" y2="150" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        // Circle partitions
        circleHalvesEqual: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="70" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="100" y1="30" x2="100" y2="170" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        circleHalvesUnequal: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="70" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="60" y1="43" x2="60" y2="157" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        circleThirdsEqual: (fill, stroke) => {
          // 3 equal pie slices
          const cx = 100, cy = 100, r = 70;
          const angles = [90, 210, 330];
          let lines = '';
          angles.forEach(angle => {
            const rad = angle * Math.PI / 180;
            const x2 = cx + r * Math.cos(rad);
            const y2 = cy - r * Math.sin(rad);
            lines += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="3"/>`;
          });
          return `
            <svg viewBox="0 0 200 200">
              <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
              ${lines}
            </svg>
          `;
        },
        circleThirdsUnequal: (fill, stroke) => {
          // Unequal pie slices
          const cx = 100, cy = 100, r = 70;
          const angles = [90, 180, 330];
          let lines = '';
          angles.forEach(angle => {
            const rad = angle * Math.PI / 180;
            const x2 = cx + r * Math.cos(rad);
            const y2 = cy - r * Math.sin(rad);
            lines += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="3"/>`;
          });
          return `
            <svg viewBox="0 0 200 200">
              <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
              ${lines}
            </svg>
          `;
        },
        circleFourthsEqual: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="70" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="100" y1="30" x2="100" y2="170" stroke="${stroke}" stroke-width="3"/>
            <line x1="30" y1="100" x2="170" y2="100" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        circleFourthsUnequal: (fill, stroke) => {
          // Unequal pie slices
          const cx = 100, cy = 100, r = 70;
          const angles = [60, 150, 240, 310];
          let lines = '';
          angles.forEach(angle => {
            const rad = angle * Math.PI / 180;
            const x2 = cx + r * Math.cos(rad);
            const y2 = cy - r * Math.sin(rad);
            lines += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="3"/>`;
          });
          return `
            <svg viewBox="0 0 200 200">
              <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
              ${lines}
            </svg>
          `;
        },
        // Square partitions (horizontal)
        squareHalvesEqualHorizontal: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="40" y="40" width="120" height="120" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="40" y1="100" x2="160" y2="100" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        squareHalvesUnequalHorizontal: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="40" y="40" width="120" height="120" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="40" y1="70" x2="160" y2="70" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        // Square diagonal
        squareHalvesDiagonalEqual: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="40" y="40" width="120" height="120" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="40" y1="40" x2="160" y2="160" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        squareFourthsEqualGrid: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="40" y="40" width="120" height="120" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="100" y1="40" x2="100" y2="160" stroke="${stroke}" stroke-width="3"/>
            <line x1="40" y1="100" x2="160" y2="100" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `,
        squareFourthsUnequalGrid: (fill, stroke) => `
          <svg viewBox="0 0 200 200">
            <rect x="40" y="40" width="120" height="120" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
            <line x1="80" y1="40" x2="80" y2="160" stroke="${stroke}" stroke-width="3"/>
            <line x1="40" y1="80" x2="160" y2="80" stroke="${stroke}" stroke-width="3"/>
          </svg>
        `
      },

      /**
       * Question definitions
       */
      questionPool: [
        { shape: 'rectangleHalvesEqual', isEqual: true },
        { shape: 'rectangleHalvesUnequal', isEqual: false },
        { shape: 'rectangleThirdsEqual', isEqual: true },
        { shape: 'rectangleThirdsUnequal', isEqual: false },
        { shape: 'rectangleFourthsEqual', isEqual: true },
        { shape: 'rectangleFourthsUnequal', isEqual: false },
        { shape: 'circleHalvesEqual', isEqual: true },
        { shape: 'circleHalvesUnequal', isEqual: false },
        { shape: 'circleThirdsEqual', isEqual: true },
        { shape: 'circleThirdsUnequal', isEqual: false },
        { shape: 'circleFourthsEqual', isEqual: true },
        { shape: 'circleFourthsUnequal', isEqual: false },
        { shape: 'squareHalvesEqualHorizontal', isEqual: true },
        { shape: 'squareHalvesUnequalHorizontal', isEqual: false },
        { shape: 'squareHalvesDiagonalEqual', isEqual: true },
        { shape: 'squareFourthsEqualGrid', isEqual: true },
        { shape: 'squareFourthsUnequalGrid', isEqual: false }
      ],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.shapeDisplay = document.getElementById('shape-display');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Set up choice buttons
        const choiceBtns = this.answerChoices.querySelectorAll('.choice-btn');
        choiceBtns.forEach(btn => {
          btn.addEventListener('click', () => this.checkAnswer(btn.dataset.answer, btn));
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.checkAnswer(btn.dataset.answer, btn);
            }
          });
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Generate question sequence
        this.generateSequence();

        // Start first round
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Generate a random sequence of questions
       */
      generateSequence() {
        this.questions = [];

        // Shuffle and pick questions, ensuring a mix of equal and not equal
        const shuffled = shuffle([...this.questionPool]);

        // Ensure roughly equal distribution
        const equalQuestions = shuffled.filter(q => q.isEqual);
        const notEqualQuestions = shuffled.filter(q => !q.isEqual);

        // Pick alternating to ensure balance
        for (let i = 0; i < this.maxRounds; i++) {
          const colorIndex = randomInt(0, this.colors.fill.length - 1);
          if (i % 2 === 0 && equalQuestions.length > 0) {
            const q = equalQuestions.shift();
            this.questions.push({ ...q, colorIndex });
          } else if (notEqualQuestions.length > 0) {
            const q = notEqualQuestions.shift();
            this.questions.push({ ...q, colorIndex });
          } else if (equalQuestions.length > 0) {
            const q = equalQuestions.shift();
            this.questions.push({ ...q, colorIndex });
          }
        }

        // Shuffle final order
        this.questions = shuffle(this.questions);
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        // Update feedback message if showing
        if (this.feedback.classList.contains('show')) {
          const isError = this.feedback.classList.contains('error');
          if (isError) {
            if (this.currentQuestion.isEqual) {
              this.feedback.textContent = i18n.t('section.activities.equal-or-not.wasEqual');
            } else {
              this.feedback.textContent = i18n.t('section.activities.equal-or-not.wasNotEqual');
            }
          } else {
            this.feedback.textContent = i18n.t('section.activities.equal-or-not.correct');
          }
        }
      },

      /**
       * Generate a new round
       */
      generateRound() {
        this.feedback.classList.remove('show');
        this.currentQuestion = this.questions[this.currentRound - 1];

        // Reset button states
        const choiceBtns = this.answerChoices.querySelectorAll('.choice-btn');
        choiceBtns.forEach(btn => {
          btn.disabled = false;
          btn.classList.remove('selected', 'correct', 'incorrect');
        });

        this.renderShape();
      },

      /**
       * Render the current shape
       */
      renderShape() {
        const { shape, colorIndex } = this.currentQuestion;
        const fill = this.colors.fill[colorIndex];
        const stroke = this.colors.stroke[colorIndex];

        const shapeGenerator = this.shapes[shape];
        if (shapeGenerator) {
          this.shapeDisplay.innerHTML = shapeGenerator(fill, stroke);
        }
      },

      /**
       * Check the selected answer
       */
      checkAnswer(answer, selectedBtn) {
        // Disable all buttons
        const choiceBtns = this.answerChoices.querySelectorAll('.choice-btn');
        choiceBtns.forEach(btn => btn.disabled = true);

        const isEqual = this.currentQuestion.isEqual;
        const isCorrect = (answer === 'equal' && isEqual) || (answer === 'not-equal' && !isEqual);

        selectedBtn.classList.add('selected');

        if (isCorrect) {
          selectedBtn.classList.add('correct');
          this.feedback.textContent = i18n.t('section.activities.equal-or-not.correct');
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;
        } else {
          selectedBtn.classList.add('incorrect');
          // Show correct answer
          if (isEqual) {
            this.feedback.textContent = i18n.t('section.activities.equal-or-not.wasEqual');
          } else {
            this.feedback.textContent = i18n.t('section.activities.equal-or-not.wasNotEqual');
          }
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.equal-or-not.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.equal-or-not.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.equal-or-not.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.equal-or-not.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the entire activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateSequence();
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      EqualOrNot.init();
    });
  </script>
