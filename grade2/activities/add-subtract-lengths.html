  <script>
    // Add/Subtract Lengths Activity - Grade 2 Level 4
    const AddSubtractLengths = {
      currentQuestion: 0,
      totalQuestions: 8,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // Current question state
      originalLength: 0,
      changeLength: 0,
      operation: 'add', // 'add' or 'subtract'
      unit: 'cm',
      storyType: null,

      // Story templates
      storyTemplates: {
        add: [
          { icon: '🎀', key: 'ribbonAdd', object: 'ribbon' },
          { icon: '🪵', key: 'stickAdd', object: 'stick' },
          { icon: '📏', key: 'paperAdd', object: 'paper' },
          { icon: '🧵', key: 'stringAdd', object: 'string' }
        ],
        subtract: [
          { icon: '🎀', key: 'ribbonCut', object: 'ribbon' },
          { icon: '🪵', key: 'stickBreak', object: 'stick' },
          { icon: '📏', key: 'paperCut', object: 'paper' },
          { icon: '🧵', key: 'stringCut', object: 'string' }
        ]
      },

      // DOM elements
      storyIcon: null,
      storyText: null,
      originalBar: null,
      originalLabel: null,
      operationIndicator: null,
      resultBar: null,
      resultLabel: null,
      questionText: null,
      choiceContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.storyIcon = document.getElementById('story-icon');
        this.storyText = document.getElementById('story-text');
        this.originalBar = document.getElementById('original-bar');
        this.originalLabel = document.getElementById('original-label');
        this.operationIndicator = document.getElementById('operation-indicator');
        this.resultBar = document.getElementById('result-bar');
        this.resultLabel = document.getElementById('result-label');
        this.resultContainer = document.getElementById('result-container');
        this.questionText = document.getElementById('question-text');
        this.choiceContainer = document.getElementById('choice-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Redraw visual on resize for responsive scaling
        window.addEventListener('resize', () => {
          this.renderVisual();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Re-render story and question on language change
        if (!this.isAnswered) {
          this.renderStory();
          this.renderQuestion();
        }
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      generateQuestion() {
        // Alternate between addition and subtraction
        this.operation = this.currentQuestion % 2 === 0 ? 'add' : 'subtract';

        // Alternate units
        this.unit = this.currentQuestion % 4 < 2 ? 'cm' : 'inches';

        // Generate lengths based on operation
        if (this.operation === 'add') {
          // For addition: two smaller numbers that add up to ≤ 50
          this.originalLength = this.randomInt(5, 30);
          this.changeLength = this.randomInt(3, Math.min(20, 50 - this.originalLength));
        } else {
          // For subtraction: larger number minus smaller (result > 0)
          this.originalLength = this.randomInt(15, 40);
          this.changeLength = this.randomInt(3, Math.min(15, this.originalLength - 2));
        }

        // Pick a story template
        const templates = this.storyTemplates[this.operation];
        this.storyType = templates[this.randomInt(0, templates.length - 1)];

        this.isAnswered = false;
      },

      getAnswer() {
        return this.operation === 'add'
          ? this.originalLength + this.changeLength
          : this.originalLength - this.changeLength;
      },

      startQuestion() {
        this.generateQuestion();
        this.renderStory();
        this.renderVisual();
        this.renderQuestion();
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderStory() {
        const unitLabel = this.getUnitLabel();
        const storyKey = `section.activities.add-subtract-lengths.stories.${this.storyType.key}`;

        this.storyIcon.textContent = this.storyType.icon;

        // Try to get translated story, fallback to English
        let storyText = window.i18n ? i18n.t(storyKey) : null;

        if (!storyText || storyText === storyKey) {
          // Fallback stories in English
          const fallbackStories = {
            ribbonAdd: `A ribbon is ${this.originalLength} ${unitLabel} long. You add another piece that is ${this.changeLength} ${unitLabel}.`,
            stickAdd: `A stick is ${this.originalLength} ${unitLabel} long. You attach another piece that is ${this.changeLength} ${unitLabel}.`,
            paperAdd: `A strip of paper is ${this.originalLength} ${unitLabel} long. You tape on ${this.changeLength} ${unitLabel} more.`,
            stringAdd: `A piece of string is ${this.originalLength} ${unitLabel} long. You tie on ${this.changeLength} ${unitLabel} more.`,
            ribbonCut: `A ribbon is ${this.originalLength} ${unitLabel} long. You cut off ${this.changeLength} ${unitLabel}.`,
            stickBreak: `A stick is ${this.originalLength} ${unitLabel} long. ${this.changeLength} ${unitLabel} breaks off.`,
            paperCut: `A strip of paper is ${this.originalLength} ${unitLabel} long. You cut off ${this.changeLength} ${unitLabel}.`,
            stringCut: `A piece of string is ${this.originalLength} ${unitLabel} long. You cut off ${this.changeLength} ${unitLabel}.`
          };
          storyText = fallbackStories[this.storyType.key];
        } else {
          // Replace placeholders
          storyText = storyText
            .replace('{original}', this.originalLength)
            .replace('{change}', this.changeLength)
            .replace('{unit}', unitLabel);
        }

        this.storyText.textContent = storyText;
      },

      getUnitLabel() {
        if (this.unit === 'cm') {
          return window.i18n ? i18n.t('section.activities.add-subtract-lengths.cm') : 'cm';
        } else {
          return window.i18n ? i18n.t('section.activities.add-subtract-lengths.inches') : 'in';
        }
      },

      renderVisual() {
        const unitLabel = this.getUnitLabel();
        const answer = this.getAnswer();

        // Scale for visual (pixels per unit)
        const isMobile = window.innerWidth <= 480;
        const pixelsPerUnit = this.unit === 'cm'
          ? (isMobile ? 4 : 6)
          : (isMobile ? 8 : 12);
        const maxWidth = isMobile ? 250 : 350;

        // Original bar
        const originalWidth = Math.min(this.originalLength * pixelsPerUnit, maxWidth);
        this.originalBar.style.width = `${originalWidth}px`;
        this.originalLabel.textContent = `${this.originalLength} ${unitLabel}`;

        // Operation indicator
        if (this.operation === 'add') {
          this.operationIndicator.textContent = `+ ${this.changeLength} ${unitLabel}`;
          this.operationIndicator.className = 'operation-indicator add';
        } else {
          this.operationIndicator.textContent = `− ${this.changeLength} ${unitLabel}`;
          this.operationIndicator.className = 'operation-indicator subtract';
        }

        // Result bar (hidden until answered)
        this.resultBar.style.width = '0px';
        this.resultLabel.textContent = '?';
        this.resultContainer.classList.remove('revealed');
      },

      renderQuestion() {
        this.choiceContainer.innerHTML = '';

        if (this.isAnswered) return;

        const unitLabel = this.getUnitLabel();
        const answer = this.getAnswer();

        // Set question text
        let questionKey = this.operation === 'add'
          ? 'section.activities.add-subtract-lengths.howLongNow'
          : 'section.activities.add-subtract-lengths.howLongLeft';

        let question = window.i18n ? i18n.t(questionKey) : null;
        if (!question || question === questionKey) {
          question = this.operation === 'add'
            ? 'How long is it now?'
            : 'How long is it now?';
        }
        this.questionText.textContent = question;

        // Generate choices
        const choices = [answer];
        const distractors = new Set();

        // Wrong operation answer
        const wrongOp = this.operation === 'add'
          ? this.originalLength - this.changeLength
          : this.originalLength + this.changeLength;
        if (wrongOp > 0) distractors.add(wrongOp);

        // Off by small amounts
        [-3, -2, -1, 1, 2, 3, 5].forEach(offset => {
          const d = answer + offset;
          if (d > 0 && d !== answer) {
            distractors.add(d);
          }
        });

        // Convert to array and pick 3
        const distractorArray = Array.from(distractors).filter(d => d !== answer);
        this.shuffleArray(distractorArray);
        choices.push(...distractorArray.slice(0, 3));

        // Ensure we have 4 choices
        while (choices.length < 4) {
          const extra = this.randomInt(Math.max(1, answer - 10), answer + 10);
          if (extra > 0 && !choices.includes(extra)) {
            choices.push(extra);
          }
        }

        this.shuffleArray(choices);

        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = `${choice} ${unitLabel}`;
          btn.dataset.value = choice;
          btn.addEventListener('click', () => this.selectAnswer(choice));
          this.choiceContainer.appendChild(btn);
        });
      },

      selectAnswer(value) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const answer = this.getAnswer();
        const isCorrect = value === answer;
        const unitLabel = this.getUnitLabel();

        // Highlight buttons
        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          const btnValue = parseInt(btn.dataset.value);
          if (btnValue === answer) {
            btn.classList.add('correct');
          } else if (btnValue === value && !isCorrect) {
            btn.classList.add('incorrect');
          }
          btn.disabled = true;
        });

        // Reveal result bar
        this.revealResult(answer);

        if (isCorrect) {
          this.correctCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.add-subtract-lengths.correct')
                .replace('{answer}', answer)
                .replace('{unit}', unitLabel)
            : `✓ Correct! It's ${answer} ${unitLabel}.`;
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.add-subtract-lengths.wrong')
                .replace('{answer}', answer)
                .replace('{unit}', unitLabel)
            : `The answer is ${answer} ${unitLabel}.`;
          this.feedback.textContent = msg;
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      revealResult(answer) {
        const unitLabel = this.getUnitLabel();
        const isMobile = window.innerWidth <= 480;
        const pixelsPerUnit = this.unit === 'cm'
          ? (isMobile ? 4 : 6)
          : (isMobile ? 8 : 12);
        const maxWidth = isMobile ? 250 : 350;

        const resultWidth = Math.min(answer * pixelsPerUnit, maxWidth);

        this.resultContainer.classList.add('revealed');
        this.resultBar.style.width = `${resultWidth}px`;
        this.resultLabel.textContent = `${answer} ${unitLabel}`;
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.isAnswered = false;
        this.renderQuestion();
        this.renderVisual();
        this.feedback.classList.remove('show', 'error');
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.add-subtract-lengths.perfect')
            : 'Amazing length skills!';
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '🧮';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.add-subtract-lengths.great')
            : 'Great work with lengths!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.add-subtract-lengths.keepPracticing')
            : 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      AddSubtractLengths.init();
    });
  </script>

    }

    .length-bar-label {

      opacity: 1;

    /* Operation Indicator */

      display: inline-flex;
      align-items: center;

      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);

      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
