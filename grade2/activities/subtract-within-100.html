  <script>
    // Subtract Within 100 Activity - Grade 2
    const SubtractWithin100 = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      num1: 0, // minuend
      num2: 0, // subtrahend
      correctAnswer: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // DOM elements
      num1Label: null,
      num2Label: null,
      num1Tens: null,
      num1Ones: null,
      num2Tens: null,
      num2Ones: null,
      choiceContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.num1Label = document.getElementById('num1-label');
        this.num2Label = document.getElementById('num2-label');
        this.num1Tens = document.getElementById('num1-tens');
        this.num1Ones = document.getElementById('num1-ones');
        this.num2Tens = document.getElementById('num2-tens');
        this.num2Ones = document.getElementById('num2-ones');
        this.choiceContainer = document.getElementById('choice-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Update stats message if visible
        if (this.statsOverlay.classList.contains('show')) {
          const percentage = (this.correctCount / this.totalQuestions) * 100;
          if (percentage >= 80) {
            this.statsMessage.textContent = window.i18n ? i18n.t('section.activities.subtract-within-100.perfect') : 'Amazing subtraction skills!';
          } else if (percentage >= 50) {
            this.statsMessage.textContent = window.i18n ? i18n.t('section.activities.subtract-within-100.great') : 'Great subtracting!';
          } else {
            this.statsMessage.textContent = window.i18n ? i18n.t('section.activities.subtract-within-100.keepPracticing') : 'Keep practicing!';
          }
        }
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      generateProblem() {
        // Progressive difficulty
        if (this.currentQuestion < 3) {
          // Easy: No regrouping (ones in minuend >= ones in subtrahend)
          const t1 = this.randomInt(3, 6);
          const o1 = this.randomInt(5, 9);
          const t2 = this.randomInt(1, t1 - 1);
          const o2 = this.randomInt(1, o1);
          this.num1 = t1 * 10 + o1;
          this.num2 = t2 * 10 + o2;
        } else if (this.currentQuestion < 7) {
          // Medium: May have regrouping (ones in minuend < ones in subtrahend)
          const t1 = this.randomInt(4, 7);
          const o1 = this.randomInt(2, 5);
          const t2 = this.randomInt(1, t1 - 2);
          const o2 = this.randomInt(o1 + 1, 9);
          this.num1 = t1 * 10 + o1;
          this.num2 = t2 * 10 + o2;
          // Ensure result is positive
          if (this.num1 - this.num2 < 10) {
            this.num2 = Math.max(11, this.num1 - this.randomInt(15, 30));
          }
        } else {
          // Hard: Larger numbers, likely regrouping
          const t1 = this.randomInt(5, 9);
          const o1 = this.randomInt(1, 4);
          const t2 = this.randomInt(2, t1 - 1);
          const o2 = this.randomInt(5, 9);
          this.num1 = t1 * 10 + o1;
          this.num2 = t2 * 10 + o2;
          // Ensure result is positive and reasonable
          if (this.num1 - this.num2 < 10) {
            this.num2 = Math.max(11, this.num1 - this.randomInt(20, 40));
          }
        }

        this.correctAnswer = this.num1 - this.num2;
        this.isAnswered = false;
      },

      startQuestion() {
        this.generateProblem();
        this.renderBlocks();
        this.renderChoices();
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderBlocks() {
        const t1 = Math.floor(this.num1 / 10);
        const o1 = this.num1 % 10;
        const t2 = Math.floor(this.num2 / 10);
        const o2 = this.num2 % 10;

        // Update labels
        this.num1Label.textContent = this.num1;
        this.num2Label.textContent = this.num2;

        // Render minuend's tens
        this.num1Tens.innerHTML = '';
        for (let i = 0; i < t1; i++) {
          const block = document.createElement('div');
          block.className = 'block ten-block';
          block.textContent = '10';
          this.num1Tens.appendChild(block);
        }

        // Render minuend's ones
        this.num1Ones.innerHTML = '';
        for (let i = 0; i < o1; i++) {
          const block = document.createElement('div');
          block.className = 'block one-block';
          this.num1Ones.appendChild(block);
        }

        // Render subtrahend's tens (crossed out style)
        this.num2Tens.innerHTML = '';
        for (let i = 0; i < t2; i++) {
          const block = document.createElement('div');
          block.className = 'block ten-block subtract-block';
          block.textContent = '10';
          this.num2Tens.appendChild(block);
        }

        // Render subtrahend's ones (crossed out style)
        this.num2Ones.innerHTML = '';
        for (let i = 0; i < o2; i++) {
          const block = document.createElement('div');
          block.className = 'block one-block subtract-block';
          this.num2Ones.appendChild(block);
        }
      },

      renderChoices() {
        this.choiceContainer.innerHTML = '';

        if (this.isAnswered) return;

        const choices = [this.correctAnswer];

        // Generate distractors
        const distractors = [];
        // Off by 10
        distractors.push(this.correctAnswer + 10);
        if (this.correctAnswer > 10) distractors.push(this.correctAnswer - 10);
        // Off by 1
        distractors.push(this.correctAnswer + 1);
        if (this.correctAnswer > 1) distractors.push(this.correctAnswer - 1);
        // Common mistake: forgot to regroup (off by 10 in wrong direction)
        const o1 = this.num1 % 10;
        const o2 = this.num2 % 10;
        if (o1 < o2) {
          // Regrouping case - might forget to borrow, getting wrong answer
          const wrongNoRegroup = this.correctAnswer + 10;
          distractors.push(wrongNoRegroup);
          // Or might subtract wrong way in ones place
          const wrongOnesSwap = Math.floor(this.num1 / 10) * 10 - Math.floor(this.num2 / 10) * 10 + (o2 - o1);
          if (wrongOnesSwap > 0 && wrongOnesSwap !== this.correctAnswer) {
            distractors.push(wrongOnesSwap);
          }
        }
        // Swapped digits mistake
        const tens = Math.floor(this.correctAnswer / 10);
        const ones = this.correctAnswer % 10;
        if (tens !== ones && ones * 10 + tens > 0) distractors.push(ones * 10 + tens);

        // Filter valid unique distractors
        const validDistractors = distractors.filter(d =>
          d > 0 && d < 100 && !choices.includes(d)
        );
        this.shuffleArray(validDistractors);
        choices.push(...validDistractors.slice(0, 3));

        // Fill remaining with random if needed
        while (choices.length < 4) {
          const d = this.randomInt(
            Math.max(1, this.correctAnswer - 20),
            Math.min(99, this.correctAnswer + 20)
          );
          if (!choices.includes(d) && d > 0) choices.push(d);
        }

        this.shuffleArray(choices);

        choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = choice;
          btn.dataset.value = choice;
          btn.setAttribute('aria-label', `Answer: ${choice}`);
          btn.addEventListener('click', () => this.selectChoice(choice));
          this.choiceContainer.appendChild(btn);
        });
      },

      selectChoice(value) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const isCorrect = value === this.correctAnswer;

        // Highlight selection
        const buttons = this.choiceContainer.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.disabled = true;
          const btnValue = parseInt(btn.dataset.value);
          if (btnValue === this.correctAnswer) {
            btn.classList.add('correct');
          } else if (btnValue === value && !isCorrect) {
            btn.classList.add('incorrect');
          }
        });

        if (isCorrect) {
          this.correctCount++;
          const msg = window.i18n ? i18n.t('section.activities.subtract-within-100.correct') : 'Correct!';
          this.feedback.textContent = '✓ ' + msg.replace('{a}', this.num1).replace('{b}', this.num2).replace('{diff}', this.correctAnswer);
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          const msg = window.i18n ? i18n.t('section.activities.subtract-within-100.wrong') : `The answer is ${this.correctAnswer}`;
          this.feedback.textContent = msg.replace('{a}', this.num1).replace('{b}', this.num2).replace('{diff}', this.correctAnswer);
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = window.i18n ? i18n.t('section.activities.subtract-within-100.perfect') : 'Amazing subtraction skills!';
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '➖';
          this.statsMessage.textContent = window.i18n ? i18n.t('section.activities.subtract-within-100.great') : 'Great subtracting!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = window.i18n ? i18n.t('section.activities.subtract-within-100.keepPracticing') : 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => SubtractWithin100.init());
      } else {
        SubtractWithin100.init();
      }
    });
  </script>
  <style>

    .operator-symbol {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
