  <script>
    // Make 100 Pairs Activity - Grade 2
    const Make100 = {
      currentRound: 0,
      totalRounds: 6,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,

      // Current round state
      pairs: [],          // Array of {a, b} pairs where a + b = 100
      cards: [],          // Array of card values to display
      selectedCard: null, // Currently selected card element
      matchedPairs: 0,    // Pairs matched in current round
      totalPairsInRound: 0, // Total pairs needed to complete round

      // DOM elements
      cardsContainer: null,
      matchedCount: null,
      totalPairsEl: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.cardsContainer = document.getElementById('cards-container');
        this.matchedCount = document.getElementById('matched-count');
        this.totalPairsEl = document.getElementById('total-pairs');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentRound());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startRound();
        this.renderProgress();
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      },

      updateTranslations() {
        // Update any dynamic text if needed
      },

      generatePairs() {
        // Define pairs that make 100 - grouped by difficulty
        const easyPairs = [
          { a: 50, b: 50 },
          { a: 40, b: 60 },
          { a: 30, b: 70 },
          { a: 20, b: 80 },
          { a: 10, b: 90 },
        ];

        const mediumPairs = [
          { a: 25, b: 75 },
          { a: 35, b: 65 },
          { a: 45, b: 55 },
          { a: 15, b: 85 },
          { a: 5, b: 95 },
        ];

        const hardPairs = [
          { a: 37, b: 63 },
          { a: 28, b: 72 },
          { a: 47, b: 53 },
          { a: 18, b: 82 },
          { a: 33, b: 67 },
          { a: 42, b: 58 },
          { a: 23, b: 77 },
          { a: 12, b: 88 },
          { a: 38, b: 62 },
          { a: 17, b: 83 },
        ];

        let availablePairs;
        let numPairs;

        if (this.currentRound < 2) {
          // Rounds 1-2: Easy pairs, 3 pairs per round
          availablePairs = [...easyPairs];
          numPairs = 3;
        } else if (this.currentRound < 4) {
          // Rounds 3-4: Mix of easy and medium, 3-4 pairs
          availablePairs = [...easyPairs, ...mediumPairs];
          numPairs = this.currentRound < 3 ? 3 : 4;
        } else {
          // Rounds 5-6: Mix of all including hard, 4 pairs
          availablePairs = [...easyPairs, ...mediumPairs, ...hardPairs];
          numPairs = 4;
        }

        this.shuffleArray(availablePairs);
        this.pairs = availablePairs.slice(0, numPairs);
        this.totalPairsInRound = numPairs;

        // Create cards array with all values
        this.cards = [];
        this.pairs.forEach(pair => {
          this.cards.push(pair.a);
          this.cards.push(pair.b);
        });
        this.shuffleArray(this.cards);
      },

      startRound() {
        this.generatePairs();
        this.selectedCard = null;
        this.matchedPairs = 0;
        this.renderCards();
        this.updateMatchedDisplay();
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderCards() {
        this.cardsContainer.innerHTML = '';

        this.cards.forEach((value, index) => {
          const card = document.createElement('button');
          card.className = 'number-card';
          card.textContent = value;
          card.dataset.value = value;
          card.dataset.index = index;
          card.setAttribute('aria-label', `Number ${value}`);
          card.addEventListener('click', () => this.selectCard(card));
          this.cardsContainer.appendChild(card);
        });

        // Focus first card for keyboard users
        const firstCard = this.cardsContainer.querySelector('.number-card');
        if (firstCard) {
          requestAnimationFrame(() => firstCard.focus());
        }
      },

      updateMatchedDisplay() {
        this.matchedCount.textContent = this.matchedPairs;
        this.totalPairsEl.textContent = this.totalPairsInRound;
      },

      selectCard(card) {
        // Ignore if card is already matched
        if (card.classList.contains('matched')) return;

        const value = parseInt(card.dataset.value);

        if (!this.selectedCard) {
          // First selection
          this.selectedCard = card;
          card.classList.add('selected');
          card.setAttribute('aria-pressed', 'true');
        } else if (this.selectedCard === card) {
          // Clicked same card - deselect
          card.classList.remove('selected');
          card.setAttribute('aria-pressed', 'false');
          this.selectedCard = null;
        } else {
          // Second selection - check for match
          const firstValue = parseInt(this.selectedCard.dataset.value);
          const secondValue = value;

          if (firstValue + secondValue === 100) {
            // Match found!
            this.handleMatch(this.selectedCard, card, firstValue, secondValue);
          } else {
            // No match
            this.handleNoMatch(this.selectedCard, card, firstValue, secondValue);
          }
        }
      },

      handleMatch(card1, card2, val1, val2) {
        // Mark as matched
        card1.classList.add('matched');
        card1.classList.remove('selected');
        card2.classList.add('matched');
        card1.setAttribute('aria-pressed', 'false');
        card1.disabled = true;
        card2.disabled = true;

        this.selectedCard = null;
        this.matchedPairs++;
        this.correctCount++;
        this.updateMatchedDisplay();

        // Show feedback
        const msg = window.i18n
          ? i18n.t('section.activities.make-100.pairFound')
              .replace('{a}', val1)
              .replace('{b}', val2)
          : `${val1} + ${val2} = 100`;

        this.feedback.textContent = '✓ ' + msg;
        this.feedback.classList.remove('error');
        this.feedback.classList.add('show');

        // Check if round is complete
        if (this.matchedPairs >= this.totalPairsInRound) {
          setTimeout(() => this.completeRound(), this.autoAdvanceDelay);
        } else {
          setTimeout(() => {
            this.feedback.classList.remove('show');
          }, 1200);
        }
      },

      handleNoMatch(card1, card2, val1, val2) {
        // Visual feedback for wrong match
        card1.classList.add('wrong');
        card2.classList.add('wrong');
        this.incorrectCount++;

        // Show feedback
        const sum = val1 + val2;
        const msg = window.i18n
          ? i18n.t('section.activities.make-100.notPair')
              .replace('{a}', val1)
              .replace('{b}', val2)
              .replace('{sum}', sum)
          : `${val1} + ${val2} = ${sum}, not 100`;

        this.feedback.textContent = msg;
        this.feedback.classList.add('error', 'show');

        setTimeout(() => {
          card1.classList.remove('selected', 'wrong');
          card2.classList.remove('wrong');
          card1.setAttribute('aria-pressed', 'false');
          this.selectedCard = null;
          this.feedback.classList.remove('show');
        }, 1200);
      },

      completeRound() {
        if (this.currentRound < this.totalRounds - 1) {
          this.currentRound++;
          this.startRound();
        } else {
          this.showStats();
        }
      },

      resetCurrentRound() {
        this.startRound();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const totalPossible = this.correctCount + this.incorrectCount;
        const percentage = totalPossible > 0 ? (this.correctCount / totalPossible) * 100 : 0;

        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.make-100.perfect')
            : 'Amazing matching skills!';
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '💯';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.make-100.great')
            : 'Great job making 100!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.make-100.keepPracticing')
            : 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentRound = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startRound();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalRounds; i++) {
          let className = 'progress-dot';
          let status = 'pending';
          if (i < this.currentRound) {
            className += ' completed';
            status = 'completed';
          } else if (i === this.currentRound) {
            className += ' current';
            status = 'current';
          }
          html += `<div class="${className}" role="listitem" aria-label="Round ${i + 1} of ${this.totalRounds}: ${status}"></div>`;
        }
        this.progress.setAttribute('role', 'list');
        this.progress.setAttribute('aria-label', 'Progress');
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => Make100.init());
      } else {
        Make100.init();
      }
    });
  </script>

    }

      border: 3px solid #f59e0b;

    .target-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: #92400e;
    }

    .target-number {
      font-family: var(--font-secondary);
      font-size: var(--text-3xl);
      font-weight: var(--weight-bold);
      color: #92400e;
    }

    .cards-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin: var(--space-4) auto;
      max-width: 400px;

    }

    .number-card {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-secondary);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border: 3px solid var(--color-primary-light);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 0 var(--color-primary-light);
    }

    .number-card:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--color-primary-light);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    }

    .number-card:focus {
      outline: none;
      box-shadow: 0 4px 0 var(--color-primary-light), 0 0 0 4px rgba(59, 130, 246, 0.5);
      border-color: #2563eb;
    }

    .number-card:focus-visible {
      outline: none;
      box-shadow: 0 4px 0 var(--color-primary-light), 0 0 0 4px rgba(59, 130, 246, 0.6);
      border-color: #2563eb;
    }

    .number-card:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 0 var(--color-primary-light);
    }

    .number-card.selected {
      background: linear-gradient(135deg, #bfdbfe, #93c5fd);
      border-color: #2563eb;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 6px 0 #2563eb, 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    .number-card.matched {
      background: linear-gradient(135deg, #86efac, #4ade80);
      border-color: #16a34a;
      color: #166534;
      cursor: default;
      animation: matchPop 0.5s ease;
    }

    .number-card.wrong {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #dc2626;
      color: #991b1b;
      animation: shake 0.5s ease;
    }

    @keyframes matchPop {
      0% { transform: scale(1); }
      30% { transform: scale(1.15); }
      60% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    /* Matched Pairs Display */
    .matched-pairs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin: var(--space-3) auto;
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      color: var(--color-neutral-600);
    }

    .matched-label {
      font-weight: var(--weight-semibold);
    }

    .matched-count {
      font-weight: var(--weight-bold);
      font-size: var(--text-xl);
      color: #22c55e;
    }

    .matched-total {
      color: var(--color-neutral-500);
    }

    /* Progress indicator */

      transition: all 0.3s ease;
    }

      .target-display {

      }

      }

      .target-number {
        font-size: var(--text-xl);
      }
    }
