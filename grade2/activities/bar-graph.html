  <script>
    // Bar Graph Questions Activity - Grade 2 Level 4
    const BarGraph = {
      currentQuestion: 0,
      totalQuestions: 6,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // Current graph data
      currentGraphData: null,
      currentQuestionData: null,

      // Graph themes with categories and colors
      graphThemes: [
        {
          titleKey: 'favoriteFruits',
          defaultTitle: 'Favorite Fruits',
          categories: [
            { key: 'apple', label: 'Apple', emoji: '🍎', color: '#ef4444' },
            { key: 'banana', label: 'Banana', emoji: '🍌', color: '#eab308' },
            { key: 'orange', label: 'Orange', emoji: '🍊', color: '#f97316' },
            { key: 'grape', label: 'Grape', emoji: '🍇', color: '#8b5cf6' }
          ]
        },
        {
          titleKey: 'favoriteAnimals',
          defaultTitle: 'Favorite Animals',
          categories: [
            { key: 'dog', label: 'Dog', emoji: '🐕', color: '#a16207' },
            { key: 'cat', label: 'Cat', emoji: '🐱', color: '#f97316' },
            { key: 'bird', label: 'Bird', emoji: '🐦', color: '#3b82f6' },
            { key: 'fish', label: 'Fish', emoji: '🐟', color: '#06b6d4' }
          ]
        },
        {
          titleKey: 'favoriteSports',
          defaultTitle: 'Favorite Sports',
          categories: [
            { key: 'soccer', label: 'Soccer', emoji: '⚽', color: '#22c55e' },
            { key: 'basketball', label: 'Basketball', emoji: '🏀', color: '#f97316' },
            { key: 'baseball', label: 'Baseball', emoji: '⚾', color: '#ef4444' },
            { key: 'swimming', label: 'Swimming', emoji: '🏊', color: '#3b82f6' }
          ]
        },
        {
          titleKey: 'favoriteColors',
          defaultTitle: 'Favorite Colors',
          categories: [
            { key: 'red', label: 'Red', emoji: '🔴', color: '#ef4444' },
            { key: 'blue', label: 'Blue', emoji: '🔵', color: '#3b82f6' },
            { key: 'green', label: 'Green', emoji: '🟢', color: '#22c55e' },
            { key: 'yellow', label: 'Yellow', emoji: '🟡', color: '#eab308' }
          ]
        },
        {
          titleKey: 'favoriteTreats',
          defaultTitle: 'Favorite Treats',
          categories: [
            { key: 'icecream', label: 'Ice Cream', emoji: '🍦', color: '#ec4899' },
            { key: 'cookie', label: 'Cookie', emoji: '🍪', color: '#a16207' },
            { key: 'cake', label: 'Cake', emoji: '🎂', color: '#f472b6' },
            { key: 'candy', label: 'Candy', emoji: '🍬', color: '#8b5cf6' }
          ]
        }
      ],

      // Question types
      questionTypes: [
        'most',      // Which has the most?
        'least',     // Which has the least?
        'howMany',   // How many chose X?
        'howManyMore', // How many more chose X than Y?
        'total'      // How many students in total?
      ],

      // DOM elements
      graphTitle: null,
      barsArea: null,
      yAxisLabels: null,
      questionArea: null,
      questionText: null,
      choiceContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.graphTitle = document.getElementById('graph-title');
        this.barsArea = document.getElementById('bars-area');
        this.yAxisLabels = document.getElementById('y-axis-labels');
        this.questionArea = document.getElementById('question-area');
        this.questionText = document.getElementById('question-text');
        this.choiceContainer = document.getElementById('choice-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Refresh graph if needed
        if (this.currentGraphData) {
          this.renderGraph();
          this.renderQuestion();
        }
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      },

      generateGraphData() {
        // Pick a random theme
        const theme = this.graphThemes[this.randomInt(0, this.graphThemes.length - 1)];

        // Pick 3-4 categories
        const numCategories = this.randomInt(3, 4);
        const categories = this.shuffleArray([...theme.categories]).slice(0, numCategories);

        // Generate values (1-10 for each category)
        let data = categories.map(cat => ({
          ...cat,
          value: this.randomInt(1, 10)
        }));

        // Ensure all values are unique to avoid ambiguous "most" or "least" questions
        // Keep regenerating until all values are unique
        let attempts = 0;
        while (new Set(data.map(d => d.value)).size < data.length && attempts < 10) {
          data = categories.map(cat => ({
            ...cat,
            value: this.randomInt(1, 10)
          }));
          attempts++;
        }

        // If still not unique after attempts, manually adjust
        const seenValues = new Set();
        data.forEach(d => {
          while (seenValues.has(d.value)) {
            d.value = d.value < 10 ? d.value + 1 : d.value - 1;
            if (d.value < 1) d.value = 1;
            if (d.value > 10) d.value = 10;
          }
          seenValues.add(d.value);
        });

        return {
          theme,
          data,
          maxValue: Math.max(...data.map(d => d.value))
        };
      },

      generateQuestion() {
        this.isAnswered = false;
        this.currentGraphData = this.generateGraphData();

        // Pick a question type
        const questionType = this.questionTypes[this.randomInt(0, this.questionTypes.length - 1)];
        const data = this.currentGraphData.data;

        let question = '';
        let correctAnswer = null;
        let answerChoices = [];

        const t = (key) => window.i18n ? i18n.t(key) : null;

        switch (questionType) {
          case 'most': {
            const maxVal = Math.max(...data.map(d => d.value));
            const mostItem = data.find(d => d.value === maxVal);
            question = t('section.activities.bar-graph.questionMost') || 'Which has the most votes?';
            correctAnswer = mostItem.emoji + ' ' + (t(`section.activities.bar-graph.categories.${mostItem.key}`) || mostItem.label);
            answerChoices = data.map(d => d.emoji + ' ' + (t(`section.activities.bar-graph.categories.${d.key}`) || d.label));
            break;
          }
          case 'least': {
            const minVal = Math.min(...data.map(d => d.value));
            const leastItem = data.find(d => d.value === minVal);
            question = t('section.activities.bar-graph.questionLeast') || 'Which has the least votes?';
            correctAnswer = leastItem.emoji + ' ' + (t(`section.activities.bar-graph.categories.${leastItem.key}`) || leastItem.label);
            answerChoices = data.map(d => d.emoji + ' ' + (t(`section.activities.bar-graph.categories.${d.key}`) || d.label));
            break;
          }
          case 'howMany': {
            const randomItem = data[this.randomInt(0, data.length - 1)];
            const itemLabel = t(`section.activities.bar-graph.categories.${randomItem.key}`) || randomItem.label;
            question = (t('section.activities.bar-graph.questionHowMany') || 'How many chose {item}?').replace('{item}', randomItem.emoji + ' ' + itemLabel);
            correctAnswer = randomItem.value;
            // Generate number choices
            answerChoices = [correctAnswer];
            while (answerChoices.length < 4) {
              const distractor = this.randomInt(1, 10);
              if (!answerChoices.includes(distractor)) {
                answerChoices.push(distractor);
              }
            }
            break;
          }
          case 'howManyMore': {
            // Sort by value to get meaningful comparison
            const sorted = [...data].sort((a, b) => b.value - a.value);
            const higher = sorted[0];
            const lower = sorted[sorted.length - 1];
            const diff = higher.value - lower.value;
            const higherLabel = t(`section.activities.bar-graph.categories.${higher.key}`) || higher.label;
            const lowerLabel = t(`section.activities.bar-graph.categories.${lower.key}`) || lower.label;
            question = (t('section.activities.bar-graph.questionHowManyMore') || 'How many more chose {item1} than {item2}?')
              .replace('{item1}', higher.emoji + ' ' + higherLabel)
              .replace('{item2}', lower.emoji + ' ' + lowerLabel);
            correctAnswer = diff;
            answerChoices = [correctAnswer];
            while (answerChoices.length < 4) {
              const distractor = this.randomInt(0, 9);
              if (!answerChoices.includes(distractor)) {
                answerChoices.push(distractor);
              }
            }
            break;
          }
          case 'total': {
            const total = data.reduce((sum, d) => sum + d.value, 0);
            question = t('section.activities.bar-graph.questionTotal') || 'How many students voted in total?';
            correctAnswer = total;
            answerChoices = [correctAnswer];
            while (answerChoices.length < 4) {
              const distractor = this.randomInt(Math.max(4, total - 8), total + 8);
              if (!answerChoices.includes(distractor) && distractor > 0) {
                answerChoices.push(distractor);
              }
            }
            break;
          }
        }

        this.currentQuestionData = {
          type: questionType,
          question,
          correctAnswer,
          answerChoices: this.shuffleArray(answerChoices)
        };
      },

      startQuestion() {
        this.generateQuestion();
        this.renderGraph();
        this.renderQuestion();
        this.renderChoices();
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderGraph() {
        const { theme, data, maxValue } = this.currentGraphData;

        // Render title
        const titleText = window.i18n
          ? i18n.t(`section.activities.bar-graph.titles.${theme.titleKey}`) || theme.defaultTitle
          : theme.defaultTitle;
        this.graphTitle.textContent = titleText;

        // Calculate scale (round up to nice number)
        const scale = Math.ceil(maxValue / 5) * 5 || 5;

        // Render Y-axis labels
        this.yAxisLabels.innerHTML = '';
        for (let i = scale; i >= 0; i -= Math.ceil(scale / 5)) {
          const label = document.createElement('div');
          label.className = 'y-label';
          label.textContent = i;
          this.yAxisLabels.appendChild(label);
        }

        // Render bars
        this.barsArea.innerHTML = '';
        data.forEach((item, index) => {
          const barWrapper = document.createElement('div');
          barWrapper.className = 'bar-wrapper';

          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.backgroundColor = item.color;
          bar.style.height = `${(item.value / scale) * 100}%`;
          bar.style.animationDelay = `${index * 0.15}s`;

          const barValue = document.createElement('div');
          barValue.className = 'bar-value';
          barValue.textContent = item.value;
          bar.appendChild(barValue);

          const barLabel = document.createElement('div');
          barLabel.className = 'bar-label';
          barLabel.innerHTML = `<span class="bar-emoji">${item.emoji}</span>`;

          barWrapper.appendChild(bar);
          barWrapper.appendChild(barLabel);
          this.barsArea.appendChild(barWrapper);
        });
      },

      renderQuestion() {
        this.questionText.textContent = this.currentQuestionData.question;
      },

      renderChoices() {
        this.choiceContainer.innerHTML = '';

        if (this.isAnswered) return;

        const { answerChoices, type } = this.currentQuestionData;

        answerChoices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = choice;
          btn.dataset.value = choice;
          btn.addEventListener('click', () => this.selectChoice(choice));
          this.choiceContainer.appendChild(btn);
        });
      },

      selectChoice(value) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const { correctAnswer } = this.currentQuestionData;
        const isCorrect = String(value) === String(correctAnswer);

        // Highlight buttons
        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          const btnValue = btn.dataset.value;
          if (String(btnValue) === String(correctAnswer)) {
            btn.classList.add('correct');
          } else if (btnValue === String(value) && !isCorrect) {
            btn.classList.add('incorrect');
          }
          btn.disabled = true;
        });

        if (isCorrect) {
          this.correctCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.bar-graph.correct').replace('{answer}', correctAnswer)
            : `✓ Correct! The answer is ${correctAnswer}.`;
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');

          if (typeof celebrate === 'function') {
            celebrate(this.barsArea);
          }
        } else {
          this.incorrectCount++;
          const msg = window.i18n
            ? i18n.t('section.activities.bar-graph.wrong').replace('{answer}', correctAnswer)
            : `The answer is ${correctAnswer}.`;
          this.feedback.textContent = msg;
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.isAnswered = false;
        this.renderChoices();
        this.feedback.classList.remove('show', 'error');
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.bar-graph.perfect')
            : 'Amazing graph reading skills!';
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '📊';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.bar-graph.great')
            : 'Great job reading graphs!';
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = window.i18n
            ? i18n.t('section.activities.bar-graph.keepPracticing')
            : 'Keep practicing!';
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      BarGraph.init();
    });
  </script>

      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-radius: var(--radius-lg);
      border: 3px solid #3b82f6;
    }

    /* Bar Graph Container */
    .bar-graph-container {
      display: flex;
      align-items: flex-end;
      gap: var(--space-2);
      padding: var(--space-4);
