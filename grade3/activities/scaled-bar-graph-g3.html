    .graph-header {

    .y-axis-labels {

      height: 100%;

    .y-label {

    .y-axis-line {

    .bars-area {

      z-index: 1;
    }

      position: relative;

      transition: height 0.3s ease;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.12);

    .bar-label {
      margin-top: var(--space-2);
      text-align: center;

      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);

    .bar-emoji {

    }

    .question-area {

    .choice-btn {

      padding: var(--space-3) var(--space-3);
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      border: 3px solid var(--color-neutral-300);

      box-shadow: 0 4px 0 var(--color-neutral-300);
      display: flex;

    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fecaca, #fca5a5);
      border-color: #dc2626;
      box-shadow: 0 4px 0 #991b1b;
      color: #991b1b;

    .choice-btn:disabled {

      font-size: 1.8rem;

    .progress-indicator {

      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-neutral-300);
      transition: all 0.3s ease;
    }

    .progress-dot.current {
      background: var(--color-primary);
      transform: scale(1.2);
    }

    .progress-dot.completed {
      background: #22c55e;
    }

    .activity-area {
      position: relative;
      padding-bottom: calc(var(--space-8) + 60px);
    }

    .feedback-message {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;

      margin-top: 0;

  <script>
    // Scaled Bar Graph Questions Activity - Grade 3 Level 5
    const ScaledBarGraph = {
      currentQuestion: 0,
      totalQuestions: 6,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,
      lastAnswerCorrect: null,
      lastCorrectAnswer: null,
      lastQuestionType: null,

      currentGraph: null,
      currentQuestionData: null,

      scaleSteps: [2, 5],
      questionTypes: ['most', 'least', 'howMany', 'howManyMore', 'total'],

      graphThemes: [
        {
          titleKey: 'favoriteBooks',
          defaultTitle: 'Favorite Books',
          categories: [
            { key: 'mystery', label: 'Mystery', emoji: '🕵️', color: '#6366f1' },
            { key: 'adventure', label: 'Adventure', emoji: '🧭', color: '#f97316' },
            { key: 'animals', label: 'Animals', emoji: '🐾', color: '#22c55e' },

        },
        {
          titleKey: 'afterSchoolClubs',

          categories: [
            { key: 'art', label: 'Art', emoji: '🎨', color: '#ec4899' },
            { key: 'music', label: 'Music', emoji: '🎵', color: '#a855f7' },
            { key: 'sports', label: 'Sports', emoji: '🏀', color: '#f59e0b' },
            { key: 'robotics', label: 'Robotics', emoji: '🤖', color: '#0ea5e9' }
          ]
        },
        {
          titleKey: 'fieldTrips',
          defaultTitle: 'Field Trip Choices',
          categories: [
            { key: 'museum', label: 'Museum', emoji: '🏛️', color: '#f43f5e' },
            { key: 'zoo', label: 'Zoo', emoji: '🦁', color: '#f97316' },
            { key: 'aquarium', label: 'Aquarium', emoji: '🐠', color: '#0ea5e9' },
            { key: 'park', label: 'Park', emoji: '🌳', color: '#22c55e' }
          ]
        },
        {
          titleKey: 'classSnacks',
          defaultTitle: 'Class Snacks',
          categories: [
            { key: 'pretzels', label: 'Pretzels', emoji: '🥨', color: '#f97316' },
            { key: 'fruit', label: 'Fruit', emoji: '🍓', color: '#ef4444' },
            { key: 'popcorn', label: 'Popcorn', emoji: '🍿', color: '#f59e0b' },
            { key: 'yogurt', label: 'Yogurt', emoji: '🥣', color: '#0ea5e9' }
          ]
        },
        {
          titleKey: 'gameDay',
          defaultTitle: 'Game Day Votes',
          categories: [
            { key: 'soccer', label: 'Soccer', emoji: '⚽', color: '#22c55e' },
            { key: 'basketball', label: 'Basketball', emoji: '🏀', color: '#f97316' },
            { key: 'relay', label: 'Relay', emoji: '🏁', color: '#6366f1' },
            { key: 'tag', label: 'Tag', emoji: '🏃', color: '#ef4444' }
          ]
        }
      ],

      graphTitle: null,
      graphScale: null,
      barsArea: null,
      yAxisLabels: null,
      questionText: null,
      choiceContainer: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.graphTitle = document.getElementById('graph-title');
        this.graphScale = document.getElementById('graph-scale');
        this.barsArea = document.getElementById('bars-area');
        this.yAxisLabels = document.getElementById('y-axis-labels');
        this.questionText = document.getElementById('question-text');
        this.choiceContainer = document.getElementById('choice-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      getTranslation(key, fallback) {
        if (window.i18n) {
          const translated = i18n.t(`section.activities.scaled-bar-graph-g3.${key}`);
          if (translated !== `section.activities.scaled-bar-graph-g3.${key}`) {
            return translated;
          }
        }
        return fallback;
      },

      getTitle(theme) {
        return this.getTranslation(`titles.${theme.titleKey}`, theme.defaultTitle);
      },

      getCategoryLabel(key, fallback) {
        return this.getTranslation(`categories.${key}`, fallback);
      },

      generateValues(count, scaleStep) {
        const maxFactor = scaleStep === 2 ? 9 : 7;
        const minFactor = 2;
        let values = [];
        let attempts = 0;

        while (attempts < 10) {
          values = Array.from({ length: count }, () => scaleStep * randomInt(minFactor, maxFactor));
          if (new Set(values).size === count) {
            return values;
          }
          attempts += 1;
        }

        const used = new Set();
        return values.map((value) => {
          let candidate = value;
          while (used.has(candidate)) {
            candidate += scaleStep;
            if (candidate > scaleStep * maxFactor) {
              candidate = scaleStep * minFactor;
            }
          }
          used.add(candidate);
          return candidate;
        });
      },

      generateGraphData() {
        const theme = randomChoice(this.graphThemes);
        const categories = shuffle([...theme.categories]).slice(0, randomInt(3, 4));
        const scaleStep = randomChoice(this.scaleSteps);
        const values = this.generateValues(categories.length, scaleStep);

        const data = categories.map((category, index) => ({
          ...category,
          value: values[index]
        }));

        return {
          theme,
          data,
          maxValue: Math.max(...values),
          scaleStep
        };
      },

      buildNumberChoices(correctAnswer, scaleStep) {
        const choices = new Set([correctAnswer]);
        while (choices.size < 4) {
          const offset = randomInt(-3, 3) * scaleStep;
          const candidate = correctAnswer + offset;
          if (candidate > 0) {
            choices.add(candidate);
          }
        }
        return shuffle([...choices]);
      },

      generateQuestion() {
        this.isAnswered = false;
        this.currentGraph = this.generateGraphData();

        const questionType = randomChoice(this.questionTypes);
        const data = this.currentGraph.data;
        const scaleStep = this.currentGraph.scaleStep;

        let correctAnswer = null;
        let answerChoices = [];
        let itemKey = null;
        let compareKeys = null;

        switch (questionType) {
          case 'most': {
            const maxVal = Math.max(...data.map(item => item.value));
            const mostItem = data.find(item => item.value === maxVal);
            correctAnswer = mostItem.key;
            answerChoices = data.map(item => item.key);
            break;
          }
          case 'least': {
            const minVal = Math.min(...data.map(item => item.value));
            const leastItem = data.find(item => item.value === minVal);
            correctAnswer = leastItem.key;
            answerChoices = data.map(item => item.key);
            break;
          }
          case 'howMany': {
            const selected = randomChoice(data);
            itemKey = selected.key;
            correctAnswer = selected.value;
            answerChoices = this.buildNumberChoices(correctAnswer, scaleStep);
            break;
          }
          case 'howManyMore': {
            const sorted = [...data].sort((a, b) => b.value - a.value);
            const higher = sorted[0];
            const lower = sorted[sorted.length - 1];
            correctAnswer = higher.value - lower.value;
            compareKeys = { higher: higher.key, lower: lower.key };
            answerChoices = this.buildNumberChoices(correctAnswer, scaleStep);
            break;
          }
          case 'total': {
            correctAnswer = data.reduce((sum, item) => sum + item.value, 0);
            answerChoices = this.buildNumberChoices(correctAnswer, scaleStep);
            break;
          }
        }

        this.currentQuestionData = {
          type: questionType,
          correctAnswer,
          answerChoices,
          itemKey,
          compareKeys
        };
      },

      getAnswerLabel(answer, type) {
        if (type === 'most' || type === 'least') {
          const item = this.currentGraph.data.find(entry => entry.key === answer);
          if (item) {
            const label = this.getCategoryLabel(item.key, item.label);
            return `${item.emoji} ${label}`;
          }
        }
        return answer;
      },

      startQuestion() {
        this.generateQuestion();
        this.renderGraph();
        this.renderQuestion();
        this.renderChoices();
        this.feedback.classList.remove('show', 'error');
        this.feedback.textContent = '';
        this.renderProgress();
      },

      renderGraph() {
        const { theme, data, maxValue, scaleStep } = this.currentGraph;

        this.graphTitle.textContent = this.getTitle(theme);

        const scaleTemplate = this.getTranslation('scaleLabel', 'Each tick = {step} votes');
        this.graphScale.textContent = scaleTemplate.replace('{step}', scaleStep);

        const yAxisMax = Math.ceil(maxValue / scaleStep) * scaleStep;

        this.yAxisLabels.innerHTML = '';
        for (let value = yAxisMax; value >= 0; value -= scaleStep) {
          const label = document.createElement('div');
          label.className = 'y-label';
          label.textContent = value;
          this.yAxisLabels.appendChild(label);
        }

        this.barsArea.innerHTML = '';
        const steps = yAxisMax / scaleStep;
        for (let i = 1; i <= steps; i++) {
          const line = document.createElement('div');
          line.className = 'grid-line';
          line.style.bottom = `${(i / steps) * 100}%`;
          this.barsArea.appendChild(line);
        }

        data.forEach((item) => {
          const barWrapper = document.createElement('div');
          barWrapper.className = 'bar-wrapper';

          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.backgroundColor = item.color;
          bar.style.height = `${(item.value / yAxisMax) * 100}%`;

          const barLabel = document.createElement('div');
          barLabel.className = 'bar-label';
          const labelText = this.getCategoryLabel(item.key, item.label);
          barLabel.innerHTML = `<span class="bar-emoji">${item.emoji}</span><span>${labelText}</span>`;

          barWrapper.appendChild(bar);
          barWrapper.appendChild(barLabel);
          this.barsArea.appendChild(barWrapper);
        });
      },

      renderQuestion() {
        const { type, itemKey, compareKeys } = this.currentQuestionData;

        if (type === 'most') {
          this.questionText.textContent = this.getTranslation('questionMost', 'Which has the most votes?');
          return;
        }

        if (type === 'least') {
          this.questionText.textContent = this.getTranslation('questionLeast', 'Which has the least votes?');
          return;
        }

        if (type === 'howMany') {
          const item = this.currentGraph.data.find(entry => entry.key === itemKey);
          const label = item ? `${item.emoji} ${this.getCategoryLabel(item.key, item.label)}` : '';
          const template = this.getTranslation('questionHowMany', 'How many votes for {item}?');
          this.questionText.textContent = template.replace('{item}', label);
          return;
        }

        if (type === 'howManyMore') {
          const higherItem = this.currentGraph.data.find(entry => entry.key === compareKeys.higher);
          const lowerItem = this.currentGraph.data.find(entry => entry.key === compareKeys.lower);
          const item1 = higherItem ? `${higherItem.emoji} ${this.getCategoryLabel(higherItem.key, higherItem.label)}` : '';
          const item2 = lowerItem ? `${lowerItem.emoji} ${this.getCategoryLabel(lowerItem.key, lowerItem.label)}` : '';
          const template = this.getTranslation('questionHowManyMore', 'How many more votes for {item1} than {item2}?');
          this.questionText.textContent = template.replace('{item1}', item1).replace('{item2}', item2);
          return;
        }

        this.questionText.textContent = this.getTranslation('questionTotal', 'How many votes in total?');
      },

      renderChoices() {
        const { answerChoices, type } = this.currentQuestionData;
        const choicesLabel = this.getTranslation('choicesLabel', 'Answer choices');
        this.choiceContainer.setAttribute('aria-label', choicesLabel);
        this.choiceContainer.innerHTML = '';

        answerChoices.forEach(choice => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'choice-btn';
          button.dataset.value = choice;

          if (type === 'most' || type === 'least') {
            const item = this.currentGraph.data.find(entry => entry.key === choice);
            if (item) {
              const label = this.getCategoryLabel(item.key, item.label);
              button.innerHTML = `<span class="choice-emoji">${item.emoji}</span><span class="choice-text">${label}</span>`;
              button.setAttribute('aria-label', `${item.emoji} ${label}`);
            }
          } else {
            button.textContent = choice;
            button.setAttribute('aria-label', `${choice}`);
          }

          button.addEventListener('click', () => this.selectChoice(button.dataset.value));
          this.choiceContainer.appendChild(button);
        });
      },

      selectChoice(value) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const { correctAnswer, type } = this.currentQuestionData;
        const isCorrect = String(value) === String(correctAnswer);
        this.lastAnswerCorrect = isCorrect;
        this.lastCorrectAnswer = correctAnswer;
        this.lastQuestionType = type;

        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          const btnValue = btn.dataset.value;
          if (String(btnValue) === String(correctAnswer)) {
            btn.classList.add('correct');
          } else if (String(btnValue) === String(value) && !isCorrect) {
            btn.classList.add('incorrect');
          }
          btn.disabled = true;
        });

        if (isCorrect) {
          this.correctCount++;
          if (typeof celebrate === 'function') {
            celebrate(this.barsArea);
          }
          this.feedback.classList.remove('error');
        } else {
          this.wrongCount++;
          this.feedback.classList.add('error');
        }

        const answerLabel = this.getAnswerLabel(correctAnswer, type);
        const template = this.getTranslation(
          isCorrect ? 'correct' : 'wrong',
          isCorrect ? 'Correct! The answer is {answer}.' : 'The answer is {answer}.'
        );
        this.feedback.textContent = template.replace('{answer}', answerLabel);
        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.currentQuestion++;
            this.startQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      updateStatsMessage() {
        const accuracy = this.correctCount / this.totalQuestions;
        if (this.correctCount === this.totalQuestions) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation('perfect', 'Perfect graph reading!');
        } else if (accuracy >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation('great', 'Great job reading graphs!');
        } else if (accuracy >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation('good', 'Good work with scales!');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation('keepPracticing', 'Keep practicing!');
        }
      },

      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;
        this.updateStatsMessage();
        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      updateTranslations() {
        if (!this.currentGraph || !this.currentQuestionData) return;

        this.renderGraph();
        this.renderQuestion();

        const { type } = this.currentQuestionData;
        const choicesLabel = this.getTranslation('choicesLabel', 'Answer choices');
        this.choiceContainer.setAttribute('aria-label', choicesLabel);

        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          const btnValue = btn.dataset.value;
          if (type === 'most' || type === 'least') {
            const item = this.currentGraph.data.find(entry => entry.key === btnValue);
            if (item) {
              const label = this.getCategoryLabel(item.key, item.label);
              btn.innerHTML = `<span class="choice-emoji">${item.emoji}</span><span class="choice-text">${label}</span>`;
              btn.setAttribute('aria-label', `${item.emoji} ${label}`);
            }
          }
        });

        if (this.feedback.classList.contains('show') && this.lastQuestionType) {
          const answerLabel = this.getAnswerLabel(this.lastCorrectAnswer, this.lastQuestionType);
          const template = this.getTranslation(
            this.lastAnswerCorrect ? 'correct' : 'wrong',
            this.lastAnswerCorrect ? 'Correct! The answer is {answer}.' : 'The answer is {answer}.'
          );
          this.feedback.textContent = template.replace('{answer}', answerLabel);
        }

        if (this.statsOverlay.classList.contains('show')) {
          this.updateStatsMessage();
        }
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      ScaledBarGraph.init();
    });
  </script>
