  <script>
    // Multiply the Array Activity - Grade 3 Level 3
    const ArrayMultiply = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      rows: 0,
      cols: 0,
      correctAnswer: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // DOM elements
      arrayRowsDisplay: null,
      arrayColsDisplay: null,
      arrayGrid: null,
      choices: null,
      progress: null,
      feedback: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        // Get DOM elements
        this.arrayRowsDisplay = document.getElementById('array-rows');
        this.arrayColsDisplay = document.getElementById('array-cols');
        this.arrayGrid = document.getElementById('array-grid');
        this.choices = document.getElementById('choices');
        this.progress = document.getElementById('progress');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Dynamic translations - will update on next question
      },

      getTranslation(key, fallback) {
        if (window.i18n) {
          const translated = i18n.t(`section.activities.array-multiply.${key}`);
          return translated !== `section.activities.array-multiply.${key}` ? translated : fallback;
        }
        return fallback;
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      generateArray() {
        // Progressive difficulty:
        // Questions 0-2: Small arrays (2-4 rows, 2-4 cols)
        // Questions 3-5: Medium arrays (3-6 rows, 3-6 cols)
        // Questions 6-9: Larger arrays (4-9 rows, 4-9 cols) with product ≤ 100

        let minDim, maxDim;
        if (this.currentQuestion < 3) {
          minDim = 2;
          maxDim = 4;
        } else if (this.currentQuestion < 6) {
          minDim = 3;
          maxDim = 6;
        } else {
          minDim = 4;
          maxDim = 9;
        }

        // Generate dimensions ensuring product <= 100
        do {
          this.rows = this.randomInt(minDim, maxDim);
          this.cols = this.randomInt(minDim, Math.min(maxDim, 10));
        } while (this.rows * this.cols > 100);

        this.correctAnswer = this.rows * this.cols;
      },

      generateChoices() {
        const choices = new Set();
        choices.add(this.correctAnswer);

        // Generate plausible wrong answers
        const wrongAnswerStrategies = [
          () => this.rows + this.cols,               // Addition instead of multiply
          () => this.correctAnswer + this.rows,     // Off by one row
          () => this.correctAnswer - this.cols,     // Off by one column
          () => this.correctAnswer + this.randomInt(1, 5), // Close but higher
          () => this.correctAnswer - this.randomInt(1, 5), // Close but lower
          () => (this.rows + 1) * this.cols,         // One more row
          () => this.rows * (this.cols + 1),         // One more column
          () => (this.rows - 1) * this.cols,         // One less row
        ];

        // Generate 3 wrong answers
        let attempts = 0;
        while (choices.size < 4 && attempts < 20) {
          const strategy = wrongAnswerStrategies[this.randomInt(0, wrongAnswerStrategies.length - 1)];
          const wrongAnswer = strategy();
          // Only add if positive, different from correct, and reasonable
          if (wrongAnswer > 0 && wrongAnswer !== this.correctAnswer && wrongAnswer <= 120) {
            choices.add(wrongAnswer);
          }
          attempts++;
        }

        // If we still need more choices, add random nearby values
        while (choices.size < 4) {
          const offset = this.randomInt(-10, 10);
          const newChoice = this.correctAnswer + offset;
          if (newChoice > 0 && !choices.has(newChoice)) {
            choices.add(newChoice);
          }
        }

        // Shuffle and return array
        return this.shuffle(Array.from(choices));
      },

      shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      },

      startQuestion() {
        this.generateArray();
        this.isAnswered = false;

        // Update display
        this.arrayRowsDisplay.textContent = this.rows;
        this.arrayColsDisplay.textContent = this.cols;

        // Build the array grid
        this.buildGrid();

        // Generate and render choices
        const choiceValues = this.generateChoices();
        this.renderChoices(choiceValues);

        // Reset UI
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      buildGrid() {
        this.arrayGrid.innerHTML = '';

        // Set grid CSS based on array dimensions
        this.arrayGrid.style.gridTemplateColumns = `repeat(${this.cols}, 1fr)`;
        this.arrayGrid.style.gridTemplateRows = `repeat(${this.rows}, 1fr)`;

        // Create all cells as filled
        for (let row = 0; row < this.rows; row++) {
          for (let col = 0; col < this.cols; col++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell filled';
            cell.setAttribute('aria-label', `Row ${row + 1}, Column ${col + 1}`);
            this.arrayGrid.appendChild(cell);
          }
        }
      },

      renderChoices(choiceValues) {
        this.choices.innerHTML = '';

        choiceValues.forEach(value => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = value;
          btn.dataset.value = value;
          btn.addEventListener('click', () => {
            if (!this.isAnswered) {
              this.checkAnswer(value, btn);
            }
          });
          this.choices.appendChild(btn);
        });
      },

      checkAnswer(selectedValue, btnElement) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const isCorrect = selectedValue === this.correctAnswer;

        // Disable all buttons
        const allBtns = this.choices.querySelectorAll('.choice-btn');
        allBtns.forEach(btn => {
          btn.disabled = true;
          if (parseInt(btn.dataset.value) === this.correctAnswer) {
            btn.classList.add('correct');
          }
        });

        if (isCorrect) {
          this.correctCount++;
          btnElement.classList.add('correct');
          const correctMsg = window.i18n ? i18n.t('feedback.correct') : 'Correct!';
          // Show the multiplication fact
          const rowsWord = this.getTranslation('groupsOf', 'groups of');
          const equalsWord = this.getTranslation('equals', 'equals');
          this.feedback.textContent = `${correctMsg} ${this.rows} ${rowsWord} ${this.cols} ${equalsWord} ${this.correctAnswer}`;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btnElement.classList.add('incorrect');
          const tryAgainMsg = window.i18n ? i18n.t('feedback.tryAgain') : 'Try again!';
          // Show the correct answer with explanation
          const rowsWord = this.getTranslation('groupsOf', 'groups of');
          const equalsWord = this.getTranslation('equals', 'equals');
          this.feedback.textContent = `${tryAgainMsg} ${this.rows} ${rowsWord} ${this.cols} ${equalsWord} ${this.correctAnswer}`;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation('perfect', 'Amazing multiplication!');
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '✖️';
          this.statsMessage.textContent = this.getTranslation('great', 'Great array work!');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation('keepPracticing', 'Keep practicing!');
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => ArrayMultiply.init());
      } else {
        ArrayMultiply.init();
      }
    });
  </script>
