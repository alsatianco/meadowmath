      position: relative;
      height: 120px;

    .number-line-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 10px;
      background: linear-gradient(135deg, #ddd6fe, #c4b5fd);
      border-radius: var(--radius-full);
      transform: translateY(-50%);
      border: 3px solid #8b5cf6;
    }

    .number-line-markers {

      top: 50%;
      left: 0;
      right: 0;
      height: 0;
      transform: translateY(-50%);
    }

    .nl-marker {
      position: absolute;
      width: 3px;
      background: #7c3aed;
      transform: translateX(-50%);
    }

    .nl-marker.major {
      height: 28px;
      top: -14px;
      background: #6d28d9;
      width: 4px;
    }

    .nl-marker.minor {
      height: 16px;
      top: -8px;
    }

    .number-line-labels {
      position: absolute;
      top: calc(50% + 22px);
      left: 0;
      right: 0;
    }

    .nl-label {

      transform: translateX(-50%);
      font-family: var(--font-secondary);

      color: var(--color-neutral-600);

    .number-line-clickable {

      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      cursor: crosshair;
      z-index: 10;
    }

    .number-line-clickable:focus {
      outline: 3px solid var(--color-primary);
      outline-offset: 4px;
      border-radius: var(--radius-md);
    }

    /* User Marker */
    .user-marker {
      position: absolute;
      top: calc(50% - 55px);
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 15;
      transition: opacity 0.2s ease;

    .marker-pin {

      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      animation: marker-drop 0.3s ease;
    }

    @keyframes marker-drop {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .marker-value {
      font-family: var(--font-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      color: var(--color-neutral-700);
      background: white;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-md);
      border: 2px solid var(--color-neutral-300);

      color: #92400e;

  <script>
    // Fraction Number Line Activity - Grade 3 Level 4
    const FractionNumberLine = {
      // Game state
      currentRound: 1,
      maxRounds: 10,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      currentQuestion: null,
      questions: [],
      userGuess: null,
      isAnswered: false,
      hasClicked: false,

      // DOM elements
      targetNumerator: null,
      targetDenominator: null,
      numberLine: null,
      numberLineClickable: null,
      numberLineMarkers: null,
      numberLineLabels: null,
      userMarker: null,
      markerValue: null,
      correctMarker: null,
      correctValue: null,
      confirmContainer: null,
      btnConfirm: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Fraction options for the activity
       * Grade 3 uses denominators 2, 3, 4, 6, 8 (per content-g3.md)
       */
      fractions: [
        { numerator: 1, denominator: 2 },
        { numerator: 1, denominator: 3 },
        { numerator: 2, denominator: 3 },
        { numerator: 1, denominator: 4 },
        { numerator: 2, denominator: 4 },
        { numerator: 3, denominator: 4 },
        { numerator: 1, denominator: 6 },
        { numerator: 2, denominator: 6 },
        { numerator: 3, denominator: 6 },
        { numerator: 4, denominator: 6 },
        { numerator: 5, denominator: 6 },
        { numerator: 1, denominator: 8 },
        { numerator: 2, denominator: 8 },
        { numerator: 3, denominator: 8 },
        { numerator: 5, denominator: 8 },
        { numerator: 7, denominator: 8 }
      ],

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.targetNumerator = document.getElementById('target-numerator');
        this.targetDenominator = document.getElementById('target-denominator');
        this.numberLine = document.getElementById('number-line');
        this.numberLineClickable = document.getElementById('number-line-clickable');
        this.numberLineMarkers = document.getElementById('number-line-markers');
        this.numberLineLabels = document.getElementById('number-line-labels');
        this.userMarker = document.getElementById('user-marker');
        this.markerValue = document.getElementById('marker-value');
        this.correctMarker = document.getElementById('correct-marker');
        this.correctValue = document.getElementById('correct-value');
        this.confirmContainer = document.getElementById('confirm-container');
        this.btnConfirm = document.getElementById('btn-confirm');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Event listeners
        this.numberLineClickable.addEventListener('click', (e) => this.handleNumberLineClick(e));
        this.numberLineClickable.addEventListener('keydown', (e) => this.handleKeyboard(e));
        this.btnConfirm.addEventListener('click', () => this.checkAnswer());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Generate question sequence
        this.generateSequence();

        // Start first round
        this.startRound();
        this.renderProgress();
      },

      /**
       * Generate a random sequence of questions
       */
      generateSequence() {
        this.questions = [];

        // Shuffle fractions and pick for rounds
        const shuffledFractions = shuffle([...this.fractions]);

        for (let i = 0; i < this.maxRounds; i++) {
          const fraction = shuffledFractions[i % shuffledFractions.length];
          this.questions.push({ ...fraction });
        }

        // Shuffle questions for variety
        this.questions = shuffle(this.questions);
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        // Re-render number line labels with new translations if needed
        this.renderNumberLine();
      },

      /**
       * Start a new round
       */
      startRound() {
        this.currentQuestion = this.questions[this.currentRound - 1];
        this.userGuess = null;
        this.isAnswered = false;
        this.hasClicked = false;

        // Update display
        this.targetNumerator.textContent = this.currentQuestion.numerator;
        this.targetDenominator.textContent = this.currentQuestion.denominator;

        // Render number line with partitions based on denominator
        this.renderNumberLine();

        // Reset UI
        this.feedback.classList.remove('show', 'error');
        this.confirmContainer.hidden = true;
        this.userMarker.hidden = true;
        this.userMarker.classList.remove('correct', 'incorrect');
        this.correctMarker.hidden = true;
        this.numberLineClickable.style.pointerEvents = 'auto';
        this.renderProgress();
      },

      /**
       * Render number line with tick marks at partition points
       */
      renderNumberLine() {
        this.numberLineMarkers.innerHTML = '';
        this.numberLineLabels.innerHTML = '';

        const denominator = this.currentQuestion.denominator;

        // Create markers at each partition point (0/d, 1/d, 2/d, ... d/d)
        for (let i = 0; i <= denominator; i++) {
          const position = (i / denominator) * 100;
          const isMajor = i === 0 || i === denominator;

          // Create marker
          const marker = document.createElement('div');
          marker.className = `nl-marker ${isMajor ? 'major' : 'minor'}`;
          marker.style.left = `${position}%`;
          this.numberLineMarkers.appendChild(marker);

          // Create label for endpoints and middle markers (not too crowded)
          if (isMajor || (denominator <= 4) || (i === Math.floor(denominator / 2))) {
            const label = document.createElement('div');
            label.className = 'nl-label';
            label.style.left = `${position}%`;
            if (i === 0) {
              label.textContent = '0';
            } else if (i === denominator) {
              label.textContent = '1';
            } else {
              label.textContent = `${i}/${denominator}`;
            }
            this.numberLineLabels.appendChild(label);
          }
        }
      },

      /**
       * Handle click on number line
       */
      handleNumberLineClick(e) {
        if (this.isAnswered) return;

        const rect = this.numberLineClickable.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percentage = Math.max(0, Math.min(1, clickX / rect.width));

        this.userGuess = percentage;

        // Position user marker
        this.userMarker.style.left = `${percentage * 100}%`;

        // Display the fraction nearest to where they clicked
        const denominator = this.currentQuestion.denominator;
        const nearestNumerator = Math.round(percentage * denominator);
        if (nearestNumerator === 0) {
          this.markerValue.textContent = '0';
        } else if (nearestNumerator === denominator) {
          this.markerValue.textContent = '1';
        } else {
          this.markerValue.textContent = `${nearestNumerator}/${denominator}`;
        }

        this.userMarker.hidden = false;
        this.confirmContainer.hidden = false;
        this.hasClicked = true;
      },

      /**
       * Handle keyboard navigation
       */
      handleKeyboard(e) {
        if (this.isAnswered) return;

        const step = 0.05; // 5% steps
        let newGuess = this.userGuess !== null ? this.userGuess : 0.5;

        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          newGuess = Math.max(0, newGuess - step);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          newGuess = Math.min(1, newGuess + step);
        } else if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          if (this.hasClicked) {
            this.checkAnswer();
          }
          return;
        } else {
          return;
        }

        this.userGuess = newGuess;

        // Position user marker
        this.userMarker.style.left = `${newGuess * 100}%`;

        // Display the fraction nearest to where they are
        const denominator = this.currentQuestion.denominator;
        const nearestNumerator = Math.round(newGuess * denominator);
        if (nearestNumerator === 0) {
          this.markerValue.textContent = '0';
        } else if (nearestNumerator === denominator) {
          this.markerValue.textContent = '1';
        } else {
          this.markerValue.textContent = `${nearestNumerator}/${denominator}`;
        }

        this.userMarker.hidden = false;
        this.confirmContainer.hidden = false;
        this.hasClicked = true;
      },

      /**
       * Check the answer
       */
      checkAnswer() {
        if (this.isAnswered || !this.hasClicked) return;
        this.isAnswered = true;

        // Hide confirm and disable clicking
        this.confirmContainer.hidden = true;
        this.numberLineClickable.style.pointerEvents = 'none';

        const { numerator, denominator } = this.currentQuestion;
        const correctPosition = numerator / denominator;

        // Tolerance: within 1/(2*denominator) of the correct answer
        // This allows for some flexibility but requires reasonable accuracy
        const tolerance = 1 / (2 * denominator);
        const difference = Math.abs(this.userGuess - correctPosition);
        const isCorrect = difference <= tolerance;

        // Show correct position
        this.correctMarker.style.left = `${correctPosition * 100}%`;
        this.correctValue.textContent = `${numerator}/${denominator}`;
        this.correctMarker.hidden = false;

        if (isCorrect) {
          this.correctCount++;
          this.userMarker.classList.add('correct');
          const msg = i18n.t('section.activities.fraction-number-line.correctMsg');
          this.feedback.textContent = msg;
          this.feedback.classList.remove('error');
        } else {
          this.wrongCount++;
          this.userMarker.classList.add('incorrect');
          const msg = i18n.t('section.activities.fraction-number-line.incorrectMsg')
            .replace('{fraction}', `${numerator}/${denominator}`);
          this.feedback.textContent = msg;
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.startRound();
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-number-line.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-number-line.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-number-line.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-number-line.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the entire activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateSequence();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      FractionNumberLine.init();
    });
  </script>
