  <script>
    // Fractions Equal to 1 Activity - Grade 3 Level 4
    const FractionsEqualTo1 = {
      // Game state
      currentRound: 1,
      maxRounds: 8,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      currentQuestion: null,
      questions: [],

      // DOM elements
      questionDisplay: null,
      shapeVisual: null,
      answerChoices: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Colors for shapes
      colors: {
        shaded: '#8b5cf6',
        stroke: '#5b21b6',
        unshaded: '#f8fafc'
      },

      /**
       * Generate a fully shaded circle
       */
      generateFullCircle(parts) {
        const cx = 75;
        const cy = 75;
        const r = 60;

        let svg = `<svg viewBox="0 0 150 150">`;

        if (parts === 1) {
          svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${this.colors.shaded}" stroke="${this.colors.stroke}" stroke-width="3"/>`;
        } else {
          const angleStep = 360 / parts;
          for (let i = 0; i < parts; i++) {
            const startAngle = i * angleStep - 90;
            const endAngle = startAngle + angleStep;

            const startRad = startAngle * Math.PI / 180;
            const endRad = endAngle * Math.PI / 180;

            const x1 = cx + r * Math.cos(startRad);
            const y1 = cy + r * Math.sin(startRad);
            const x2 = cx + r * Math.cos(endRad);
            const y2 = cy + r * Math.sin(endRad);

            const largeArcFlag = angleStep > 180 ? 1 : 0;

            svg += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArcFlag} 1 ${x2} ${y2} Z" fill="${this.colors.shaded}" stroke="${this.colors.stroke}" stroke-width="2"/>`;
          }
        }

        svg += `</svg>`;
        return svg;
      },

      /**
       * Generate a partially shaded circle for choice buttons
       */
      generatePartialCircle(shadedParts, totalParts) {
        const cx = 25;
        const cy = 25;
        const r = 22;

        let svg = `<svg viewBox="0 0 50 50">`;

        if (totalParts === 1) {
          const fill = shadedParts === 1 ? this.colors.shaded : this.colors.unshaded;
          svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${this.colors.stroke}" stroke-width="2"/>`;
        } else {
          const angleStep = 360 / totalParts;
          for (let i = 0; i < totalParts; i++) {
            const startAngle = i * angleStep - 90;
            const endAngle = startAngle + angleStep;
            const partFill = i < shadedParts ? this.colors.shaded : this.colors.unshaded;

            const startRad = startAngle * Math.PI / 180;
            const endRad = endAngle * Math.PI / 180;

            const x1 = cx + r * Math.cos(startRad);
            const y1 = cy + r * Math.sin(startRad);
            const x2 = cx + r * Math.cos(endRad);
            const y2 = cy + r * Math.sin(endRad);

            const largeArcFlag = angleStep > 180 ? 1 : 0;

            svg += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArcFlag} 1 ${x2} ${y2} Z" fill="${partFill}" stroke="${this.colors.stroke}" stroke-width="1.5"/>`;
          }
        }

        svg += `</svg>`;
        return svg;
      },

      /**
       * Generate questions for the activity
       * Each question shows one correct fraction (equal to 1) and three incorrect fractions
       */
      generateQuestions() {
        this.questions = [];

        // Correct fractions (equal to 1): n/n where n is 2, 3, 4, 6, 8
        const correctDenominators = [2, 3, 4, 6, 8, 2, 3, 4];

        // Wrong fraction patterns (not equal to 1)
        const wrongFractions = [
          { num: 1, den: 2 },
          { num: 1, den: 3 },
          { num: 1, den: 4 },
          { num: 2, den: 3 },
          { num: 2, den: 4 },
          { num: 3, den: 4 },
          { num: 1, den: 6 },
          { num: 3, den: 6 },
          { num: 5, den: 6 },
          { num: 1, den: 8 },
          { num: 3, den: 8 },
          { num: 5, den: 8 },
          { num: 7, den: 8 },
          { num: 2, den: 6 },
          { num: 4, den: 6 },
          { num: 2, den: 8 },
          { num: 4, den: 8 },
          { num: 6, den: 8 }
        ];

        for (let i = 0; i < this.maxRounds; i++) {
          const correctDen = correctDenominators[i];
          const correctFraction = { num: correctDen, den: correctDen };

          // Pick 3 wrong fractions, avoiding duplicates and fractions equal to 1
          const availableWrong = wrongFractions.filter(f => f.num !== f.den);
          const shuffledWrong = shuffle(availableWrong);
          const wrongOptions = shuffledWrong.slice(0, 3);

          // Combine and shuffle all options
          const allOptions = [correctFraction, ...wrongOptions];
          const shuffledOptions = shuffle(allOptions);

          this.questions.push({
            correctFraction,
            options: shuffledOptions
          });
        }

        // Shuffle questions for variety
        this.questions = shuffle(this.questions);
      },

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.questionDisplay = document.getElementById('question-display');
        this.shapeVisual = document.getElementById('shape-visual');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Generate questions and start
        this.generateQuestions();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        // Update feedback message if showing
        if (this.feedback.classList.contains('show')) {
          const isError = this.feedback.classList.contains('error');
          if (isError) {
            const { correctFraction } = this.currentQuestion;
            const fractionText = `${correctFraction.num}/${correctFraction.den}`;
            this.feedback.textContent = i18n.t('section.activities.fractions-equal-to-1.wrong')
              .replace('{fraction}', fractionText);
          } else {
            this.feedback.textContent = i18n.t('section.activities.fractions-equal-to-1.correct');
          }
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.currentQuestion = this.questions[this.currentRound - 1];
        this.feedback.classList.remove('show', 'error');

        // Show the fully shaded shape (representing 1 whole)
        const { correctFraction } = this.currentQuestion;
        this.shapeVisual.innerHTML = this.generateFullCircle(correctFraction.den);

        // Render answer choices
        this.renderChoices();
        this.renderProgress();
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        const { options } = this.currentQuestion;

        let html = '';
        options.forEach(option => {
          const shapeSvg = this.generatePartialCircle(option.num, option.den);
          html += `
            <button class="choice-btn" data-numerator="${option.num}" data-denominator="${option.den}" aria-label="${option.num} over ${option.den}">
              <div class="choice-content">
                <div class="choice-shape">${shapeSvg}</div>
                <div class="fraction-display">
                  <span class="fraction-numerator">${option.num}</span>
                  <span class="fraction-denominator">${option.den}</span>
                </div>
              </div>
            </button>
          `;
        });

        this.answerChoices.innerHTML = html;

        // Add click and keyboard handlers
        const buttons = this.answerChoices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            const num = parseInt(btn.dataset.numerator);
            const den = parseInt(btn.dataset.denominator);
            this.checkAnswer(num, den, btn);
          });
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              const num = parseInt(btn.dataset.numerator);
              const den = parseInt(btn.dataset.denominator);
              this.checkAnswer(num, den, btn);
            }
          });
        });
      },

      /**
       * Check the selected answer
       */
      checkAnswer(selectedNum, selectedDen, selectedBtn) {
        // Disable all buttons
        const buttons = this.answerChoices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        const { correctFraction } = this.currentQuestion;
        // A fraction equals 1 if numerator equals denominator
        const isCorrect = selectedNum === selectedDen;

        if (isCorrect) {
          selectedBtn.classList.add('correct');
          this.feedback.textContent = i18n.t('section.activities.fractions-equal-to-1.correct');
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;
        } else {
          selectedBtn.classList.add('incorrect');
          // Show correct answer
          buttons.forEach(btn => {
            const num = parseInt(btn.dataset.numerator);
            const den = parseInt(btn.dataset.denominator);
            if (num === den) {
              btn.classList.add('correct');
            }
          });
          const fractionText = `${correctFraction.num}/${correctFraction.den}`;
          this.feedback.textContent = i18n.t('section.activities.fractions-equal-to-1.wrong')
            .replace('{fraction}', fractionText);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.fractions-equal-to-1.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.fractions-equal-to-1.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.fractions-equal-to-1.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.fractions-equal-to-1.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };
