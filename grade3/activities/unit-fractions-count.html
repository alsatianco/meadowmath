  <script>
    // Count Unit Fractions Activity - Grade 3 Level 4
    const UnitFractionsCount = {
      // Game state
      currentRound: 1,
      maxRounds: 10,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      currentQuestion: null,
      questions: [],

      // DOM elements
      questionText: null,
      shapeVisual: null,
      unitLabel: null,
      answerChoices: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Colors for shapes
      colors: {
        shaded: '#3b82f6',
        stroke: '#1e40af',
        unshaded: '#f1f5f9'
      },

      // Denominators used in Grade 3 (per content-g3.md)
      denominators: [2, 3, 4, 6, 8],

      /**
       * Get ordinal word for a denominator
       */
      getOrdinalWord(denominator, count) {
        const ordinals = {
          2: { singular: 'half', plural: 'halves' },
          3: { singular: 'third', plural: 'thirds' },
          4: { singular: 'fourth', plural: 'fourths' },
          6: { singular: 'sixth', plural: 'sixths' },
          8: { singular: 'eighth', plural: 'eighths' }
        };

        const ordinal = ordinals[denominator];
        if (!ordinal) return '';

        return count === 1 ? ordinal.singular : ordinal.plural;
      },

      /**
       * Generate a fraction strip (horizontal bar divided into equal parts)
       */
      generateFractionStrip(shadedCount, totalParts) {
        const width = 360;
        const height = 60;
        const partWidth = width / totalParts;
        const padding = 10;

        let svg = `<svg viewBox="0 0 ${width + padding * 2} ${height + padding * 2}" role="img" aria-label="A strip divided into ${totalParts} equal parts with ${shadedCount} parts shaded">`;

        for (let i = 0; i < totalParts; i++) {
          const fill = i < shadedCount ? this.colors.shaded : this.colors.unshaded;
          svg += `<rect
            x="${padding + i * partWidth}"
            y="${padding}"
            width="${partWidth}"
            height="${height}"
            fill="${fill}"
            stroke="${this.colors.stroke}"
            stroke-width="3"
          />`;
        }

        svg += `</svg>`;
        return svg;
      },

      /**
       * Generate questions for the activity
       */
      generateQuestions() {
        this.questions = [];

        for (let i = 0; i < this.maxRounds; i++) {
          // Pick a random denominator
          const denominator = this.denominators[Math.floor(Math.random() * this.denominators.length)];

          // Pick a random numerator (at least 1, at most denominator)
          const numerator = randomInt(1, denominator);

          // Generate wrong answers (different numerators)
          const wrongAnswers = [];
          const possibleWrong = [];

          for (let j = 1; j <= denominator; j++) {
            if (j !== numerator) {
              possibleWrong.push(j);
            }
          }

          // Add some out-of-range wrong answers if denominator allows
          if (denominator < 8) {
            possibleWrong.push(denominator + 1);
          }
          if (numerator > 1) {
            possibleWrong.push(0);
          }

          // Shuffle and pick 3 wrong answers
          const shuffledWrong = shuffle(possibleWrong);
          for (let j = 0; j < 3 && j < shuffledWrong.length; j++) {
            wrongAnswers.push(shuffledWrong[j]);
          }

          // Fill in if we don't have enough wrong answers
          while (wrongAnswers.length < 3) {
            const candidate = randomInt(0, denominator + 2);
            if (candidate !== numerator && !wrongAnswers.includes(candidate)) {
              wrongAnswers.push(candidate);
            }
          }

          // Combine correct and wrong, then shuffle
          const allOptions = [numerator, ...wrongAnswers.slice(0, 3)];
          const shuffledOptions = shuffle(allOptions);

          this.questions.push({
            numerator,
            denominator,
            options: shuffledOptions
          });
        }
      },

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.questionText = document.getElementById('question-text');
        this.shapeVisual = document.getElementById('shape-visual');
        this.unitLabel = document.getElementById('unit-label');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Generate questions and start
        this.generateQuestions();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        // Update unit label
        if (this.currentQuestion) {
          const { denominator } = this.currentQuestion;
          this.unitLabel.textContent = i18n.t('section.activities.unit-fractions-count.eachPart')
            .replace('{den}', denominator);
        }

        // Update feedback message if showing
        if (this.feedback.classList.contains('show')) {
          const isError = this.feedback.classList.contains('error');
          const { numerator, denominator } = this.currentQuestion;

          if (isError) {
            this.feedback.textContent = i18n.t('section.activities.unit-fractions-count.wrong')
              .replace('{num}', numerator)
              .replace('{den}', denominator);
          } else {
            this.feedback.textContent = i18n.t('section.activities.unit-fractions-count.correct');
          }
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.currentQuestion = this.questions[this.currentRound - 1];
        this.feedback.classList.remove('show', 'error');

        const { numerator, denominator } = this.currentQuestion;

        // Show the fraction strip
        this.shapeVisual.innerHTML = this.generateFractionStrip(numerator, denominator);

        // Update unit label (e.g., "Each part is 1/4")
        this.unitLabel.textContent = i18n.t('section.activities.unit-fractions-count.eachPart')
          .replace('{den}', denominator);

        // Render answer choices
        this.renderChoices();
        this.renderProgress();
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        const { options, denominator } = this.currentQuestion;

        let html = '';
        options.forEach(count => {
          // Format the choice display
          const ordinalWord = this.getOrdinalWord(denominator, count);
          const fractionText = `${count}/${denominator}`;

          html += `
            <button class="choice-btn" data-count="${count}" aria-label="${count} one-${ordinalWord}, ${fractionText}">
              <div class="choice-content">
                <div class="choice-count">${count}</div>
                <div class="choice-fraction">
                  <div class="fraction-display">
                    <span class="fraction-numerator">${count}</span>
                    <span class="fraction-denominator">${denominator}</span>
                  </div>
                </div>
              </div>
            </button>
          `;
        });

        this.answerChoices.innerHTML = html;

        // Add click and keyboard handlers
        const buttons = this.answerChoices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            const count = parseInt(btn.dataset.count);
            this.checkAnswer(count, btn);
          });
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              const count = parseInt(btn.dataset.count);
              this.checkAnswer(count, btn);
            }
          });
        });
      },

      /**
       * Check the selected answer
       */
      checkAnswer(selectedCount, selectedBtn) {
        // Disable all buttons
        const buttons = this.answerChoices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        const { numerator, denominator } = this.currentQuestion;
        const isCorrect = selectedCount === numerator;

        if (isCorrect) {
          selectedBtn.classList.add('correct');
          this.feedback.textContent = i18n.t('section.activities.unit-fractions-count.correct');
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;
        } else {
          selectedBtn.classList.add('incorrect');
          // Show correct answer
          buttons.forEach(btn => {
            const count = parseInt(btn.dataset.count);
            if (count === numerator) {
              btn.classList.add('correct');
            }
          });
          this.feedback.textContent = i18n.t('section.activities.unit-fractions-count.wrong')
            .replace('{num}', numerator)
            .replace('{den}', denominator);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.unit-fractions-count.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.unit-fractions-count.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.unit-fractions-count.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.unit-fractions-count.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.startRound();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      UnitFractionsCount.init();
    });
  </script>
