  <script>
    // Skip Count for Multiplication Activity - Grade 3 Level 3
    const SkipCountMultiply = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      countBy: 0,
      sequence: [],
      blankIndex: 0,
      correctAnswer: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // DOM elements
      countByNumber: null,
      sequenceSection: null,
      choices: null,
      connection: null,
      connectionText: null,
      progress: null,
      feedback: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        // Get DOM elements
        this.countByNumber = document.getElementById('count-by-number');
        this.sequenceSection = document.getElementById('sequence-section');
        this.choices = document.getElementById('choices');
        this.connection = document.getElementById('connection');
        this.connectionText = document.getElementById('connection-text');
        this.progress = document.getElementById('progress');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Dynamic translations - will update on next question
      },

      getTranslation(key, fallback) {
        if (window.i18n) {
          const translated = i18n.t(`section.activities.skip-count-multiply.${key}`);
          return translated !== `section.activities.skip-count-multiply.${key}` ? translated : fallback;
        }
        return fallback;
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      },

      generateSequence() {
        // Progressive difficulty
        // Questions 0-3: Easy multiples (2, 5, 10)
        // Questions 4-6: Medium multiples (3, 4, 6)
        // Questions 7-9: Harder multiples (7, 8, 9)

        let possibleCountBy;
        if (this.currentQuestion < 4) {
          possibleCountBy = [2, 5, 10];
        } else if (this.currentQuestion < 7) {
          possibleCountBy = [3, 4, 6];
        } else {
          possibleCountBy = [7, 8, 9];
        }

        this.countBy = possibleCountBy[this.randomInt(0, possibleCountBy.length - 1)];

        // Generate sequence of 6 numbers
        const sequenceLength = 6;
        const startMultiplier = this.randomInt(0, 4); // Start from 0 to 4 times the countBy

        this.sequence = [];
        for (let i = 0; i < sequenceLength; i++) {
          this.sequence.push((startMultiplier + i) * this.countBy);
        }

        // Pick a random position for the blank (not first or last)
        this.blankIndex = this.randomInt(1, sequenceLength - 2);
        this.correctAnswer = this.sequence[this.blankIndex];
      },

      generateChoices() {
        const choices = new Set();
        choices.add(this.correctAnswer);

        // Generate plausible wrong answers
        const wrongStrategies = [
          () => this.correctAnswer + this.countBy,       // Next in sequence
          () => this.correctAnswer - this.countBy,       // Previous in sequence
          () => this.correctAnswer + 1,                   // Off by one
          () => this.correctAnswer - 1,                   // Off by one
          () => this.correctAnswer + 2,                   // Off by two
          () => this.correctAnswer - 2,                   // Off by two
          () => this.correctAnswer + (this.countBy * 2),  // Skip two ahead
          () => Math.floor(this.correctAnswer / 2),       // Half (common mistake)
          () => this.correctAnswer + 10,                  // Add 10 (if wrong base)
          () => this.correctAnswer - 10                   // Subtract 10
        ];

        let attempts = 0;
        while (choices.size < 4 && attempts < 20) {
          const strategy = wrongStrategies[this.randomInt(0, wrongStrategies.length - 1)];
          const wrongAnswer = strategy();
          if (wrongAnswer > 0 && wrongAnswer !== this.correctAnswer && !choices.has(wrongAnswer)) {
            choices.add(wrongAnswer);
          }
          attempts++;
        }

        // Fill remaining with nearby values
        while (choices.size < 4) {
          const offset = this.randomInt(-5, 5) * this.countBy;
          const newChoice = Math.max(1, this.correctAnswer + offset);
          if (!choices.has(newChoice) && newChoice !== this.correctAnswer) {
            choices.add(newChoice);
          }
        }

        return this.shuffle(Array.from(choices));
      },

      startQuestion() {
        this.generateSequence();
        this.isAnswered = false;

        // Update count by display
        this.countByNumber.textContent = this.countBy;

        // Render sequence
        this.renderSequence();

        // Generate and render choices
        const choiceValues = this.generateChoices();
        this.renderChoices(choiceValues);

        // Hide connection
        this.connection.style.display = 'none';

        // Reset UI
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderSequence() {
        this.sequenceSection.innerHTML = '';

        this.sequence.forEach((num, index) => {
          const item = document.createElement('div');
          item.className = 'sequence-item';

          if (index === this.blankIndex) {
            item.classList.add('blank');
            item.textContent = '?';
            item.id = 'blank-slot';
          } else {
            item.textContent = num;
          }

          this.sequenceSection.appendChild(item);

          // Add arrow between items (except after last)
          if (index < this.sequence.length - 1) {
            const arrow = document.createElement('div');
            arrow.className = 'sequence-arrow';
            arrow.textContent = '→';
            this.sequenceSection.appendChild(arrow);
          }
        });
      },

      renderChoices(choiceValues) {
        this.choices.innerHTML = '';

        choiceValues.forEach(value => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = value;
          btn.dataset.value = value;
          btn.addEventListener('click', () => {
            if (!this.isAnswered) {
              this.checkAnswer(value, btn);
            }
          });
          this.choices.appendChild(btn);
        });
      },

      checkAnswer(selectedValue, btnElement) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const isCorrect = selectedValue === this.correctAnswer;

        // Disable all buttons and show correct answer
        const allBtns = this.choices.querySelectorAll('.choice-btn');
        allBtns.forEach(btn => {
          btn.disabled = true;
          if (parseInt(btn.dataset.value) === this.correctAnswer) {
            btn.classList.add('correct');
          }
        });

        // Fill in the blank
        const blankSlot = document.getElementById('blank-slot');
        if (blankSlot) {
          blankSlot.textContent = this.correctAnswer;
          blankSlot.classList.remove('blank');
          blankSlot.classList.add(isCorrect ? 'filled-correct' : 'filled-incorrect');
        }

        // Show multiplication connection
        this.showConnection();

        if (isCorrect) {
          this.correctCount++;
          btnElement.classList.add('correct');
          const correctMsg = window.i18n ? i18n.t('feedback.correct') : 'Correct!';
          this.feedback.textContent = correctMsg;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btnElement.classList.add('incorrect');
          const tryAgainMsg = window.i18n ? i18n.t('feedback.tryAgain') : 'Try again!';
          const answerIs = this.getTranslation('answerIs', 'The answer is');
          this.feedback.textContent = `${tryAgainMsg} ${answerIs} ${this.correctAnswer}`;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      showConnection() {
        // Calculate the multiplication connection
        const multiplier = this.blankIndex + Math.floor(this.sequence[0] / this.countBy);
        const thatsPrefix = this.getTranslation('thats', "That's");
        const times = '×';
        const equals = '=';

        this.connectionText.textContent = `${thatsPrefix} ${this.countBy} ${times} ${multiplier} ${equals} ${this.correctAnswer}`;
        this.connection.style.display = 'block';
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation('perfect', 'Amazing skip counting!');
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '🎵';
          this.statsMessage.textContent = this.getTranslation('great', 'Great skip counting!');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation('keepPracticing', 'Keep practicing!');
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      SkipCountMultiply.init();
    });
  </script>
