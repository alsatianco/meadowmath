    }

    .choice-btn:hover {

    .choice-btn:active {

  <script>
    // Fraction of Shape Activity - Grade 3
    const FractionOfShapeG3 = {
      // Game state
      currentRound: 1,
      maxRounds: 10,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      currentQuestion: null,
      questions: [],

      // DOM elements
      shapeDisplay: null,
      answerChoices: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      // Shape colors
      colors: {
        shaded: ['#fecaca', '#fed7aa', '#fef08a', '#bbf7d0', '#bae6fd', '#ddd6fe', '#fbcfe8'],
        stroke: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#0ea5e9', '#8b5cf6', '#ec4899'],
        unshaded: '#f8fafc'
      },

      /**
       * Fraction options for the activity
       * Grade 3 uses denominators 2, 3, 4, 6, 8 (per content-g3.md)
       */
      fractions: [
        { numerator: 1, denominator: 2, label: '1/2' },
        { numerator: 1, denominator: 3, label: '1/3' },
        { numerator: 2, denominator: 3, label: '2/3' },
        { numerator: 1, denominator: 4, label: '1/4' },
        { numerator: 2, denominator: 4, label: '2/4' },
        { numerator: 3, denominator: 4, label: '3/4' },
        { numerator: 1, denominator: 6, label: '1/6' },
        { numerator: 5, denominator: 6, label: '5/6' },
        { numerator: 1, denominator: 8, label: '1/8' },
        { numerator: 3, denominator: 8, label: '3/8' },
        { numerator: 5, denominator: 8, label: '5/8' },
        { numerator: 7, denominator: 8, label: '7/8' }
      ],

      /**
       * Generate a rectangle divided into parts
       */
      generateRectangle(shadedParts, totalParts, fill, stroke) {
        const width = 160;
        const height = 100;
        const x = 20;
        const y = 50;
        const partWidth = width / totalParts;

        let svg = `<svg viewBox="0 0 200 200">`;

        // Draw each part
        for (let i = 0; i < totalParts; i++) {
          const partFill = i < shadedParts ? fill : this.colors.unshaded;
          svg += `<rect x="${x + i * partWidth}" y="${y}" width="${partWidth}" height="${height}" fill="${partFill}" stroke="${stroke}" stroke-width="2"/>`;
        }

        svg += `</svg>`;
        return svg;
      },

      /**
       * Generate a circle divided into pie slices
       */
      generateCircle(shadedParts, totalParts, fill, stroke) {
        const cx = 100;
        const cy = 100;
        const r = 70;

        let svg = `<svg viewBox="0 0 200 200">`;

        const angleStep = 360 / totalParts;
        for (let i = 0; i < totalParts; i++) {
          const startAngle = i * angleStep - 90;
          const endAngle = startAngle + angleStep;
          const partFill = i < shadedParts ? fill : this.colors.unshaded;

          const startRad = startAngle * Math.PI / 180;
          const endRad = endAngle * Math.PI / 180;

          const x1 = cx + r * Math.cos(startRad);
          const y1 = cy + r * Math.sin(startRad);
          const x2 = cx + r * Math.cos(endRad);
          const y2 = cy + r * Math.sin(endRad);

          // For large arcs (>180 degrees), we need the large-arc-flag
          const largeArcFlag = angleStep > 180 ? 1 : 0;

          svg += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArcFlag} 1 ${x2} ${y2} Z" fill="${partFill}" stroke="${stroke}" stroke-width="2"/>`;
        }

        svg += `</svg>`;
        return svg;
      },

      /**
       * Generate a square divided into parts (grid style for larger denominators)
       */
      generateSquare(shadedParts, totalParts, fill, stroke) {
        const size = 140;
        const x = 30;
        const y = 30;

        let svg = `<svg viewBox="0 0 200 200">`;

        if (totalParts === 2) {
          // Split vertically
          const leftFill = shadedParts >= 1 ? fill : this.colors.unshaded;
          const rightFill = shadedParts >= 2 ? fill : this.colors.unshaded;
          svg += `<rect x="${x}" y="${y}" width="${size / 2}" height="${size}" fill="${leftFill}" stroke="${stroke}" stroke-width="2"/>`;
          svg += `<rect x="${x + size / 2}" y="${y}" width="${size / 2}" height="${size}" fill="${rightFill}" stroke="${stroke}" stroke-width="2"/>`;
        } else if (totalParts === 3) {
          // Split into 3 horizontal rows
          const partHeight = size / 3;
          for (let i = 0; i < 3; i++) {
            const partFill = i < shadedParts ? fill : this.colors.unshaded;
            svg += `<rect x="${x}" y="${y + i * partHeight}" width="${size}" height="${partHeight}" fill="${partFill}" stroke="${stroke}" stroke-width="2"/>`;
          }
        } else if (totalParts === 4) {
          // 2x2 grid
          const halfSize = size / 2;
          const positions = [
            { px: x, py: y },
            { px: x + halfSize, py: y },
            { px: x, py: y + halfSize },
            { px: x + halfSize, py: y + halfSize }
          ];
          for (let i = 0; i < 4; i++) {
            const partFill = i < shadedParts ? fill : this.colors.unshaded;
            svg += `<rect x="${positions[i].px}" y="${positions[i].py}" width="${halfSize}" height="${halfSize}" fill="${partFill}" stroke="${stroke}" stroke-width="2"/>`;
          }
        } else if (totalParts === 6) {
          // 2x3 grid
          const partWidth = size / 3;
          const partHeight = size / 2;
          let index = 0;
          for (let row = 0; row < 2; row++) {
            for (let col = 0; col < 3; col++) {
              const partFill = index < shadedParts ? fill : this.colors.unshaded;
              svg += `<rect x="${x + col * partWidth}" y="${y + row * partHeight}" width="${partWidth}" height="${partHeight}" fill="${partFill}" stroke="${stroke}" stroke-width="2"/>`;
              index++;
            }
          }
        } else if (totalParts === 8) {
          // 2x4 grid
          const partWidth = size / 4;
          const partHeight = size / 2;
          let index = 0;
          for (let row = 0; row < 2; row++) {
            for (let col = 0; col < 4; col++) {
              const partFill = index < shadedParts ? fill : this.colors.unshaded;
              svg += `<rect x="${x + col * partWidth}" y="${y + row * partHeight}" width="${partWidth}" height="${partHeight}" fill="${partFill}" stroke="${stroke}" stroke-width="2"/>`;
              index++;
            }
          }
        }

        svg += `</svg>`;
        return svg;
      },

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.shapeDisplay = document.getElementById('shape-display');
        this.answerChoices = document.getElementById('answer-choices');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Generate question sequence
        this.generateSequence();

        // Start first round
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Generate a random sequence of questions
       */
      generateSequence() {
        this.questions = [];
        const shapeTypes = ['rectangle', 'circle', 'square'];

        for (let i = 0; i < this.maxRounds; i++) {
          // Pick a random fraction
          const fraction = this.fractions[i % this.fractions.length];
          const shapeType = shapeTypes[i % shapeTypes.length];
          const colorIndex = randomInt(0, this.colors.shaded.length - 1);

          // Generate wrong options (different fractions with same or different denominators)
          const wrongOptions = this.fractions
            .filter(f => !(f.numerator === fraction.numerator && f.denominator === fraction.denominator))
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);

          // Combine correct and wrong options, then shuffle
          const allOptions = [fraction, ...wrongOptions];
          const shuffledOptions = shuffle(allOptions);

          this.questions.push({
            fraction,
            shapeType,
            colorIndex,
            options: shuffledOptions
          });
        }

        // Shuffle questions for variety
        this.questions = shuffle(this.questions);
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        // Update feedback message if showing
        if (this.feedback.classList.contains('show')) {
          const isError = this.feedback.classList.contains('error');
          if (isError) {
            const { fraction } = this.currentQuestion;
            const fractionText = `${fraction.numerator}/${fraction.denominator}`;
            this.feedback.textContent = i18n.t('section.activities.fraction-of-shape-g3.wrong')
              .replace('{fraction}', fractionText);
          } else {
            this.feedback.textContent = i18n.t('section.activities.fraction-of-shape-g3.correct');
          }
        }
      },

      /**
       * Generate a new round
       */
      generateRound() {
        this.feedback.classList.remove('show');
        this.currentQuestion = this.questions[this.currentRound - 1];

        this.renderShape();
        this.renderChoices();
      },

      /**
       * Render the current shape
       */
      renderShape() {
        const { fraction, shapeType, colorIndex } = this.currentQuestion;
        const fill = this.colors.shaded[colorIndex];
        const stroke = this.colors.stroke[colorIndex];
        const { numerator, denominator } = fraction;

        let svg;
        switch (shapeType) {
          case 'rectangle':
            svg = this.generateRectangle(numerator, denominator, fill, stroke);
            break;
          case 'circle':
            svg = this.generateCircle(numerator, denominator, fill, stroke);
            break;
          case 'square':
            svg = this.generateSquare(numerator, denominator, fill, stroke);
            break;
        }

        this.shapeDisplay.innerHTML = svg;
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        const { options } = this.currentQuestion;

        let html = '';
        options.forEach(option => {
          html += `
            <button class="choice-btn" data-numerator="${option.numerator}" data-denominator="${option.denominator}" tabindex="0" aria-label="${option.numerator} out of ${option.denominator}">
              <div class="fraction-display">
                <span class="fraction-numerator">${option.numerator}</span>
                <span class="fraction-denominator">${option.denominator}</span>
              </div>
            </button>
          `;
        });

        this.answerChoices.innerHTML = html;

        // Add click and keyboard handlers
        const buttons = this.answerChoices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            const num = parseInt(btn.dataset.numerator);
            const den = parseInt(btn.dataset.denominator);
            this.checkAnswer(num, den, btn);
          });
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              const num = parseInt(btn.dataset.numerator);
              const den = parseInt(btn.dataset.denominator);
              this.checkAnswer(num, den, btn);
            }
          });
        });
      },

      /**
       * Check the selected answer
       */
      checkAnswer(selectedNumerator, selectedDenominator, selectedBtn) {
        // Disable all buttons
        const buttons = this.answerChoices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);

        const { fraction } = this.currentQuestion;
        const isCorrect = selectedNumerator === fraction.numerator && selectedDenominator === fraction.denominator;

        if (isCorrect) {
          selectedBtn.classList.add('correct');
          this.feedback.textContent = i18n.t('section.activities.fraction-of-shape-g3.correct');
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
          this.correctCount++;
        } else {
          selectedBtn.classList.add('incorrect');
          // Show correct answer
          buttons.forEach(btn => {
            const num = parseInt(btn.dataset.numerator);
            const den = parseInt(btn.dataset.denominator);
            if (num === fraction.numerator && den === fraction.denominator) {
              btn.classList.add('correct');
            }
          });
          const fractionText = `${fraction.numerator}/${fraction.denominator}`;
          this.feedback.textContent = i18n.t('section.activities.fraction-of-shape-g3.wrong')
            .replace('{fraction}', fractionText);
          this.feedback.classList.add('show', 'error');
          this.wrongCount++;
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-of-shape-g3.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-of-shape-g3.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-of-shape-g3.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-of-shape-g3.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the entire activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateSequence();
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.generateRound();
        this.renderProgress();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      FractionOfShapeG3.init();
    });
  </script>
