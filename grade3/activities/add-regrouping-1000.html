  <script>
    // Regrouping Practice: Add (Column) Activity - Grade 3 Level 2
    const AddRegrouping1000 = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      numberFirst: 0,
      numberSecond: 0,
      correctAnswer: 0,
      questionType: 'full', // 'ones', 'tens', 'full'
      autoAdvanceDelay: 1500,
      isAnswered: false,
      hintVisible: false,

      // DOM elements
      firstHundreds: null,
      firstTens: null,
      firstOnes: null,
      secondHundreds: null,
      secondTens: null,
      secondOnes: null,
      resultThousands: null,
      resultHundreds: null,
      resultTens: null,
      resultOnes: null,
      carryHundreds: null,
      carryTens: null,
      carryOnes: null,
      carryRow: null,
      questionPrompt: null,
      promptText: null,
      hintToggle: null,
      hintLabel: null,
      hintPanel: null,
      hintContent: null,
      choiceContainer: null,
      feedback: null,
      progress: null,
      btnReset: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        // Get DOM elements
        this.firstHundreds = document.getElementById('first-hundreds');
        this.firstTens = document.getElementById('first-tens');
        this.firstOnes = document.getElementById('first-ones');
        this.secondHundreds = document.getElementById('second-hundreds');
        this.secondTens = document.getElementById('second-tens');
        this.secondOnes = document.getElementById('second-ones');
        this.resultThousands = document.getElementById('result-thousands');
        this.resultHundreds = document.getElementById('result-hundreds');
        this.resultTens = document.getElementById('result-tens');
        this.resultOnes = document.getElementById('result-ones');
        this.carryHundreds = document.getElementById('carry-hundreds');
        this.carryTens = document.getElementById('carry-tens');
        this.carryOnes = document.getElementById('carry-ones');
        this.carryRow = document.getElementById('carry-row');
        this.questionPrompt = document.getElementById('question-prompt');
        this.promptText = document.getElementById('prompt-text');
        this.hintToggle = document.getElementById('hint-toggle');
        this.hintLabel = document.getElementById('hint-label');
        this.hintPanel = document.getElementById('hint-panel');
        this.hintContent = document.getElementById('hint-content');
        this.choiceContainer = document.getElementById('choice-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.btnReset = document.getElementById('btn-reset');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Event listeners
        this.btnReset.addEventListener('click', () => this.resetCurrentQuestion());
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });
        this.hintToggle.addEventListener('click', () => this.toggleHint());

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Update prompt text based on question type
        this.updatePromptText();
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      generateProblem() {
        // Progressive difficulty with focus on regrouping
        // Questions 0-2: 2-digit + 2-digit, ensure ones regroup
        // Questions 3-5: 2-digit + 2-digit, ensure tens regroup
        // Questions 6-7: 3-digit + 2-digit, mixed regrouping
        // Questions 8-9: 3-digit + 3-digit, possibly both regroup

        let first, second;

        if (this.currentQuestion < 3) {
          // Ensure ones column requires regrouping
          const firstOnes = this.randomInt(5, 9);
          const secondOnes = this.randomInt(10 - firstOnes + 1, 9);
          const firstTens = this.randomInt(1, 7);
          const secondTens = this.randomInt(1, 9 - firstTens);
          first = firstTens * 10 + firstOnes;
          second = secondTens * 10 + secondOnes;
          this.questionType = this.randomInt(0, 2) === 0 ? 'ones' : 'full';
        } else if (this.currentQuestion < 6) {
          // Ensure tens column requires regrouping
          const firstOnes = this.randomInt(1, 5);
          const secondOnes = this.randomInt(1, 9 - firstOnes);
          const firstTens = this.randomInt(5, 9);
          const secondTens = this.randomInt(10 - firstTens + 1, 9);
          first = firstTens * 10 + firstOnes;
          second = secondTens * 10 + secondOnes;
          this.questionType = this.randomInt(0, 2) === 0 ? 'tens' : 'full';
        } else if (this.currentQuestion < 8) {
          // 3-digit + 2-digit, ensure at least one regrouping
          first = this.randomInt(200, 500);
          // Ensure ones column requires regrouping
          const firstOnes = first % 10;
          const secondOnes = firstOnes < 5 ? this.randomInt(10 - firstOnes, 9) : this.randomInt(11 - firstOnes, 9);
          // If firstOnes >= 5, secondOnes needs to be (11-firstOnes) to 9 to guarantee sum > 10
          // e.g., firstOnes=5, secondOnes needs to be 6-9 (sum 11-14)
          // e.g., firstOnes=9, secondOnes needs to be 2-9 (sum 11-18)
          second = this.randomInt(5, 9) * 10 + secondOnes;
          this.questionType = 'full';
        } else {
          // 3-digit + 3-digit, ensure regrouping in multiple places
          const firstH = this.randomInt(2, 4);
          const firstT = this.randomInt(5, 9);
          const firstO = this.randomInt(5, 9);
          first = firstH * 100 + firstT * 10 + firstO;

          const secondH = this.randomInt(1, 4);
          const secondT = this.randomInt(10 - firstT, 9);
          const secondO = this.randomInt(10 - firstO, 9);
          second = secondH * 100 + secondT * 10 + secondO;

          // Ensure sum is under 1000
          if (first + second >= 1000) {
            second = 999 - first - this.randomInt(1, 50);
          }
          this.questionType = 'full';
        }

        this.numberFirst = first;
        this.numberSecond = second;
        this.correctAnswer = first + second;
        this.isAnswered = false;
        this.hintVisible = false;
      },

      startQuestion() {
        this.generateProblem();
        this.displayProblem();
        this.updatePromptText();
        this.generateChoices();
        this.feedback.classList.remove('show', 'error');
        this.hintPanel.classList.remove('show');
        this.hintToggle.classList.remove('active');
        this.updateHintLabel();
        this.renderProgress();
      },

      displayProblem() {
        // Parse first number digits
        const first = this.numberFirst;
        const firstH = Math.floor(first / 100);
        const firstT = Math.floor((first % 100) / 10);
        const firstO = first % 10;

        // Parse second number digits
        const second = this.numberSecond;
        const secondH = Math.floor(second / 100);
        const secondT = Math.floor((second % 100) / 10);
        const secondO = second % 10;

        // Display first number
        this.firstHundreds.textContent = firstH > 0 ? firstH : '';
        this.firstTens.textContent = (firstH > 0 || firstT > 0) ? firstT : '';
        this.firstOnes.textContent = firstO;

        // Display second number
        this.secondHundreds.textContent = secondH > 0 ? secondH : '';
        this.secondTens.textContent = (secondH > 0 || secondT > 0) ? secondT : '';
        this.secondOnes.textContent = secondO;

        // Clear result row
        this.resultThousands.textContent = '';
        this.resultHundreds.textContent = '?';
        this.resultTens.textContent = '?';
        this.resultOnes.textContent = '?';

        // Clear carry row
        this.carryHundreds.textContent = '';
        this.carryTens.textContent = '';
        this.carryOnes.textContent = '';
        this.carryRow.classList.remove('show');

        // Generate and display hint
        this.generateHint();
      },

      generateHint() {
        // Calculate carries
        const first = this.numberFirst;
        const second = this.numberSecond;

        const firstO = first % 10;
        const secondO = second % 10;
        const onesSum = firstO + secondO;
        const carryToTens = onesSum >= 10 ? 1 : 0;

        const firstT = Math.floor((first % 100) / 10);
        const secondT = Math.floor((second % 100) / 10);
        const tensSum = firstT + secondT + carryToTens;
        const carryToHundreds = tensSum >= 10 ? 1 : 0;

        const firstH = Math.floor(first / 100);
        const secondH = Math.floor(second / 100);
        const hundredsSum = firstH + secondH + carryToHundreds;
        const carryToThousands = hundredsSum >= 10 ? 1 : 0;

        let hintHtml = '<div class="hint-steps">';

        // Step 1: Ones
        hintHtml += '<div class="hint-step">';
        hintHtml += `<span class="step-label">${this.getTranslation('onesLabel', 'Ones')}: </span>`;
        hintHtml += `<span class="step-calc">${firstO} + ${secondO} = ${onesSum}</span>`;
        if (carryToTens) {
          hintHtml += `<span class="step-note">${this.getTranslation('writeCarry', 'Write {digit}, carry {carry}').replace('{digit}', onesSum % 10).replace('{carry}', '1')}</span>`;
        }
        hintHtml += '</div>';

        // Step 2: Tens
        hintHtml += '<div class="hint-step">';
        hintHtml += `<span class="step-label">${this.getTranslation('tensLabel', 'Tens')}: </span>`;
        if (carryToTens) {
          hintHtml += `<span class="step-calc">${firstT} + ${secondT} + 1 = ${tensSum}</span>`;
        } else {
          hintHtml += `<span class="step-calc">${firstT} + ${secondT} = ${tensSum}</span>`;
        }
        if (carryToHundreds) {
          hintHtml += `<span class="step-note">${this.getTranslation('writeCarry', 'Write {digit}, carry {carry}').replace('{digit}', tensSum % 10).replace('{carry}', '1')}</span>`;
        }
        hintHtml += '</div>';

        // Step 3: Hundreds (if applicable)
        if (firstH > 0 || secondH > 0 || carryToHundreds) {
          hintHtml += '<div class="hint-step">';
          hintHtml += `<span class="step-label">${this.getTranslation('hundredsLabel', 'Hundreds')}: </span>`;
          if (carryToHundreds) {
            hintHtml += `<span class="step-calc">${firstH} + ${secondH} + 1 = ${hundredsSum}</span>`;
          } else {
            hintHtml += `<span class="step-calc">${firstH} + ${secondH} = ${hundredsSum}</span>`;
          }
          if (carryToThousands) {
            hintHtml += `<span class="step-note">${this.getTranslation('writeCarry', 'Write {digit}, carry {carry}').replace('{digit}', hundredsSum % 10).replace('{carry}', '1')}</span>`;
          }
          hintHtml += '</div>';
        }

        hintHtml += '</div>';
        this.hintContent.innerHTML = hintHtml;
      },

      getTranslation(key, fallback) {
        if (window.i18n) {
          const translated = i18n.t(`section.activities.add-regrouping-1000.${key}`);
          return translated !== `section.activities.add-regrouping-1000.${key}` ? translated : fallback;
        }
        return fallback;
      },

      updatePromptText() {
        let prompt = '';
        if (this.questionType === 'ones') {
          prompt = this.getTranslation('whatOnesDigit', 'What is the ones digit in the answer?');
        } else if (this.questionType === 'tens') {
          prompt = this.getTranslation('whatTensDigit', 'What is the tens digit in the answer?');
        } else {
          prompt = this.getTranslation('whatIsSum', 'What is the sum?');
        }
        this.promptText.textContent = prompt;
      },

      toggleHint() {
        this.hintVisible = !this.hintVisible;
        if (this.hintVisible) {
          this.hintPanel.classList.add('show');
          this.hintToggle.classList.add('active');
        } else {
          this.hintPanel.classList.remove('show');
          this.hintToggle.classList.remove('active');
        }
        this.updateHintLabel();
      },

      updateHintLabel() {
        const showText = this.getTranslation('showHint', 'Show hint');
        const hideText = this.getTranslation('hideHint', 'Hide hint');
        this.hintLabel.textContent = this.hintVisible ? hideText : showText;
      },

      generateChoices() {
        const choices = [];
        let correctValue;

        if (this.questionType === 'ones') {
          correctValue = this.correctAnswer % 10;
        } else if (this.questionType === 'tens') {
          correctValue = Math.floor((this.correctAnswer % 100) / 10);
        } else {
          correctValue = this.correctAnswer;
        }

        choices.push(correctValue);

        if (this.questionType === 'ones' || this.questionType === 'tens') {
          // Generate single digit distractors
          while (choices.length < 4) {
            const distractor = this.randomInt(0, 9);
            if (!choices.includes(distractor)) {
              choices.push(distractor);
            }
          }
        } else {
          // Generate full sum distractors
          // Distractor 1: Off by 10 (forgot to carry or carried wrong)
          let d1 = correctValue + (Math.random() < 0.5 ? 10 : -10);
          if (d1 > 0 && !choices.includes(d1)) choices.push(d1);

          // Distractor 2: Off by 1
          let d2 = correctValue + (Math.random() < 0.5 ? 1 : -1);
          if (d2 > 0 && !choices.includes(d2)) choices.push(d2);

          // Distractor 3: "No carry" error - sum each column without regrouping
          const first = this.numberFirst;
          const second = this.numberSecond;
          const noCarryOnes = (first % 10) + (second % 10);
          const noCarryTens = (Math.floor((first % 100) / 10) + Math.floor((second % 100) / 10));
          const noCarryHundreds = (Math.floor(first / 100) + Math.floor(second / 100));
          const d3 = noCarryHundreds * 100 + noCarryTens * 10 + noCarryOnes;
          if (d3 !== correctValue && d3 > 0 && !choices.includes(d3)) {
            choices.push(d3);
          }

          // Fill remaining with nearby values
          while (choices.length < 4) {
            const offset = this.randomInt(-30, 30);
            const distractor = correctValue + offset;
            if (distractor > 0 && distractor !== correctValue && !choices.includes(distractor)) {
              choices.push(distractor);
            }
          }
        }

        // Shuffle
        this.shuffle(choices);

        // Render buttons
        let html = '';
        choices.forEach(choice => {
          const displayValue = choice.toLocaleString ? choice.toLocaleString() : choice;
          html += `<button class="choice-btn" data-value="${choice}" aria-label="Select ${displayValue}">${displayValue}</button>`;
        });
        this.choiceContainer.innerHTML = html;

        // Attach event listeners
        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          btn.addEventListener('click', () => this.selectChoice(parseInt(btn.dataset.value)));
        });
      },

      shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      },

      selectChoice(value) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        let correctValue;
        if (this.questionType === 'ones') {
          correctValue = this.correctAnswer % 10;
        } else if (this.questionType === 'tens') {
          correctValue = Math.floor((this.correctAnswer % 100) / 10);
        } else {
          correctValue = this.correctAnswer;
        }

        const isCorrect = value === correctValue;

        // Highlight correct and incorrect choices
        this.choiceContainer.querySelectorAll('.choice-btn').forEach(btn => {
          btn.disabled = true;
          if (parseInt(btn.dataset.value) === correctValue) {
            btn.classList.add('correct');
          } else if (parseInt(btn.dataset.value) === value && !isCorrect) {
            btn.classList.add('incorrect');
          }
        });

        // Show the complete answer in the column display
        this.showAnswer();

        // Show feedback
        if (isCorrect) {
          this.correctCount++;
          const msg = window.i18n ? i18n.t('feedback.correct') || 'Correct!' : 'Correct!';
          if (this.questionType === 'full') {
            this.feedback.textContent = `${msg} ${this.numberFirst} + ${this.numberSecond} = ${this.correctAnswer}`;
          } else {
            this.feedback.textContent = msg;
          }
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          let incorrectMsg;
          if (this.questionType === 'ones') {
            incorrectMsg = this.getTranslation('incorrectOnes', 'The ones digit is {answer}').replace('{answer}', correctValue);
          } else if (this.questionType === 'tens') {
            incorrectMsg = this.getTranslation('incorrectTens', 'The tens digit is {answer}').replace('{answer}', correctValue);
          } else {
            incorrectMsg = this.getTranslation('incorrectMsg', 'The sum is {answer}').replace('{answer}', this.correctAnswer.toLocaleString());
          }
          this.feedback.textContent = incorrectMsg;
          this.feedback.classList.add('error');
        }
        this.feedback.classList.add('show');

        // Auto-advance
        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      showAnswer() {
        const answer = this.correctAnswer;
        const answerStr = answer.toString().padStart(3, '0');

        // Calculate carries for display
        const first = this.numberFirst;
        const second = this.numberSecond;
        const firstO = first % 10;
        const secondO = second % 10;
        const onesSum = firstO + secondO;
        const carryToTens = onesSum >= 10 ? 1 : 0;

        const firstT = Math.floor((first % 100) / 10);
        const secondT = Math.floor((second % 100) / 10);
        const tensSum = firstT + secondT + carryToTens;
        const carryToHundreds = tensSum >= 10 ? 1 : 0;

        // Show carry digits
        if (carryToTens || carryToHundreds) {
          this.carryRow.classList.add('show');
          this.carryTens.textContent = carryToTens ? '1' : '';
          this.carryHundreds.textContent = carryToHundreds ? '1' : '';
        }

        // Show result
        if (answer >= 1000) {
          this.resultThousands.textContent = Math.floor(answer / 1000);
          this.resultHundreds.textContent = Math.floor((answer % 1000) / 100);
        } else if (answer >= 100) {
          this.resultThousands.textContent = '';
          this.resultHundreds.textContent = Math.floor(answer / 100);
        } else {
          this.resultThousands.textContent = '';
          this.resultHundreds.textContent = '';
        }
        this.resultTens.textContent = Math.floor((answer % 100) / 10);
        this.resultOnes.textContent = answer % 10;
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      resetCurrentQuestion() {
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation('perfect', 'Amazing regrouping skills!');
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '🎒';
          this.statsMessage.textContent = this.getTranslation('great', 'Great work!');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation('keepPracticing', 'Keep practicing!');
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => AddRegrouping1000.init());
      } else {

      }
    });
