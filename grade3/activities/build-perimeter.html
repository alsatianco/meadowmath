  <script>
    // Build the Perimeter Activity - Grade 3 Level 5
    const BuildPerimeter = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      questions: [],
      currentShape: null,
      autoAdvanceDelay: 1500,
      isAnswered: false,
      lastResult: null,
      polygonIndex: 0,

      polygonShapes: [
        {
          id: 'l-shape-a',
          points: [
            [0, 0],
            [5, 0],
            [5, 2],
            [3, 2],
            [3, 5],
            [0, 5]
          ]
        },
        {
          id: 'l-shape-b',
          points: [
            [0, 0],
            [6, 0],
            [6, 3],
            [2, 3],
            [2, 6],
            [0, 6]
          ]
        },
        {
          id: 'step-shape',
          points: [
            [0, 0],
            [4, 0],
            [4, 2],
            [7, 2],
            [7, 5],
            [0, 5]
          ]
        }
      ],

      // DOM elements
      shapeDisplay: null,
      missingHint: null,
      choices: null,
      progress: null,
      feedback: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        this.shapeDisplay = document.getElementById('shape-display');
        this.missingHint = document.getElementById('missing-hint');
        this.choices = document.getElementById('choices');
        this.progress = document.getElementById('progress');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.generateQuestions();
        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        const unitText = this.getTranslation('units', 'units');
        const buttons = this.choices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          const unitEl = btn.querySelector('.choice-unit');
          if (unitEl) {
            unitEl.textContent = unitText;
          }
          if (btn.dataset.value) {
            btn.setAttribute('aria-label', `${btn.dataset.value} ${unitText}`);
          }
        });

        if (this.feedback.classList.contains('show') && this.lastResult) {
          if (this.lastResult.isCorrect) {
            this.feedback.textContent = this.getTranslation('correct', 'Correct!');
            this.feedback.classList.remove('error');
          } else {
            const wrongTemplate = this.getTranslation('wrong', 'The perimeter is {perimeter} units.');
            this.feedback.textContent = wrongTemplate.replace('{perimeter}', this.lastResult.perimeter);
            this.feedback.classList.add('error');
          }
        }

        if (this.statsOverlay.classList.contains('show')) {
          this.showStats();
        }

        const shapeLabel = this.getTranslation('shapeLabel', 'Shape with side lengths');
        const svg = this.shapeDisplay.querySelector('svg');
        if (svg) {
          svg.setAttribute('aria-label', shapeLabel);
        }
      },

      getTranslation(key, fallback) {
        if (window.i18n) {
          const translated = i18n.t(`section.activities.build-perimeter.${key}`);
          return translated !== `section.activities.build-perimeter.${key}` ? translated : fallback;
        }
        return fallback;
      },

      generateQuestions() {
        this.questions = [];
        for (let i = 0; i < this.totalQuestions; i++) {
          this.questions.push(this.createQuestion());
        }
      },

      createQuestion() {
        const usePolygon = Math.random() < 0.4;
        if (usePolygon) {
          const shape = this.polygonShapes[this.polygonIndex % this.polygonShapes.length];
          this.polygonIndex++;
          const sides = this.getSideLengths(shape.points);
          const perimeter = sides.reduce((sum, value) => sum + value, 0);
          return {
            type: 'polygon',
            points: shape.points,
            sides,
            perimeter,
            missingSideIndex: null
          };
        }

        const width = randomInt(3, 8);
        const height = randomInt(2, 7);
        const points = [
          [0, 0],
          [width, 0],
          [width, height],
          [0, height]
        ];
        const sides = [width, height, width, height];
        const perimeter = 2 * (width + height);
        const showMissingSide = Math.random() < 0.4;
        const missingSideIndex = showMissingSide ? randomInt(0, 3) : null;

        return {
          type: 'rectangle',
          points,
          sides,
          perimeter,
          width,
          height,
          missingSideIndex
        };
      },

      getSideLengths(points) {
        const lengths = [];
        for (let i = 0; i < points.length; i++) {
          const [x1, y1] = points[i];
          const [x2, y2] = points[(i + 1) % points.length];
          const dx = x2 - x1;
          const dy = y2 - y1;
          lengths.push(Math.round(Math.hypot(dx, dy)));
        }
        return lengths;
      },

      startQuestion() {
        this.isAnswered = false;
        this.lastResult = null;
        this.feedback.classList.remove('show', 'error');

        this.currentShape = this.questions[this.currentQuestion];
        this.renderShape(this.currentShape);
        this.renderChoices(this.generateChoices(this.currentShape));
        this.updateHint(this.currentShape);
        this.renderProgress();
      },

      renderShape(question) {
        this.shapeDisplay.innerHTML = '';

        const scale = 30;
        const margin = 26;
        const points = question.points;
        const xs = points.map(point => point[0]);
        const ys = points.map(point => point[1]);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);

        const widthPx = (maxX - minX) * scale + margin * 2;
        const heightPx = (maxY - minY) * scale + margin * 2;
        const offsetX = margin - minX * scale;
        const offsetY = margin - minY * scale;

        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', `0 0 ${widthPx} ${heightPx}`);
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        svg.setAttribute('role', 'img');
        svg.setAttribute('aria-label', this.getTranslation('shapeLabel', 'Shape with side lengths'));
        svg.classList.add('shape-svg');

        const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        const polygonPoints = points.map(([x, y]) => {
          const px = x * scale + offsetX;
          const py = y * scale + offsetY;
          return `${px},${py}`;
        }).join(' ');

        polygon.setAttribute('points', polygonPoints);
        polygon.setAttribute('class', 'shape-outline');
        svg.appendChild(polygon);

        const centerX = points.reduce((sum, point) => sum + point[0], 0) / points.length;
        const centerY = points.reduce((sum, point) => sum + point[1], 0) / points.length;
        const labelOffset = 0.6;

        question.sides.forEach((length, index) => {
          const [x1, y1] = points[index];
          const [x2, y2] = points[(index + 1) % points.length];
          const midX = (x1 + x2) / 2;
          const midY = (y1 + y2) / 2;
          const isHorizontal = y1 === y2;

          let labelX = midX;
          let labelY = midY;

          if (isHorizontal) {
            labelY = midY + (midY < centerY ? -labelOffset : labelOffset);
          } else {
            labelX = midX + (midX < centerX ? -labelOffset : labelOffset);
          }

          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', labelX * scale + offsetX);
          text.setAttribute('y', labelY * scale + offsetY);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('dominant-baseline', 'middle');
          text.setAttribute('class', `side-label${question.missingSideIndex === index ? ' missing' : ''}`);
          text.dataset.sideIndex = index;
          text.textContent = question.missingSideIndex === index ? '?' : length;
          svg.appendChild(text);
        });

        this.shapeDisplay.appendChild(svg);
      },

      updateHint(question) {
        if (question.missingSideIndex !== null) {
          this.missingHint.hidden = false;
        } else {
          this.missingHint.hidden = true;
        }
      },

      generateChoices(question) {
        const wrongAnswers = new Set();
        if (question.type === 'rectangle') {
          const area = question.width * question.height;
          if (area !== question.perimeter) {
            wrongAnswers.add(area);
          }
        }

        const deltas = [-10, -8, -6, -4, -2, 2, 4, 6, 8, 10, 12];
        while (wrongAnswers.size < 3) {
          const delta = deltas[randomInt(0, deltas.length - 1)];
          const candidate = question.perimeter + delta;
          if (candidate > 4 && candidate !== question.perimeter) {
            wrongAnswers.add(candidate);
          }
        }

        return shuffle([question.perimeter, ...wrongAnswers]);
      },

      renderChoices(choiceValues) {
        this.choices.innerHTML = '';
        const unitText = this.getTranslation('units', 'units');

        choiceValues.forEach(value => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.type = 'button';
          btn.dataset.value = value;
          btn.setAttribute('aria-label', `${value} ${unitText}`);

          const valueSpan = document.createElement('span');
          valueSpan.className = 'choice-value';
          valueSpan.textContent = value;

          const unitSpan = document.createElement('span');
          unitSpan.className = 'choice-unit';
          unitSpan.textContent = unitText;

          btn.appendChild(valueSpan);
          btn.appendChild(unitSpan);
          btn.addEventListener('click', () => {
            if (!this.isAnswered) {
              this.checkAnswer(parseInt(value, 10), btn);
            }
          });

          this.choices.appendChild(btn);
        });
      },

      revealMissingSide() {
        if (this.currentShape.missingSideIndex === null) return;
        const label = this.shapeDisplay.querySelector(
          `text[data-side-index="${this.currentShape.missingSideIndex}"]`
        );
        if (!label) return;
        label.textContent = this.currentShape.sides[this.currentShape.missingSideIndex];
        label.classList.remove('missing');
        label.classList.add('revealed');
      },

      checkAnswer(selectedValue, btnElement) {
        if (this.isAnswered) return;

        this.isAnswered = true;
        const isCorrect = selectedValue === this.currentShape.perimeter;
        this.lastResult = { isCorrect, perimeter: this.currentShape.perimeter };
        this.revealMissingSide();

        const buttons = this.choices.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
          btn.disabled = true;
          if (parseInt(btn.dataset.value, 10) === this.currentShape.perimeter) {
            btn.classList.add('correct');
          }
        });

        if (isCorrect) {
          this.correctCount++;
          btnElement.classList.add('correct');
          this.feedback.textContent = this.getTranslation('correct', 'Correct!');
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btnElement.classList.add('incorrect');
          const wrongTemplate = this.getTranslation('wrong', 'The perimeter is {perimeter} units.');
          this.feedback.textContent = wrongTemplate.replace('{perimeter}', this.currentShape.perimeter);
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 90) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = this.getTranslation('perfect', 'Perfect perimeter builder!');
        } else if (percentage >= 70) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation('great', 'Great adding!');
        } else if (percentage >= 40) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = this.getTranslation('good', 'Nice work!');
        } else {
          this.statsIcon.textContent = '🌱';
          this.statsMessage.textContent = this.getTranslation('keepPracticing', 'Keep practicing!');
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => BuildPerimeter.init());
      } else {
        BuildPerimeter.init();
      }
    });
  </script>
