  <script>
    // Fraction Story Problems Activity - Grade 3 Level 4
    const FractionStoryProblems = {
      // Game state
      currentRound: 1,
      maxRounds: 8,
      correctCount: 0,
      wrongCount: 0,
      autoAdvanceDelay: 1500,
      questions: [],
      currentQuestion: null,
      isAnswered: false,

      // DOM elements
      storyVisual: null,
      storyText: null,
      questionText: null,
      choicesContainer: null,
      feedback: null,
      progress: null,
      statsOverlay: null,
      statsCorrect: null,
      statsWrong: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      /**
       * Story templates for generating problems
       */
      storyTemplates: [
        // Eating part of something
        {
          type: 'eating',
          items: [
            { name: 'pizza', namePlural: 'slices', icon: '🍕', shape: 'circle' },
            { name: 'pie', namePlural: 'slices', icon: '🥧', shape: 'circle' },
            { name: 'cake', namePlural: 'slices', icon: '🎂', shape: 'circle' }
          ],
          storyTemplate: 'A {item} is cut into {total} equal {parts}. You eat {used} {parts}.',
          questionTemplate: 'What fraction did you eat?'
        },
        // Sharing items
        {
          type: 'sharing',
          items: [
            { name: 'sandwich', namePlural: 'pieces', icon: '🥪', shape: 'bar' },
            { name: 'candy bar', namePlural: 'pieces', icon: '🍫', shape: 'bar' },
            { name: 'ribbon', namePlural: 'parts', icon: '🎀', shape: 'bar' }
          ],
          storyTemplate: 'A {item} is divided into {total} equal {parts}. {friend} takes {used} {parts}.',
          questionTemplate: 'What fraction did {friend} take?'
        },
        // Part of a whole (unit fraction)
        {
          type: 'unit',
          items: [
            { name: 'rope', namePlural: 'parts', icon: '🧵', shape: 'bar' },
            { name: 'board', namePlural: 'pieces', icon: '🪵', shape: 'bar' },
            { name: 'string', namePlural: 'parts', icon: '🧶', shape: 'bar' }
          ],
          storyTemplate: 'A {item} is cut into {total} equal {parts}.',
          questionTemplate: 'How much is one part?'
        },
        // Remaining/left over
        {
          type: 'remaining',
          items: [
            { name: 'cookies', namePlural: 'cookies', icon: '🍪', shape: 'items' },
            { name: 'cupcakes', namePlural: 'cupcakes', icon: '🧁', shape: 'items' },
            { name: 'flowers', namePlural: 'flowers', icon: '🌸', shape: 'items' }
          ],
          storyTemplate: 'There are {total} {item}. {used} are given away.',
          questionTemplate: 'What fraction is left?'
        }
      ],

      /**
       * Generate questions
       */
      generateQuestions() {
        this.questions = [];
        const friends = ['Sam', 'Mia', 'Leo', 'Ava', 'Ben', 'Zoe', 'Max', 'Lily'];

        // Create varied questions
        const denominators = [2, 3, 4, 6, 8];

        for (let i = 0; i < this.maxRounds; i++) {
          const template = this.storyTemplates[i % this.storyTemplates.length];
          const item = template.items[Math.floor(Math.random() * template.items.length)];
          const den = denominators[Math.floor(Math.random() * denominators.length)];
          const friend = friends[Math.floor(Math.random() * friends.length)];

          let num, correctAnswer;

          if (template.type === 'unit') {
            // Unit fraction: answer is always 1/total
            num = 0;
            correctAnswer = { num: 1, den: den };
          } else if (template.type === 'remaining') {
            // Remaining: answer is (total - used) / total
            num = randomInt(1, den - 1);
            correctAnswer = { num: den - num, den: den };
          } else {
            // Eating or sharing: answer is used / total
            num = randomInt(1, den - 1);
            correctAnswer = { num: num, den: den };
          }

          const question = {
            template: template,
            item: item,
            total: den,
            used: num,
            friend: friend,
            correctAnswer: correctAnswer
          };

          this.questions.push(question);
        }

        // Shuffle questions
        this.questions = shuffle(this.questions);
      },

      /**
       * Generate distractor fractions
       */
      generateDistractors(correct) {
        const distractors = [];
        const { num, den } = correct;

        // Generate 3 distractors
        const possibleDistractors = [];

        // Swap numerator and denominator
        if (num !== den) {
          possibleDistractors.push({ num: den, den: num });
        }

        // Different numerator, same denominator
        for (let i = 1; i < den; i++) {
          if (i !== num) {
            possibleDistractors.push({ num: i, den: den });
          }
        }

        // Same numerator, different denominator
        const otherDens = [2, 3, 4, 6, 8].filter(d => d !== den);
        for (const d of otherDens) {
          if (num <= d) {
            possibleDistractors.push({ num: num, den: d });
          }
        }

        // Common wrong answers
        if (num + 1 <= den) {
          possibleDistractors.push({ num: num + 1, den: den });
        }
        if (num - 1 >= 1) {
          possibleDistractors.push({ num: num - 1, den: den });
        }

        // Filter out equivalent fractions and duplicates
        const uniqueDistractors = possibleDistractors.filter(d => {
          // Not equivalent to correct answer
          if (d.num / d.den === num / den) return false;
          // Not already in distractors
          return !distractors.some(existing =>
            existing.num === d.num && existing.den === d.den
          );
        });

        // Shuffle and pick 3
        const shuffled = shuffle(uniqueDistractors);
        return shuffled.slice(0, 3);
      },

      /**
       * Initialize the activity
       */
      init() {
        // Get DOM elements
        this.storyVisual = document.getElementById('story-visual');
        this.storyText = document.getElementById('story-text');
        this.questionText = document.getElementById('question-text');
        this.choicesContainer = document.getElementById('choices-container');
        this.feedback = document.getElementById('feedback');
        this.progress = document.getElementById('progress');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statsCorrect = document.getElementById('stats-correct');
        this.statsWrong = document.getElementById('stats-wrong');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Event listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        // Generate questions and start
        this.generateQuestions();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Update translations when language changes
       */
      updateTranslations() {
        // Regenerate current round to update text
        if (this.currentQuestion) {
          this.renderStory();
          this.renderQuestion();
        }
      },

      /**
       * Start a new round
       */
      startRound() {
        this.currentQuestion = this.questions[this.currentRound - 1];
        this.isAnswered = false;

        // Render the story
        this.renderStory();
        this.renderQuestion();
        this.renderChoices();

        // Reset UI
        this.feedback.classList.remove('show', 'error');

        this.renderProgress();
      },

      /**
       * Render the story visual and text
       */
      renderStory() {
        const q = this.currentQuestion;
        const { template, item, total, used, friend } = q;

        // Render visual
        this.storyVisual.innerHTML = '';

        if (item.shape === 'circle') {
          this.renderCircleVisual(total, used);
        } else if (item.shape === 'bar') {
          this.renderBarVisual(total, used);
        } else if (item.shape === 'items') {
          this.renderItemsVisual(total, used, item.icon);
        }

        // Render story text
        let storyStr = i18n.t(`section.activities.fraction-story-problems.stories.${template.type}.story`)
          || template.storyTemplate;

        // Get translated parts name
        const translatedParts = i18n.t(`section.activities.fraction-story-problems.parts.${item.namePlural}`) || item.namePlural;

        storyStr = storyStr
          .replace('{item}', i18n.t(`section.activities.fraction-story-problems.items.${item.name}`) || item.name)
          .replace('{total}', total)
          .replace('{used}', used)
          .replace(/{parts}/g, translatedParts)
          .replace(/{friend}/g, friend);

        this.storyText.textContent = storyStr;
      },

      /**
       * Render a circle (pie) visual
       */
      renderCircleVisual(total, used) {
        const container = document.createElement('div');
        container.className = 'shape-circle';

        // Create SVG for better slice rendering
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.style.width = '100%';
        svg.style.height = '100%';

        const cx = 50, cy = 50, r = 48;

        for (let i = 0; i < total; i++) {
          const startAngle = (i / total) * 360 - 90;
          const endAngle = ((i + 1) / total) * 360 - 90;

          const startRad = (startAngle * Math.PI) / 180;
          const endRad = (endAngle * Math.PI) / 180;

          const x1 = cx + r * Math.cos(startRad);
          const y1 = cy + r * Math.sin(startRad);
          const x2 = cx + r * Math.cos(endRad);
          const y2 = cy + r * Math.sin(endRad);

          const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;

          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
          path.setAttribute('d', d);
          path.setAttribute('stroke', '#92400e');
          path.setAttribute('stroke-width', '2');

          if (i < used) {
            path.setAttribute('fill', '#60a5fa');
          } else {
            path.setAttribute('fill', '#f8fafc');
          }

          svg.appendChild(path);
        }

        container.appendChild(svg);
        this.storyVisual.appendChild(container);
      },

      /**
       * Render a bar visual
       */
      renderBarVisual(total, used) {
        const bar = document.createElement('div');
        bar.className = 'shape-bar';

        for (let i = 0; i < total; i++) {
          const part = document.createElement('div');
          part.className = 'part';
          if (i < used) {
            part.classList.add('shaded');
          } else {
            part.classList.add('unshaded');
          }
          bar.appendChild(part);
        }

        this.storyVisual.appendChild(bar);
      },

      /**
       * Render items grid visual
       */
      renderItemsVisual(total, used, icon) {
        const grid = document.createElement('div');
        grid.className = 'items-grid';

        for (let i = 0; i < total; i++) {
          const item = document.createElement('span');
          item.className = 'item-icon';
          item.textContent = icon;
          if (i < used) {
            item.classList.add('used');
          }
          grid.appendChild(item);
        }

        this.storyVisual.appendChild(grid);
      },

      /**
       * Render the question
       */
      renderQuestion() {
        const q = this.currentQuestion;
        const { template, friend } = q;

        let questionStr = i18n.t(`section.activities.fraction-story-problems.stories.${template.type}.question`)
          || template.questionTemplate;

        questionStr = questionStr.replace(/{friend}/g, friend);

        this.questionText.textContent = questionStr;
      },

      /**
       * Render answer choices
       */
      renderChoices() {
        const q = this.currentQuestion;
        const correct = q.correctAnswer;
        const distractors = this.generateDistractors(correct);

        // Combine and shuffle
        const choices = shuffle([correct, ...distractors]);

        this.choicesContainer.innerHTML = '';

        choices.forEach((choice, index) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.dataset.num = choice.num;
          btn.dataset.den = choice.den;
          const ariaLabel = i18n.t('section.activities.fraction-story-problems.fractionLabel')
            .replace('{num}', choice.num)
            .replace('{den}', choice.den);
          btn.setAttribute('aria-label', ariaLabel);

          btn.innerHTML = `
            <div class="choice-fraction">
              <span class="numerator">${choice.num}</span>
              <span class="denominator">${choice.den}</span>
            </div>
          `;

          btn.addEventListener('click', () => this.selectAnswer(btn, choice));
          this.choicesContainer.appendChild(btn);
        });
      },

      /**
       * Handle answer selection
       */
      selectAnswer(btn, choice) {
        if (this.isAnswered) return;
        this.isAnswered = true;

        const correct = this.currentQuestion.correctAnswer;
        const isCorrect = (choice.num === correct.num && choice.den === correct.den);

        // Disable all buttons
        const buttons = this.choicesContainer.querySelectorAll('.choice-btn');
        buttons.forEach(b => b.disabled = true);

        if (isCorrect) {
          this.correctCount++;
          btn.classList.add('correct');
          this.feedback.textContent = i18n.t('section.activities.fraction-story-problems.correct');
          this.feedback.classList.remove('error');
          this.feedback.classList.add('show');
        } else {
          this.wrongCount++;
          btn.classList.add('incorrect');

          // Show correct answer
          buttons.forEach(b => {
            const bNum = parseInt(b.dataset.num);
            const bDen = parseInt(b.dataset.den);
            if (bNum === correct.num && bDen === correct.den) {
              b.classList.add('correct');
            }
          });

          const msg = i18n.t('section.activities.fraction-story-problems.wrong')
            .replace('{fraction}', `${correct.num}/${correct.den}`);
          this.feedback.textContent = msg;
          this.feedback.classList.add('show', 'error');
        }

        this.renderProgress();

        // Auto-advance after delay
        setTimeout(() => {
          if (this.currentRound < this.maxRounds) {
            this.nextRound();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      /**
       * Go to next round
       */
      nextRound() {
        this.currentRound++;
        this.startRound();
      },

      /**
       * Show completion stats
       */
      showStats() {
        this.statsCorrect.textContent = this.correctCount;
        this.statsWrong.textContent = this.wrongCount;

        const percent = this.correctCount / this.maxRounds;

        if (percent === 1) {
          this.statsIcon.textContent = '🏆';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-story-problems.perfect');
        } else if (percent >= 0.8) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-story-problems.great');
        } else if (percent >= 0.6) {
          this.statsIcon.textContent = '👍';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-story-problems.good');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = i18n.t('section.activities.fraction-story-problems.keepPracticing');
        }

        this.statsOverlay.classList.add('show');
      },

      /**
       * Restart the activity
       */
      restartActivity() {
        this.currentRound = 1;
        this.correctCount = 0;
        this.wrongCount = 0;
        this.statsOverlay.classList.remove('show');
        this.generateQuestions();
        this.startRound();
        this.renderProgress();
      },

      /**
       * Render progress indicator
       */
      renderProgress() {
        let html = '';
        for (let i = 1; i <= this.maxRounds; i++) {
          let className = 'progress-dot';
          if (i < this.currentRound) {
            className += ' completed';
          } else if (i === this.currentRound) {
            className += ' current';
          }
          html += `<div class="${className}" role="presentation" aria-hidden="true"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.ready();
      FractionStoryProblems.init();
    });
  </script>
