  <script>
    // Match Picture to Equation Activity - Grade 3 Level 3
    const MatchPictureEquation = {
      currentQuestion: 0,
      totalQuestions: 10,
      correctCount: 0,
      incorrectCount: 0,
      autoAdvanceDelay: 1500,
      isAnswered: false,

      // Current problem data
      pictureType: '', // 'groups' or 'array'
      rows: 0,
      cols: 0, // for arrays
      groups: 0,
      itemsPerGroup: 0, // for equal groups
      product: 0,
      correctEquation: '',

      // Items for equal groups display
      groupItems: [
        { emoji: '🍎', name: 'apple' },
        { emoji: '🍪', name: 'cookie' },
        { emoji: '⭐', name: 'star' },
        { emoji: '🎈', name: 'balloon' },
        { emoji: '🌸', name: 'flower' },
        { emoji: '🍬', name: 'candy' },
        { emoji: '🔵', name: 'ball' },
        { emoji: '🐟', name: 'fish' }
      ],

      currentItem: null,

      // DOM elements
      pictureLabel: null,
      pictureDisplay: null,
      choices: null,
      progress: null,
      feedback: null,
      statsOverlay: null,
      statCorrect: null,
      statIncorrect: null,
      statsMessage: null,
      statsIcon: null,
      btnPlayAgain: null,

      init() {
        // Get DOM elements
        this.pictureLabel = document.getElementById('picture-label');
        this.pictureDisplay = document.getElementById('picture-display');
        this.choices = document.getElementById('choices');
        this.progress = document.getElementById('progress');
        this.feedback = document.getElementById('feedback');
        this.statsOverlay = document.getElementById('stats-overlay');
        this.statCorrect = document.getElementById('stat-correct');
        this.statIncorrect = document.getElementById('stat-incorrect');
        this.statsMessage = document.getElementById('stats-message');
        this.statsIcon = document.getElementById('stats-icon');
        this.btnPlayAgain = document.getElementById('btn-play-again');

        // Set up listeners
        this.btnPlayAgain.addEventListener('click', () => this.restartActivity());
        this.statsOverlay.addEventListener('click', (e) => {
          if (e.target === this.statsOverlay) this.restartActivity();
        });

        // Listen for language changes
        document.addEventListener('languageChanged', () => {
          this.updateTranslations();
        });

        this.startQuestion();
        this.renderProgress();
      },

      updateTranslations() {
        // Dynamic translations - will update on next question
      },

      getTranslation(key, fallback) {
        if (window.i18n) {
          const translated = i18n.t(`section.activities.match-picture-equation-mult.${key}`);
          return translated !== `section.activities.match-picture-equation-mult.${key}` ? translated : fallback;
        }
        return fallback;
      },

      randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      },

      shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      },

      generateProblem() {
        // Alternate between arrays and equal groups
        this.pictureType = this.currentQuestion % 2 === 0 ? 'array' : 'groups';

        // Progressive difficulty
        let minDim, maxDim;
        if (this.currentQuestion < 4) {
          minDim = 2;
          maxDim = 5;
        } else if (this.currentQuestion < 7) {
          minDim = 3;
          maxDim = 7;
        } else {
          minDim = 4;
          maxDim = 9;
        }

        // Generate numbers ensuring product <= 81 for reasonable display
        do {
          if (this.pictureType === 'array') {
            this.rows = this.randomInt(minDim, maxDim);
            this.cols = this.randomInt(minDim, Math.min(maxDim, 9));
            this.product = this.rows * this.cols;
          } else {
            this.groups = this.randomInt(minDim, Math.min(maxDim, 8));
            this.itemsPerGroup = this.randomInt(minDim, Math.min(maxDim, 8));
            this.product = this.groups * this.itemsPerGroup;
          }
        } while (this.product > 81 || this.product < 6);

        // Pick random item for groups
        this.currentItem = this.groupItems[this.randomInt(0, this.groupItems.length - 1)];

        // Build correct equation
        if (this.pictureType === 'array') {
          this.correctEquation = `${this.rows} × ${this.cols} = ${this.product}`;
        } else {
          this.correctEquation = `${this.groups} × ${this.itemsPerGroup} = ${this.product}`;
        }
      },

      buildPictureDisplay() {
        if (this.pictureType === 'array') {
          return this.buildArrayDisplay();
        } else {
          return this.buildGroupsDisplay();
        }
      },

      buildArrayDisplay() {
        let html = '<div class="array-grid" style="grid-template-columns: repeat(' + this.cols + ', 1fr);">';
        for (let r = 0; r < this.rows; r++) {
          for (let c = 0; c < this.cols; c++) {
            html += `<div class="grid-cell filled" aria-label="Row ${r + 1}, Column ${c + 1}"></div>`;
          }
        }
        html += '</div>';
        return html;
      },

      buildGroupsDisplay() {
        let html = '<div class="groups-container">';
        for (let g = 0; g < this.groups; g++) {
          html += `<div class="group-box" aria-label="Group ${g + 1} with ${this.itemsPerGroup} items">`;
          for (let i = 0; i < this.itemsPerGroup; i++) {
            html += `<span class="group-item" aria-hidden="true">${this.currentItem.emoji}</span>`;
          }
          html += '</div>';
        }
        html += '</div>';
        return html;
      },

      generateChoices() {
        const choices = [];
        let a, b;

        if (this.pictureType === 'array') {
          a = this.rows;
          b = this.cols;
        } else {
          a = this.groups;
          b = this.itemsPerGroup;
        }

        // Correct equation - matches the picture representation exactly
        // For arrays: rows × columns (6 rows × 4 columns = "6 × 4")
        // For groups: groups × items (3 groups of 5 = "3 × 5")
        choices.push({
          text: `${a} × ${b} = ${this.product}`,
          isCorrect: true
        });

        // Swapped factors - mathematically equivalent but doesn't match the picture
        // This teaches that while 6×4 = 4×6, the equation should match what's shown
        // The picture shows a specific arrangement (rows×cols or groups×items)
        if (a !== b) {
          choices.push({
            text: `${b} × ${a} = ${this.product}`,
            isCorrect: false // Doesn't match the picture arrangement
          });
        }

        // Wrong equations - use plausible distractors
        const wrongStrategies = [];

        // Addition instead of multiplication
        wrongStrategies.push(() => `${a} + ${b} = ${a + b}`);

        // Wrong product (off by 1)
        wrongStrategies.push(() => `${a} × ${b} = ${this.product + 1}`);
        wrongStrategies.push(() => `${a} × ${b} = ${this.product - 1}`);

        // One factor off
        if (a > 2) wrongStrategies.push(() => `${a - 1} × ${b} = ${(a - 1) * b}`);
        if (b > 2) wrongStrategies.push(() => `${a} × ${b - 1} = ${a * (b - 1)}`);
        wrongStrategies.push(() => `${a + 1} × ${b} = ${(a + 1) * b}`);
        wrongStrategies.push(() => `${a} × ${b + 1} = ${a * (b + 1)}`);

        // Generate wrong answers
        const usedTexts = new Set(choices.map(c => c.text));
        let attempts = 0;
        while (choices.length < 4 && attempts < 30) {
          const strategy = wrongStrategies[this.randomInt(0, wrongStrategies.length - 1)];
          const wrongText = strategy();
          if (!usedTexts.has(wrongText)) {
            usedTexts.add(wrongText);
            choices.push({
              text: wrongText,
              isCorrect: false
            });
          }
          attempts++;
        }

        // Fill remaining with more distractors if needed
        while (choices.length < 4) {
          const randA = this.randomInt(2, 9);
          const randB = this.randomInt(2, 9);
          const wrongText = `${randA} × ${randB} = ${randA * randB}`;
          if (!usedTexts.has(wrongText)) {
            usedTexts.add(wrongText);
            choices.push({
              text: wrongText,
              isCorrect: false
            });
          }
        }

        return this.shuffle(choices.slice(0, 4));
      },

      startQuestion() {
        this.generateProblem();
        this.isAnswered = false;

        // Update picture label
        if (this.pictureType === 'array') {
          const rowsWord = this.getTranslation('rows', 'rows');
          const colsWord = this.getTranslation('columns', 'columns');
          this.pictureLabel.textContent = `${this.rows} ${rowsWord} × ${this.cols} ${colsWord}`;
        } else {
          const groupsWord = this.getTranslation('groups', 'groups');
          const eachWord = this.getTranslation('eachWith', 'each with');
          this.pictureLabel.textContent = `${this.groups} ${groupsWord}, ${eachWord} ${this.itemsPerGroup}`;
        }

        // Build picture display
        this.pictureDisplay.innerHTML = this.buildPictureDisplay();
        this.pictureDisplay.className = 'picture-display ' + this.pictureType;

        // Generate and render choices
        const choiceData = this.generateChoices();
        this.renderChoices(choiceData);

        // Reset UI
        this.feedback.classList.remove('show', 'error');
        this.renderProgress();
      },

      renderChoices(choiceData) {
        this.choices.innerHTML = '';

        choiceData.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn equation-btn';
          btn.textContent = choice.text;
          btn.dataset.correct = choice.isCorrect;
          btn.addEventListener('click', () => {
            if (!this.isAnswered) {
              this.checkAnswer(choice.isCorrect, btn, choice.text);
            }
          });
          this.choices.appendChild(btn);
        });
      },

      checkAnswer(isCorrect, btnElement, selectedText) {
        if (this.isAnswered) return;

        this.isAnswered = true;

        // Disable all buttons and show correct answers
        const allBtns = this.choices.querySelectorAll('.choice-btn');
        allBtns.forEach(btn => {
          btn.disabled = true;
          if (btn.dataset.correct === 'true') {
            btn.classList.add('correct');
          }
        });

        if (isCorrect) {
          this.correctCount++;
          btnElement.classList.add('correct');
          const correctMsg = window.i18n ? i18n.t('feedback.correct') : 'Correct!';
          this.feedback.textContent = `${correctMsg} ${selectedText}`;
          this.feedback.classList.remove('error');
        } else {
          this.incorrectCount++;
          btnElement.classList.add('incorrect');
          const tryAgainMsg = window.i18n ? i18n.t('feedback.tryAgain') : 'Try again!';
          this.feedback.textContent = `${tryAgainMsg} ${this.correctEquation}`;
          this.feedback.classList.add('error');
        }

        this.feedback.classList.add('show');

        setTimeout(() => {
          if (this.currentQuestion < this.totalQuestions - 1) {
            this.nextQuestion();
          } else {
            this.showStats();
          }
        }, this.autoAdvanceDelay);
      },

      nextQuestion() {
        this.currentQuestion++;
        this.startQuestion();
      },

      showStats() {
        this.statCorrect.textContent = this.correctCount;
        this.statIncorrect.textContent = this.incorrectCount;

        const percentage = (this.correctCount / this.totalQuestions) * 100;
        if (percentage >= 80) {
          this.statsIcon.textContent = '🌟';
          this.statsMessage.textContent = this.getTranslation('perfect', 'Amazing matching skills!');
        } else if (percentage >= 50) {
          this.statsIcon.textContent = '🖼️';
          this.statsMessage.textContent = this.getTranslation('great', 'Great matching work!');
        } else {
          this.statsIcon.textContent = '💪';
          this.statsMessage.textContent = this.getTranslation('keepPracticing', 'Keep practicing!');
        }

        this.statsOverlay.classList.add('show');
      },

      restartActivity() {
        this.currentQuestion = 0;
        this.correctCount = 0;
        this.incorrectCount = 0;
        this.statsOverlay.classList.remove('show');
        this.startQuestion();
      },

      renderProgress() {
        let html = '';
        for (let i = 0; i < this.totalQuestions; i++) {
          let className = 'progress-dot';
          if (i < this.currentQuestion) {
            className += ' completed';
          } else if (i === this.currentQuestion) {
            className += ' current';
          }
          html += `<div class="${className}"></div>`;
        }
        this.progress.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n && typeof i18n.init === 'function') {
        i18n.init().then(() => MatchPictureEquation.init());
      } else {
        MatchPictureEquation.init();
      }
    });
  </script>
  <style>
    /* Match Picture to Equation specific styles */

    /* Picture Section */
    .picture-section {
      background: rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-xl);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      text-align: center;
    }

    .picture-label {
      font-family: var(--font-secondary);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-600);
      margin-bottom: var(--space-3);
    }

    .picture-display {
      min-height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Array Grid Display */
    .picture-display.array .array-grid {
      display: grid;
      gap: 4px;
      max-width: 320px;
      margin: 0 auto;
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      padding: var(--space-3);
      border-radius: var(--radius-lg);
      border: 2px solid var(--color-neutral-200);
    }

    .picture-display .grid-cell {
      aspect-ratio: 1;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: 2px solid #1d4ed8;
      border-radius: var(--radius-md);
      box-shadow: 0 2px 0 #1e40af;
      min-width: 24px;
      min-height: 24px;
    }

    /* Groups Display */
    .picture-display.groups .groups-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
      max-width: 400px;
    }

    .group-box {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 2px;
      padding: var(--space-2);
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border: 2px solid #0ea5e9;
      border-radius: var(--radius-lg);
      min-width: 60px;
      max-width: 80px;
    }

    .group-item {
      font-size: var(--text-lg);
      display: inline-block;
    }

    /* Question Section */
    .question-section {
      text-align: center;
      margin-bottom: var(--space-4);
    }

    .question-text {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      color: var(--color-neutral-700);
      margin: 0;
    }

    /* Choices Section */
    .choices-section {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      max-width: 500px;
      margin: 0 auto var(--space-4);
    }

    .choice-btn {
      font-family: var(--font-secondary);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      padding: var(--space-4) var(--space-3);
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      border: 3px solid var(--color-neutral-300);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--color-neutral-700);
      box-shadow: 0 4px 0 var(--color-neutral-400);
      min-height: 72px;
    }

    .equation-btn {
      font-family: monospace, var(--font-secondary);
      letter-spacing: 0.05em;
    }

    .choice-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: var(--color-primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--color-primary-dark);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--color-neutral-400);
    }

    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: 0.8;
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-color: #22c55e;
      color: #166534;
      box-shadow: 0 4px 0 #15803d;
    }

    .choice-btn.incorrect {
      background: linear-gradient(135deg, #fef2f2, #fecaca);
      border-color: #ef4444;
      color: #991b1b;
      box-shadow: 0 4px 0 #dc2626;
      animation: wiggle 0.5s ease;
    }

    .choice-btn:focus-visible {
      outline: none;
      box-shadow: 0 4px 0 var(--color-neutral-400), 0 0 0 3px rgba(59, 130, 246, 0.5);
    }

    /* Progress indicator */
    .progress-indicator {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-neutral-300);
      transition: all 0.3s ease;
    }

    .progress-dot.current {
      background: var(--color-primary);
      transform: scale(1.2);
    }

    .progress-dot.completed {
      background: #22c55e;
    }

    /* Feedback */
    .activity-area {
      padding-bottom: calc(var(--space-8) + 60px);
    }

    .feedback-message {
      position: absolute;
      bottom: var(--space-4);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0;
      max-width: 90%;
    }
